<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

let currentMode = 'upper';

/* ===== 分词：按空格、下划线、短横线、大写字母边界拆分 ===== */
function toWords(str) {
  return str
    .replace(/([a-z])([A-Z])/g, '$1 $2')  // camelCase → camel Case
    .replace(/([A-Z]+)([A-Z][a-z])/g, '$1 $2')  // XMLParser → XML Parser
    .replace(/[_\-]+/g, ' ')  // snake_case / kebab-case → 空格
    .trim()
    .split(/\s+/)
    .filter(Boolean);
}

function capitalize(w) {
  return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
}

/* ===== 转换 ===== */
function convert(input) {
  switch (currentMode) {
    case 'upper': return input.toUpperCase();
    case 'lower': return input.toLowerCase();
    case 'title': return input.replace(/\b\w/g, c => c.toUpperCase());
    case 'sentence': return input.toLowerCase().replace(/(^\s*|[.!?]\s+)(\w)/g, (_, p, c) => p + c.toUpperCase());
    case 'camel': return toWords(input).map((w, i) => i === 0 ? w.toLowerCase() : capitalize(w)).join('');
    case 'pascal': return toWords(input).map(w => capitalize(w)).join('');
    case 'snake': return toWords(input).map(w => w.toLowerCase()).join('_');
    case 'kebab': return toWords(input).map(w => w.toLowerCase()).join('-');
    default: return input;
  }
}

function doConvert() {
  const input = document.getElementById('inputText').value;
  const output = convert(input);
  document.getElementById('outputText').value = output;
  updateStats(input);
  document.getElementById('inputCount').textContent = input.length;
  document.getElementById('outputCount').textContent = output.length;
}

function updateStats(s) {
  document.getElementById('statChars').textContent = s.length;
  document.getElementById('statWords').textContent = s.trim() ? s.trim().split(/\s+/).length : 0;
  document.getElementById('statLines').textContent = s ? s.split('\n').length : 0;
  document.getElementById('statUpper').textContent = (s.match(/[A-Z]/g) || []).length;
  document.getElementById('statLower').textContent = (s.match(/[a-z]/g) || []).length;
}

/* ===== 事件绑定 ===== */
document.getElementById('convertGrid').addEventListener('click', (e) => {
  const btn = e.target.closest('.convert-btn');
  if (!btn) return;
  document.querySelectorAll('.convert-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentMode = btn.dataset.mode;
  doConvert();
});

document.getElementById('inputText').addEventListener('input', doConvert);

document.getElementById('btnPaste').addEventListener('click', async () => {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('inputText').value = text;
    doConvert();
  } catch (e) { /* clipboard permission denied */ }
});

document.getElementById('btnClear').addEventListener('click', () => {
  document.getElementById('inputText').value = '';
  doConvert();
});

document.getElementById('btnCopy').addEventListener('click', () => {
  const output = document.getElementById('outputText').value;
  if (output) navigator.clipboard.writeText(output);
});
</script>
