body { min-height: 100vh; display: flex; flex-direction: column; }
.main { flex: 1; position: relative; z-index: 1; padding: 24px 24px 24px; max-width: 960px; margin: 0 auto; width: 100%; }

.editor-panel {
  padding: 24px; border-radius: 16px; margin-bottom: 16px;
  background: var(--bg-glass); backdrop-filter: blur(20px);
  border: 0.5px solid var(--border-glass);
}

/* 工具栏 */
.toolbar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.tool-btn {
  padding: 8px 14px; border-radius: 8px; border: 1.5px solid var(--border-glass);
  background: var(--bg-glass); font-size: 12px; font-weight: 600;
  color: var(--text-secondary); cursor: pointer; transition: all 150ms;
  display: flex; align-items: center; gap: 4px;
}
.tool-btn:hover { border-color: var(--brand-500); color: var(--brand-500); background: rgba(99,102,241,0.06); }
.tool-btn.primary {
  background: linear-gradient(135deg, #6366F1, #818CF8); color: white; border: none;
  box-shadow: 0 4px 24px rgba(99,102,241,0.18);
}
.tool-btn.primary:hover { box-shadow: 0 6px 28px rgba(99,102,241,0.25); }
.tool-sep { width: 1px; height: 24px; background: var(--border-glass); margin: 0 4px; align-self: center; }

/* 双栏 */
.dual { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.panel-title {
  font-size: 12px; font-weight: 700; color: var(--text-caption); text-transform: uppercase;
  letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px;
}
.panel-badge {
  padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700;
  background: rgba(99,102,241,0.08); color: var(--brand-500);
}
.panel-btn {
  padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border-glass);
  background: var(--bg-glass); font-size: 11px; font-weight: 600;
  color: var(--text-caption); cursor: pointer; transition: all 150ms;
}
.panel-btn:hover { border-color: var(--brand-500); color: var(--brand-500); }
.text-area {
  width: 100%; height: 320px; resize: vertical; padding: 16px; border-radius: 10px;
  border: 1.5px solid var(--border-glass); background: var(--bg-glass);
  font-family: var(--font-code); font-size: 13px; line-height: 1.7; tab-size: 2;
  color: var(--text-primary); transition: border-color 200ms;
}
.text-area:focus { outline: none; border-color: var(--brand-500); }
.text-area::placeholder { color: var(--text-caption); }
.text-area.error { border-color: #EF4444; animation: shake 300ms; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }

/* 状态条 */
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; border-radius: 6px; font-size: 12px; margin-top: 8px;
}
.status-ok { background: rgba(16,185,129,0.08); color: #10B981; }
.status-error { background: rgba(239,68,68,0.08); color: #EF4444; }

@media (max-width: 768px) {
  .main { padding: 16px 16px 60px; }
  .dual { grid-template-columns: 1fr; }
  .text-area { height: 240px; }
}

<h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">TOML 编辑器 — DevKit 在线开发者工具箱</h1>

<div class="topbar">
  <a class="topbar-logo" href="../index.html"><svg class="topbar-logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="6" fill="url(#bg)"/><path d="M8 7L4 12L8 17M16 7L20 12L16 17" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="bg" x1="0" y1="0" x2="24" y2="24"><stop stop-color="#6366F1"/><stop offset="1" stop-color="#818CF8"/></linearGradient></defs></svg><span class="topbar-logo-text">DevKit</span></a>
  <span class="topbar-tool-name">TOML 编辑器</span>
  <div class="topbar-spacer"></div>
  <button class="theme-btn" onclick="toggleTheme()">🌙</button>
</div>

<div class="main">
  <div class="editor-panel">
    <div class="toolbar">
      <button class="tool-btn primary" id="btnFormat">✨ 格式化</button>
      <button class="tool-btn" id="btnMinify">🗜️ 压缩</button>
      <button class="tool-btn" id="btnValidate">✅ 校验</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" id="btnToJson">📤 TOML → JSON</button>
      <button class="tool-btn" id="btnToToml">📥 JSON → TOML</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" id="btnSample">📋 示例</button>
      <button class="tool-btn" id="btnClear">✕ 清空</button>
    </div>

    <div class="dual">
      <div>
        <div class="panel-header">
          <span class="panel-title">📝 输入 <span class="panel-badge" id="leftBadge">TOML</span></span>
          <button class="panel-btn" id="btnPaste">📋 粘贴</button>
        </div>
        <textarea class="text-area" id="inputText" placeholder='[package]
name = "my-app"
version = "1.0.0"

[dependencies]
serde = "1.0"'></textarea>
      </div>
      <div>
        <div class="panel-header">
          <span class="panel-title">📤 输出 <span class="panel-badge" id="rightBadge">TOML</span></span>
          <button class="panel-btn" id="btnCopy">📋 复制</button>
        </div>
        <textarea class="text-area" id="outputText" readonly></textarea>
      </div>
    </div>

    <div class="status-bar status-ok" id="statusBar">
      <span>✅ 就绪 — 输入 TOML 后点击操作按钮</span>
      <span id="statusRight"></span>
    </div>
  </div>
</div>

<div class="statusbar">
  <span>smol-toml · TOML v1.0</span>
  <div class="statusbar-spacer"></div>
  <span>纯本地处理</span>
</div>

<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';
import TOML from 'https://cdn.jsdelivr.net/npm/smol-toml@1.3.1/dist/index.js';

const SAMPLE = `# 项目配置示例 (Cargo.toml)
[package]
name = "devkit"
version = "1.0.0"
edition = "2021"
description = "开发者工具箱"
license = "MIT"
authors = ["DevKit Team <team@devkit.dev>"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
axum = "0.7"

[dev-dependencies]
criterion = "0.5"

[[bin]]
name = "devkit-server"
path = "src/main.rs"

[profile.release]
opt-level = 3
lto = true
strip = true`;

const inputEl = document.getElementById('inputText');
const outputEl = document.getElementById('outputText');

function setStatus(ok, msg, right = '') {
  const bar = document.getElementById('statusBar');
  bar.className = 'status-bar ' + (ok ? 'status-ok' : 'status-error');
  bar.innerHTML = `<span>${ok ? '✅' : '❌'} ${msg}</span><span>${right}</span>`;
}

function setBadges(left, right) {
  document.getElementById('leftBadge').textContent = left;
  document.getElementById('rightBadge').textContent = right;
}

function showError(e) {
  outputEl.value = '';
  const msg = e.message || String(e);
  setStatus(false, msg);
  inputEl.classList.add('error');
  setTimeout(() => inputEl.classList.remove('error'), 2000);
}

/* ===== 格式化 ===== */
document.getElementById('btnFormat').addEventListener('click', () => {
  const input = inputEl.value;
  if (!input.trim()) { setStatus(false, '请输入 TOML'); return; }
  try {
    const parsed = TOML.parse(input);
    outputEl.value = TOML.stringify(parsed);
    setBadges('TOML', 'TOML');
    setStatus(true, '格式化成功', outputEl.value.split('\n').length + ' 行');
  } catch (e) { showError(e); }
});

/* ===== 压缩 ===== */
document.getElementById('btnMinify').addEventListener('click', () => {
  const input = inputEl.value;
  if (!input.trim()) { setStatus(false, '请输入 TOML'); return; }
  try {
    TOML.parse(input); // 先校验
    const lines = input.split('\n')
      .filter(l => l.trim() && !l.trim().startsWith('#'))
      .map(l => l.replace(/#[^"']*$/, '').trimEnd()); // 去行尾注释
    outputEl.value = lines.join('\n');
    setBadges('TOML', 'TOML');
    setStatus(true, '压缩完成', lines.length + ' 行');
  } catch (e) { showError(e); }
});

/* ===== 校验 ===== */
document.getElementById('btnValidate').addEventListener('click', () => {
  const input = inputEl.value;
  if (!input.trim()) { setStatus(false, '请输入 TOML'); return; }
  try {
    const parsed = TOML.parse(input);
    const keys = Object.keys(parsed).length;
    outputEl.value = `✅ TOML 语法正确\n\n解析成功，共 ${keys} 个顶级键。`;
    setBadges('TOML', '结果');
    setStatus(true, '校验通过 — TOML 语法正确');
  } catch (e) { showError(e); }
});

/* ===== TOML → JSON ===== */
document.getElementById('btnToJson').addEventListener('click', () => {
  const input = inputEl.value;
  if (!input.trim()) { setStatus(false, '请输入 TOML'); return; }
  try {
    const parsed = TOML.parse(input);
    outputEl.value = JSON.stringify(parsed, null, 2);
    setBadges('TOML', 'JSON');
    setStatus(true, 'TOML → JSON 转换成功');
  } catch (e) { showError(e); }
});

/* ===== JSON → TOML ===== */
document.getElementById('btnToToml').addEventListener('click', () => {
  const input = inputEl.value;
  if (!input.trim()) { setStatus(false, '请输入 JSON'); return; }
  try {
    const parsed = JSON.parse(input);
    outputEl.value = TOML.stringify(parsed);
    setBadges('JSON', 'TOML');
    setStatus(true, 'JSON → TOML 转换成功');
  } catch (e) { showError(e); }
});

/* ===== 其他 ===== */
document.getElementById('btnSample').addEventListener('click', () => {
  inputEl.value = SAMPLE;
  outputEl.value = '';
  setBadges('TOML', 'TOML');
  setStatus(true, '已加载示例 — Cargo.toml 配置');
});

document.getElementById('btnClear').addEventListener('click', () => {
  inputEl.value = '';
  outputEl.value = '';
  setStatus(true, '已清空');
});

document.getElementById('btnPaste').addEventListener('click', async () => {
  try { inputEl.value = await navigator.clipboard.readText(); } catch (e) { /* denied */ }
});

document.getElementById('btnCopy').addEventListener('click', () => {
  if (outputEl.value) navigator.clipboard.writeText(outputEl.value);
});
</script>
<noscript><p>TOML 编辑器 — DevKit 在线开发者工具箱。请启用 JavaScript 以使用本工具。</p></noscript>
</body>
