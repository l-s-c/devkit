<script type="module">
import '../../shared/theme.js';

/* ===== 文案常量 ===== */
const LABELS = {
  ready: '选择图片开始压缩',
  compressing: (i, n) => `正在压缩 ${i}/${n}...`,
  done: (n, pct) => `${n} 张压缩完成，平均节省 ${pct}%`,
  tooLarge: '文件超过 20MB，已跳过',
  maxFiles: '最多支持 20 张图片',
};
const MAX_FILES = 20;
const MAX_SIZE = 20 * 1024 * 1024; // 20MB
const RESIZE_THRESHOLD = 10 * 1024 * 1024; // >10MB 自动 resize

/* ===== 状态 ===== */
let files = []; // { file, originalUrl, compressedBlob, compressedUrl, width, height, status }
let outputFormat = 'auto';
let lockRatio = true;
let compareIdx = -1;

/* ===== DOM ===== */
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const settingsPanel = document.getElementById('settingsPanel');
const fileListEl = document.getElementById('fileList');
const statsBar = document.getElementById('statsBar');
const compareSection = document.getElementById('compareSection');
const bottomActions = document.getElementById('bottomActions');
const qualitySlider = document.getElementById('qualitySlider');

/* ===== 工具函数 ===== */
function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(2) + ' MB';
}

function getMimeType(file) {
  if (outputFormat !== 'auto') return outputFormat;
  if (file.type === 'image/png') return 'image/png';
  if (file.type === 'image/webp') return 'image/webp';
  return 'image/jpeg';
}

function getExt(mime) {
  if (mime === 'image/png') return 'png';
  if (mime === 'image/webp') return 'webp';
  return 'jpg';
}

/* ===== 文件添加 ===== */
function addFiles(newFiles) {
  const remaining = MAX_FILES - files.length;
  const toAdd = Array.from(newFiles).slice(0, remaining);

  for (const file of toAdd) {
    if (file.size > MAX_SIZE) continue; // >20MB skip
    const originalUrl = URL.createObjectURL(file);
    files.push({
      file,
      originalUrl,
      compressedBlob: null,
      compressedUrl: null,
      width: 0,
      height: 0,
      status: 'pending', // pending | compressing | done | error
    });
  }

  if (files.length > 0) {
    uploadZone.classList.add('hidden');
    settingsPanel.classList.add('show');
    fileListEl.classList.add('show');
    bottomActions.classList.add('show');
  }
  renderFileList();
}

/* ===== 渲染文件列表 ===== */
function renderFileList() {
  fileListEl.innerHTML = files.map((f, i) => {
    const escaped = f.file.name.replace(/</g, '&lt;');
    let sizeHtml = `<span style="font-family:var(--font-code);font-size:12px">${formatSize(f.file.size)}</span>`;
    if (f.status === 'done' && f.compressedBlob) {
      const savings = Math.round((1 - f.compressedBlob.size / f.file.size) * 100);
      const savingsColor = savings > 0 ? '#10B981' : '#F59E0B';
      sizeHtml = `<span class="file-original">${formatSize(f.file.size)}</span>
        <span class="file-arrow">→</span>
        <span class="file-compressed">${formatSize(f.compressedBlob.size)}</span>
        <span class="file-savings" style="color:${savingsColor};background:${savings > 0 ? 'rgba(16,185,129,0.1)' : 'rgba(245,158,11,0.1)'}">${savings > 0 ? '-' : '+'}${Math.abs(savings)}%</span>`;
    }
    const progress = f.status === 'compressing' ? 50 : f.status === 'done' ? 100 : 0;
    const statusText = f.status === 'compressing' ? '压缩中...' : f.status === 'error' ? '失败' : '';
    return `<div class="file-card" data-idx="${i}">
      <img class="file-thumb" src="${f.originalUrl}" alt="">
      <div class="file-info">
        <div class="file-name">${escaped}</div>
        <div class="file-meta"><span>${f.width ? f.width + ' × ' + f.height : '...'}</span><span>·</span><span>${f.file.type.split('/')[1]?.toUpperCase() || '?'}</span></div>
        <div class="file-size-change">${sizeHtml}</div>
        ${progress > 0 ? `<div class="file-progress"><div class="file-progress-bar" style="width:${progress}%"></div></div>` : ''}
        ${statusText ? `<div class="file-status-text">${statusText}</div>` : ''}
      </div>
      <div class="file-actions">
        ${f.status === 'done' ? `<button class="file-action-btn" data-action="compare" data-idx="${i}" title="对比">👁️</button>` : ''}
        ${f.status === 'done' ? `<button class="file-action-btn" data-action="download" data-idx="${i}" title="下载">⬇️</button>` : ''}
        <button class="file-action-btn" data-action="remove" data-idx="${i}" title="删除">🗑️</button>
      </div>
    </div>`;
  }).join('');

  // 加载图片尺寸
  files.forEach((f, i) => {
    if (!f.width) {
      const img = new Image();
      img.onload = () => { f.width = img.naturalWidth; f.height = img.naturalHeight; renderFileList(); };
      img.src = f.originalUrl;
    }
  });
}

/* ===== 压缩核心 ===== */
function compressImage(file, quality, maxW, maxH) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      let w = img.naturalWidth;
      let h = img.naturalHeight;

      // 大图自动 resize
      if (file.size > RESIZE_THRESHOLD && !maxW && !maxH) {
        maxW = 2000;
      }

      // 尺寸调整
      if (maxW && w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      if (maxH && h > maxH) { w = Math.round(w * maxH / h); h = maxH; }

      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);

      const mime = getMimeType(file);
      const q = mime === 'image/png' ? undefined : quality / 100;

      canvas.toBlob((blob) => {
        ctx.clearRect(0, 0, w, h);
        canvas.width = 0;
        canvas.height = 0;
        if (blob) resolve(blob);
        else reject(new Error('压缩失败'));
      }, mime, q);
    };
    img.onerror = () => reject(new Error('图片加载失败'));
    img.src = URL.createObjectURL(file);
  });
}

/* ===== 批量压缩（串行） ===== */
async function compressAll() {
  const quality = parseInt(qualitySlider.value);
  const maxW = parseInt(document.getElementById('maxWidth').value) || 0;
  const maxH = parseInt(document.getElementById('maxHeight').value) || 0;

  document.getElementById('btnCompress').disabled = true;
  document.getElementById('btnCompress').textContent = '🗜️ 压缩中...';

  for (let i = 0; i < files.length; i++) {
    if (files[i].status === 'done') continue;
    files[i].status = 'compressing';
    renderFileList();
    document.getElementById('statusInfo').textContent = LABELS.compressing(i + 1, files.length);

    try {
      const blob = await compressImage(files[i].file, quality, maxW, maxH);
      if (files[i].compressedUrl) URL.revokeObjectURL(files[i].compressedUrl);
      files[i].compressedBlob = blob;
      files[i].compressedUrl = URL.createObjectURL(blob);
      files[i].status = 'done';
    } catch (e) {
      files[i].status = 'error';
    }
    renderFileList();
  }

  document.getElementById('btnCompress').disabled = false;
  document.getElementById('btnCompress').textContent = '🗜️ 重新压缩';
  document.getElementById('btnDownload').style.display = '';
  updateStats();

  // 自动显示第一个的对比
  const firstDone = files.findIndex(f => f.status === 'done');
  if (firstDone >= 0) showCompare(firstDone);
}

/* ===== 统计 ===== */
function updateStats() {
  const done = files.filter(f => f.status === 'done');
  const totalOriginal = done.reduce((s, f) => s + f.file.size, 0);
  const totalCompressed = done.reduce((s, f) => s + (f.compressedBlob?.size || 0), 0);
  const savings = totalOriginal > 0 ? Math.round((1 - totalCompressed / totalOriginal) * 100) : 0;

  document.getElementById('statCount').textContent = done.length + ' 张';
  document.getElementById('statOriginal').textContent = formatSize(totalOriginal);
  document.getElementById('statCompressed').textContent = formatSize(totalCompressed);
  document.getElementById('statSavings').textContent = savings + '%';
  statsBar.classList.add('show');

  document.getElementById('statusInfo').textContent = LABELS.done(done.length, savings);
}

/* ===== 前后对比 ===== */
function showCompare(idx) {
  const f = files[idx];
  if (!f || f.status !== 'done') return;
  compareIdx = idx;

  document.getElementById('compareOriginal').src = f.originalUrl;
  document.getElementById('compareCompressed').src = f.compressedUrl;
  document.getElementById('compareOriginalLabel').textContent = `原图 ${formatSize(f.file.size)}`;
  const savings = Math.round((1 - f.compressedBlob.size / f.file.size) * 100);
  document.getElementById('compareCompressedLabel').textContent = `压缩后 ${formatSize(f.compressedBlob.size)} (${savings > 0 ? '-' : '+'}${Math.abs(savings)}%)`;

  compareSection.classList.add('show');
  compareSection.style.setProperty('--split', '50%');
}

// 对比滑块拖动
const compareDivider = document.getElementById('compareDivider');
const compareBox = document.getElementById('compareBox');
let dragging = false;

compareDivider.addEventListener('mousedown', () => { dragging = true; });
document.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const rect = compareBox.getBoundingClientRect();
  const pct = Math.min(100, Math.max(0, ((e.clientX - rect.left) / rect.width) * 100));
  compareBox.style.setProperty('--split', pct + '%');
});
document.addEventListener('mouseup', () => { dragging = false; });
// Touch
compareDivider.addEventListener('touchstart', () => { dragging = true; });
document.addEventListener('touchmove', (e) => {
  if (!dragging) return;
  const rect = compareBox.getBoundingClientRect();
  const pct = Math.min(100, Math.max(0, ((e.touches[0].clientX - rect.left) / rect.width) * 100));
  compareBox.style.setProperty('--split', pct + '%');
});
document.addEventListener('touchend', () => { dragging = false; });

/* ===== 下载 ===== */
function downloadSingle(idx) {
  const f = files[idx];
  if (!f?.compressedBlob) return;
  const ext = getExt(getMimeType(f.file));
  const name = f.file.name.replace(/\.[^.]+$/, '') + '_compressed.' + ext;
  const a = document.createElement('a');
  a.href = f.compressedUrl;
  a.download = name;
  a.click();
}

async function downloadAll() {
  const done = files.filter(f => f.status === 'done');
  if (done.length === 0) return;

  if (done.length === 1) { downloadSingle(files.indexOf(done[0])); return; }

  const zip = new JSZip();
  for (const f of done) {
    const ext = getExt(getMimeType(f.file));
    const name = f.file.name.replace(/\.[^.]+$/, '') + '_compressed.' + ext;
    zip.file(name, f.compressedBlob);
  }
  const blob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'devkit-compressed.zip';
  a.click();
  URL.revokeObjectURL(url);
}

/* ===== 事件绑定 ===== */
// 文件上传
fileInput.addEventListener('change', (e) => { addFiles(e.target.files); fileInput.value = ''; });

// 拖拽
uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => { uploadZone.classList.remove('dragover'); });
uploadZone.addEventListener('drop', (e) => { e.preventDefault(); uploadZone.classList.remove('dragover'); addFiles(e.dataTransfer.files); });

// 质量滑块
qualitySlider.addEventListener('input', () => {
  const v = qualitySlider.value;
  document.getElementById('qualityVal').textContent = v + '%';
  qualitySlider.style.setProperty('--pct', ((v - 10) / 90 * 100) + '%');
});
qualitySlider.dispatchEvent(new Event('input'));

// 格式 Tab
document.getElementById('formatTabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.format-tab');
  if (!tab) return;
  document.querySelectorAll('.format-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  outputFormat = tab.dataset.format;
});

// 锁定比例
document.getElementById('lockRatio').addEventListener('click', () => {
  lockRatio = !lockRatio;
  document.getElementById('lockRatio').classList.toggle('locked', lockRatio);
});

// 文件列表操作
fileListEl.addEventListener('click', (e) => {
  const btn = e.target.closest('.file-action-btn');
  if (!btn) return;
  const idx = parseInt(btn.dataset.idx);
  const action = btn.dataset.action;
  if (action === 'remove') {
    if (files[idx].originalUrl) URL.revokeObjectURL(files[idx].originalUrl);
    if (files[idx].compressedUrl) URL.revokeObjectURL(files[idx].compressedUrl);
    files.splice(idx, 1);
    if (files.length === 0) {
      uploadZone.classList.remove('hidden');
      settingsPanel.classList.remove('show');
      fileListEl.classList.remove('show');
      bottomActions.classList.remove('show');
      statsBar.classList.remove('show');
      compareSection.classList.remove('show');
    }
    renderFileList();
  } else if (action === 'download') {
    downloadSingle(idx);
  } else if (action === 'compare') {
    showCompare(idx);
  }
});

// 压缩按钮
document.getElementById('btnCompress').addEventListener('click', compressAll);

// 全部下载
document.getElementById('btnDownload').addEventListener('click', downloadAll);

// 继续添加
document.getElementById('btnAddMore').addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/jpeg,image/png,image/webp,image/gif,image/bmp';
  input.multiple = true;
  input.onchange = (e) => addFiles(e.target.files);
  input.click();
});
</script>
