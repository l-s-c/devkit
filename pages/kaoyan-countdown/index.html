<script type="module">
import '../../shared/theme.js';
const QUOTES=[
['"一个人可以被毁灭，但不能被打败。"','海明威《老人与海》'],
['"生活不可能像你想象的那么好，但也不会像你想象的那么糟。"','莫泊桑'],
['"世界上只有一种英雄主义，就是认清生活的真相后依然热爱生活。"','罗曼·罗兰'],
['"宝剑锋从磨砺出，梅花香自苦寒来。"','《警世贤文》'],
['"不积跬步，无以至千里。"','荀子'],
['"天行健，君子以自强不息。"','《周易》'],
['"路漫漫其修远兮，吾将上下而求索。"','屈原'],
['"锲而不舍，金石可镂。"','荀子'],
['"业精于勤荒于嬉，行成于思毁于随。"','韩愈'],
['"吾生也有涯，而知也无涯。"','庄子'],
['"纸上得来终觉浅，绝知此事要躬行。"','陆游'],
['"博学之，审问之，慎思之，明辨之，笃行之。"','《中庸》'],
['"千淘万漉虽辛苦，吹尽狂沙始到金。"','刘禹锡'],
['"读书破万卷，下笔如有神。"','杜甫'],
['"黑夜给了我黑色的眼睛，我却用它寻找光明。"','顾城'],
];
// 考研：每年12月最后一个周六
function getKaoyanDate(){
  const now=new Date();let y=now.getFullYear();
  function lastSatDec(year){
    const d=new Date(year,11,31);
    while(d.getDay()!==6)d.setDate(d.getDate()-1);
    d.setHours(8,30,0,0);return d;
  }
  let ky=lastSatDec(y);
  if(now>ky)ky=lastSatDec(y+1);
  return ky;
}
function update(){
  const ky=getKaoyanDate();const now=new Date();const diff=ky-now;
  const days=Math.floor(diff/864e5);
  document.getElementById('daysNum').textContent=days;
  document.getElementById('hH').textContent=String(Math.floor((diff%864e5)/36e5)).padStart(2,'0');
  document.getElementById('hM').textContent=String(Math.floor((diff%36e5)/6e4)).padStart(2,'0');
  document.getElementById('hS').textContent=String(Math.floor((diff%6e4)/1e3)).padStart(2,'0');
  document.getElementById('yearLabel').textContent=ky.getFullYear()+' 年全国硕士研究生考试';
  document.getElementById('statusInfo').textContent='距考研 '+days+' 天';
}
function showQuote(){
  const q=QUOTES[Math.floor(Math.random()*QUOTES.length)];
  document.getElementById('quoteText').textContent=q[0];
  document.getElementById('quoteAuthor').textContent='—— '+q[1];
}
document.getElementById('quoteBtn').addEventListener('click',showQuote);
update();showQuote();setInterval(update,1000);
</script>
