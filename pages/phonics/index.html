{combo:'y → /i/',sound:'/i/',desc:'词尾 y 在多音节词中发短 i',words:[{w:'happ<b>y</b>',ipa:'/ˈhæpi/',cn:'快乐'},{w:'cit<b>y</b>',ipa:'/ˈsɪti/',cn:'城市'},{w:'bab<b>y</b>',ipa:'/ˈbeɪbi/',cn:'宝宝'}]},

{combo:'-sion',sound:'/ʒən/',desc:'常见后缀',words:[{w:'vi<b>sion</b>',ipa:'/ˈvɪʒən/',cn:'视觉'},{w:'deci<b>sion</b>',ipa:'/dɪˈsɪʒən/',cn:'决定'}]}
]
};

const categories=Object.keys(RULES);
const tabsEl=document.getElementById('tabs');
const ruleGrid=document.getElementById('ruleGrid');
const catTitle=document.getElementById('catTitle');
const detail=document.getElementById('detail');
let currentCat=categories[0];

function speak(word){
  const u=new SpeechSynthesisUtterance(word.replace(/<[^>]*>/g,''));
  u.lang='en-US';u.rate=0.8;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}

function renderTabs(){
  const icons=['⊞','🅰️','◎','⊞','★'];
  tabsEl.innerHTML=categories.map((c,i)=>`<div class="tab${c===currentCat?' active':''}" data-cat="${c}">${icons[i]||'◎'} ${c}</div>`).join('');
  tabsEl.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
    currentCat=t.dataset.cat;renderTabs();renderGrid();detail.classList.remove('show');
  }));
}

function renderGrid(){
  catTitle.textContent=currentCat;
  const rules=RULES[currentCat];
  ruleGrid.innerHTML=rules.map((r,i)=>`<div class="rule-card" data-idx="${i}">
    <div class="rule-combo">${r.combo}</div>
    <div class="rule-sound">${r.sound}</div>
    <div class="rule-desc">${r.desc}</div>
    <div class="rule-examples">${r.words.slice(0,3).map(w=>`<span class="rule-word">${w.w}</span>`).join('')}</div>
  </div>`).join('');
  ruleGrid.querySelectorAll('.rule-card').forEach(c=>c.addEventListener('click',()=>{
    ruleGrid.querySelectorAll('.rule-card').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');
    showDetail(RULES[currentCat][+c.dataset.idx]);
  }));
}

function showDetail(r){
  detail.classList.add('show');
  detail.innerHTML=`<button class="close-detail" onclick="document.getElementById('detail').classList.remove('show')">✕</button>
    <div class="detail-combo">${r.combo} → ${r.sound}</div>
    <div class="detail-desc">${r.desc}</div>
    <div class="example-list">${r.words.map(w=>`<div class="example-item">
      <div class="example-info"><div class="example-word">${w.w}</div><div class="example-ipa">${w.ipa}</div><div class="example-cn">${w.cn}</div></div>
      <button class="play-btn" onclick="speak('${w.w.replace(/<[^>]*>/g,'')}')">▶</button>
    </div>`).join('')}</div>`;
  detail.scrollIntoView({behavior:'smooth',block:'nearest'});
}

renderTabs();renderGrid();
</script>
