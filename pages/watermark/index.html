  min-height: 240px; display: flex; align-items: center; justify-content: center;
}
.preview-canvas { max-width: 100%; max-height: 400px; display: block; }

/* Radio */
.radio-row { display: flex; gap: 6px; margin-bottom: 12px; }
.radio-btn {
  flex: 1; padding: 8px; border-radius: 10px; border: 1.5px solid var(--border-glass);
  background: var(--bg-glass); font-size: 12px; font-weight: 600;
  color: var(--text-secondary); cursor: pointer; text-align: center; transition: all 150ms;
}
.radio-btn:hover { border-color: var(--brand-500); color: var(--brand-500); }

}
.grid9-cell:hover { border-color: var(--brand-500); }
.grid9-cell.active { border-color: var(--brand-500); background: var(--brand-500); color: #fff; }

/* 滑块行 */

.logo-upload {

}

/* 操作按钮 */

}

@media (max-width: 768px) {

            <div class="grid9-cell active" data-pos="mc">●</div>
            <div class="grid9-cell" data-pos="mr">→</div>

<div class="statusbar">

<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

let wmType = 'text', posMode = 'single', pos = 'mc';
let img = null, logoImg = null, files = [];

/* ===== 滑块值显示 ===== */
const sliderUnits = { wmSize: 'px', wmOpacity: '%', wmRotate: '°', logoSize: '%', logoOpacity: '%', tileGap: 'px' };
Object.keys(sliderUnits).forEach(id => {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('input', () => {
    document.getElementById(id + 'Val').textContent = el.value + sliderUnits[id];
    render();
  });
});
document.getElementById('wmColor').addEventListener('input', e => {
  document.getElementById('wmColorHex').textContent = e.target.value;
  render();
});
document.getElementById('wmText').addEventListener('input', render);

/* ===== 文件上传 ===== */
document.getElementById('fileInput').addEventListener('change', e => {
  files = [...e.target.files].filter(f => f.type.startsWith('image/'));
  if (!files.length) return;
  loadMainImage(files[0]);
  renderBatchList();
});

const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('dragover');
  files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/'));
  if (files.length) { loadMainImage(files[0]); renderBatchList(); }
});

function loadMainImage(file) {
  const url = URL.createObjectURL(file);
  img = new Image();
  img.onload = () => {
    document.getElementById('previewPanel').style.display = 'block';
    document.getElementById('downloadBtn').disabled = false;
    render();
    document.getElementById('statusInfo').textContent = `${file.name} · ${img.width}×${img.height}`;
  };
  img.src = url;
}

function renderBatchList() {
  if (files.length <= 1) { document.getElementById('batchPanel').style.display = 'none'; return; }
  document.getElementById('batchPanel').style.display = 'block';
  document.getElementById('batchCount').textContent = `(${files.length} 张)`;
  document.getElementById('batchList').innerHTML = files.map((f, i) =>
    `<div class="batch-item"><div class="batch-name">${f.name}</div><div class="batch-status" id="batchS${i}">⏳</div></div>`
  ).join('');
}

/* ===== Logo 上传 ===== */
document.getElementById('logoInput').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const url = URL.createObjectURL(f);
  logoImg = new Image();
  logoImg.onload = () => {
    document.getElementById('logoPreviewWrap').innerHTML =
      `<img class="logo-preview" src="${logoImg.src}"><div style="font-size:11px;color:var(--text-caption)">点击更换</div>`;
    render();
  };
  logoImg.src = url;
});

/* ===== 水印类型切换 ===== */
document.getElementById('btnText').addEventListener('click', () => {
  wmType = 'text';
  document.getElementById('btnText').classList.add('active');
  document.getElementById('btnLogo').classList.remove('active');
  document.getElementById('textPanel').style.display = 'block';
  document.getElementById('logoPanel').style.display = 'none';
  render();
});
document.getElementById('btnLogo').addEventListener('click', () => {
  wmType = 'logo';
  document.getElementById('btnLogo').classList.add('active');
  document.getElementById('btnText').classList.remove('active');
  document.getElementById('textPanel').style.display = 'none';
  document.getElementById('logoPanel').style.display = 'block';
  render();
});

/* ===== 位置模式 ===== */
document.getElementById('btnPos').addEventListener('click', () => {
  posMode = 'single';
  document.getElementById('btnPos').classList.add('active');
  document.getElementById('btnTile').classList.remove('active');
  document.getElementById('posPanel').style.display = 'block';
  document.getElementById('tilePanel').style.display = 'none';
  render();
});
document.getElementById('btnTile').addEventListener('click', () => {
  posMode = 'tile';
  document.getElementById('btnTile').classList.add('active');
  document.getElementById('btnPos').classList.remove('active');
  document.getElementById('posPanel').style.display = 'none';
  document.getElementById('tilePanel').style.display = 'block';
  render();
});

/* ===== 9宫格（事件委托）===== */
document.getElementById('grid9').addEventListener('click', e => {
  const cell = e.target.closest('.grid9-cell');
  if (!cell) return;
  pos = cell.dataset.pos;
  document.querySelectorAll('.grid9-cell').forEach(c => c.classList.toggle('active', c.dataset.pos === pos));
  render();
});

/* ===== 9宫格坐标计算 ===== */
function getPosition(cw, ch, ww, wh, p) {
  const pad = 20;
  const map = {
    tl: { x: pad + ww / 2, y: pad + wh / 2 },
    tc: { x: cw / 2, y: pad + wh / 2 },
    tr: { x: cw - pad - ww / 2, y: pad + wh / 2 },
    ml: { x: pad + ww / 2, y: ch / 2 },
    mc: { x: cw / 2, y: ch / 2 },
    mr: { x: cw - pad - ww / 2, y: ch / 2 },
    bl: { x: pad + ww / 2, y: ch - pad - wh / 2 },
    bc: { x: cw / 2, y: ch - pad - wh / 2 },
    br: { x: cw - pad - ww / 2, y: ch - pad - wh / 2 },
  };
  return map[p] || map.mc;
}

/* ===== 绘制水印（通用，支持预览和导出）===== */
function drawWatermark(ctx, cw, ch, scale) {
  if (wmType === 'text') {
    const text = document.getElementById('wmText').value || '';
    if (!text) return;
    const size = parseInt(document.getElementById('wmSize').value) * scale;
    const color = document.getElementById('wmColor').value;
    const opacity = parseInt(document.getElementById('wmOpacity').value) / 100;
    const rotate = parseInt(document.getElementById('wmRotate').value) * Math.PI / 180;

    ctx.globalAlpha = opacity;
    ctx.font = `bold ${size}px "PingFang SC","Microsoft YaHei",sans-serif`;
    ctx.fillStyle = color;
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'center';

    if (posMode === 'tile') {
      const gap = parseInt(document.getElementById('tileGap').value) * scale;
      for (let y = -ch; y < ch * 2; y += gap) {
        for (let x = -cw; x < cw * 2; x += gap) {
          ctx.save(); ctx.translate(x, y); ctx.rotate(rotate);
          ctx.fillText(text, 0, 0); ctx.restore();
        }
      }
    } else {
      const { x, y } = getPosition(cw, ch, size * 2, size, pos);
      ctx.save(); ctx.translate(x, y); ctx.rotate(rotate);
      ctx.fillText(text, 0, 0); ctx.restore();
    }
    ctx.globalAlpha = 1;
  } else if (wmType === 'logo' && logoImg) {
    const sizePct = parseInt(document.getElementById('logoSize').value) / 100;
    const opacity = parseInt(document.getElementById('logoOpacity').value) / 100;
    const lw = cw * sizePct;
    const lh = lw * (logoImg.height / logoImg.width);

    ctx.globalAlpha = opacity;
    if (posMode === 'tile') {
      const gap = parseInt(document.getElementById('tileGap').value) * scale;
      for (let y = 0; y < ch; y += gap) {
        for (let x = 0; x < cw; x += gap) {
          ctx.drawImage(logoImg, x - lw / 2, y - lh / 2, lw, lh);
        }
      }
    } else {
      const { x, y } = getPosition(cw, ch, lw, lh, pos);
      ctx.drawImage(logoImg, x - lw / 2, y - lh / 2, lw, lh);
    }
    ctx.globalAlpha = 1;
  }
}

/* ===== 预览渲染 ===== */
function render() {
  if (!img) return;
  const canvas = document.getElementById('previewCanvas');
  const ctx = canvas.getContext('2d');
  // 预览缩放（max 800px）
  const scale = Math.min(1, 800 / Math.max(img.width, img.height));
  canvas.width = img.width * scale;
  canvas.height = img.height * scale;
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  drawWatermark(ctx, canvas.width, canvas.height, scale);
}

/* ===== 导出（原图分辨率重新绘制）===== */
function doDownload() {
  if (!img || !files.length) return;
  document.getElementById('downloadBtn').disabled = true;
  document.getElementById('downloadBtn').textContent = '⏳ 处理中…';

  let idx = 0;
  function processNext() {
    if (idx >= files.length) {
      document.getElementById('downloadBtn').disabled = false;
      document.getElementById('downloadBtn').textContent = '⊡ 导出水印图片';
      document.getElementById('statusInfo').textContent = `✓ ${files.length} 张图片处理完成`;
      return;
    }
    const file = files[idx];
    const url = URL.createObjectURL(file);
    const tmpImg = new Image();
    tmpImg.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = tmpImg.width;
      canvas.height = tmpImg.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(tmpImg, 0, 0);
      // 原图分辨率水印，scale=1
      drawWatermark(ctx, canvas.width, canvas.height, 1);
      canvas.toBlob(blob => {
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = file.name.replace(/\.[^.]+$/, '') + '_watermarked.png';
        a.click();
        URL.revokeObjectURL(blobUrl);
        URL.revokeObjectURL(url);
        canvas.width = 0; canvas.height = 0;
        const statusEl = document.getElementById('batchS' + idx);
        if (statusEl) statusEl.textContent = '✓';
        idx++;
        setTimeout(processNext, 300);
      }, 'image/png');
    };
    tmpImg.src = url;
  }
  processNext();
}

document.getElementById('downloadBtn').addEventListener('click', doDownload);
</script>
