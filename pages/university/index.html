let typeF='',provF='',query='';
document.getElementById('totalStat').textContent=`共 ${U.length} 所高校`;

function setupFilter(id,setter){
  document.getElementById(id).addEventListener('click',e=>{
    const p=e.target.closest('.fp');if(!p)return;
    document.querySelectorAll(`#${id} .fp`).forEach(x=>x.classList.remove('active'));
    p.classList.add('active');setter(p.dataset.v);render();
  });
}
setupFilter('typeFilter',v=>typeF=v);
setupFilter('provFilter',v=>provF=v);
document.getElementById('searchInput').addEventListener('input',e=>{query=e.target.value.trim();render()});

function render(){
  let list=U;
  if(query)list=list.filter(u=>u[0].includes(query));
  if(provF)list=list.filter(u=>u[1].includes(provF));
  if(typeF==='985')list=list.filter(u=>u[6]);
  else if(typeF==='211')list=list.filter(u=>u[7]);
  else if(typeF==='双一流')list=list.filter(u=>u[8]);
  else if(typeF)list=list.filter(u=>u[3]===typeF);
  document.getElementById('showStat').textContent=`显示 ${list.length} 条`;
  if(!list.length){document.getElementById('uniList').innerHTML='<div class="empty-state">未找到匹配高校</div>';return}
  document.getElementById('uniList').innerHTML=list.slice(0,50).map(u=>{
    const tags=[];
    if(u[6])tags.push('<span class="uni-tag tag-985">985</span>');
    if(u[7])tags.push('<span class="uni-tag tag-211">211</span>');
    if(u[8])tags.push('<span class="uni-tag tag-double">双一流</span>');
    if(!u[6]&&!u[7]&&!u[8])tags.push(`<span class="uni-tag tag-type">${u[3]}</span>`);
    return `<div class="uni-card"><div class="uni-header"><div><div class="uni-name">${u[0]}</div><div class="uni-location">📍 ${u[1]} · ${u[2]}</div></div><div class="uni-tags">${tags.join('')}</div></div><div class="uni-info"><span>🏛️ ${u[3]}</span><span>📋 ${u[4]}</span><span>🎓 ${u[5]}</span></div></div>`;
  }).join('');
}
render();
