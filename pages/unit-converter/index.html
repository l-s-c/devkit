<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

/* ===== 文案常量（预留 i18n） ===== */
const LABELS = {
  ready: '选择类别，输入数值实时转换',
  catNames: {
    length: '长度', weight: '重量', temperature: '温度',
    css: 'CSS', data: '数据', time: '时间',
  },
};

/* ===== 单位定义 ===== */
const CATEGORIES = {
  length: {
    units: ['mm', 'cm', 'm', 'km', 'in', 'ft', 'yd', 'mi'],
    names: { mm: '毫米', cm: '厘米', m: '米', km: '千米', in: '英寸', ft: '英尺', yd: '码', mi: '英里' },
    // 转为基准单位（m）的系数
    toBase: { mm: 0.001, cm: 0.01, m: 1, km: 1000, in: 0.0254, ft: 0.3048, yd: 0.9144, mi: 1609.344 },
  },
  weight: {
    units: ['mg', 'g', 'kg', 't', 'oz', 'lb'],
    names: { mg: '毫克', g: '克', kg: '千克', t: '吨', oz: '盎司', lb: '磅' },
    toBase: { mg: 0.000001, g: 0.001, kg: 1, t: 1000, oz: 0.0283495, lb: 0.453592 },
  },
  temperature: {
    units: ['°C', '°F', 'K'],
    names: { '°C': '摄氏度', '°F': '华氏度', K: '开尔文' },
    custom: true, // 非线性，独立公式
  },
  css: {
    units: ['px', 'rem', 'em', 'vw', 'vh', '%', 'pt'],
    names: { px: '像素', rem: '根em (16px)', em: 'em (16px)', vw: '视口宽% (1440px)', vh: '视口高% (960px)', '%': '百分比', pt: '点' },
    // 基准：px，rem/em 基于 16px
    toBase: { px: 1, rem: 16, em: 16, vw: 14.4, vh: 9.6, '%': 10, pt: 1.333 },
  },
  data: {
    units: ['B', 'KB', 'MB', 'GB', 'TB'],
    names: { B: '字节', KB: '千字节', MB: '兆字节', GB: '吉字节', TB: '太字节' },
    // 1024 进制
    toBase: { B: 1, KB: 1024, MB: 1048576, GB: 1073741824, TB: 1099511627776 },
  },
  time: {
    units: ['ms', 's', 'min', 'h', 'd', 'w'],
    names: { ms: '毫秒', s: '秒', min: '分钟', h: '小时', d: '天', w: '周' },
    toBase: { ms: 0.001, s: 1, min: 60, h: 3600, d: 86400, w: 604800 },
  },
};

let currentCat = 'length';
let lastSwapTarget = null;

/* ===== 温度独立转换（非线性） ===== */
function convertTemperature(val, from, to) {
  // 先转为 °C，再转为目标
  let celsius;
  if (from === '°C') celsius = val;
  else if (from === '°F') celsius = (val - 32) * 5 / 9;
  else if (from === 'K') celsius = val - 273.15;

  if (to === '°C') return celsius;
  if (to === '°F') return celsius * 9 / 5 + 32;
  if (to === 'K') return celsius + 273.15;
  return 0;
}

/* ===== 数值格式化（避免浮点精度问题） ===== */
function formatNum(n) {
  if (n === 0) return '0';
  if (Math.abs(n) < 0.000001) return n.toExponential(4);
  if (Math.abs(n) >= 1e12) return n.toExponential(4);
  if (Number.isInteger(n)) return n.toLocaleString();
  return parseFloat(n.toPrecision(10)).toString();
}

/* ===== 填充单位下拉 ===== */
function populateUnits() {
  const cat = CATEGORIES[currentCat];
  const sel = document.getElementById('fromUnit');
  sel.innerHTML = cat.units.map(u => `<option value="${u}">${u}</option>`).join('');
}

/* ===== 转换核心 ===== */
function convert() {
  const cat = CATEGORIES[currentCat];
  const val = parseFloat(document.getElementById('unitInput').value);
  const from = document.getElementById('fromUnit').value;
  const container = document.getElementById('results');
  const formulaEl = document.getElementById('formula');

  if (isNaN(val)) {
    container.innerHTML = '';
    formulaEl.innerHTML = '';
    return;
  }

  let results;
  if (cat.custom) {
    // 温度：独立公式
    results = cat.units.filter(u => u !== from).map(u => ({
      unit: u,
      value: convertTemperature(val, from, u),
      name: cat.names[u],
    }));
  } else {
    // 通用：乘除系数
    const baseVal = val * cat.toBase[from];
    results = cat.units.filter(u => u !== from).map(u => ({
      unit: u,
      value: baseVal / cat.toBase[u],
      name: cat.names[u],
    }));
  }

  // 渲染结果卡片
  container.innerHTML = results.map(r => {
    const display = formatNum(r.value);
    const escaped = (display + ' ' + r.unit).replace(/"/g, '&quot;');
    return `<div class="result-card" data-copy="${escaped}">
      <div class="result-left">
        <span class="result-value">${display}</span>
        <span class="result-unit">${r.unit}</span>
        <span class="result-name">${r.name}</span>
      </div>
      <button class="result-copy">☰</button>
    </div>`;
  }).join('');

  // 公式栏
  const top3 = results.slice(0, 3).map(r => `${formatNum(r.value)} ${r.unit}`).join(' = ');
  formulaEl.innerHTML = `<strong>${formatNum(val)} ${from}</strong> = ${top3}`;

  // 记录第一个结果单位供交换用
  lastSwapTarget = results.length > 0 ? results[0].unit : null;

  // 状态栏
  document.getElementById('statusInfo').textContent = `${LABELS.catNames[currentCat]} · ${from} → ${results.length} 种单位`;
}

/* ===== 交换单位 ===== */
function swapUnits() {
  if (!lastSwapTarget) return;
  const sel = document.getElementById('fromUnit');
  sel.value = lastSwapTarget;
  convert();
}

/* ===== 事件绑定 ===== */
document.getElementById('unitInput').addEventListener('input', convert);
document.getElementById('fromUnit').addEventListener('change', convert);
document.getElementById('swapBtn').addEventListener('click', swapUnits);

// 类别 Tab 切换
document.getElementById('catTabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.cat-tab');
  if (!tab) return;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentCat = tab.dataset.cat;
  populateUnits();
  convert();
});

// 结果卡片点击复制
document.getElementById('results').addEventListener('click', (e) => {
  const card = e.target.closest('.result-card');
  if (!card) return;
  const text = card.dataset.copy;
  navigator.clipboard.writeText(text);
  const btn = card.querySelector('.result-copy');
  btn.textContent = '✓';
  btn.classList.add('ok');
  setTimeout(() => { btn.textContent = '☰'; btn.classList.remove('ok'); }, 1200);
});

// 初始化
populateUnits();
convert();
</script>
