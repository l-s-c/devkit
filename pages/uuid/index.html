<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

function uuidv4() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random()*16|0;
    return (c==='x'?r:(r&0x3|0x8)).toString(16);
  });
}
function uuidv1() {
  // Pseudo v1: timestamp-based layout (real v1 needs MAC, this uses random node)
  const now = Date.now();
  const ticks = BigInt(now) * 10000n + 122192928000000000n;
  const timeLow = (ticks & 0xFFFFFFFFn).toString(16).padStart(8,'0');
  const timeMid = ((ticks >> 32n) & 0xFFFFn).toString(16).padStart(4,'0');
  const timeHi = ((ticks >> 48n) & 0x0FFFn | 0x1000n).toString(16).padStart(4,'0');
  const clock = (Math.random()*0x3FFF|0x8000).toString(16).padStart(4,'0');
  const node = Array.from({length:6},()=>Math.floor(Math.random()*256).toString(16).padStart(2,'0')).join('');
  return `${timeLow}-${timeMid}-${timeHi}-${clock}-${node}`;
}
function uuidv7() {
  // UUIDv7: Unix ms timestamp + random
  const ms = Date.now();
  const hex = ms.toString(16).padStart(12,'0');
  const r = () => Math.random().toString(16).slice(2);
  const rand = r()+r();
  return `${hex.slice(0,8)}-${hex.slice(8,12)}-7${rand.slice(0,3)}-${(0x80|Math.random()*0x3F|0).toString(16).padStart(2,'0')}${rand.slice(3,5)}-${rand.slice(5,17)}`;
}

function generate() {
  const count = Math.min(1000, Math.max(1, parseInt(document.getElementById('count').value)||10));
  const upper = document.getElementById('upper').checked;
  const noDash = document.getElementById('noDash').checked;
  const list = document.getElementById('uuidList');
  const ver = document.getElementById('version').value;
  const gen = ver === 'v1' ? uuidv1 : ver === 'v7' ? uuidv7 : uuidv4;
  const uuids = [];
  for (let i = 0; i < count; i++) {
    let u = gen();
    if (noDash) u = u.replace(/-/g,'');
    if (upper) u = u.toUpperCase();
    uuids.push(u);
  }
  list.innerHTML = uuids.map((u,i) => `<div class="uuid-item" onclick="copyText('${u}','✓ 已复制 UUID')"><span class="idx">${i+1}</span><span>${u}</span></div>`).join('');
  document.getElementById('countLabel').textContent = `${count} 个 UUID`;
  window._uuids = uuids;
}

document.getElementById('btnGen').addEventListener('click', generate);
document.getElementById('btnCopy').addEventListener('click', () => {
  if (window._uuids) copyText(window._uuids.join('\n'), '✓ 已复制全部 UUID');
});
generate();

/* UUID 解析 */
document.getElementById('btnParse').addEventListener('click', parseUUID);
document.getElementById('parseInput').addEventListener('keydown', e => { if (e.key === 'Enter') parseUUID(); });
function parseUUID() {
  const raw = document.getElementById('parseInput').value.trim();
  const el = document.getElementById('parseResult');
  const hex = raw.replace(/-/g, '');
  if (!/^[0-9a-f]{32}$/i.test(hex)) { el.innerHTML = '✗ 无效 UUID 格式'; return; }
  const version = parseInt(hex[12], 16);
  const variantBits = parseInt(hex[16], 16);
  let variant = 'Unknown';
  if ((variantBits & 0x8) === 0) variant = 'NCS (兼容)';
  else if ((variantBits & 0xC) === 0x8) variant = 'RFC 4122';
  else if ((variantBits & 0xE) === 0xC) variant = 'Microsoft';
  else variant = 'Future';
  const formatted = `${hex.slice(0,8)}-${hex.slice(8,12)}-${hex.slice(12,16)}-${hex.slice(16,20)}-${hex.slice(20)}`.toLowerCase();
  let extra = '';
  if (version === 1) {
    const tLow = hex.slice(0,8), tMid = hex.slice(8,12), tHi = hex.slice(13,16);
    const ticks = BigInt('0x' + tHi + tMid + tLow);
    const unixMs = Number((ticks - 122192928000000000n) / 10000n);
    if (unixMs > 0 && unixMs < 4102444800000) extra = `<br>☰ 时间: ${new Date(unixMs).toLocaleString('zh-CN')}`;
  } else if (version === 7) {
    const tsHex = hex.slice(0,12);
    const ms = parseInt(tsHex, 16);
    if (ms > 0 && ms < 4102444800000) extra = `<br>☰ 时间: ${new Date(ms).toLocaleString('zh-CN')}`;
  }
  el.innerHTML = `✓ <strong>${formatted}</strong><br>版本: v${version} · 变体: ${variant} · 长度: ${hex.length * 4} bit${extra}`;
}
</script>
