<div class="main">
  <div class="panel" id="recordPanel">
    <div class="security-badge">🔒 文件不上传服务器，全部本地处理</div>
    <div id="idleState">
      <button class="record-btn idle" id="startBtn">⏺</button>
      <div class="status-text">点击开始录制屏幕</div>
      <div class="compat-warn" id="compatWarn" style="display:none">⚠️ 当前浏览器不支持屏幕录制，请使用 Chrome / Edge / Firefox</div>
    </div>
    <div id="recordingState" style="display:none">
      <button class="record-btn recording" id="recordingBtn">⏺</button>
      <div class="timer" id="timer">00:00</div>
      <div class="status-text" id="recordStatus">🔴 录制中...</div>
      <div class="controls">
        <button class="ctrl-btn" id="pauseBtn">⏸️ 暂停</button>

    </div>

    <div style="font-size:13px;font-weight:800;margin-bottom:12px">👁️ 录制预览</div>

      <video id="previewVideo" controls></video>
    </div>
    <div class="download-row">
      <button class="btn-download" id="downloadBtn">📥 下载 WebM</button>
      <button class="ctrl-btn" id="newBtn">🔄 重新录制</button>

<div class="statusbar">

  <div class="statusbar-spacer"></div>
  <span>MediaRecorder · 纯本地</span>
</div>

<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

let mediaRecorder = null, stream = null, chunks = [], blobUrl = null;
let startTime = 0, timerInterval = null, pausedDuration = 0, pauseStart = 0;

// Check support
if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
  document.getElementById('compatWarn').style.display = 'block';
  document.getElementById('startBtn').style.opacity = '0.5';
  document.getElementById('startBtn').style.cursor = 'not-allowed';
}

function fmt(sec) {
  const m = Math.floor(sec / 60), s = sec % 60;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function updateTimer() {
  const elapsed = Math.floor((Date.now() - startTime - pausedDuration) / 1000);
  document.getElementById('timer').textContent = fmt(elapsed);
}

document.getElementById('startBtn').addEventListener('click', async () => {
  if (!navigator.mediaDevices?.getDisplayMedia) return;
  try {
    stream = await navigator.mediaDevices.getDisplayMedia({
      video: { cursor: 'always' },
      audio: true
    });
  } catch (e) {
    document.getElementById('statusInfo').textContent = '❌ 用户取消了屏幕共享';
    return;
  }

  chunks = [];
  const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
  mediaRecorder = new MediaRecorder(stream, { mimeType });

  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  mediaRecorder.onstop = onRecordingStop;

  // User might stop sharing via browser UI
  stream.getVideoTracks()[0].onended = () => { if (mediaRecorder.state !== 'inactive') mediaRecorder.stop(); };

  mediaRecorder.start(1000);
  startTime = Date.now(); pausedDuration = 0;
  timerInterval = setInterval(updateTimer, 500);

  document.getElementById('idleState').style.display = 'none';
  document.getElementById('recordingState').style.display = 'block';
  document.getElementById('previewPanel').style.display = 'none';
  document.getElementById('statusInfo').textContent = '🔴 录制中';
  document.getElementById('pauseBtn').innerHTML = '⏸️ 暂停';
});

document.getElementById('pauseBtn').addEventListener('click', () => {
  if (!mediaRecorder) return;
  if (mediaRecorder.state === 'recording') {
    mediaRecorder.pause();
    pauseStart = Date.now();
    clearInterval(timerInterval);
    document.getElementById('recordingBtn').className = 'record-btn paused';
    document.getElementById('recordStatus').textContent = '⏸️ 已暂停';
    document.getElementById('pauseBtn').innerHTML = '▶️ 继续';
    document.getElementById('statusInfo').textContent = '⏸️ 已暂停';
  } else if (mediaRecorder.state === 'paused') {
    mediaRecorder.resume();
    pausedDuration += Date.now() - pauseStart;
    timerInterval = setInterval(updateTimer, 500);
    document.getElementById('recordingBtn').className = 'record-btn recording';
    document.getElementById('recordStatus').textContent = '🔴 录制中...';
    document.getElementById('pauseBtn').innerHTML = '⏸️ 暂停';
    document.getElementById('statusInfo').textContent = '🔴 录制中';
  }
});

document.getElementById('stopBtn').addEventListener('click', () => {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
});

function onRecordingStop() {
  clearInterval(timerInterval);
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }

  const blob = new Blob(chunks, { type: 'video/webm' });
  if (blobUrl) URL.revokeObjectURL(blobUrl);
  blobUrl = URL.createObjectURL(blob);

  const video = document.getElementById('previewVideo');
  video.src = blobUrl;

  const sizeMB = (blob.size / 1024 / 1024).toFixed(2);
  const duration = document.getElementById('timer').textContent;
  document.getElementById('fileInfo').textContent = `📁 ${sizeMB} MB · ${duration} · WebM`;

  document.getElementById('idleState').style.display = 'none';
  document.getElementById('recordingState').style.display = 'none';
  document.getElementById('previewPanel').style.display = 'block';
  document.getElementById('statusInfo').textContent = `✅ 录制完成 ${duration}`;
}

document.getElementById('downloadBtn').addEventListener('click', () => {
  if (!blobUrl) return;
  const a = document.createElement('a');
  a.href = blobUrl;
  a.download = `screen-recording-${Date.now()}.webm`;
  a.click();
});

document.getElementById('newBtn').addEventListener('click', () => {
  if (blobUrl) { URL.revokeObjectURL(blobUrl); blobUrl = null; }
  chunks = [];
  document.getElementById('timer').textContent = '00:00';
  document.getElementById('idleState').style.display = 'block';
  document.getElementById('recordingState').style.display = 'none';
  document.getElementById('previewPanel').style.display = 'none';
  document.getElementById('statusInfo').textContent = '在线录屏';
});
</script>
