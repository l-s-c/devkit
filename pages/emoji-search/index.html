let currentCat = 'all';
let recent = JSON.parse(localStorage.getItem('devkit-emoji-recent') || '[]');

function renderGrid(list) {
  const grid = document.getElementById('emojiGrid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty-state">😕 没有找到匹配的 Emoji</div>';
    document.getElementById('searchCount').textContent = '0';
    return;
  }
  grid.innerHTML = list.map(em => `
    <div class="emoji-cell" data-emoji="${em.e}" title="${em.n}">
      <span class="emoji-char">${em.e}</span>
      <span class="emoji-name">${em.n.split(' ')[0]}</span>
    </div>`).join('');
  document.getElementById('searchCount').textContent = `${list.length} 个`;
}

function filterEmoji() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let list = EMOJIS;
  if (currentCat !== 'all') list = list.filter(e => e.c === currentCat);
  if (q) list = list.filter(e => e.n.toLowerCase().includes(q));
  renderGrid(list);
}

/* Category pills */
document.getElementById('catRow').addEventListener('click', e => {
  const pill = e.target.closest('[data-cat]');
  if (!pill) return;
  currentCat = pill.dataset.cat;
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  filterEmoji();
});

document.getElementById('searchInput').addEventListener('input', filterEmoji);

/* Click to copy */
document.getElementById('emojiGrid').addEventListener('click', e => {
  const cell = e.target.closest('.emoji-cell');
  if (!cell) return;
  const emoji = cell.dataset.emoji;
  navigator.clipboard.writeText(emoji);
  recent = recent.filter(r => r !== emoji);
  recent.unshift(emoji);
  if (recent.length > 20) recent.pop();
  localStorage.setItem('devkit-emoji-recent', JSON.stringify(recent));
  renderRecent();
  document.getElementById('statusInfo').textContent = `✅ ${emoji} 已复制`;
  setTimeout(() => { document.getElementById('statusInfo').textContent = 'Emoji 搜索'; }, 1500);
});

function renderRecent() {
  const area = document.getElementById('recentArea');
  if (!recent.length) { area.style.display = 'none'; return; }
  area.style.display = 'block';
  document.getElementById('recentList').innerHTML = recent.slice(0, 16).map(e =>
    `<span class="recent-item" data-emoji="${e}">${e}</span>`).join('');
}

document.getElementById('recentList').addEventListener('click', e => {
  const item = e.target.closest('[data-emoji]');
  if (!item) return;
  navigator.clipboard.writeText(item.dataset.emoji);
  document.getElementById('statusInfo').textContent = `✅ ${item.dataset.emoji} 已复制`;
  setTimeout(() => { document.getElementById('statusInfo').textContent = 'Emoji 搜索'; }, 1500);
});

renderGrid(EMOJIS);
renderRecent();
