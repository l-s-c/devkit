<div class="statusbar">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" integrity="sha384-JcnsjUPPylna1s1fvi1u12X5qjY5OL56iySh75FdtrwhO/SWXgMjoVqcKyIIWOLk" crossorigin="anonymous"></script>
<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

let images = [], orientation = 'portrait', pageSize = 'a4', fitMode = 'contain';
const SIZES = { a4: [210, 297], letter: [216, 279], a3: [297, 420] };

/* ===== 图片列表渲染 ===== */
function renderList() {
  const list = document.getElementById('imgList');
  list.innerHTML = '';
  images.forEach((im, i) => {
    const item = document.createElement('div');
    item.className = 'img-item';
    item.innerHTML = `
      <img class="img-thumb" src="${im.url}">
      <div class="img-info"><div class="img-name">${im.name}</div><div class="img-dim">${im.w}×${im.h}</div></div>
      <span class="img-page">P${i + 1}</span>
    `;
    const upBtn = document.createElement('button');
    upBtn.className = 'img-btn'; upBtn.textContent = '↑';
    upBtn.addEventListener('click', () => { if (i > 0) { [images[i], images[i-1]] = [images[i-1], images[i]]; renderList(); renderPreview(); } });

    const downBtn = document.createElement('button');
    downBtn.className = 'img-btn'; downBtn.textContent = '↓';
    downBtn.addEventListener('click', () => { if (i < images.length - 1) { [images[i], images[i+1]] = [images[i+1], images[i]]; renderList(); renderPreview(); } });

    const delBtn = document.createElement('button');
    delBtn.className = 'img-btn img-del'; delBtn.textContent = '✕';
    delBtn.addEventListener('click', () => { URL.revokeObjectURL(images[i].url); images.splice(i, 1); renderList(); renderPreview(); });

    item.appendChild(upBtn);
    item.appendChild(downBtn);
    item.appendChild(delBtn);
    list.appendChild(item);
  });

  document.getElementById('statsWrap').style.display = images.length ? 'flex' : 'none';
  document.getElementById('statCount').textContent = images.length + ' 张';
  document.getElementById('statPages').textContent = images.length + ' 页 PDF';
  document.getElementById('genBtn').disabled = images.length === 0;
}

/* ===== 页面预览 ===== */
function renderPreview() {
  const panel = document.getElementById('previewPanel');
  const scroll = document.getElementById('previewScroll');
  if (!images.length) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  const isLand = orientation === 'landscape';
  const pw = isLand ? 170 : 120, ph = isLand ? 120 : 170;
  scroll.innerHTML = images.map((im, i) =>
    `<div class="preview-page" style="width:${pw}px;height:${ph}px">
      <img src="${im.url}">
      <span class="page-num">${i + 1}</span>
    </div>`
  ).join('');
  document.getElementById('statusInfo').textContent = `${images.length} 张 · ${pageSize.toUpperCase()} · ${orientation === 'portrait' ? '纵向' : '横向'}`;
}

/* ===== 生成 PDF ===== */
function generatePDF() {
  if (!images.length) return;
  const { jsPDF } = window.jspdf;
  const margin = parseInt(document.getElementById('margin').value);

  let doc = null;
  images.forEach((im, i) => {
    let pw, ph;
    if (pageSize === 'fit') {
      pw = im.w * 25.4 / 96 + margin * 2;
      ph = im.h * 25.4 / 96 + margin * 2;
    } else {
      [pw, ph] = SIZES[pageSize];
    }
    if (orientation === 'landscape') [pw, ph] = [ph, pw];

    const fmt = pageSize === 'fit' ? [pw, ph] : pageSize;
    if (i === 0) {
      doc = new jsPDF({ orientation, unit: 'mm', format: fmt });
    } else {
      doc.addPage(fmt, orientation);
    }

    const areaW = pw - margin * 2, areaH = ph - margin * 2;
    const imgRatio = im.w / im.h;
    let dw, dh;
    if (fitMode === 'contain') {
      if (imgRatio > areaW / areaH) { dw = areaW; dh = areaW / imgRatio; }
      else { dh = areaH; dw = areaH * imgRatio; }
    } else {
      if (imgRatio > areaW / areaH) { dh = areaH; dw = areaH * imgRatio; }
      else { dw = areaW; dh = areaW / imgRatio; }
    }
    const x = margin + (areaW - dw) / 2;
    const y = margin + (areaH - dh) / 2;
    doc.addImage(im.url, 'JPEG', x, y, dw, dh);
  });
  doc.save('images.pdf');
}

/* ===== 事件绑定 ===== */
document.getElementById('fileInput').addEventListener('change', e => {
  const files = [...e.target.files];
  let loaded = 0;
  files.forEach(f => {
    const url = URL.createObjectURL(f);
    const img = new Image();
    img.onload = () => {
      images.push({ img, name: f.name, w: img.width, h: img.height, url });
      loaded++;
      if (loaded === files.length) { renderList(); renderPreview(); }
    };
    img.src = url;
  });
});

document.getElementById('orientTabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  orientation = tab.dataset.orient;
  document.querySelectorAll('#orientTabs .tab').forEach(t => t.classList.toggle('active', t.dataset.orient === orientation));
  renderPreview();
});

document.getElementById('sizeGrid').addEventListener('click', e => {
  const chip = e.target.closest('.opt-chip');
  if (!chip) return;
  pageSize = chip.dataset.size;
  document.querySelectorAll('#sizeGrid .opt-chip').forEach(c => c.classList.toggle('active', c.dataset.size === pageSize));
  renderPreview();
});

document.getElementById('margin').addEventListener('input', function() {
  document.getElementById('marginVal').textContent = this.value + 'mm';
  renderPreview();
});

document.getElementById('fitTabs').addEventListener('click', e => {
  const tab = e.target.closest('.fit-tab');
  if (!tab) return;
  fitMode = tab.dataset.fit;
  document.querySelectorAll('.fit-tab').forEach(t => t.classList.toggle('active', t.dataset.fit === fitMode));
});

document.getElementById('genBtn').addEventListener('click', generatePDF);
</script>
