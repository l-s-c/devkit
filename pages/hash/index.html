<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

const algos = ['MD5','SHA-1','SHA-256','SHA-384','SHA-512'];

// Pure JS MD5
function md5(str){const k=[],s=[7,12,17,22,7,12,17,22,7,12,17,22,7,12,17,22,5,9,14,20,5,9,14,20,5,9,14,20,5,9,14,20,4,11,16,23,4,11,16,23,4,11,16,23,4,11,16,23,6,10,15,21,6,10,15,21,6,10,15,21,6,10,15,21];for(let i=0;i<64;i++)k[i]=Math.floor(2**32*Math.abs(Math.sin(i+1)))>>>0;const bytes=new TextEncoder().encode(str);const bits=bytes.length*8;const padLen=bytes.length%64<56?56-bytes.length%64:120-bytes.length%64;const padded=new Uint8Array(bytes.length+padLen+8);padded.set(bytes);padded[bytes.length]=0x80;const dv=new DataView(padded.buffer);dv.setUint32(padded.length-8,bits>>>0,true);dv.setUint32(padded.length-4,(bits/2**32)>>>0,true);let a0=0x67452301>>>0,b0=0xefcdab89>>>0,c0=0x98badcfe>>>0,d0=0x10325476>>>0;for(let i=0;i<padded.length;i+=64){const M=[];for(let j=0;j<16;j++)M[j]=dv.getUint32(i+j*4,true);let a=a0,b=b0,c=c0,d=d0;for(let j=0;j<64;j++){let f,g;if(j<16){f=(b&c)|((~b>>>0)&d);g=j}else if(j<32){f=(d&b)|((~d>>>0)&c);g=(5*j+1)%16}else if(j<48){f=b^c^d;g=(3*j+5)%16}else{f=c^(b|(~d>>>0));g=(7*j)%16}f=(f>>>0);const temp=d;d=c;c=b;const sum=(a+f+k[j]+M[g])>>>0;b=(b+((sum<<s[j])|(sum>>>(32-s[j]))))>>>0;a=temp}a0=(a0+a)>>>0;b0=(b0+b)>>>0;c0=(c0+c)>>>0;d0=(d0+d)>>>0}const hex=v=>{const h=v.toString(16).padStart(8,'0');return h.slice(6,8)+h.slice(4,6)+h.slice(2,4)+h.slice(0,2)};return hex(a0)+hex(b0)+hex(c0)+hex(d0)}

async function computeHash(algo, text) {
  if (algo === 'MD5') return md5(text);
  const data = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest(algo, data);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function calculate() {
  const text = document.getElementById('input').value;
  if (!text) return;
  const upper = document.getElementById('upper').checked;
  const results = await Promise.all(algos.map(async a => {
    let h = await computeHash(a, text);
    if (upper) h = h.toUpperCase();
    return { algo: a, hash: h };
  }));
  document.getElementById('results').innerHTML = results.map(r =>
    `<div class="hash-row"><span class="hash-algo" data-algo="${r.algo}">${r.algo}</span><span class="hash-value">${r.hash}</span><span style="font-size:11px;color:var(--text-caption)">${r.hash.length*4} bit</span><button class="btn-tool hash-copy" data-hash="${r.hash}">☰</button></div>`
  ).join('') + '<div style="font-size:11px;color:var(--text-caption);padding:4px 14px">⚠ MD5 不安全，仅供兼容需要，推荐使用 SHA-256</div>';
  document.getElementById('charCount').textContent = `${text.length} 字符 · ${algos.length} 种算法`;
}

let debounceTimer;
document.getElementById('input').addEventListener('input', () => {
  document.getElementById('charCount').textContent = `${document.getElementById('input').value.length} 字符`;
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(calculate, 300);
});
document.getElementById('btnClear').addEventListener('click', () => {
  document.getElementById('input').value = '';
  document.getElementById('results').innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-caption)">输入文本即可实时计算</div>';
  document.getElementById('charCount').textContent = '0 字符';
});
document.getElementById('results').addEventListener('click', e => {
  const btn = e.target.closest('.hash-copy');
  if (btn) copyText(btn.dataset.hash, '✓ 已复制');
});

/* File hash */
const dropZone = document.getElementById('fileDropZone');
const fileInput = document.getElementById('fileInput');
document.getElementById('filePick').addEventListener('click', () => fileInput.click());
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = 'var(--brand-500)'; });
dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = 'var(--border-glass)'; });
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.style.borderColor = 'var(--border-glass)'; if (e.dataTransfer.files[0]) hashFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if (fileInput.files[0]) hashFile(fileInput.files[0]); });

async function hashFile(file) {
  document.getElementById('fileName').textContent = `☰ ${file.name} (${(file.size/1024).toFixed(1)} KB)`;
  document.getElementById('fileResult').style.display = 'block';
  const buf = await file.arrayBuffer();
  const fileAlgos = ['SHA-1','SHA-256','SHA-512'];
  const container = document.getElementById('fileHashes');
  container.innerHTML = '<div style="color:var(--text-caption)">计算中…</div>';
  const results = await Promise.all(fileAlgos.map(async algo => {
    const hash = await crypto.subtle.digest(algo, buf);
    return { algo, hash: Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('') };
  }));
  container.innerHTML = results.map(r =>
    `<div class="hash-row"><span class="hash-algo" data-algo="${r.algo}">${r.algo}</span><span class="hash-value">${r.hash}</span><button class="btn-tool hash-copy" data-hash="${r.hash}" style="font-size:11px">☰</button></div>`
  ).join('');
}
</script>
