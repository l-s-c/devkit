.card-lab .entry-title{color:#15803D}
.entry-desc{font-size:13px;color:#6B7280;line-height:1.7;margin-bottom:16px}
.entry-stats{display:flex;gap:10px;flex-wrap:wrap}
.entry-stat{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700}
.card-tools .entry-stat{background:rgba(59,130,246,0.1);color:#2563EB}

.entry-arrow{position:absolute;right:20px;bottom:20px;font-size:22px;opacity:0.25;transition:all 200ms}
.entry-card:hover .entry-arrow{opacity:0.7;right:16px}

/* Preview section */
.preview-section{max-width:720px;margin:0 auto;padding:0 24px 40px}
.section-title{font-size:16px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.preview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.preview-item{
  background:var(--bg-glass,rgba(255,255,255,0.72));backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:0.5px solid var(--border-glass,rgba(0,0,0,0.06));
  border-radius:12px;padding:14px;text-align:center;
  transition:all 200ms;cursor:pointer;text-decoration:none;color:inherit;display:block;
}
.preview-item:hover{background:rgba(59,130,246,0.04);border-color:rgba(59,130,246,0.12);transform:translateY(-2px)}
.preview-item:active{transform:scale(0.97)}
.preview-item .pi-icon{font-size:26px;margin-bottom:6px}
.preview-item .pi-name{font-size:12px;font-weight:600;color:#374151}
