<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"组词练习","url":"https://l-s-c.github.io/devkit/pages/word-formation/","applicationCategory":"EducationalApplication","operatingSystem":"Web","offers":{"@type":"Offer","price":"0","priceCurrency":"CNY"}}</script>
<link rel="stylesheet" href="../../shared/liquid-glass.css">
<style>
:root{--brand-500:#F59E0B}[data-theme=dark]{--brand-500:#FBBF24}
body{min-height:100vh;display:flex;flex-direction:column}
.mesh-bg .mesh-blob:nth-child(1){background:radial-gradient(ellipse,rgba(245,158,11,0.08),transparent 70%)}
.main{flex:1;position:relative;z-index:1;padding:24px 24px 24px;max-width:960px;margin:0 auto;width:100%}
.panel{padding:20px;border-radius:16px;margin-bottom:16px;background:var(--bg-glass);backdrop-filter:blur(20px);border:0.5px solid var(--border-glass)}
.section-title{font-size:13px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap::before{content:'🔍';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px}
.search-input{width:100%;padding:12px 16px 12px 40px;border-radius:10px;border:1.5px solid var(--border-glass);background:var(--bg-glass-input);font-size:14px;color:var(--text-primary);outline:none}
.search-input:focus{border-color:var(--brand-500)}
.pill-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.pill-label{font-size:10px;color:var(--text-caption);margin-right:4px}
.pill{padding:5px 12px;border-radius:14px;border:1.5px solid var(--border-glass);background:var(--bg-glass-input);font-size:10px;font-weight:700;cursor:pointer;transition:all 150ms}
.pill:hover{border-color:var(--brand-500);color:var(--brand-500)}
.pill.active{background:var(--brand-500);color:#fff;border-color:var(--brand-500)}
.word-hero{text-align:center;padding:20px;margin-bottom:16px}
.word-char{font-size:72px;font-weight:800;margin-bottom:4px}
.word-pinyin{font-size:14px;color:var(--text-caption);font-family:var(--font-code)}
.word-list{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.word-tag{padding:8px 16px;border-radius:20px;border:1.5px solid var(--border-glass);background:var(--bg-glass-input);font-size:14px;font-weight:700;cursor:pointer;transition:all 200ms}
.word-tag:hover{border-color:var(--brand-500);background:rgba(245,158,11,0.06);transform:translateY(-1px)}
.word-tag .hl{color:var(--brand-500);font-weight:800}
.word-freq{font-size:8px;color:var(--text-caption);margin-left:4px;vertical-align:super}
.example-area{margin-top:16px;padding:16px;border-radius:6px;background:rgba(245,158,11,0.04);border:1px solid rgba(245,158,11,0.1)}
.example-label{font-size:9px;font-weight:700;color:var(--brand-500);margin-bottom:4px}
.example-text{font-size:13px;line-height:1.8}
.empty-msg{text-align:center;padding:40px;color:var(--text-caption);font-size:13px}
</style>
<script>var _hmt=_hmt||[];(function(){var hm=document.createElement("script");hm.src="https://hm.baidu.com/hm.js?bbc2c451520fe871702237e9d83943db";var s=document.getElementsByTagName("script")[0];s.parentNode.insertBefore(hm,s);})();</script>
<style>@media(min-width:1380px){.main{margin-left:calc((100vw - 328px)/2 - 480px)!important;margin-right:328px!important}}</style></head>
<body>
<h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">组词练习 — DevKit</h1>
<div class="mesh-bg"><div class="mesh-blob"></div><div class="mesh-blob"></div><div class="mesh-blob"></div></div>
<div class="topbar"><a class="topbar-logo" href="../index.html"><svg class="topbar-logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="6" fill="url(#bg)"/><path d="M8 7L4 12L8 17M16 7L20 12L16 17" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="bg" x1="0" y1="0" x2="24" y2="24"><stop stop-color="#6366F1"/><stop offset="1" stop-color="#818CF8"/></linearGradient></defs></svg><span class="topbar-logo-text">DevKit</span></a><span class="topbar-tool-name">组词练习</span><div class="topbar-spacer"></div><button class="theme-btn" onclick="toggleTheme()">🌙</button></div>
<div class="main">
  <div class="panel">
    <div class="section-title">📝 组词练习</div>
    <div class="search-wrap"><input class="search-input" id="searchInput" placeholder="输入一个汉字，查看常用组词..." maxlength="1"></div>
    <div class="pill-row" id="quickPills">
      <span class="pill-label">常用字：</span>
      <div class="pill">大</div><div class="pill">小</div><div class="pill">花</div><div class="pill">天</div>
      <div class="pill">地</div><div class="pill">水</div><div class="pill">火</div><div class="pill">山</div>
      <div class="pill">风</div><div class="pill">雨</div><div class="pill">春</div><div class="pill">明</div>
    </div>
  </div>
  <div class="panel" id="resultPanel">
    <div class="empty-msg" id="emptyMsg">👆 输入汉字开始组词</div>
  </div>
</div>
<div class="statusbar"><span id="statusInfo">组词练习</span><div class="statusbar-spacer"></div><span>小学常用字 · 纯本地</span></div>
<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';
// Load 200 chars from external JSON
let DATA={};
fetch('./words.json').then(r=>r.json()).then(arr=>{
  arr.forEach(item=>{
    const STARS={3:'★★★',2:'★★☆',1:'★☆☆'};
    DATA[item.char]={words:item.words.map(w=>[w.w,STARS[w.freq]||'★☆☆',w.sentence])};
  });
  // update quick pills with first 12 chars
  const pills=arr.slice(0,12).map(i=>i.char);
  document.getElementById('quickPills').innerHTML='<span class="pill-label">常用字：</span>'+pills.map(c=>`<div class="pill">${c}</div>`).join('');
  document.getElementById('statusInfo').textContent=`${arr.length} 个常用字`;
}).catch(()=>{});
function render(char){
  const p=document.getElementById('resultPanel');
  if(!char||!DATA[char]){p.innerHTML='<div class="empty-msg">'+(char?'暂无「'+char+'」的组词数据':'👆 输入汉字开始组词')+'</div>';return}
  const d=DATA[char];
  let html=`<div class="word-hero"><div class="word-char">${char}</div></div>`;
  html+=`<div class="section-title">💡 常用组词 <span style="font-size:10px;color:var(--text-caption);margin-left:auto;font-weight:400">按使用频率排序</span></div>`;
  html+='<div class="word-list">';
  d.words.forEach(w=>{
    const highlighted=w[0].replace(char,`<span class="hl">${char}</span>`);
    html+=`<div class="word-tag" data-ex="${w[2]}">${highlighted}<span class="word-freq">${w[1]}</span></div>`;
  });
  html+='</div>';
  html+=`<div class="example-area" id="exArea"><div class="example-label">📖 例句</div><div class="example-text" id="exText">点击上方词语查看例句</div></div>`;
  p.innerHTML=html;
  p.querySelectorAll('.word-tag').forEach(t=>t.addEventListener('click',function(){
    document.getElementById('exText').innerHTML=this.dataset.ex;
  }));
  document.getElementById('statusInfo').textContent='「'+char+'」共 '+d.words.length+' 个组词';
}
document.getElementById('searchInput').addEventListener('input',function(){render(this.value.trim())});
document.getElementById('quickPills').addEventListener('click',e=>{
  if(!e.target.classList.contains('pill'))return;
  const c=e.target.textContent;
  document.getElementById('searchInput').value=c;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  e.target.classList.add('active');
  render(c);
});
</script>
<noscript><p>组词练习 — DevKit。请启用 JavaScript。</p></noscript>
</body>
</html>
