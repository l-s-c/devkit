body { min-height: 100vh; display: flex; flex-direction: column; }
.main { flex: 1; position: relative; z-index: 1; padding: 24px 24px 24px; max-width: 960px; margin: 0 auto; width: 100%; }

/* 左输入 + 右统计 */
.dual { display: grid; grid-template-columns: 1fr 340px; gap: 16px; align-items: start; }

/* 输入区 */
.input-card {
  padding: 24px; border-radius: 16px;
  background: var(--bg-glass); backdrop-filter: blur(20px);
  border: 0.5px solid var(--border-glass);
}
.input-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.input-title { font-size: 12px; font-weight: 700; color: var(--text-caption); text-transform: uppercase; letter-spacing: 0.5px; }
.input-actions { display: flex; gap: 4px; }
.input-btn {
  padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border-glass);
  background: var(--bg-glass); font-size: 11px; font-weight: 600;
  color: var(--text-caption); cursor: pointer; transition: all 150ms;
}
.input-btn:hover { border-color: var(--brand-500); color: var(--brand-500); }
.text-area {
  width: 100%; height: 360px; resize: vertical; padding: 16px; border-radius: 10px;
  border: 1.5px solid var(--border-glass); background: var(--bg-glass);
  font-family: var(--font-main); font-size: 15px; line-height: 1.8;
  color: var(--text-primary); transition: border-color 200ms;
}
.text-area:focus { outline: none; border-color: var(--brand-500); }
.text-area::placeholder { color: var(--text-caption); }

/* 统计面板 */
.stats-panel { display: flex; flex-direction: column; gap: 12px; position: sticky; top: 72px; }
.panel {
  padding: 20px; border-radius: 16px;
  background: var(--bg-glass); backdrop-filter: blur(20px);
  border: 0.5px solid var(--border-glass);
}

/* Hero 数字 */
.hero-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.hero-card {
  padding: 16px; border-radius: 10px; border: 1px solid var(--border-glass);
  background: var(--bg-glass); text-align: center;
}
.hero-value { font-family: var(--font-code); font-size: 28px; font-weight: 900; color: var(--brand-500); }
.hero-label { font-size: 11px; color: var(--text-caption); margin-top: 2px; }

/* 详细统计 */
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
.detail-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; border-radius: 6px;
  border: 1px solid var(--border-glass); background: var(--bg-glass);
}
.detail-name { font-size: 12px; color: var(--text-secondary); }
.detail-value { font-family: var(--font-code); font-size: 13px; font-weight: 700; }

/* 阅读时间 */
.reading-card {
  padding: 16px; border-radius: 10px; text-align: center;
  background: linear-gradient(135deg, rgba(99,102,241,0.06), rgba(168,85,247,0.06));
  border: 1px solid rgba(99,102,241,0.1);
}
.reading-icon { font-size: 24px; margin-bottom: 4px; }
.reading-time { font-family: var(--font-code); font-size: 20px; font-weight: 800; color: var(--brand-500); }
.reading-label { font-size: 11px; color: var(--text-caption); margin-top: 2px; }

/* 高频词 */
.kw-title { font-size: 12px; font-weight: 700; color: var(--text-caption); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.kw-list { display: flex; flex-direction: column; gap: 4px; }
.kw-item {
  display: flex; align-items: center; gap: 8px; padding: 6px 10px;
  border-radius: 6px; background: var(--bg-glass); border: 1px solid var(--border-glass);
}
.kw-rank { font-family: var(--font-code); font-size: 10px; font-weight: 800; color: var(--text-caption); width: 16px; }
.kw-word { font-size: 12px; font-weight: 600; flex-shrink: 0; }
.kw-bar-bg { flex: 1; height: 4px; border-radius: 2px; background: var(--border-glass); max-width: 60px; }
.kw-bar { height: 4px; border-radius: 2px; background: var(--brand-500); transition: width 300ms; }
.kw-count { font-family: var(--font-code); font-size: 11px; color: var(--text-caption); width: 24px; text-align: right; }
.kw-empty { text-align: center; color: var(--text-caption); font-size: 12px; padding: 16px; }

@media (max-width: 768px) {
  .main { padding: 16px 16px 60px; }
  .dual { grid-template-columns: 1fr; }
  .stats-panel { position: static; }
  .text-area { height: 200px; }
}

<div class="main">
  <div class="dual">
    <!-- 左侧输入 -->
    <div class="input-card">
      <div class="input-header">
        <span class="input-title">☰ 输入文本</span>
        <div class="input-actions">
          <button class="input-btn" id="btnPaste">☰ 粘贴</button>
          <button class="input-btn" id="btnClear">✕ 清空</button>
        </div>
      </div>
      <textarea class="text-area" id="inputText" placeholder="输入或粘贴文本，实时统计各维度数据..."></textarea>
    </div>

    <!-- 右侧统计 -->
    <div class="stats-panel">
      <div class="panel">
        <div class="hero-stats">
          <div class="hero-card"><div class="hero-value" id="statChars">0</div><div class="hero-label">字符数</div></div>
          <div class="hero-card"><div class="hero-value" id="statWords">0</div><div class="hero-label">单词/字数</div></div>
        </div>
        <div class="detail-grid">
          <div class="detail-item"><span class="detail-name">不含空格</span><span class="detail-value" id="statNoSpace">0</span></div>
          <div class="detail-item"><span class="detail-name">中文字数</span><span class="detail-value" id="statChinese">0</span></div>
          <div class="detail-item"><span class="detail-name">英文词数</span><span class="detail-value" id="statEnglish">0</span></div>
          <div class="detail-item"><span class="detail-name">数字个数</span><span class="detail-value" id="statNumbers">0</span></div>
          <div class="detail-item"><span class="detail-name">句子数</span><span class="detail-value" id="statSentences">0</span></div>
          <div class="detail-item"><span class="detail-name">段落数</span><span class="detail-value" id="statParagraphs">0</span></div>
          <div class="detail-item"><span class="detail-name">行数</span><span class="detail-value" id="statLines">0</span></div>
          <div class="detail-item"><span class="detail-name">标点符号</span><span class="detail-value" id="statPunc">0</span></div>
        </div>
      </div>

      <div class="panel">
        <div class="reading-card">
          <div class="reading-icon">⊞</div>
          <div class="reading-time" id="readingTime">0 秒</div>
          <div class="reading-label">预计阅读时间</div>
        </div>
      </div>

      <div class="panel">
        <div class="kw-title">⊕ 高频词 Top 5</div>
        <div class="kw-list" id="keywordList">
          <div class="kw-empty">输入文本后显示高频词分析</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="statusbar">
  <span id="statusInfo">实时统计，输入即更新</span>
  <div class="statusbar-spacer"></div>
  <span>纯本地处理</span>
</div>

<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

let debounceTimer = null;

function escH(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function analyze() {
  const text = document.getElementById('inputText').value;

  // 字符数（Array.from 正确处理 emoji）
  const chars = Array.from(text).length;
  const noSpace = Array.from(text.replace(/\s/g, '')).length;
  document.getElementById('statChars').textContent = chars;
  document.getElementById('statNoSpace').textContent = noSpace;

  // 中文
  const chinese = (text.match(/[\u4e00-\u9fff]/g) || []).length;
  document.getElementById('statChinese').textContent = chinese;

  // 英文词
  const engWords = (text.match(/[a-zA-Z]+/g) || []).length;
  document.getElementById('statEnglish').textContent = engWords;

  // 总词数 = 中文字 + 英文词
  document.getElementById('statWords').textContent = chinese + engWords;

  // 数字
  document.getElementById('statNumbers').textContent = (text.match(/\d+/g) || []).length;

  // 句子（中英文句号/问号/感叹号）
  document.getElementById('statSentences').textContent = (text.match(/[.!?。！？]+/g) || []).length;

  // 段落（双换行分隔）
  document.getElementById('statParagraphs').textContent = text.trim() ? text.trim().split(/\n\s*\n/).filter(p => p.trim()).length : 0;

  // 行数
  document.getElementById('statLines').textContent = text ? text.split('\n').length : 0;

  // 标点
  document.getElementById('statPunc').textContent = (text.match(/[^\w\s\u4e00-\u9fff]/gu) || []).length;

  // 阅读时间（中文 300 字/分钟，英文 200 词/分钟）
  const minutes = chinese / 300 + engWords / 200;
  let timeStr;
  if (minutes < 1) timeStr = Math.max(0, Math.round(minutes * 60)) + ' 秒';
  else if (minutes < 60) timeStr = Math.round(minutes) + ' 分钟';
  else timeStr = Math.floor(minutes / 60) + ' 小时 ' + Math.round(minutes % 60) + ' 分钟';
  document.getElementById('readingTime').textContent = timeStr;

  // 高频词（Map O(n)）
  analyzeKeywords(text);
}

function analyzeKeywords(text) {
  const list = document.getElementById('keywordList');
  if (!text.trim()) {
    list.innerHTML = '<div class="kw-empty">输入文本后显示高频词分析</div>';
    return;
  }

  const freq = new Map();
  // 中文单字
  (text.match(/[\u4e00-\u9fff]/g) || []).forEach(c => freq.set(c, (freq.get(c) || 0) + 1));
  // 英文词（2 字母以上）
  (text.match(/[a-zA-Z]{2,}/g) || []).forEach(w => {
    const k = w.toLowerCase();
    freq.set(k, (freq.get(k) || 0) + 1);
  });

  const sorted = [...freq.entries()].sort((a, b) => b[1] - a[1]).slice(0, 5);
  if (!sorted.length) {
    list.innerHTML = '<div class="kw-empty">无足够数据</div>';
    return;
  }

  const max = sorted[0][1];
  list.innerHTML = sorted.map(([word, count], i) =>
    `<div class="kw-item">
      <span class="kw-rank">${i + 1}</span>
      <span class="kw-word">${escH(word)}</span>
      <div class="kw-bar-bg"><div class="kw-bar" style="width:${Math.round(count / max * 100)}%"></div></div>
      <span class="kw-count">${count}</span>
    </div>`
  ).join('');
}

/* ===== 事件（200ms 防抖） ===== */
document.getElementById('inputText').addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(analyze, 200);
});

document.getElementById('btnPaste').addEventListener('click', async () => {
  try {
    document.getElementById('inputText').value = await navigator.clipboard.readText();
    analyze();
  } catch (e) { /* denied */ }
});

document.getElementById('btnClear').addEventListener('click', () => {
  document.getElementById('inputText').value = '';
  analyze();
});

analyze();
</script>
