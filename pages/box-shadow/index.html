<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

const PRESETS = [
  { name: '柔和', layers: [{ x: 0, y: 4, blur: 12, spread: 0, color: 'rgba(0,0,0,0.15)', inset: false }] },
  { name: '悬浮', layers: [{ x: 0, y: 8, blur: 24, spread: -4, color: 'rgba(0,0,0,0.12)', inset: false }] },
  { name: '深邃', layers: [{ x: 0, y: 12, blur: 40, spread: 0, color: 'rgba(0,0,0,0.25)', inset: false }] },
  { name: '品牌光', layers: [{ x: 0, y: 4, blur: 20, spread: 0, color: 'rgba(99,102,241,0.3)', inset: false }] },
  { name: '内凹', layers: [{ x: 0, y: 2, blur: 8, spread: 0, color: 'rgba(0,0,0,0.2)', inset: true }] },
  { name: '双层', layers: [{ x: 0, y: 4, blur: 6, spread: 0, color: 'rgba(0,0,0,0.1)', inset: false }, { x: 0, y: 12, blur: 24, spread: 0, color: 'rgba(0,0,0,0.08)', inset: false }] },
  { name: '新拟态', layers: [{ x: 6, y: 6, blur: 12, spread: 0, color: 'rgba(0,0,0,0.15)', inset: false }, { x: -6, y: -6, blur: 12, spread: 0, color: 'rgba(255,255,255,0.8)', inset: false }] },
  { name: '霓虹', layers: [{ x: 0, y: 0, blur: 20, spread: 4, color: 'rgba(99,102,241,0.5)', inset: false }, { x: 0, y: 0, blur: 40, spread: 8, color: 'rgba(168,85,247,0.3)', inset: false }] }
];

let shadows = [{ x: 0, y: 4, blur: 12, spread: 0, color: 'rgba(0,0,0,0.15)', inset: false }];

function rgbaToHex(rgba) {
  const m = rgba.match(/[\d.]+/g);
  if (!m) return '#000000';
  return '#' + [m[0], m[1], m[2]].map(v => parseInt(v).toString(16).padStart(2, '0')).join('');
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

function shadowToCSS(s) {
  return `${s.inset ? 'inset ' : ''}${s.x}px ${s.y}px ${s.blur}px ${s.spread}px ${s.color}`;
}

function getCSS() {
  return shadows.map(shadowToCSS).join(',\n    ');
}

function update() {
  const css = shadows.map(shadowToCSS).join(', ');
  document.getElementById('previewBox').style.boxShadow = css;
  document.getElementById('codeVal').textContent = getCSS();
  document.getElementById('statusInfo').textContent = `${shadows.length} 层阴影`;
}

/* Presets */
function renderPresets() {
  document.getElementById('presetGrid').innerHTML = PRESETS.map((p, i) => {
    const css = p.layers.map(shadowToCSS).join(', ');
    return `<div class="preset-chip" data-idx="${i}"><div class="preset-preview" style="box-shadow:${css}"></div><div class="preset-name">${p.name}</div></div>`;
  }).join('');
}

document.getElementById('presetGrid').addEventListener('click', e => {
  const chip = e.target.closest('.preset-chip');
  if (!chip) return;
  shadows = JSON.parse(JSON.stringify(PRESETS[parseInt(chip.dataset.idx)].layers));
  renderLayers(); update();
});

/* Layers */
function renderLayers() {
  document.getElementById('layerList').innerHTML = shadows.map((s, i) => `
    <div class="layer-item">
      <div class="layer-header">
        <div class="layer-title"><span class="layer-num">${i + 1}</span> 图层 ${i + 1}</div>
        <button class="layer-btn" data-del="${i}" ${shadows.length <= 1 ? 'disabled' : ''}>✕</button>
      </div>
      <div class="slider-row"><span class="slider-label">X</span><input type="range" class="slider" min="-50" max="50" value="${s.x}" data-layer="${i}" data-prop="x"><span class="slider-val">${s.x}px</span></div>
      <div class="slider-row"><span class="slider-label">Y</span><input type="range" class="slider" min="-50" max="50" value="${s.y}" data-layer="${i}" data-prop="y"><span class="slider-val">${s.y}px</span></div>
      <div class="slider-row"><span class="slider-label">模糊</span><input type="range" class="slider" min="0" max="100" value="${s.blur}" data-layer="${i}" data-prop="blur"><span class="slider-val">${s.blur}px</span></div>
      <div class="slider-row"><span class="slider-label">扩展</span><input type="range" class="slider" min="-20" max="40" value="${s.spread}" data-layer="${i}" data-prop="spread"><span class="slider-val">${s.spread}px</span></div>
      <div class="option-row">
        <input type="color" class="color-input" value="${rgbaToHex(s.color)}" data-layer="${i}" data-prop="color">
        <span class="color-hex">${s.color}</span>
        <label class="inset-toggle"><input type="checkbox" class="inset-cb" ${s.inset ? 'checked' : ''} data-layer="${i}" data-prop="inset"> inset</label>
      </div>
    </div>`).join('');
}

/* Event delegation for layers */
document.getElementById('layerList').addEventListener('input', e => {
  const el = e.target;
  const i = parseInt(el.dataset.layer);
  const prop = el.dataset.prop;
  if (isNaN(i) || !prop) return;

  if (prop === 'color') {
    // Extract current alpha from existing color
    const m = shadows[i].color.match(/[\d.]+/g);
    const alpha = m && m[3] ? parseFloat(m[3]) : 0.15;
    shadows[i].color = hexToRgba(el.value, alpha);
    el.nextElementSibling.textContent = shadows[i].color;
  } else if (prop === 'inset') {
    shadows[i].inset = el.checked;
  } else {
    shadows[i][prop] = +el.value;
    el.nextElementSibling.textContent = el.value + 'px';
  }
  update();
});

document.getElementById('layerList').addEventListener('click', e => {
  const del = e.target.closest('[data-del]');
  if (!del || shadows.length <= 1) return;
  shadows.splice(parseInt(del.dataset.del), 1);
  renderLayers(); update();
});

document.getElementById('addLayerBtn').addEventListener('click', () => {
  shadows.push({ x: 0, y: 4, blur: 12, spread: 0, color: 'rgba(0,0,0,0.15)', inset: false });
  renderLayers(); update();
});

/* Copy */
document.getElementById('codeBlock').addEventListener('click', () => {
  navigator.clipboard.writeText(`box-shadow: ${getCSS()};`);
  const cp = document.getElementById('codeCopy');
  cp.textContent = '✓ 已复制';
  setTimeout(() => cp.textContent = '☰ 复制', 1500);
});

renderPresets(); renderLayers(); update();
</script>
