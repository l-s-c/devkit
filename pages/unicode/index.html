<script type="module">
import '../../shared/theme.js';

let format = 'unicode';
const encoder = new TextEncoder();

const FORMAT_LABELS = { unicode: '\\uXXXX', es6: '\\u{XXXXX}', html: '&#xXXXX;', utf8: 'UTF-8 Hex' };

/* ===== 编码：文本→编码（用 codePointAt，不是 charCodeAt）===== */
function textToEncoded(text) {
  if (!text) return '';
  const codePoints = [...text].map(ch => ch.codePointAt(0));

  switch (format) {
    case 'unicode':
      // BMP 用 \uXXXX，超出 BMP 的 emoji 用代理对 \uD83D\uDE00
      return codePoints.map(cp => {
        if (cp <= 0xFFFF) return '\\u' + cp.toString(16).toUpperCase().padStart(4, '0');
        const hi = Math.floor((cp - 0x10000) / 0x400) + 0xD800;
        const lo = (cp - 0x10000) % 0x400 + 0xDC00;
        return '\\u' + hi.toString(16).toUpperCase() + '\\u' + lo.toString(16).toUpperCase();
      }).join('');
    case 'es6':
      // \u{XXXXX} 格式，emoji 直接 \u{1F600}
      return codePoints.map(cp => '\\u{' + cp.toString(16).toUpperCase() + '}').join('');
    case 'html':
      return codePoints.map(cp => '&#x' + cp.toString(16).toUpperCase() + ';').join('');
    case 'utf8':
      // TextEncoder 编码后逐字节 .toString(16)
      return [...encoder.encode(text)].map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ');
  }
}

/* ===== 解码：编码→文本 ===== */
function encodedToText(encoded) {
  if (!encoded) return '';
  try {
    switch (format) {
      case 'unicode':
        // 处理代理对：先还原所有 \uXXXX 为 charCode 数组，再用 fromCharCode
        return encoded.replace(/\\u([0-9A-Fa-f]{4})/g, (_, h) =>
          String.fromCharCode(parseInt(h, 16))
        );
      case 'es6':
        return encoded.replace(/\\u\{([0-9A-Fa-f]+)\}/g, (_, h) =>
          String.fromCodePoint(parseInt(h, 16))
        );
      case 'html':
        return encoded.replace(/&#x([0-9A-Fa-f]+);/g, (_, h) =>
          String.fromCodePoint(parseInt(h, 16))
        );
      case 'utf8':
        const bytes = encoded.trim().split(/\s+/).map(h => parseInt(h, 16)).filter(n => !isNaN(n));
        return new TextDecoder().decode(new Uint8Array(bytes));
    }
  } catch (e) { return '⚠️ 解码错误'; }
}

/* ===== 转换 ===== */
function convert(dir) {
  if (dir === 'encode') {
    const text = document.getElementById('inputText').value;
    document.getElementById('outputText').value = textToEncoded(text);
    updateInfo(text);
  } else {
    const encoded = document.getElementById('outputText').value;
    const text = encodedToText(encoded);
    document.getElementById('inputText').value = text;
    updateInfo(text);
  }
}

/* ===== 字符详情 ===== */
function updateInfo(text) {
  const chars = [...text];
  const codePoints = chars.map(ch => ch.codePointAt(0));
  document.getElementById('statChars').textContent = chars.length + ' 字符';
  document.getElementById('statPoints').textContent = codePoints.length + ' 码点';

  document.getElementById('charTable').innerHTML = chars.slice(0, 50).map(ch => {
    const cp = ch.codePointAt(0);
    const hex = cp.toString(16).toUpperCase();
    const uEsc = cp <= 0xFFFF ? '\\u' + hex.padStart(4, '0') : '\\u{' + hex + '}';
    const html = '&#x' + hex + ';';
    const utf8 = [...encoder.encode(ch)].map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ');
    return `<tr><td>${ch}</td><td>U+${hex}</td><td>${uEsc}</td><td>${html}</td><td>${utf8}</td></tr>`;
  }).join('');

  document.getElementById('statusInfo').textContent = `${chars.length} 字符 · ${codePoints.length} 码点 · ${FORMAT_LABELS[format]}`;
}

/* ===== 复制 ===== */
function copyText(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).value).then(() => {
    btn.textContent = '已复制 ✓';
    setTimeout(() => btn.textContent = '复制', 1500);
  });
}

/* ===== 事件绑定 ===== */
document.getElementById('inputText').addEventListener('input', () => convert('encode'));
document.getElementById('outputText').addEventListener('input', () => convert('decode'));

document.getElementById('formatTabs').addEventListener('click', e => {
  const tab = e.target.closest('.format-tab');
  if (!tab) return;
  format = tab.dataset.fmt;
  document.querySelectorAll('.format-tab').forEach(t => t.classList.toggle('active', t.dataset.fmt === format));
  document.getElementById('statFormat').textContent = FORMAT_LABELS[format];
  convert('encode');
});

document.getElementById('copyInput').addEventListener('click', function() { copyText('inputText', this); });
document.getElementById('copyOutput').addEventListener('click', function() { copyText('outputText', this); });

convert('encode');
</script>
