.sc{padding:14px 8px;border-radius:10px;border:1.5px solid var(--border-glass);background:var(--bg-glass-input);text-align:center;cursor:pointer;transition:all 200ms}
.sc:hover{border-color:var(--brand-500);transform:translateY(-2px)}

.rc-label{font-size:9px;font-weight:700;color:var(--text-caption);margin-bottom:2px}
.rc-value{font-size:22px;font-weight:900;font-family:var(--font-code);color:var(--brand-500)}

.formula-box{padding:12px;border-radius:8px;background:rgba(139,92,246,0.04);font-family:var(--font-code);font-size:12px;text-align:center;margin-top:12px;font-weight:600;color:var(--text-secondary);line-height:1.8}

<div class="main">
  <div class="panel">
    <div class="section-title">вҲ  йҖүжӢ©еӣҫеҪў</div>
    <div class="shape-grid" id="shapeGrid"></div>
  </div>
  <div class="panel">
    <div class="section-title" id="formTitle">иҫ“е…ҘеҸӮж•°</div>
    <div id="formArea"></div>
    <button class="btn" id="calcBtn">в–Ұ и®Ўз®—</button>
    <div class="result-grid" id="resultGrid"></div>
    <div class="formula-box" id="formulaBox"></div>
  </div>
</div>
<div class="statusbar"><span id="statusInfo">еҮ дҪ•еӣҫеҪўи®Ўз®—еҷЁ</span><div class="statusbar-spacer"></div><span>ж•°еӯҰзҙ« В· 10з§ҚеӣҫеҪў</span></div>
<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';
const PI=Math.PI,fmt=n=>Number.isInteger(n)?n:parseFloat(n.toFixed(4));
const SHAPES=[
{icon:'в–ӯ',name:'й•ҝж–№еҪў',fields:[['й•ҝ a','a','8'],['е®Ҫ b','b','5']],calc:v=>[{l:'йқўз§Ҝ S',v:fmt(v.a*v.b),u:'cmВІ'},{l:'е‘Ёй•ҝ C',v:fmt(2*(v.a+v.b)),u:'cm'},{l:'еҜ№и§’зәҝ',v:fmt(Math.sqrt(v.a**2+v.b**2)),u:'cm'}],formula:v=>`S = aГ—b = ${v.a}Г—${v.b} = ${fmt(v.a*v.b)} cmВІ\nC = 2(a+b) = 2(${v.a}+${v.b}) = ${fmt(2*(v.a+v.b))} cm`},
{icon:'в–Ў',name:'жӯЈж–№еҪў',fields:[['иҫ№й•ҝ a','a','6']],calc:v=>[{l:'йқўз§Ҝ S',v:fmt(v.a**2),u:'cmВІ'},{l:'е‘Ёй•ҝ C',v:fmt(4*v.a),u:'cm'},{l:'еҜ№и§’зәҝ',v:fmt(v.a*Math.sqrt(2)),u:'cm'}],formula:v=>`S = aВІ = ${v.a}ВІ = ${fmt(v.a**2)} cmВІ`},
{icon:'в–і',name:'дёүи§’еҪў',fields:[['иҫ№ a','a','5'],['иҫ№ b','b','6'],['иҫ№ c','c','7']],calc:v=>{const s=(v.a+v.b+v.c)/2;const area=Math.sqrt(s*(s-v.a)*(s-v.b)*(s-v.c));return[{l:'йқўз§Ҝ S',v:fmt(area),u:'cmВІ'},{l:'е‘Ёй•ҝ C',v:fmt(v.a+v.b+v.c),u:'cm'}]},formula:v=>{const s=(v.a+v.b+v.c)/2;return `жө·дјҰе…¬ејҸ: S = вҲҡ(s(s-a)(s-b)(s-c))\ns = (${v.a}+${v.b}+${v.c})/2 = ${fmt(s)}`}},
{icon:'в—Ӣ',name:'еңҶеҪў',fields:[['еҚҠеҫ„ r','r','5']],calc:v=>[{l:'йқўз§Ҝ S',v:fmt(PI*v.r**2),u:'cmВІ'},{l:'е‘Ёй•ҝ C',v:fmt(2*PI*v.r),u:'cm'}],formula:v=>`S = ПҖrВІ = ПҖГ—${v.r}ВІ = ${fmt(PI*v.r**2)} cmВІ\nC = 2ПҖr = 2ПҖГ—${v.r} = ${fmt(2*PI*v.r)} cm`},
{icon:'в¬Ў',name:'жўҜеҪў',fields:[['дёҠеә• a','a','4'],['дёӢеә• b','b','8'],['й«ҳ h','h','5']],calc:v=>[{l:'йқўз§Ҝ S',v:fmt((v.a+v.b)*v.h/2),u:'cmВІ'}],formula:v=>`S = (a+b)Г—h/2 = (${v.a}+${v.b})Г—${v.h}/2 = ${fmt((v.a+v.b)*v.h/2)} cmВІ`},
{icon:'в—Ү',name:'е№іиЎҢеӣӣиҫ№еҪў',fields:[['еә• a','a','8'],['й«ҳ h','h','5']],calc:v=>[{l:'йқўз§Ҝ S',v:fmt(v.a*v.h),u:'cmВІ'}],formula:v=>`S = aГ—h = ${v.a}Г—${v.h} = ${fmt(v.a*v.h)} cmВІ`},
{icon:'в¬ӣ',name:'жӯЈж–№дҪ“',fields:[['иҫ№й•ҝ a','a','4']],calc:v=>[{l:'дҪ“з§Ҝ V',v:fmt(v.a**3),u:'cmВі'},{l:'иЎЁйқўз§Ҝ',v:fmt(6*v.a**2),u:'cmВІ'}],formula:v=>`V = aВі = ${v.a}Ві = ${fmt(v.a**3)} cmВі\nиЎЁйқўз§Ҝ = 6aВІ = 6Г—${v.a}ВІ = ${fmt(6*v.a**2)} cmВІ`},
{icon:'вҠһ',name:'й•ҝж–№дҪ“',fields:[['й•ҝ a','a','5'],['е®Ҫ b','b','4'],['й«ҳ h','h','3']],calc:v=>[{l:'дҪ“з§Ҝ V',v:fmt(v.a*v.b*v.h),u:'cmВі'},{l:'иЎЁйқўз§Ҝ',v:fmt(2*(v.a*v.b+v.b*v.h+v.a*v.h)),u:'cmВІ'}],formula:v=>`V = aГ—bГ—h = ${v.a}Г—${v.b}Г—${v.h} = ${fmt(v.a*v.b*v.h)} cmВі`},
{icon:'в—Ҹ',name:'зҗғ',fields:[['еҚҠеҫ„ r','r','5']],calc:v=>[{l:'дҪ“з§Ҝ V',v:fmt(4/3*PI*v.r**3),u:'cmВі'},{l:'иЎЁйқўз§Ҝ',v:fmt(4*PI*v.r**2),u:'cmВІ'}],formula:v=>`V = 4/3ПҖrВі = ${fmt(4/3*PI*v.r**3)} cmВі\nиЎЁйқўз§Ҝ = 4ПҖrВІ = ${fmt(4*PI*v.r**2)} cmВІ`},
{icon:'в—Һ',name:'еңҶжҹұ',fields:[['еҚҠеҫ„ r','r','3'],['й«ҳ h','h','8']],calc:v=>[{l:'дҪ“з§Ҝ V',v:fmt(PI*v.r**2*v.h),u:'cmВі'},{l:'дҫ§йқўз§Ҝ',v:fmt(2*PI*v.r*v.h),u:'cmВІ'},{l:'иЎЁйқўз§Ҝ',v:fmt(2*PI*v.r*(v.r+v.h)),u:'cmВІ'}],formula:v=>`V = ПҖrВІh = ПҖГ—${v.r}ВІГ—${v.h} = ${fmt(PI*v.r**2*v.h)} cmВі`},
];
let curShape=0;
function renderShapes(){document.getElementById('shapeGrid').innerHTML=SHAPES.map((s,i)=>`<div class="sc${i===curShape?' active':''}" data-idx="${i}"><div class="sc-icon">${s.icon}</div><div class="sc-name">${s.name}</div></div>`).join('')}
function renderForm(){
  const s=SHAPES[curShape];
  document.getElementById('formTitle').textContent=`${s.icon} ${s.name} вҖ” иҫ“е…ҘеҸӮж•°`;
  document.getElementById('formArea').innerHTML=s.fields.map(([label,key,def])=>`<div class="form-item"><div class="form-label">${label} (cm)</div><input class="form-input" id="f_${key}" value="${def}"></div>`).join('');
  document.getElementById('resultGrid').innerHTML='';
  document.getElementById('formulaBox').textContent='';
}
function calc(){
  const s=SHAPES[curShape];const vals={};
  for(const[,key]of s.fields){
    const v=parseFloat(document.getElementById('f_'+key).value);
    if(isNaN(v)||v<=0){alert('иҜ·иҫ“е…ҘжӯЈж•°');return}
    vals[key]=v;
  }
  const results=s.calc(vals);
  document.getElementById('resultGrid').innerHTML=results.map(r=>`<div class="rc"><div class="rc-label">${r.l}</div><div class="rc-value">${r.v}</div><div class="rc-unit">${r.u}</div></div>`).join('');
  document.getElementById('formulaBox').textContent=s.formula(vals);
}
document.getElementById('shapeGrid').addEventListener('click',e=>{const c=e.target.closest('.sc');if(!c)return;curShape=+c.dataset.idx;renderShapes();renderForm()});
document.getElementById('calcBtn').addEventListener('click',calc);
renderShapes();renderForm();
</script>
