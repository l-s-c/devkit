<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

function getCron() {
  return [0,1,2,3,4].map(i=>document.getElementById('f'+i).value.trim()||'*').join(' ');
}

function expandField(field, min, max) {
  const values = new Set();
  field.split(',').forEach(part => {
    const stepMatch = part.match(/^(.+)\/(\d+)$/);
    let base = stepMatch ? stepMatch[1] : part;
    const step = stepMatch ? parseInt(stepMatch[2]) : 1;
    if (base === '*') { for(let i=min;i<=max;i+=step) values.add(i); }
    else {
      const rangeMatch = base.match(/^(\d+)-(\d+)$/);
      if (rangeMatch) { for(let i=+rangeMatch[1];i<=+rangeMatch[2];i+=step) values.add(i); }
      else values.add(parseInt(base));
    }
  });
  return [...values].sort((a,b)=>a-b);
}

function getNextRuns(cron, count=10) {
  const parts = cron.split(/\s+/);
  if (parts.length !== 5) return [];
  const mins = expandField(parts[0],0,59);
  const hours = expandField(parts[1],0,23);
  const doms = expandField(parts[2],1,31);
  const months = expandField(parts[3],1,12);
  const dows = expandField(parts[4],0,6);
  const domWild = parts[2]==='*', dowWild = parts[4]==='*';

  const results = [];
  const now = new Date();
  const d = new Date(now);
  d.setSeconds(0,0);
  d.setMinutes(d.getMinutes()+1);
  const limit = new Date(now.getTime()+365*24*3600*1000);

  while(results.length<count && d<limit) {
    if (!months.includes(d.getMonth()+1)) { d.setMonth(d.getMonth()+1); d.setDate(1); d.setHours(0,0); continue; }
    const domOk = domWild || doms.includes(d.getDate());
    const dowOk = dowWild || dows.includes(d.getDay());
    const dayOk = (domWild&&dowWild) ? true : (domWild ? dowOk : (dowWild ? domOk : (domOk||dowOk)));
    if (!dayOk) { d.setDate(d.getDate()+1); d.setHours(0,0); continue; }
    if (!hours.includes(d.getHours())) { d.setHours(d.getHours()+1); d.setMinutes(0); continue; }
    if (!mins.includes(d.getMinutes())) { d.setMinutes(d.getMinutes()+1); continue; }
    results.push(new Date(d));
    d.setMinutes(d.getMinutes()+1);
  }
  return results;
}

function humanize(cron) {
  const presets = {
    '* * * * *':'每分钟执行','*/5 * * * *':'每 5 分钟执行','0 * * * *':'每小时整点执行',
    '0 0 * * *':'每天 00:00 执行','0 0 1 * *':'每月 1 号 00:00 执行','0 0 * * 0':'每周日 00:00 执行',
    '0 9 * * 1-5':'工作日 09:00 执行','30 2 * * *':'每天 02:30 执行'
  };
  if(presets[cron]) return presets[cron];
  const p = cron.split(/\s+/);
  let s = '';
  if(p[4]!=='*') s += `每周 ${p[4]} `;
  if(p[3]!=='*') s += `${p[3]} 月 `;
  if(p[2]!=='*') s += `${p[2]} 号 `;
  if(p[1]!=='*') s += `${p[1]} 时 `;
  if(p[0]!=='*') s += `${p[0]} 分 `;
  return (s||'每分钟') + '执行';
}

function relativeTime(d) {
  const diff = d.getTime()-Date.now();
  const mins = Math.round(diff/60000);
  if(mins<60) return `${mins} 分钟后`;
  const hours = Math.round(mins/60);
  if(hours<24) return `${hours} 小时后`;
  return `${Math.round(hours/24)} 天后`;
}

function update() {
  const cron = getCron();
  document.getElementById('cronExpr').textContent = cron;
  document.getElementById('humanText').textContent = humanize(cron);
  const runs = getNextRuns(cron);
  if(runs.length===0){
    document.getElementById('nextRuns').innerHTML = '<div style="text-align:center;color:var(--text-caption);padding:20px">无法解析或未来一年内无执行时间</div>';
    return;
  }
  document.getElementById('nextRuns').innerHTML = runs.map((d,i)=>
    `<div class="next-run-item"><span class="run-idx">${i+1}</span><span class="run-time">${d.toLocaleString('zh-CN',{hour12:false})}</span><span class="run-relative">${relativeTime(d)}</span></div>`
  ).join('');
}

document.getElementById('btnCopyCron').addEventListener('click',()=>copyText(getCron(),'✓ Cron 表达式已复制'));
document.getElementById('cronPaste').addEventListener('input', function() {
  const parts = this.value.trim().split(/\s+/);
  if (parts.length >= 5) {
    for (let i = 0; i < 5; i++) document.getElementById('f'+i).value = parts[i] || '*';
    update();
  }
});
[0,1,2,3,4].forEach(i=>document.getElementById('f'+i).addEventListener('input',update));
document.querySelectorAll('.preset-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const parts=btn.dataset.cron.split(' ');
    parts.forEach((v,i)=>document.getElementById('f'+i).value=v);
    update();
  });
});
update();
</script>
