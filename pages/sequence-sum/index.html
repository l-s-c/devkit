<style>
body{min-height:100vh;display:flex;flex-direction:column}
.main{flex:1;position:relative;z-index:1;padding:24px;max-width:960px;margin:0 auto;width:100%}
.glass{background:var(--bg-glass);backdrop-filter:blur(20px);border:0.5px solid var(--border-glass);border-radius:16px;padding:20px;margin-bottom:16px}
.section-title{font-size:13px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.tab-row{display:flex;gap:4px;margin-bottom:16px}
.tab{padding:7px 14px;border-radius:14px;border:1.5px solid var(--border-glass);background:var(--bg-glass);font-size:11px;font-weight:700;cursor:pointer;color:var(--text-primary);transition:all 150ms}
.tab.active{background:#8B5CF6;color:#fff;border-color:#8B5CF6}
.input-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px}
.input-group label{font-size:11px;font-weight:700;color:var(--text-secondary);display:block;margin-bottom:4px}
.input-group input{width:100%;padding:12px;border-radius:10px;border:1.5px solid var(--border-glass);background:var(--bg-glass);font-size:18px;font-weight:700;text-align:center;outline:none;font-family:var(--font-code);color:var(--text-primary)}
.input-group input:focus{border-color:#8B5CF6}
.btn{padding:10px 24px;border-radius:20px;border:none;font-size:12px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,#8B5CF6,#A78BFA);color:#fff;transition:all 150ms;display:block;margin:0 auto}
.btn:hover{transform:translateY(-1px)}
.result-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.r-card{padding:16px;border-radius:12px;border:1px solid var(--border-glass);background:var(--bg-glass);text-align:center}
.r-value{font-size:28px;font-weight:900;font-family:var(--font-code);color:#8B5CF6}
.r-label{font-size:10px;color:var(--text-caption);margin-top:4px}
.formula-box{padding:16px;border-radius:12px;border:2px solid rgba(139,92,246,0.3);background:rgba(139,92,246,0.04);font-family:var(--font-code);font-size:14px;text-align:center;color:var(--text-primary);margin-bottom:16px;line-height:1.8}
.preview{font-family:var(--font-code);font-size:13px;color:var(--text-secondary);padding:12px;border-radius:10px;background:var(--bg-glass);border:1px solid var(--border-glass);word-break:break-all;margin-bottom:16px}
.steps{font-size:13px;line-height:2;color:var(--text-secondary)}
.steps .step{padding:6px 0;border-bottom:1px solid var(--border-glass)}
.result-section{display:none}
@media(max-width:768px){.main{padding:16px}.input-grid{grid-template-columns:1fr}.result-cards{grid-template-columns:1fr 1fr}}
</style>

<h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">数列求和 — DevKit 在线开发者工具箱</h1>
<div class="mesh-bg"><div class="mesh-blob"></div><div class="mesh-blob"></div><div class="mesh-blob"></div></div>
<div class="topbar">
  <a class="topbar-logo" href="../index.html"><svg class="topbar-logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="6" fill="url(#bg)"/><path d="M8 7L4 12L8 17M16 7L20 12L16 17" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="bg" x1="0" y1="0" x2="24" y2="24"><stop stop-color="#6366F1"/><stop offset="1" stop-color="#818CF8"/></linearGradient></defs></svg><span class="topbar-logo-text">DevKit</span></a>
  <span class="topbar-tool-name">数列求和</span>
  <div class="topbar-spacer"></div>
  <button class="theme-btn" onclick="toggleTheme()">🌙</button>
</div>
<div class="main">
  <div class="glass">
    <div class="section-title">📐 数列求和</div>
    <div class="tab-row">
      <div class="tab active" onclick="setType(0)">等差数列</div>
      <div class="tab" onclick="setType(1)">等比数列</div>
    </div>
    <div class="input-grid">
      <div class="input-group"><label>首项 a₁</label><input type="number" id="a1" value="1"></div>
      <div class="input-group"><label id="dLabel">公差 d</label><input type="number" id="d" value="2"></div>
      <div class="input-group"><label>项数 n</label><input type="number" id="n" value="10" min="1" max="100"></div>
    </div>
    <button class="btn" onclick="calc()">计算</button>
  </div>
  <div class="result-section" id="resultSection">
    <div class="glass">
      <div class="result-cards">
        <div class="r-card"><div class="r-value" id="snVal">-</div><div class="r-label">前n项和 Sₙ</div></div>
        <div class="r-card"><div class="r-value" id="anVal">-</div><div class="r-label">第n项 aₙ</div></div>
      </div>
      <div class="section-title">📋 公式</div>
      <div class="formula-box" id="formulaBox"></div>
      <div class="section-title">🔢 数列预览</div>
      <div class="preview" id="preview"></div>
      <div class="section-title">📝 解题步骤</div>
      <div class="steps" id="steps"></div>
    </div>
  </div>
</div>
<script src="../../shared/theme.js"></script>
<script>
let type=0;
function setType(t){type=t;document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===t));document.getElementById('dLabel').textContent=t===0?'公差 d':'公比 q';document.getElementById('d').value=t===0?'2':'2'}

function calc(){
  const a1=parseFloat(document.getElementById('a1').value);
  const d=parseFloat(document.getElementById('d').value);
  const n=parseInt(document.getElementById('n').value);
  if(isNaN(a1)||isNaN(d)||isNaN(n)||n<1){alert('请输入有效数值');return}

  document.getElementById('resultSection').style.display='block';
  let an,sn,formula,steps=[],preview=[];

  if(type===0){
    // Arithmetic
    an=a1+(n-1)*d;
    sn=n*a1+n*(n-1)/2*d;
    formula=`aₙ = a₁ + (n-1)d = ${a1} + (n-1)×${d}<br>Sₙ = na₁ + n(n-1)d/2`;
    steps.push(`已知：a₁ = ${a1}，d = ${d}，n = ${n}`);
    steps.push(`aₙ = a₁ + (n-1)d = ${a1} + (${n}-1)×${d} = ${a1} + ${(n-1)*d} = ${an}`);
    steps.push(`Sₙ = na₁ + n(n-1)d/2 = ${n}×${a1} + ${n}×${n-1}×${d}/2`);
    steps.push(`Sₙ = ${n*a1} + ${n*(n-1)*d/2} = ${sn}`);
    for(let i=0;i<Math.min(n,15);i++) preview.push(a1+i*d);
  } else {
    // Geometric
    an=a1*Math.pow(d,n-1);
    if(d===1){sn=n*a1}else{sn=a1*(1-Math.pow(d,n))/(1-d)}
    formula=`aₙ = a₁ × q^(n-1) = ${a1} × ${d}^(n-1)<br>Sₙ = a₁(1-qⁿ)/(1-q)` + (d===1?' （q=1时 Sₙ=na₁）':'');
    steps.push(`已知：a₁ = ${a1}，q = ${d}，n = ${n}`);
    steps.push(`aₙ = a₁ × q^(n-1) = ${a1} × ${d}^${n-1} = ${an}`);
    if(d===1){steps.push(`q = 1，Sₙ = na₁ = ${n}×${a1} = ${sn}`)}
    else{steps.push(`Sₙ = a₁(1-qⁿ)/(1-q) = ${a1}×(1-${d}^${n})/(1-${d})`);steps.push(`Sₙ = ${a1}×(1-${Math.pow(d,n)})/(${1-d}) = ${sn}`)}
    for(let i=0;i<Math.min(n,15);i++) preview.push(a1*Math.pow(d,i));
  }

  document.getElementById('snVal').textContent=Number.isFinite(sn)?formatNum(sn):'∞';
  document.getElementById('anVal').textContent=Number.isFinite(an)?formatNum(an):'∞';
  document.getElementById('formulaBox').innerHTML=formula;
  document.getElementById('preview').textContent=preview.map(v=>formatNum(v)).join(', ')+(n>15?', ...':'');
  document.getElementById('steps').innerHTML=steps.map(s=>`<div class="step">${s}</div>`).join('');
}

function formatNum(v){return Math.abs(v)>1e10?v.toExponential(4):(Number.isInteger(v)?v:parseFloat(v.toFixed(6)))}
</script>
