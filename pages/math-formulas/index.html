<style>

<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';
const F=[
// 代数
{n:'完全平方公式',f:'(a \\pm b)^2 = a^2 \\pm 2ab + b^2',cat:'代数',d:'两数之和（差）的平方展开'},
{n:'平方差公式',f:'(a+b)(a-b) = a^2 - b^2',cat:'代数',d:'两数之和乘以两数之差'},
{n:'一元二次求根公式',f:'x = \\dfrac{-b \\pm \\sqrt{b^2-4ac}}{2a}',cat:'代数',d:'ax²+bx+c=0 的解，Δ=b²-4ac≥0'},
{n:'韦达定理',f:'x_1+x_2=-\\dfrac{b}{a},\\quad x_1 \\cdot x_2=\\dfrac{c}{a}',cat:'代数',d:'一元二次方程两根的和与积'},
{n:'二项式定理',f:'(a+b)^n = \\sum_{k=0}^{n} C_n^k a^{n-k} b^k',cat:'代数',d:'二项式展开公式'},
{n:'等差数列求和',f:'S_n = \\dfrac{n(a_1+a_n)}{2}',cat:'代数',d:'首项a₁，末项aₙ，共n项'},
{n:'等比数列求和',f:'S_n = \\dfrac{a_1(1-q^n)}{1-q}',cat:'代数',d:'首项a₁，公比q≠1'},
// 几何
{n:'圆面积',f:'S = \\pi r^2',cat:'几何',d:'圆面积等于π乘以半径的平方'},
{n:'圆周长',f:'C = 2\\pi r',cat:'几何',d:'圆周长等于2π乘以半径'},
{n:'勾股定理',f:'a^2 + b^2 = c^2',cat:'几何',d:'直角三角形两直角边平方和等于斜边平方'},
{n:'三角形面积',f:'S = \\dfrac{1}{2}ah',cat:'几何',d:'底×高÷2'},
{n:'梯形面积',f:'S = \\dfrac{(a+b)h}{2}',cat:'几何',d:'(上底+下底)×高÷2'},
{n:'球体积',f:'V = \\dfrac{4}{3}\\pi r^3',cat:'几何',d:'球的体积公式'},
{n:'球表面积',f:'S = 4\\pi r^2',cat:'几何',d:'球的表面积公式'},
{n:'圆柱体积',f:'V = \\pi r^2 h',cat:'几何',d:'底面积×高'},
// 三角
{n:'正弦定理',f:'\\dfrac{a}{\\sin A}=\\dfrac{b}{\\sin B}=\\dfrac{c}{\\sin C}=2R',cat:'三角',d:'三角形边与对角正弦之比相等'},
{n:'余弦定理',f:'c^2 = a^2+b^2-2ab\\cos C',cat:'三角',d:'一般三角形边角关系'},
{n:'基本恒等式',f:'\\sin^2\\theta + \\cos^2\\theta = 1',cat:'三角',d:'三角函数基本恒等式'},
{n:'二倍角公式',f:'\\sin 2\\theta = 2\\sin\\theta\\cos\\theta',cat:'三角',d:'正弦二倍角'},
{n:'和差化积',f:'\\sin A+\\sin B = 2\\sin\\dfrac{A+B}{2}\\cos\\dfrac{A-B}{2}',cat:'三角',d:'和差化积公式'},
// 函数
{n:'一次函数',f:'y = kx + b',cat:'函数',d:'k为斜率，b为截距'},
{n:'二次函数',f:'y = ax^2 + bx + c',cat:'函数',d:'顶点(-b/2a, (4ac-b²)/4a)'},
{n:'指数函数',f:'y = a^x \\quad (a>0, a\\neq 1)',cat:'函数',d:'底数a>0且a≠1'},
{n:'对数函数',f:'y = \\log_a x',cat:'函数',d:'指数函数的反函数'},
{n:'导数定义',f:"f'(x) = \\lim_{\\Delta x \\to 0}\\dfrac{f(x+\\Delta x)-f(x)}{\\Delta x}",cat:'函数',d:'函数在某点的变化率'},
// 概率
{n:'排列数',f:'A_n^m = \\dfrac{n!}{(n-m)!}',cat:'概率',d:'从n个中取m个有序排列'},
{n:'组合数',f:'C_n^m = \\dfrac{n!}{m!(n-m)!}',cat:'概率',d:'从n个中取m个无序组合'},
{n:'古典概型',f:'P(A) = \\dfrac{m}{n}',cat:'概率',d:'事件A包含m个基本事件，总共n个'},
// 统计
{n:'平均数',f:'\\bar{x} = \\dfrac{1}{n}\\sum_{i=1}^{n}x_i',cat:'统计',d:'n个数据的算术平均'},
{n:'方差',f:'S^2 = \\dfrac{1}{n}\\sum_{i=1}^{n}(x_i-\\bar{x})^2',cat:'统计',d:'衡量数据离散程度'},
{n:'标准差',f:'S = \\sqrt{S^2}',cat:'统计',d:'方差的算术平方根'},
];
const CATS=['全部','代数','几何','三角','函数','概率','统计'];
let currentCat='全部';
function renderTabs(){
  document.getElementById('tabRow').innerHTML=CATS.map(c=>`<div class="tab${c===currentCat?' active':''}" data-cat="${c}">${c}</div>`).join('');
}
function renderFormulas(q=''){
  const filtered=F.filter(f=>{
    if(currentCat!=='全部'&&f.cat!==currentCat)return false;
    if(q)return f.n.includes(q)||f.d.includes(q);
    return true;
  });
  const el=document.getElementById('fGrid');
  el.innerHTML=filtered.map(f=>`<div class="fc"><div class="fc-name">${f.n}</div><div class="fc-expr" data-tex="${f.f.replace(/"/g,'&quot;')}">${f.f}</div><div class="fc-note">${f.d}</div></div>`).join('');
  document.getElementById('statusInfo').textContent=`共 ${filtered.length} 个公式`;
  if(typeof katex!=='undefined'){
    el.querySelectorAll('.fc-expr[data-tex]').forEach(e=>{
      try{katex.render(e.dataset.tex,e,{throwOnError:false,displayMode:true})}catch(_){}
    });
  }
}
document.getElementById('tabRow').addEventListener('click',e=>{
  if(!e.target.classList.contains('tab'))return;
  currentCat=e.target.dataset.cat;renderTabs();renderFormulas(document.getElementById('searchInput').value.trim());
});
document.getElementById('searchInput').addEventListener('input',function(){renderFormulas(this.value.trim())});
function init(){renderTabs();renderFormulas()}
if(typeof katex!=='undefined')init();
else{const check=setInterval(()=>{if(typeof katex!=='undefined'){clearInterval(check);init()}},100);setTimeout(()=>clearInterval(check),5000);init()}
</script>
