.tab.active{background:var(--brand-500);color:#fff;border-color:var(--brand-500)}
.eq-label{font-size:11px;font-weight:700;color:var(--text-caption);margin-bottom:8px}
.eq-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.coeff-input{width:56px;padding:10px 8px;border-radius:8px;border:1.5px solid var(--border-glass);background:var(--bg-glass-input);font-size:18px;font-weight:800;text-align:center;font-family:var(--font-code);outline:none;color:var(--text-primary)}
.coeff-input:focus{border-color:var(--brand-500)}
.eq-text{font-size:18px;font-weight:700;font-family:var(--font-code);color:var(--text-secondary)}
.btn{padding:10px 24px;border-radius:20px;border:none;font-size:12px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,#8B5CF6,#A78BFA);color:#fff;margin-top:8px}

.step-num{display:inline-flex;width:20px;height:20px;border-radius:50%;background:var(--brand-500);color:#fff;font-size:10px;font-weight:800;align-items:center;justify-content:center;margin-right:4px}
.err{color:#EF4444;font-size:12px;margin-top:8px}

<h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">方程求解器 — DevKit</h1>
<div class="mesh-bg"><div class="mesh-blob"></div><div class="mesh-blob"></div><div class="mesh-blob"></div></div>
<div class="topbar"><a class="topbar-logo" href="../index.html"><svg class="topbar-logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="6" fill="url(#bg)"/><path d="M8 7L4 12L8 17M16 7L20 12L16 17" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="bg" x1="0" y1="0" x2="24" y2="24"><stop stop-color="#6366F1"/><stop offset="1" stop-color="#818CF8"/></linearGradient></defs></svg><span class="topbar-logo-text">DevKit</span></a><span class="topbar-tool-name">方程求解器</span><div class="topbar-spacer"></div><button class="theme-btn" onclick="toggleTheme()">🌙</button></div>
<div class="main">
  <div class="panel">
    <div class="section-title">📐 方程求解器</div>
    <div class="tab-row"><div class="tab active" data-type="linear1">一元一次</div><div class="tab" data-type="quadratic">一元二次</div><div class="tab" data-type="linear2">二元一次</div></div>
    <div id="formArea"></div>
    <button class="btn" id="solveBtn">🧮 求解</button>
    <div class="err" id="errMsg"></div>
  </div>

    <div class="section-title">✅ 解</div>

  </div>

<div class="statusbar"><span>方程求解器</span><div class="statusbar-spacer"></div><span>数学紫 · 判别式</span></div>
<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';
let type='linear1';
const FORMS={
  linear1:`<div class="eq-label">一元一次方程：ax + b = 0</div><div class="eq-row"><input class="coeff-input" id="a" value="3"><span class="eq-text">x +</span><input class="coeff-input" id="b" value="-6"><span class="eq-text">= 0</span></div>`,
  quadratic:`<div class="eq-label">一元二次方程：ax² + bx + c = 0</div><div class="eq-row"><input class="coeff-input" id="a" value="1"><span class="eq-text">x² +</span><input class="coeff-input" id="b" value="-5"><span class="eq-text">x +</span><input class="coeff-input" id="c" value="6"><span class="eq-text">= 0</span></div>`,
  linear2:`<div class="eq-label">二元一次方程组</div><div class="eq-row"><input class="coeff-input" id="a1" value="2"><span class="eq-text">x +</span><input class="coeff-input" id="b1" value="3"><span class="eq-text">y =</span><input class="coeff-input" id="c1" value="7"></div><div class="eq-row"><input class="coeff-input" id="a2" value="1"><span class="eq-text">x −</span><input class="coeff-input" id="b2" value="1"><span class="eq-text">y =</span><input class="coeff-input" id="c2" value="1"></div>`
};
function renderForm(){document.getElementById('formArea').innerHTML=FORMS[type];document.getElementById('resultPanel').style.display='none';document.getElementById('errMsg').textContent=''}
document.querySelector('.tab-row').addEventListener('click',e=>{if(!e.target.classList.contains('tab'))return;type=e.target.dataset.type;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));e.target.classList.add('active');renderForm()});
function fmt(n){return Number.isInteger(n)?n:parseFloat(n.toFixed(4))}
function solve(){
  const err=document.getElementById('errMsg');err.textContent='';
  function clearResult(){document.getElementById('resultPanel').style.display='none'}
  const steps=[];let result='',note='';
  if(type==='linear1'){
    const a=parseFloat(document.getElementById('a').value),b=parseFloat(document.getElementById('b').value);
    if(isNaN(a)||isNaN(b)){err.textContent='请输入系数';clearResult();return}
    if(a===0){err.textContent='a 不能为 0（否则不是方程）';clearResult();return}
    steps.push(`方程：${a}x + ${b} = 0`);
    steps.push(`移项：${a}x = ${-b}`);
    const x=-b/a;
    steps.push(`x = ${-b} / ${a} = ${fmt(x)} ✅`);
    result=`x = ${fmt(x)}`;
  } else if(type==='quadratic'){
    const a=parseFloat(document.getElementById('a').value),b=parseFloat(document.getElementById('b').value),c=parseFloat(document.getElementById('c').value);
    if(isNaN(a)||isNaN(b)||isNaN(c)){err.textContent='请输入系数';clearResult();return}
    if(a===0){err.textContent='a 不能为 0（否则不是二次方程）';clearResult();return}
    const delta=b*b-4*a*c;
    steps.push(`方程：${a}x² + (${b})x + (${c}) = 0`);
    steps.push(`判别式 Δ = b²−4ac = (${b})² − 4×${a}×(${c}) = ${fmt(delta)}`);
    if(delta<0){result='无实数解';note=`Δ = ${fmt(delta)} < 0`;steps.push('Δ < 0，方程无实数解')}
    else if(delta===0){const x=-b/(2*a);result=`x = ${fmt(x)}`;note='Δ = 0，两个相等实根';steps.push(`x = −b/2a = ${fmt(x)} ✅`)}
    else{const sq=Math.sqrt(delta);const x1=(-b+sq)/(2*a),x2=(-b-sq)/(2*a);result=`x₁ = ${fmt(x1)}，x₂ = ${fmt(x2)}`;note=`Δ = ${fmt(delta)} > 0，两个不等实根`;steps.push(`x = (${-b} ± √${fmt(delta)}) / ${2*a}`);steps.push(`x₁ = ${fmt(x1)}，x₂ = ${fmt(x2)} ✅`)}
  } else {
    const a1=parseFloat(document.getElementById('a1').value),b1=parseFloat(document.getElementById('b1').value),c1=parseFloat(document.getElementById('c1').value);
    const a2=parseFloat(document.getElementById('a2').value),b2=-parseFloat(document.getElementById('b2').value),c2=parseFloat(document.getElementById('c2').value);
    if([a1,b1,c1,a2,b2,c2].some(isNaN)){err.textContent='请输入系数';clearResult();return}
    const det=a1*b2-a2*b1;
    steps.push(`方程组：${a1}x + ${b1}y = ${c1}，${a2}x + (${b2})y = ${c2}`);
    steps.push(`行列式 D = ${a1}×(${b2}) − ${a2}×${b1} = ${det}`);
    if(det===0){result='无唯一解';note='行列式 D = 0';steps.push('D = 0，方程组无唯一解')}
    else{const x=(c1*b2-c2*b1)/det,y=(a1*c2-a2*c1)/det;result=`x = ${fmt(x)}，y = ${fmt(y)}`;note=`克莱默法则 D = ${det}`;steps.push(`x = (${c1}×${b2} − ${c2}×${b1}) / ${det} = ${fmt(x)}`);steps.push(`y = (${a1}×${c2} − ${a2}×${c1}) / ${det} = ${fmt(y)} ✅`)}
  }
  document.getElementById('resultPanel').style.display='';
  document.getElementById('resultValue').textContent=result;
  document.getElementById('resultNote').textContent=note;
  document.getElementById('stepsContent').innerHTML=steps.map((s,i)=>`<span class="step-num">${i+1}</span> ${s}<br>`).join('');
}
document.getElementById('solveBtn').addEventListener('click',solve);
renderForm();
</script>
