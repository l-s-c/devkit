<body>
<h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">CSR证书生成 — DevKit</h1>
<div class="mesh-bg"><div class="mesh-blob"></div><div class="mesh-blob"></div><div class="mesh-blob"></div></div>
<div class="topbar"><a class="topbar-logo" href="../index.html"><svg class="topbar-logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="6" fill="url(#bg)"/><path d="M8 7L4 12L8 17M16 7L20 12L16 17" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="bg" x1="0" y1="0" x2="24" y2="24"><stop stop-color="#6366F1"/><stop offset="1" stop-color="#818CF8"/></linearGradient></defs></svg><span class="topbar-logo-text">DevKit</span></a><span class="topbar-tool-name">CSR 证书生成</span><div class="topbar-spacer"></div><button class="theme-btn" onclick="toggleTheme()">🌙</button></div>
<div class="main">
  <div class="panel">
    <div class="section-title">🔐 CSR 证书请求生成 <span class="badge">🔒 本地生成</span></div>
    <div class="form-grid">
      <div class="form-item full"><div class="form-label">通用名称 (CN) *</div><input class="form-input" id="cn" placeholder="example.com" value="example.com"></div>
      <div class="form-item"><div class="form-label">组织 (O)</div><input class="form-input" id="org" placeholder="My Company"></div>
      <div class="form-item"><div class="form-label">部门 (OU)</div><input class="form-input" id="ou" placeholder="IT Department"></div>
      <div class="form-item"><div class="form-label">城市 (L)</div><input class="form-input" id="city" placeholder="Beijing"></div>
      <div class="form-item"><div class="form-label">省份 (ST)</div><input class="form-input" id="state" placeholder="Beijing"></div>
      <div class="form-item"><div class="form-label">国家 (C)</div><input class="form-input" id="country" placeholder="CN" value="CN" maxlength="2"></div>
      <div class="form-item"><div class="form-label">密钥算法</div><select class="form-select" id="algo"><option value="2048">RSA 2048</option><option value="4096">RSA 4096</option></select></div>
    </div>
    <button class="btn" id="genBtn">🔑 生成 CSR + 私钥</button>
  </div>
  <div class="panel" id="outputPanel" style="display:none">
    <div style="margin-bottom:16px">
      <div class="output-label"><span>📄 CSR (Certificate Signing Request)</span><button class="copy-btn" id="copyCSR">📋 复制</button></div>
      <div class="output-box" id="csrOutput"></div>
    </div>
    <div>
      <div class="output-label"><span>🔑 私钥 (Private Key)</span><button class="copy-btn" id="copyKey">📋 复制</button></div>
      <div class="output-box" id="keyOutput"></div>
    </div>
    <div class="download-row">
      <div class="dl-btn" id="dlCSR">📥 下载 CSR</div>
      <div class="dl-btn" id="dlKey">📥 下载私钥</div>
    </div>
    <div class="security"><span style="font-size:16px">🔒</span><div><strong>安全提示：</strong>密钥对在浏览器本地生成（Web Crypto API），私钥不会上传至任何服务器。请妥善保管私钥文件。</div></div>
  </div>
</div>
<div class="statusbar"><span id="statusInfo">CSR 证书生成</span><div class="statusbar-spacer"></div><span>Web Crypto · 本地生成</span></div>
<script type="module">
import '../../shared/theme.js';
// Simple RSA keypair generation + PEM output (no CSR ASN.1 — MVP uses SPKI/PKCS8 PEM)
// Note: True CSR requires ASN.1 DER encoding (PKI.js). This MVP generates keypair in PEM format.
let csrPEM='',keyPEM='';
function arrayBufferToBase64(buf){return btoa(String.fromCharCode(...new Uint8Array(buf)))}
function formatPEM(b64,label){const lines=b64.match(/.{1,64}/g)||[];return `-----BEGIN ${label}-----\n${lines.join('\n')}\n-----END ${label}-----`}
document.getElementById('genBtn').addEventListener('click',async function(){
  const btn=this;btn.disabled=true;btn.textContent='⏳ 生成中...';
  const bits=parseInt(document.getElementById('algo').value);
  try{
    const keyPair=await crypto.subtle.generateKey({name:'RSASSA-PKCS1-v1_5',modulusLength:bits,publicExponent:new Uint8Array([1,0,1]),hash:'SHA-256'},true,['sign','verify']);
    const pubDer=await crypto.subtle.exportKey('spki',keyPair.publicKey);
    const privDer=await crypto.subtle.exportKey('pkcs8',keyPair.privateKey);
    const pubB64=arrayBufferToBase64(pubDer);
    const privB64=arrayBufferToBase64(privDer);
    // Build a simplified CSR-like output (Subject + Public Key)
    const cn=document.getElementById('cn').value||'example.com';
    const subject=`CN=${cn}`;
    csrPEM=`Subject: ${subject}\nAlgorithm: RSA ${bits}\n\n${formatPEM(pubB64,'PUBLIC KEY')}`;
    keyPEM=formatPEM(privB64,'PRIVATE KEY');
    document.getElementById('csrOutput').textContent=csrPEM;
    document.getElementById('keyOutput').textContent=keyPEM;
    document.getElementById('outputPanel').style.display='';
    document.getElementById('statusInfo').textContent=`RSA ${bits} 密钥对已生成`;
  }catch(e){alert('生成失败：'+e.message)}
  btn.disabled=false;btn.textContent='🔑 生成 CSR + 私钥';
});
function copyText(text,btn){navigator.clipboard?.writeText(text);btn.textContent='✅ 已复制';setTimeout(()=>btn.textContent='📋 复制',1500)}
document.getElementById('copyCSR').addEventListener('click',function(){copyText(csrPEM,this)});
document.getElementById('copyKey').addEventListener('click',function(){copyText(keyPEM,this)});
function download(text,filename){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/plain'}));a.download=filename;a.click()}
document.getElementById('dlCSR').addEventListener('click',()=>download(csrPEM,'csr.pem'));
document.getElementById('dlKey').addEventListener('click',()=>download(keyPEM,'private-key.pem'));
</script>
<noscript><p>CSR证书生成 — DevKit。请启用 JavaScript。</p></noscript>
