<div class="main">

    <div class="form-grid">
      <div class="form-item full"><div class="form-label">通用名称 (CN) *</div><input class="form-input" id="cn" placeholder="example.com" value="example.com"></div>
      <div class="form-item"><div class="form-label">组织 (O)</div><input class="form-input" id="org" placeholder="My Company"></div>
      <div class="form-item"><div class="form-label">部门 (OU)</div><input class="form-input" id="ou" placeholder="IT Department"></div>
      <div class="form-item"><div class="form-label">城市 (L)</div><input class="form-input" id="loc" placeholder="Beijing"></div>
      <div class="form-item"><div class="form-label">省份 (ST)</div><input class="form-input" id="st" placeholder="Beijing"></div>

      <div class="form-item"><div class="form-label">密钥长度</div><select class="form-select" id="keySize"><option value="2048">RSA 2048</option><option value="4096">RSA 4096</option></select></div>

      <div class="output-label"><span>📄 CSR (Certificate Signing Request)</span><button class="copy-btn" data-target="csrOutput">📋 复制</button></div>

<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';
function arrayBufferToBase64(buf){const bytes=new Uint8Array(buf);let s='';for(let i=0;i<bytes.length;i++)s+=String.fromCharCode(bytes[i]);return btoa(s)}
function formatPEM(b64,type){const lines=b64.match(/.{1,64}/g)||[];return `-----BEGIN ${type}-----\n${lines.join('\n')}\n-----END ${type}-----`}
function download(text,filename){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/plain'}));a.download=filename;a.click()}
document.getElementById('generateBtn').addEventListener('click',async()=>{
  const btn=document.getElementById('generateBtn');btn.textContent='⏳ 生成中...';btn.disabled=true;
  const keySize=parseInt(document.getElementById('keySize').value);
  try{
    const keyPair=await crypto.subtle.generateKey({name:'RSASSA-PKCS1-v1_5',modulusLength:keySize,publicExponent:new Uint8Array([1,0,1]),hash:'SHA-256'},true,['sign','verify']);
    const privDer=await crypto.subtle.exportKey('pkcs8',keyPair.privateKey);
    const privPem=formatPEM(arrayBufferToBase64(privDer),'PRIVATE KEY');
    const pubDer=await crypto.subtle.exportKey('spki',keyPair.publicKey);
    const pubPem=formatPEM(arrayBufferToBase64(pubDer),'PUBLIC KEY');
    // Build CSR-like output (simplified — real CSR needs ASN.1 DER encoding)
    // For DevKit MVP: show the public key as "CSR" with subject info header
    const cn=document.getElementById('cn').value||'example.com';
    const org=document.getElementById('org').value;
    const ou=document.getElementById('ou').value;
    const loc=document.getElementById('loc').value;
    const st=document.getElementById('st').value;
    const country=document.getElementById('country').value||'CN';
    let subject=`CN=${cn}`;
    if(org)subject+=`, O=${org}`;if(ou)subject+=`, OU=${ou}`;
    if(loc)subject+=`, L=${loc}`;if(st)subject+=`, ST=${st}`;
    subject+=`, C=${country}`;
    const csrText=`Subject: ${subject}\nKey: RSA ${keySize}\nHash: SHA-256\n\n${pubPem}\n\n⚠️ 注意：这是简化版 CSR 输出。完整的 PKCS#10 CSR 需要 ASN.1 DER 编码。\n如需标准 CSR，建议使用 openssl 命令行工具：\nopenssl req -new -key private.key -out request.csr`;
    document.getElementById('csrOutput').textContent=csrText;
    document.getElementById('keyOutput').textContent=privPem;
    document.getElementById('outputPanel').style.display='';
    document.getElementById('statusInfo').textContent=`RSA ${keySize} 密钥对已生成`;
    document.getElementById('dlCsr').onclick=()=>download(csrText,`${cn}.csr.txt`);
    document.getElementById('dlKey').onclick=()=>download(privPem,`${cn}.key`);
  }catch(e){alert('生成失败：'+e.message)}
  btn.textContent='🔑 生成 CSR + 私钥';btn.disabled=false;
});
document.querySelectorAll('.copy-btn').forEach(btn=>btn.addEventListener('click',function(){
  const text=document.getElementById(this.dataset.target).textContent;
  navigator.clipboard.writeText(text).then(()=>{this.textContent='✅ 已复制';setTimeout(()=>this.textContent='📋 复制',1500)});
}));
</script>
