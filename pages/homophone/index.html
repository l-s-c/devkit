// Build reverse lookup: char -> pinyin_base
const charToPinyin={};
Object.entries(DATA).forEach(([ch,v])=>{charToPinyin[ch]=v[0]});

function search(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  if(!q)return;
  let base=q;
  // If input is a Chinese character, find its pinyin
  if(DATA[q]){base=DATA[q][0]}
  // Find all chars with this pinyin base
  const groups={1:[],2:[],3:[],4:[],5:[]};
  Object.entries(DATA).forEach(([ch,[py,tone,strokes,word]])=>{
    if(py===base) groups[tone].push({ch,tone,strokes,word});
  });
  const toneNames={1:"一声（阴平）",2:"二声（阳平）",3:"三声（上声）",4:"四声（去声）",5:"轻声"};
  const toneClasses={1:"tone-1",2:"tone-2",3:"tone-3",4:"tone-4",5:"tone-1"};
  const res=document.getElementById('results');
  let html='';
  let found=false;
  [1,2,3,4,5].forEach(t=>{
    if(groups[t].length===0)return;
    found=true;
    html+=`<div class="glass tone-group"><div class="tone-label ${toneClasses[t]}">${toneNames[t]}（${base}）· ${groups[t].length}字</div><div class="char-list">`;
    groups[t].forEach(({ch,strokes,word})=>{
      html+=`<div class="char-chip"><div class="char-chip-char">${ch}</div><div class="char-chip-word">${word}</div><div class="char-chip-strokes">${strokes}画</div></div>`;
    });
    html+=`</div></div>`;
  });
  if(!found) html=`<div class="glass" style="text-align:center;color:var(--text-caption)">未找到拼音为「${q}」的字，请尝试其他拼音</div>`;
  res.innerHTML=html;
}

document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')search()});
