  [['天','tiān'],['门','mén'],['中','zhōng'],['断','duàn'],['楚','chǔ'],['江','jiāng'],['开','kāi']],

]},
];
const GRADES=[1,2,3,4,5,6];
let currentGrade=0,currentIdx=0,showPinyin=true;
function renderGrades(){
  document.getElementById('gradePills').innerHTML=[{g:0,l:'全部'},...GRADES.map(g=>({g,l:g+'年级'}))].map(
    ({g,l})=>`<div class="pill${g===currentGrade?' active':''}" data-grade="${g}">${l}</div>`
  ).join('');
}
function getFiltered(){return currentGrade===0?POEMS:POEMS.filter(p=>p.g===currentGrade)}
function renderPoem(){
  const list=getFiltered();if(!list.length)return;
  if(currentIdx>=list.length)currentIdx=0;
  const p=list[currentIdx];
  const el=document.getElementById('poemDisplay');
  el.className='poem-display'+(showPinyin?' show-pinyin':'');
  el.innerHTML=`<div class="poem-title">${p.t}</div><div class="poem-author">${p.a}</div>`+
    p.lines.map((line,li)=>`<div class="poem-line">${line.map(([c,py])=>`<span class="poem-char"><span class="poem-pinyin">${py}</span>${c}</span>`).join('')}${li%2===0?'，':'。'}</div>`).join('');
  document.getElementById('statusInfo').textContent=`${p.t} · ${p.a}`;
}
document.getElementById('gradePills').addEventListener('click',e=>{if(!e.target.classList.contains('pill'))return;currentGrade=+e.target.dataset.grade;currentIdx=0;renderGrades();renderPoem()});
document.getElementById('togglePinyin').addEventListener('click',()=>{
  showPinyin=!showPinyin;
  document.getElementById('pinyinCb').className='toggle-cb'+(showPinyin?' on':'');
  document.getElementById('pinyinCb').textContent=showPinyin?'✓':'';
  renderPoem();
});
document.getElementById('nextBtn').addEventListener('click',()=>{currentIdx++;renderPoem()});
document.getElementById('readBtn').addEventListener('click',()=>{
  if(!('speechSynthesis' in window))return;
  speechSynthesis.cancel();
  const list=getFiltered();const p=list[currentIdx];
  const text=p.t+'。'+p.a+'。'+p.lines.map(l=>l.map(([c])=>c).join('')).join('，');
  const u=new SpeechSynthesisUtterance(text);u.lang='zh-CN';u.rate=0.7;speechSynthesis.speak(u);
});
renderGrades();renderPoem();
</script>
