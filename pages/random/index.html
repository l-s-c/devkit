}

.dice.rolling { animation: roll 400ms ease; }
@keyframes roll { 0%{transform:rotate(0)} 25%{transform:rotate(90deg)} 50%{transform:rotate(180deg)} 75%{transform:rotate(270deg)} 100%{transform:rotate(360deg)} }
.dice-total { text-align: center; margin-top: 12px; font-family: var(--font-code); font-size: 14px; color: var(--text-secondary); }
.dice-total-num { font-weight: 800; color: var(--brand-500); }

/* 历史 */
.history-title {
  font-size: 13px; font-weight: 700; color: var(--text-caption); text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
}
.history-clear { font-size: 11px; color: var(--text-caption); cursor: pointer; font-weight: 500; }
.history-clear:hover { color: #EF4444; }
.history-list { display: flex; flex-wrap: wrap; gap: 6px; }
.history-chip {
  padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border-glass);

}

.history-empty { font-size: 12px; color: var(--text-caption); }

@media (max-width: 480px) {

  .dice { width: 52px; height: 52px; font-size: 22px; }
}

      </div>

      <button class="result-btn primary" id="btnRollAll">◎ 掷骰子</button>
      <button class="result-btn" id="btnAddDice">+ 加骰子</button>
      <button class="result-btn" id="btnRemoveDice">- 减骰子</button>
    </div>
    <div class="dice-total">总计：<span class="dice-total-num" id="diceTotal">8</span></div>

  <!-- 历史记录 -->

<div class="statusbar">
  <span id="statusInfo">crypto.getRandomValues() 安全随机</span>
  <div class="statusbar-spacer"></div>
  <span>本地生成</span>
</div>

<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

let currentMode = 'integer';
let history = [];
const MAX_HISTORY = 20;

/* ===== 安全随机 ===== */
function secureRandom() {
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] / 4294967296; // [0, 1)
}

function randomInt(min, max) {
  return min + Math.floor(secureRandom() * (max - min + 1));
}

function randomFloat(min, max, decimals) {
  const val = min + secureRandom() * (max - min);
  return parseFloat(val.toFixed(decimals));
}

/* ===== 生成 ===== */
function generate() {
  const min = parseFloat(document.getElementById('minVal').value) || 0;
  const max = parseFloat(document.getElementById('maxVal').value) || 100;
  const count = parseInt(document.getElementById('batchCount').value) || 1;
  const unique = document.getElementById('uniqueToggle').classList.contains('on');
  const isFloat = currentMode === 'float';
  const decimals = parseInt(document.getElementById('decimalPlaces').value) || 2;

  let nums = [];

  if (isFloat) {
    for (let i = 0; i < count; i++) nums.push(randomFloat(min, max, decimals));
  } else {
    const intMin = Math.ceil(min);
    const intMax = Math.floor(max);
    if (unique && count > 1 && (intMax - intMin + 1) >= count) {
      // Fisher-Yates
      const pool = [];
      for (let i = intMin; i <= intMax; i++) pool.push(i);
      for (let i = pool.length - 1; i > 0; i--) {
        const j = randomInt(0, i);
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      nums = pool.slice(0, count);
    } else {
      for (let i = 0; i < count; i++) nums.push(randomInt(intMin, intMax));
    }
  }

  // 主数字
  const el = document.getElementById('mainResult');
  el.textContent = nums[0];
  el.classList.remove('spin');
  void el.offsetWidth;
  el.classList.add('spin');

  // 批量
  const batchSection = document.getElementById('batchSection');
  if (count > 1) {
    document.getElementById('batchGrid').innerHTML = nums.map(n =>
      `<div class="batch-item" data-val="${n}">${n}</div>`
    ).join('');
    batchSection.classList.add('show');
  } else {
    batchSection.classList.remove('show');
  }

  // 历史
  nums.forEach(n => addHistory(n));

  document.getElementById('statusInfo').textContent = `已生成 ${count} 个${isFloat ? '浮点' : '整'}数 · 范围 ${min}-${max}`;
}

/* ===== 骰子 ===== */
function rollDice(el) {
  el.classList.remove('rolling');
  void el.offsetWidth;
  el.classList.add('rolling');
  el.textContent = randomInt(1, 6);
}

function rollAll() {
  document.querySelectorAll('#diceGrid .dice').forEach(d => rollDice(d));
  updateDiceTotal();
}

function addDice() {
  const grid = document.getElementById('diceGrid');
  if (grid.children.length >= 6) return;
  const d = document.createElement('div');
  d.className = 'dice';
  d.textContent = randomInt(1, 6);
  d.addEventListener('click', () => { rollDice(d); updateDiceTotal(); });
  grid.appendChild(d);
  updateDiceTotal();
}

function removeDice() {
  const grid = document.getElementById('diceGrid');
  if (grid.children.length <= 1) return;
  grid.removeChild(grid.lastChild);
  updateDiceTotal();
}

function updateDiceTotal() {
  let sum = 0;
  document.querySelectorAll('#diceGrid .dice').forEach(d => sum += parseInt(d.textContent));
  document.getElementById('diceTotal').textContent = sum;
  addHistory(sum);
}

/* ===== 历史 ===== */
function addHistory(val) {
  history.unshift(val);
  if (history.length > MAX_HISTORY) history.pop();
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('historyList');
  if (history.length === 0) {
    el.innerHTML = '<span class="history-empty">暂无记录</span>';
    return;
  }
  el.innerHTML = history.map(n =>
    `<span class="history-chip" data-val="${n}">${n}</span>`
  ).join('');
}

/* ===== 模式切换 ===== */
document.getElementById('modeTabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.mode-tab');
  if (!tab) return;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentMode = tab.dataset.mode;

  document.getElementById('numPanel').classList.toggle('hidden', currentMode === 'dice');
  document.getElementById('dicePanel').classList.toggle('hidden', currentMode !== 'dice');
  document.getElementById('uniqueRow').style.display = currentMode === 'float' ? 'none' : '';
  document.getElementById('decimalRow').style.display = currentMode === 'float' ? '' : 'none';
});

/* ===== 事件绑定 ===== */
document.getElementById('btnGenerate').addEventListener('click', generate);
document.getElementById('btnCopy').addEventListener('click', () => {
  const text = document.getElementById('mainResult').textContent;
  if (text !== '—') navigator.clipboard.writeText(text);
});
document.getElementById('uniqueToggle').addEventListener('click', function() { this.classList.toggle('on'); });
document.getElementById('btnRollAll').addEventListener('click', rollAll);
document.getElementById('btnAddDice').addEventListener('click', addDice);
document.getElementById('btnRemoveDice').addEventListener('click', removeDice);
document.getElementById('btnClearHistory').addEventListener('click', () => { history = []; renderHistory(); });

// 批量结果点击复制
document.getElementById('batchGrid').addEventListener('click', (e) => {
  const item = e.target.closest('.batch-item');
  if (item) navigator.clipboard.writeText(item.dataset.val);
});

// 历史点击复制
document.getElementById('historyList').addEventListener('click', (e) => {
  const chip = e.target.closest('.history-chip');
  if (chip) navigator.clipboard.writeText(chip.dataset.val);
});

// 骰子初始点击事件
document.querySelectorAll('#diceGrid .dice').forEach(d => {
  d.addEventListener('click', () => { rollDice(d); updateDiceTotal(); });
});
</script>
