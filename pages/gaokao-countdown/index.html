:root{--brand-500:#EF4444}[data-theme=dark]{--brand-500:#F87171}
body{min-height:100vh;display:flex;flex-direction:column}
.mesh-bg .mesh-blob:nth-child(1){background:radial-gradient(ellipse,rgba(239,68,68,0.08),transparent 70%)}
.main{flex:1;position:relative;z-index:1;padding:24px 24px 24px;max-width:960px;margin:0 auto;width:100%}
.panel{padding:20px;border-radius:16px;margin-bottom:16px;background:var(--bg-glass);backdrop-filter:blur(20px);border:0.5px solid var(--border-glass)}
.hero{text-align:center;padding:40px 20px}
.hero-label{font-size:14px;color:var(--text-secondary);margin-bottom:4px}
.hero-year{font-size:16px;font-weight:700;color:var(--brand-500);margin-bottom:24px}
.cd-days{font-size:96px;font-weight:900;font-family:var(--font-code);background:linear-gradient(135deg,#EF4444,#F59E0B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.cd-unit{font-size:18px;font-weight:700;color:var(--text-caption);margin-top:4px}
.cd-hms{display:flex;gap:8px;justify-content:center;margin-top:16px}
.hms-box{padding:8px 14px;border-radius:10px;background:var(--bg-glass-input);border:1px solid var(--border-glass);text-align:center;min-width:56px}
.hms-num{font-size:22px;font-weight:800;font-family:var(--font-code)}
.hms-label{font-size:9px;color:var(--text-caption)}
.year-progress{margin-top:20px}
.prog-label{font-size:10px;color:var(--text-caption);display:flex;justify-content:space-between;margin-bottom:4px}
.prog-bar{height:6px;background:var(--border-glass);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#EF4444,#F59E0B)}
.quote-card{padding:20px;border-radius:10px;background:rgba(239,68,68,0.04);border-left:4px solid var(--brand-500);text-align:center}
.quote-text{font-size:16px;font-weight:600;line-height:1.8;margin-bottom:8px}
.quote-author{font-size:11px;color:var(--text-caption)}
.quote-btn{margin-top:8px;font-size:11px;color:var(--brand-500);cursor:pointer;font-weight:700;border:none;background:none}
.goal-area{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.goal-area{grid-template-columns:1fr}}
.goal-card{padding:14px;border-radius:10px;border:1.5px solid var(--border-glass);background:var(--bg-glass-input);text-align:center}
.goal-label{font-size:10px;color:var(--text-caption);margin-bottom:4px}
.goal-input{width:80px;padding:6px 8px;border-radius:6px;border:1.5px solid var(--border-glass);background:var(--bg-glass-input);font-size:18px;font-weight:800;text-align:center;color:var(--brand-500);outline:none;font-family:var(--font-code)}
.goal-total{font-size:10px;color:var(--text-caption);margin-top:2px}
.section-title{font-size:13px;font-weight:800;margin-bottom:12px}
</style>

<div class="main">
  <div class="panel">
    <div class="hero">
      <div class="hero-label">距离</div>
      <div class="hero-year" id="yearLabel"></div>
      <div class="cd-days" id="daysNum">--</div>
      <div class="cd-unit">天</div>
      <div class="cd-hms">
        <div class="hms-box"><div class="hms-num" id="hH">--</div><div class="hms-label">时</div></div>
        <div class="hms-box"><div class="hms-num" id="hM">--</div><div class="hms-label">分</div></div>
        <div class="hms-box"><div class="hms-num" id="hS">--</div><div class="hms-label">秒</div></div>
      </div>
      <div class="year-progress">
        <div class="prog-label"><span id="progStartLabel"></span><span id="progPct"></span></div>
        <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
      </div>
    </div>
  </div>
  <div class="panel">
    <div class="quote-card">
      <div class="quote-text" id="quoteText"></div>
      <div class="quote-author" id="quoteAuthor"></div>
      <button class="quote-btn" id="quoteBtn">↻ 换一句</button>
    </div>
  </div>
  <div class="panel">
    <div class="section-title">◎ 目标分数</div>
    <div class="goal-area">
      <div class="goal-card"><div class="goal-label">语文</div><input class="goal-input" id="g1" value="120"><div class="goal-total">/ 150</div></div>
      <div class="goal-card"><div class="goal-label">数学</div><input class="goal-input" id="g2" value="130"><div class="goal-total">/ 150</div></div>
      <div class="goal-card"><div class="goal-label">英语</div><input class="goal-input" id="g3" value="125"><div class="goal-total">/ 150</div></div>
      <div class="goal-card"><div class="goal-label">综合</div><input class="goal-input" id="g4" value="230"><div class="goal-total">/ 300</div></div>
    </div>
    <div style="text-align:center;margin-top:12px;font-size:14px;font-weight:800;color:var(--brand-500)" id="goalTotal"></div>
  </div>
</div>
<div class="statusbar"><span id="statusInfo">高考倒计时</span><div class="statusbar-spacer"></div><span>加油！◈</span></div>
<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';
const QUOTES=[
  ['"宝剑锋从磨砺出，梅花香自苦寒来。"','《警世贤文》'],
  ['"书山有路勤为径，学海无涯苦作舟。"','韩愈'],
  ['"长风破浪会有时，直挂云帆济沧海。"','李白'],
  ['"天行健，君子以自强不息。"','《周易》'],
  ['"不积跬步，无以至千里。"','荀子'],
  ['"锲而不舍，金石可镂。"','荀子'],
  ['"业精于勤荒于嬉，行成于思毁于随。"','韩愈'],
  ['"千里之行，始于足下。"','老子'],
  ['"有志者事竟成。"','《后汉书》'],
  ['"少壮不努力，老大徒伤悲。"','《长歌行》'],
  ['"世上无难事，只怕有心人。"','俗语'],
  ['"读书破万卷，下笔如有神。"','杜甫'],
  ['"三人行，必有我师焉。"','孔子'],
  ['"知之为知之，不知为不知，是知也。"','孔子'],
  ['"学而不思则罔，思而不学则殆。"','孔子'],
  ['"一寸光阴一寸金，寸金难买寸光阴。"','俗语'],
  ['"天道酬勤。"','《周易》'],
  ['"海纳百川，有容乃大。"','林则徐'],
  ['"路漫漫其修远兮，吾将上下而求索。"','屈原'],
  ['"会当凌绝顶，一览众山小。"','杜甫'],
];
function getGaokaoDate(){
  const now=new Date();let y=now.getFullYear();
  const gk=new Date(y,5,7,9,0,0); // June 7
  if(now>gk)y++;
  return new Date(y,5,7,9,0,0);
}
function update(){
  const gk=getGaokaoDate();const now=new Date();
  const diff=gk-now;
  const days=Math.floor(diff/864e5);
  const h=Math.floor((diff%864e5)/36e5);
  const m=Math.floor((diff%36e5)/6e4);
  const s=Math.floor((diff%6e4)/1e3);
  document.getElementById('daysNum').textContent=days;
  document.getElementById('hH').textContent=String(h).padStart(2,'0');
  document.getElementById('hM').textContent=String(m).padStart(2,'0');
  document.getElementById('hS').textContent=String(s).padStart(2,'0');
  document.getElementById('yearLabel').textContent=gk.getFullYear()+' 年全国高考';
  // progress: from last year's gaokao to this year's
  const lastGk=new Date(gk.getFullYear()-1,5,7,9,0,0);
  const total=gk-lastGk;const elapsed=now-lastGk;
  const pct=Math.min(100,Math.max(0,Math.round(elapsed/total*100)));
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progStartLabel').textContent=(gk.getFullYear()-1)+'.06.07 → '+gk.getFullYear()+'.06.07';
  document.getElementById('statusInfo').textContent='距高考 '+days+' 天';
}
function showQuote(){
  const q=QUOTES[Math.floor(Math.random()*QUOTES.length)];
  document.getElementById('quoteText').textContent=q[0];
  document.getElementById('quoteAuthor').textContent='—— '+q[1];
}
function calcGoal(){
  const t=[1,2,3,4].reduce((s,i)=>s+(+document.getElementById('g'+i).value||0),0);
  document.getElementById('goalTotal').textContent='◎ 目标总分：'+t+' / 750';
}
document.getElementById('quoteBtn').addEventListener('click',showQuote);
document.querySelectorAll('.goal-input').forEach(i=>i.addEventListener('input',calcGoal));
update();showQuote();calcGoal();
setInterval(update,1000);
</script>
