          <button class="preset-btn" data-w="1080" data-h="1920">手机壁纸 1080×1920</button>
          <button class="preset-btn" data-w="900" data-h="383">公众号封面 900×383</button>
          <button class="preset-btn" data-w="1280" data-h="720">720p</button>

          <div class="field-label">质量 <span id="qualityVal">85</span>%</div>
          <input type="range" id="quality" min="10" max="100" value="85" style="width:100%">

<div class="statusbar">
  <span id="statusInfo">上传图片开始调整</span>
  <div class="statusbar-spacer"></div>

</div>

<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

let origW = 0, origH = 0, locked = true, mode = 'pixel', format = 'jpg';
let files = [], previewUrl = null;

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

/* ===== 加载图片 ===== */
function loadImage(file) {
  if (previewUrl) URL.revokeObjectURL(previewUrl);
  previewUrl = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    origW = img.naturalWidth;
    origH = img.naturalHeight;
    document.getElementById('previewImg').src = previewUrl;
    document.getElementById('previewBadge').textContent = `${origW} × ${origH}`;
    document.getElementById('origSize').textContent = `${origW} × ${origH}`;
    document.getElementById('origFileSize').textContent = fmtSize(file.size);
    document.getElementById('previewPanel').style.display = 'block';
    document.getElementById('resizeBtn').disabled = false;
    // 默认 50%
    document.getElementById('inputW').value = Math.round(origW / 2);
    document.getElementById('inputH').value = Math.round(origH / 2);
    document.getElementById('inputPct').value = 50;
    updateNewSize();
    document.getElementById('statusInfo').textContent = `${file.name} · ${origW}×${origH} · ${fmtSize(file.size)}`;
  };
  img.src = previewUrl;
}

/* ===== 批量列表 ===== */
function renderBatchList() {
  if (files.length <= 1) { document.getElementById('batchPanel').style.display = 'none'; return; }
  document.getElementById('batchPanel').style.display = 'block';
  document.getElementById('batchCount').textContent = `(${files.length} 张)`;
  const list = document.getElementById('batchList');
  list.innerHTML = files.map((f, i) => `
    <div class="batch-item">
      <div class="batch-thumb" style="background:var(--brand-500);border-radius:6px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px">🖼️</div>
      <div class="batch-name">${f.name}</div>
      <div class="batch-size">${fmtSize(f.size)}</div>
      <div class="batch-status" id="batchStatus${i}">⏳</div>
    </div>
  `).join('');
}

/* ===== 尺寸计算 ===== */
function updateNewSize() {
  const w = parseInt(document.getElementById('inputW').value) || 1;
  const h = parseInt(document.getElementById('inputH').value) || 1;
  document.getElementById('newSize').textContent = `${w} × ${h}`;
  // 预估文件大小
  const ratio = (w * h) / (origW * origH || 1);
  const est = ratio * 300 * 1024; // 粗估
  document.getElementById('newFileSize').textContent = '~' + fmtSize(Math.max(1024, est));
  // 放大警告（AC-10）
  document.getElementById('upscaleWarn').style.display = (origW > 0 && (w > origW || h > origH)) ? 'block' : 'none';
}

/* ===== 调整并下载 ===== */
function doResize() {
  if (!files.length) return;
  const w = parseInt(document.getElementById('inputW').value) || origW;
  const h = parseInt(document.getElementById('inputH').value) || origH;
  const q = parseInt(document.getElementById('quality').value) / 100;
  const mime = format === 'jpg' ? 'image/jpeg' : format === 'png' ? 'image/png' : 'image/webp';
  const ext = format === 'jpg' ? 'jpg' : format;

  document.getElementById('resizeBtn').disabled = true;
  document.getElementById('resizeBtn').textContent = '⏳ 处理中…';

  // 串行处理 + revokeObjectURL 释放
  let idx = 0;
  function processNext() {
    if (idx >= files.length) {
      document.getElementById('resizeBtn').disabled = false;
      document.getElementById('resizeBtn').textContent = '📐 调整并下载';
      document.getElementById('statusInfo').textContent = `✅ ${files.length} 张图片处理完成`;
      return;
    }
    const file = files[idx];
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      // JPG 白色背景填充
      if (format === 'jpg') { ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, w, h); }
      ctx.drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => {
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = file.name.replace(/\.[^.]+$/, '') + `_${w}x${h}.${ext}`;
        a.click();
        URL.revokeObjectURL(blobUrl);
        URL.revokeObjectURL(url);
        canvas.width = 0; canvas.height = 0; // 内存释放
        // 更新批量状态
        const statusEl = document.getElementById('batchStatus' + idx);
        if (statusEl) statusEl.textContent = '✅';
        idx++;
        setTimeout(processNext, 300);
      }, mime, q);
    };
    img.src = url;
  }
  processNext();
}

/* ===== 事件绑定 ===== */
// 文件上传
document.getElementById('fileInput').addEventListener('change', e => {
  files = [...e.target.files].filter(f => f.type.startsWith('image/'));
  if (files.length) { loadImage(files[0]); renderBatchList(); }
});

// 拖拽
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('dragover');
  files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/'));
  if (files.length) { loadImage(files[0]); renderBatchList(); }
});

// 像素/百分比模式
document.getElementById('btnPixel').addEventListener('click', () => {
  mode = 'pixel';
  document.getElementById('btnPixel').classList.add('active');
  document.getElementById('btnPercent').classList.remove('active');
  document.getElementById('pixelMode').style.display = 'block';
  document.getElementById('percentMode').style.display = 'none';
});
document.getElementById('btnPercent').addEventListener('click', () => {
  mode = 'percent';
  document.getElementById('btnPercent').classList.add('active');
  document.getElementById('btnPixel').classList.remove('active');
  document.getElementById('pixelMode').style.display = 'none';
  document.getElementById('percentMode').style.display = 'block';
  // 从当前宽度反算百分比
  const w = parseInt(document.getElementById('inputW').value) || origW;
  document.getElementById('inputPct').value = origW ? Math.round(w / origW * 100) : 100;
});

// 锁定比例
document.getElementById('lockBtn').addEventListener('click', () => {
  locked = !locked;
  const btn = document.getElementById('lockBtn');
  btn.classList.toggle('locked', locked);
  btn.textContent = locked ? '🔗' : '🔓';
});

// 宽高输入
document.getElementById('inputW').addEventListener('input', () => {
  const w = parseInt(document.getElementById('inputW').value) || 1;
  if (locked && origW > 0) {
    document.getElementById('inputH').value = Math.round(w * origH / origW);
  }
  updateNewSize();
});
document.getElementById('inputH').addEventListener('input', () => {
  const h = parseInt(document.getElementById('inputH').value) || 1;
  if (locked && origH > 0) {
    document.getElementById('inputW').value = Math.round(h * origW / origH);
  }
  updateNewSize();
});
document.getElementById('inputPct').addEventListener('input', () => {
  const pct = (parseFloat(document.getElementById('inputPct').value) || 100) / 100;
  document.getElementById('inputW').value = Math.round(origW * pct);
  document.getElementById('inputH').value = Math.round(origH * pct);
  updateNewSize();
});

// 预设尺寸（事件委托）
document.getElementById('presets').addEventListener('click', e => {
  const btn = e.target.closest('.preset-btn');
  if (!btn) return;
  const w = parseInt(btn.dataset.w), h = parseInt(btn.dataset.h);
  document.getElementById('inputW').value = w;
  document.getElementById('inputH').value = h;
  // 预设时解锁比例
  locked = false;
  document.getElementById('lockBtn').classList.remove('locked');
  document.getElementById('lockBtn').textContent = '🔓';
  // 切回像素模式
  if (mode === 'percent') {
    mode = 'pixel';
    document.getElementById('btnPixel').classList.add('active');
    document.getElementById('btnPercent').classList.remove('active');
    document.getElementById('pixelMode').style.display = 'block';
    document.getElementById('percentMode').style.display = 'none';
  }
  updateNewSize();
});

// 格式选择（事件委托）
document.querySelectorAll('.format-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    format = btn.dataset.fmt;
    document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('qualityField').style.display = format === 'png' ? 'none' : 'block';
  });
});

// 质量滑块
document.getElementById('quality').addEventListener('input', e => {
  document.getElementById('qualityVal').textContent = e.target.value;
});

// 调整按钮
document.getElementById('resizeBtn').addEventListener('click', doResize);
