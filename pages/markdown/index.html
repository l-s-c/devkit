import '../../shared/theme.js';
import '../../shared/sidebar.js';

// Simple Markdown parser (no dependency)
function parseMd(md) {
  // Extract code blocks first to protect them
  const codeBlocks = [];
  md = md.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    codeBlocks.push(`<pre><code>${esc(code.trim())}</code></pre>`);
    return `%%CODEBLOCK_${codeBlocks.length-1}%%`;
  });

  // Tables (GFM) — must be before other inline processing
  md = md.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)*)/gm, (_, header, sep, body) => {
    const aligns = sep.split('|').filter(Boolean).map(c => {
      c = c.trim();
      if (c.startsWith(':') && c.endsWith(':')) return 'center';
      if (c.endsWith(':')) return 'right';
      return 'left';
    });
    const ths = header.split('|').filter(Boolean).map((c,i) => `<th style="text-align:${aligns[i]||'left'}">${c.trim()}</th>`).join('');
    const rows = body.trim().split('\n').filter(Boolean).map(row => {
      const tds = row.split('|').filter(Boolean).map((c,i) => `<td style="text-align:${aligns[i]||'left'}">${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
  });

  let html = md
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^######\s+(.+)$/gm, '<h6>$1</h6>')
    .replace(/^#####\s+(.+)$/gm, '<h5>$1</h5>')
    .replace(/^####\s+(.+)$/gm, '<h4>$1</h4>')
    .replace(/^###\s+(.+)$/gm, '<h3>$1</h3>')
    .replace(/^##\s+(.+)$/gm, '<h2>$1</h2>')
    .replace(/^#\s+(.+)$/gm, '<h1>$1</h1>')
    .replace(/^---+$/gm, '<hr>')
    .replace(/^>\s+(.+)$/gm, '<blockquote><p>$1</p></blockquote>')
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/~~(.+?)~~/g, '<del>$1</del>')
    // Task lists (GFM)
    .replace(/^[-*]\s+\[x\]\s+(.+)$/gim, '<li class="task"><input type="checkbox" checked disabled> $1</li>')
    .replace(/^[-*]\s+\[\s?\]\s+(.+)$/gm, '<li class="task"><input type="checkbox" disabled> $1</li>')
    // Regular lists
    .replace(/^[-*]\s+(.+)$/gm, '<li>$1</li>')
    .replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>')
    .replace(/^(?!<[huplobid\|t]|<li|<hr|<pre|<block|<table|%%CODE)(.+)$/gm, '<p>$1</p>');

  html = html.replace(/((?:<li[^>]*>.*<\/li>\s*)+)/g, '<ul>$1</ul>');

  // Restore code blocks
  codeBlocks.forEach((block, i) => { html = html.replace(`%%CODEBLOCK_${i}%%`, block); });
  return html;
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function sanitize(html) {
  // Whitelist approach: only allow safe Markdown-rendered tags
  const ALLOWED = /^(h[1-6]|p|br|hr|ul|ol|li|a|strong|em|b|i|u|s|del|code|pre|blockquote|table|thead|tbody|tr|th|td|sup|sub|span|img)$/i;
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  // Remove all non-whitelisted tags (keep text content)
  function walk(el) {
    [...el.children].forEach(child => {
      if (!ALLOWED.test(child.tagName)) {
        child.replaceWith(...child.childNodes);
      } else {
        // Strip event handlers and dangerous attrs
        [...child.attributes].forEach(a => {
          if (/^on/i.test(a.name) || (a.name === 'href' && /^\s*javascript:/i.test(a.value)) ||
              (a.name === 'src' && /^\s*javascript:/i.test(a.value))) {
            child.removeAttribute(a.name);
          }
        });
        // img: only allow src, alt, width, height
        if (child.tagName === 'IMG') {
          [...child.attributes].forEach(a => {
            if (!['src','alt','width','height'].includes(a.name)) child.removeAttribute(a.name);
          });
        }
        walk(child);
      }
    });
  }
  walk(tmp);
  return tmp.innerHTML;
}

const editor = document.getElementById('editor');
const preview = document.getElementById('preview');

function render() {
  preview.innerHTML = sanitize(parseMd(editor.value));
  document.getElementById('charCount').textContent = `${editor.value.length} 字符`;
  document.getElementById('lineCount').textContent = `${editor.value.split('\n').length} 行`;
}

editor.addEventListener('input', render);
render(); // render default content
// Tab support
editor.addEventListener('keydown', e => {
  if (e.key==='Tab') { e.preventDefault(); const s=editor.selectionStart; editor.value=editor.value.slice(0,s)+'  '+editor.value.slice(editor.selectionEnd); editor.selectionStart=editor.selectionEnd=s+2; render(); }
});

</body></html>`;

</script>
