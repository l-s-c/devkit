<body>
<h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">URL 编解码 — DevKit 在线开发者工具箱</h1>

<div class="mesh-bg"><div class="mesh-blob"></div><div class="mesh-blob"></div><div class="mesh-blob"></div></div>

<div class="topbar">
  <a class="topbar-logo" href="../index.html"><svg class="topbar-logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="6" fill="url(#bg)"/><path d="M8 7L4 12L8 17M16 7L20 12L16 17" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="bg" x1="0" y1="0" x2="24" y2="24"><stop stop-color="#6366F1"/><stop offset="1" stop-color="#818CF8"/></linearGradient></defs></svg><span class="topbar-logo-text">DevKit</span></a>
  <span class="topbar-tool-name">URL 编解码</span>
  <div class="topbar-spacer"></div>
  <button class="theme-btn" onclick="toggleTheme()">🌙</button>
</div>

<div class="tool-toolbar">
  <div class="toggle-pill">
    <button class="toggle-pill-option active" id="modeEncode">编码</button>
    <button class="toggle-pill-option" id="modeDecode">解码</button>
  </div>
  <select class="glass-select" id="encodeMode">
    <option value="component">encodeURIComponent</option>
    <option value="uri">encodeURI</option>
  </select>
  <div class="toolbar-spacer"></div>
  <button class="btn-tool" id="btnCopy">📋 复制</button>
  <button class="btn-tool" id="btnSwap">🔄 交换</button>
  <button class="btn-tool" id="btnSample">示例</button>
  <button class="btn-tool" id="btnClear">✕ 清空</button>
</div>

<div class="work-area">
  <div class="work-pane">
    <div class="pane-header"><span class="pane-label">原文</span><span class="pane-meta" id="inputMeta"></span></div>
    <div class="pane-editor"><textarea id="input" placeholder="输入 URL 或文本..."></textarea></div>
  </div>
  <div class="work-pane">
    <div class="pane-header"><span class="pane-label">结果</span><span class="pane-meta" id="outputMeta"></span></div>
    <div class="pane-editor"><textarea id="output" readonly placeholder="结果将显示在这里..."></textarea></div>
  </div>
  <button class="swap-btn" id="btnSwap2" title="交换">⇄</button>
</div>

<div class="statusbar">
  <span class="statusbar-item">UTF-8</span>
  <span class="statusbar-item" id="modeLabel">encodeURIComponent</span>
  <div class="statusbar-spacer"></div>
</div>

<script type="module">
import '../../shared/theme.js';
const input = document.getElementById('input');
const output = document.getElementById('output');
let mode = 'encode';

function updateMeta() {
  document.getElementById('inputMeta').textContent = `${input.value.length} 字符`;
  document.getElementById('outputMeta').textContent = `${output.value.length} 字符`;
}

function process() {
  const text = input.value;
  if (!text) { output.value = ''; updateMeta(); return; }
  const encMode = document.getElementById('encodeMode').value;
  try {
    if (mode === 'encode') {
      output.value = encMode === 'component' ? encodeURIComponent(text) : encodeURI(text);
    } else {
      output.value = encMode === 'component' ? decodeURIComponent(text) : decodeURI(text);
    }
  } catch (e) { output.value = '失败：' + e.message; }
  updateMeta();
}

document.getElementById('modeEncode').addEventListener('click', () => { mode='encode'; document.getElementById('modeEncode').classList.add('active'); document.getElementById('modeDecode').classList.remove('active'); process(); });
document.getElementById('modeDecode').addEventListener('click', () => { mode='decode'; document.getElementById('modeDecode').classList.add('active'); document.getElementById('modeEncode').classList.remove('active'); process(); });
input.addEventListener('input', process);
document.getElementById('encodeMode').addEventListener('change', () => { document.getElementById('modeLabel').textContent = document.getElementById('encodeMode').value === 'component' ? 'encodeURIComponent' : 'encodeURI'; process(); });

function swap() { const tmp = input.value; input.value = output.value; output.value = tmp; updateMeta(); }
document.getElementById('btnSwap').addEventListener('click', swap);
document.getElementById('btnSwap2').addEventListener('click', swap);
document.getElementById('btnCopy').addEventListener('click', () => { if (output.value) navigator.clipboard.writeText(output.value); });
document.getElementById('btnSample').addEventListener('click', () => { input.value='https://l-s-c.github.io/devkit/search?q=在线工具&lang=中文&page=1#结果'; process(); });
document.getElementById('btnClear').addEventListener('click', () => { input.value=''; output.value=''; updateMeta(); });
</script>
  <noscript><p>URL 编解码 — DevKit 在线开发者工具箱。请启用 JavaScript 以使用本工具。</p></noscript>
