<script type="module">
import '../../shared/theme.js';
function genAvatar(cvs,size=200){
  cvs.width=size;cvs.height=size;
  const ctx=cvs.getContext('2d');
  const grid=5,cell=size/grid;
  const hue=Math.random()*360,sat=60+Math.random()*30,light=45+Math.random()*20;
  const bg=`hsl(${hue},${sat}%,${light+35}%)`,fg=`hsl(${hue},${sat}%,${light}%)`;
  ctx.fillStyle=bg;ctx.fillRect(0,0,size,size);
  ctx.fillStyle=fg;
  const half=Math.ceil(grid/2);
  const pattern=[];
  for(let y=0;y<grid;y++){pattern[y]=[];for(let x=0;x<half;x++)pattern[y][x]=Math.random()>0.5}
  for(let y=0;y<grid;y++)for(let x=0;x<grid;x++){
    const sx=x<half?x:grid-1-x;
    if(pattern[y][sx])ctx.fillRect(x*cell,y*cell,cell,cell);
  }
}
function download(cvs,name='avatar.png'){
  cvs.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href)},'image/png');
}
const main=document.getElementById('mainAvatar');
genAvatar(main);
document.getElementById('refreshBtn').addEventListener('click',()=>genAvatar(main));
document.getElementById('downloadBtn').addEventListener('click',()=>download(main));
document.getElementById('batchBtn').addEventListener('click',()=>{
  const panel=document.getElementById('batchPanel');panel.style.display='block';
  const grid=document.getElementById('batchGrid');grid.innerHTML='';
  for(let i=0;i<9;i++){
    const c=document.createElement('canvas');
    genAvatar(c,200);
    c.addEventListener('click',()=>download(c,`avatar-${i+1}.png`));
    grid.appendChild(c);
  }
});
main.addEventListener('click',()=>genAvatar(main));
</script>
