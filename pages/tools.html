function getIconHtml(tool, size) {
  var key = tool.url.replace(/^\.\//, '').replace(/\/$/, '');
  var ic = window.TOOL_ICONS && window.TOOL_ICONS[key];
  if (!ic) return size === 'hot' ? '<div class="hot-emoji">'+tool.emoji+'</div>' : '<div class="tool-emoji">'+tool.emoji+'</div>';
  var cls = size === 'hot' ? 'hot-icon-app' : 'tool-icon-app';
  return '<div class="'+cls+'" style="background:'+ic.gradient+'">'+ic.svg+'<div class="ti-sh"></div></div>';
}

let currentCat = 'all', searchQuery = '';
const CAT_NAMES = { all:'全部', text:'☰ 文本', image:'⊞️ 图片', calc:'⊞ 计算', dev:'⊞ 开发', design:'◆ 设计', encode:'⊕ 编码', life:'⌂ 生活' };

function renderHot() {
  const hots = TOOLS.filter(t => t.hot);
  document.getElementById('hotGrid').innerHTML = hots.map(t =>
    `<a class="hot-card" href="${t.url}" target="_blank" rel="noopener">${getIconHtml(t,'hot')}<div class="hot-name">${t.name}</div><div class="hot-desc">${t.desc}</div></a>`
  ).join('');
}

function render() {
  let list = TOOLS;
  if (currentCat !== 'all') list = list.filter(t => t.cat === currentCat);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(t => t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q));
  }

  const hotVisible = currentCat === 'all' && !searchQuery;
  document.getElementById('hotSection').style.display = hotVisible ? 'block' : 'none';

  document.getElementById('sectionTitle').textContent = searchQuery
    ? `⊙ 搜索结果（${list.length}）`
    : `⊞ ${CAT_NAMES[currentCat] || '全部'}工具（${list.length}）`;

  if (!list.length) {
    document.getElementById('toolsSection').style.display = 'none';
    document.getElementById('emptyState').style.display = 'block';
  } else {
    document.getElementById('toolsSection').style.display = 'block';
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('toolsGrid').innerHTML = list.map(t =>
      `<a class="tool-card" href="${t.url}" target="_blank" rel="noopener">${getIconHtml(t,'tool')}<div class="tool-name">${t.name}</div><div class="tool-desc">${t.desc}</div></a>`
    ).join('');
  }

  // toolCount is now a static "关于团队" link
}

/* Events */
document.getElementById('searchInput').addEventListener('input', function() {
  searchQuery = this.value.trim();
  document.getElementById('searchClear').style.display = searchQuery ? 'flex' : 'none';
  render();
});

document.getElementById('searchClear').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  document.getElementById('searchClear').style.display = 'none';
  render();
});

document.getElementById('tagsWrap').addEventListener('click', e => {
  const tag = e.target.closest('.tag');
  if (!tag) return;
  currentCat = tag.dataset.cat;
  document.querySelectorAll('.tag').forEach(t => t.classList.toggle('active', t.dataset.cat === currentCat));
  render();
});

renderHot();
render();
</script>
