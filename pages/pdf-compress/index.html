<h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">PDF 压缩 — DevKit 在线开发者工具箱</h1>

<div class="topbar">

<div class="main">
  <div class="panel">
    <div class="security-badge">🔒 文件不上传服务器，全部本地处理</div>
    <div class="upload-zone" id="dropZone">
      <div style="font-size:32px;margin-bottom:8px">📄</div>
      <div style="font-size:14px;font-weight:700;margin-bottom:4px">拖拽 PDF 文件到此处</div>
      <div style="font-size:12px">或 <span style="color:var(--brand-500);font-weight:600">点击选择文件</span>（最大 50MB）</div>
      <input type="file" id="fileInput" accept=".pdf">
    </div>
  </div>

  <div class="panel" id="optionsPanel" style="display:none">
    <div class="section-title">📄 <span id="fileName"></span></div>
    <div class="quality-row" id="qualityRow">
      <div class="quality-card" data-quality="low">
        <div class="quality-icon">🏎️</div>
        <div class="quality-name">极限压缩</div>
        <div class="quality-desc">最小体积，画质较低</div>
      </div>
      <div class="quality-card active" data-quality="medium">
        <div class="quality-icon">⚖️</div>
        <div class="quality-name">推荐</div>
        <div class="quality-desc">平衡体积与画质</div>
      </div>
      <div class="quality-card" data-quality="high">
        <div class="quality-icon">💎</div>
        <div class="quality-name">高质量</div>
        <div class="quality-desc">保持较好画质</div>
      </div>
    </div>
    <button class="compress-btn" id="compressBtn">🗜️ 开始压缩</button>
    <div class="limit-warn">⚠️ 纯前端压缩能力有限，主要通过移除冗余元数据实现。对纯文字 PDF 效果有限，对含图片的 PDF 效果较好。</div>
  </div>

  <div class="panel" id="resultPanel" style="display:none">
    <div style="text-align:center;padding:16px">
      <div style="font-size:48px;margin-bottom:8px">✅</div>
      <div class="result-compare">
        <div class="size-box"><div class="size-num" id="origSize">0</div><div class="size-label">原始大小</div></div>
        <div class="arrow">→</div>
        <div class="size-box"><div class="size-num" id="compSize">0</div><div class="size-label">压缩后</div></div>
      </div>
      <div class="savings" id="savings"></div>
      <div style="margin-top:16px"><button class="btn-download" id="downloadBtn">📥 下载压缩后的 PDF</button></div>
    </div>
  </div>
</div>

<div class="statusbar">
  <span id="statusInfo">PDF 压缩</span>
  <div class="statusbar-spacer"></div>
  <span>pdf-lib · 纯本地</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script type="module">
import '../../shared/theme.js';

let origBytes = null, origSize = 0, quality = 'medium', resultUrl = null;

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => e.preventDefault());
dropZone.addEventListener('drop', e => { e.preventDefault(); if (e.dataTransfer.files[0]) loadPDF(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadPDF(fileInput.files[0]); });

async function loadPDF(file) {
  if (file.size > 50 * 1024 * 1024) { document.getElementById('statusInfo').textContent = '⚠️ 文件超过 50MB'; return; }
  origBytes = await file.arrayBuffer();
  origSize = file.size;
  document.getElementById('fileName').textContent = `${file.name} (${fmtSize(file.size)})`;
  document.getElementById('optionsPanel').style.display = 'block';
  document.getElementById('resultPanel').style.display = 'none';
}

function fmtSize(bytes) {
  if (bytes > 1024 * 1024) return (bytes / 1024 / 1024).toFixed(2) + ' MB';
  return (bytes / 1024).toFixed(1) + ' KB';
}

document.getElementById('qualityRow').addEventListener('click', e => {
  const card = e.target.closest('[data-quality]');
  if (!card) return;
  quality = card.dataset.quality;
  document.querySelectorAll('.quality-card').forEach(c => c.classList.remove('active'));
  card.classList.add('active');
});

document.getElementById('compressBtn').addEventListener('click', async () => {
  if (!origBytes) return;
  const btn = document.getElementById('compressBtn');
  btn.disabled = true; btn.textContent = '⏳ 压缩中...';
  if (resultUrl) { URL.revokeObjectURL(resultUrl); resultUrl = null; }

  try {
    const { PDFDocument } = PDFLib;
    const doc = await PDFDocument.load(origBytes);

    // Remove metadata to save space
    doc.setTitle(''); doc.setAuthor(''); doc.setSubject(''); doc.setKeywords([]);
    doc.setProducer(''); doc.setCreator('');

    // Save with options based on quality
    const saveOpts = {};
    if (quality === 'low') {
      saveOpts.useObjectStreams = false;
      // Aggressively strip
    } else if (quality === 'medium') {
      saveOpts.useObjectStreams = false;
    }
    // high = default save

    const compBytes = await doc.save(saveOpts);
    const blob = new Blob([compBytes], { type: 'application/pdf' });
    resultUrl = URL.createObjectURL(blob);

    document.getElementById('origSize').textContent = fmtSize(origSize);
    document.getElementById('compSize').textContent = fmtSize(blob.size);

    const saved = ((1 - blob.size / origSize) * 100);
    if (saved > 0) {
      document.getElementById('savings').textContent = `节省 ${saved.toFixed(1)}%`;
      document.getElementById('savings').style.color = '#10B981';
    } else {
      document.getElementById('savings').textContent = '文件已经很小了，无法进一步压缩';
      document.getElementById('savings').style.color = '#F59E0B';
    }

    document.getElementById('resultPanel').style.display = 'block';
    document.getElementById('statusInfo').textContent = `✅ 压缩完成 ${fmtSize(origSize)} → ${fmtSize(blob.size)}`;
  } catch (e) {
    document.getElementById('statusInfo').textContent = '❌ 压缩失败：' + e.message;
  }
  btn.disabled = false; btn.textContent = '🗜️ 开始压缩';
});

document.getElementById('downloadBtn').addEventListener('click', () => {
  if (!resultUrl) return;
  const a = document.createElement('a'); a.href = resultUrl; a.download = 'compressed.pdf'; a.click();
});
</script>
