<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';
const ZODIAC=[
  {name:'鼠',emoji:'🐀',wuXing:'水',lucky:'2,3',color:'蓝/金',trait:'机灵聪慧、灵活敏捷'},
  {name:'牛',emoji:'◎',wuXing:'土',lucky:'1,4',color:'白/黄',trait:'勤劳踏实、坚韧不拔'},
  {name:'虎',emoji:'🐅',wuXing:'木',lucky:'1,3,4',color:'蓝/灰',trait:'勇敢果断、充满活力'},
  {name:'兔',emoji:'🐇',wuXing:'木',lucky:'3,4,6',color:'红/粉',trait:'温柔善良、心思细腻'},
  {name:'龙',emoji:'◎',wuXing:'土',lucky:'1,6,7',color:'金/银',trait:'志向远大、气度不凡'},
  {name:'蛇',emoji:'◎',wuXing:'火',lucky:'2,8,9',color:'红/浅黄',trait:'深沉稳重、智慧过人'},
  {name:'马',emoji:'◎',wuXing:'火',lucky:'2,3,7',color:'黄/绿',trait:'热情奔放、自由洒脱'},
  {name:'羊',emoji:'🐏',wuXing:'土',lucky:'2,7',color:'绿/红',trait:'温和善良、富有同情心'},
  {name:'猴',emoji:'🐒',wuXing:'金',lucky:'4,9',color:'白/蓝',trait:'聪明机智、活泼好动'},
  {name:'鸡',emoji:'🐓',wuXing:'金',lucky:'5,7,8',color:'金/棕',trait:'勤勉守信、果断干练'},
  {name:'狗',emoji:'🐕',wuXing:'土',lucky:'3,4,9',color:'红/绿',trait:'忠诚正直、善解人意'},
  {name:'猪',emoji:'🐖',wuXing:'水',lucky:'2,5,8',color:'黄/灰',trait:'真诚豁达、心地善良'}
];
const TIAN_GAN=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const DI_ZHI=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];

function getZodiacIdx(year){return(year-4)%12<0?(year-4)%12+12:(year-4)%12}
function getGanZhi(year){return TIAN_GAN[(year-4)%10]+DI_ZHI[(year-4)%12]+'年'}

function query(year){
  const idx=getZodiacIdx(year);
  const z=ZODIAC[idx];
  document.getElementById('heroEmoji').textContent=z.emoji;
  document.getElementById('heroName').textContent=z.name;
  document.getElementById('heroGanZhi').textContent=getGanZhi(year)+' · '+year+'年';
  document.getElementById('infoGrid').innerHTML=[
    ['★','性格特征',z.trait],['◈','五行属性',z.wuXing],
    ['◎','幸运数字',z.lucky],['◆','幸运颜色',z.color]
  ].map(([icon,label,value])=>
    `<div class="info-card"><div class="info-label">${icon} ${label}</div><div class="info-value">${value}</div></div>`).join('');
  renderGrid(idx);
}

function renderGrid(activeIdx){
  document.getElementById('zodiacGrid').innerHTML=ZODIAC.map((z,i)=>
    `<div class="zodiac-cell${i===activeIdx?' active':''}" data-idx="${i}"><div class="zodiac-emoji">${z.emoji}</div><div class="zodiac-name">${z.name}</div></div>`).join('');
}

document.getElementById('queryBtn').addEventListener('click',()=>query(parseInt(document.getElementById('yearInput').value)));
document.getElementById('yearInput').addEventListener('keydown',e=>{if(e.key==='Enter')query(parseInt(document.getElementById('yearInput').value))});
document.getElementById('zodiacGrid').addEventListener('click',e=>{
  const cell=e.target.closest('[data-idx]');if(!cell)return;
  const idx=parseInt(cell.dataset.idx);
  // Find a recent year matching this zodiac
  const now=new Date().getFullYear();
  for(let y=now;y>=now-12;y--)if(getZodiacIdx(y)===idx){document.getElementById('yearInput').value=y;query(y);break}
});
query(parseInt(document.getElementById('yearInput').value));
</script>
