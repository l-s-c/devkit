<script src="https://cdn.jsdelivr.net/npm/ajv@6.12.6/dist/ajv.bundle.js" integrity="sha384-FhxE5wb1R5PH1FNHJnhnZA5Th28cz8eOE7DjUCzNuwImYzw3t4Zl1wiWJhbuf+De" crossorigin="anonymous"></script>

<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

const TEMPLATES = {
  user: {
    schema: { type:"object", required:["name","email","age"], properties:{ name:{type:"string",minLength:1}, email:{type:"string",format:"email"}, age:{type:"integer",minimum:0,maximum:150}, phone:{type:"string",pattern:"^1[3-9]\\d{9}$"} } },
    data: { name:"张三", email:"zhangsan@example.com", age:28, phone:"13800138000" }
  },
  product: {
    schema: { type:"object", required:["id","name","price"], properties:{ id:{type:"integer"}, name:{type:"string"}, price:{type:"number",minimum:0}, tags:{type:"array",items:{type:"string"}}, inStock:{type:"boolean"} } },
    data: { id:1001, name:"无线蓝牙耳机", price:299.99, tags:["电子","音频"], inStock:true }
  },
  api: {
    schema: { type:"object", required:["code","message","data"], properties:{ code:{type:"integer"}, message:{type:"string"}, data:{type:"object"}, timestamp:{type:"integer"} } },
    data: { code:200, message:"success", data:{items:[],total:0}, timestamp:1710000000 }
  },
  empty: { schema:{}, data:{} }
};

function loadTemplate(key) {
  const t = TEMPLATES[key];
  document.getElementById('schemaInput').value = JSON.stringify(t.schema, null, 2);
  document.getElementById('dataInput').value = JSON.stringify(t.data, null, 2);
  document.getElementById('resultArea').innerHTML = '';
  document.getElementById('schemaInput').classList.remove('has-error');
  document.getElementById('dataInput').classList.remove('has-error');
}

function validate() {
  const schemaEl = document.getElementById('schemaInput');
  const dataEl = document.getElementById('dataInput');
  const area = document.getElementById('resultArea');
  schemaEl.classList.remove('has-error');
  dataEl.classList.remove('has-error');

  const sv = schemaEl.value.trim();
  const dv = dataEl.value.trim();
  if (!sv && !dv) { area.innerHTML = ''; return; }

  let schema, data;
  try { schema = JSON.parse(sv || '{}'); } catch(e) {
    schemaEl.classList.add('has-error');
    area.innerHTML = `<div class="result-bar fail"><span class="result-icon">❌</span><div><div class="result-text">Schema JSON 语法错误</div><div class="result-sub">${esc(e.message)}</div></div></div>`;
    document.getElementById('statusInfo').textContent = 'Schema 语法错误';
    return;
  }
  try { data = JSON.parse(dv || '{}'); } catch(e) {
    dataEl.classList.add('has-error');
    area.innerHTML = `<div class="result-bar fail"><span class="result-icon">❌</span><div><div class="result-text">数据 JSON 语法错误</div><div class="result-sub">${esc(e.message)}</div></div></div>`;
    document.getElementById('statusInfo').textContent = '数据语法错误';
    return;
  }

  try {
    const ajv = new Ajv({ allErrors: true });
    const valid = ajv.validate(schema, data);
    if (valid) {
      area.innerHTML = `<div class="result-bar pass"><span class="result-icon">✅</span><div><div class="result-text">验证通过</div><div class="result-sub">JSON 数据完全符合 Schema 定义</div></div></div>`;
      document.getElementById('statusInfo').textContent = '验证通过 ✅';
    } else {
      const errors = ajv.errors || [];
      let html = `<div class="result-bar fail"><span class="result-icon">❌</span><div><div class="result-text">验证失败</div><div class="result-sub">发现 ${errors.length} 个错误</div></div></div><ul class="error-list">`;
      errors.forEach(err => {
        const path = esc(err.instancePath || '/');
        html += `<li class="error-item"><div class="error-path">${path}<span class="error-keyword">${esc(err.keyword)}</span></div><div class="error-msg">${esc(err.message)}</div></li>`;
      });
      html += '</ul>';
      area.innerHTML = html;
      document.getElementById('statusInfo').textContent = `验证失败 · ${errors.length} 个错误`;
    }
  } catch(e) {
    area.innerHTML = `<div class="result-bar fail"><span class="result-icon">⚠️</span><div><div class="result-text">Schema 编译错误</div><div class="result-sub">${esc(e.message)}</div></div></div>`;
    document.getElementById('statusInfo').textContent = 'Schema 编译错误';
  }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

/* Events */
document.getElementById('tplRow').addEventListener('click', e => {
  const pill = e.target.closest('.tpl-pill');
  if (!pill) return;
  document.querySelectorAll('.tpl-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  loadTemplate(pill.dataset.tpl);
});

document.getElementById('validateBtn').addEventListener('click', validate);

// Load default
loadTemplate('user');
</script>
