<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" integrity="sha384-bs/nf9FbdNouRbMiFcrcZfLXYPKiPaGVGplVbv7dLGECccEXDW+S3zjqSKR5ZEaD" crossorigin="anonymous"></script>
<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

const PALETTES = {
  default:  ['#6366F1','#EC4899','#10B981','#F59E0B','#3B82F6','#8B5CF6','#EF4444','#14B8A6','#F97316','#06B6D4'],
  morandi:  ['#B8A9C9','#D4A5A5','#A5C4D4','#C9B99A','#9AB8A0','#D4BCA5','#A5A5D4','#C9A5B8','#B8C9A5','#A5D4C9'],
  business: ['#1E3A5F','#3B82F6','#93C5FD','#1E40AF','#60A5FA','#2563EB','#BFDBFE','#1D4ED8','#3B82F6','#7DD3FC'],
  warm:     ['#EF4444','#F97316','#F59E0B','#FB7185','#FBBF24','#DC2626','#EA580C','#D97706','#F43F5E','#FCD34D'],
  cool:     ['#06B6D4','#8B5CF6','#3B82F6','#14B8A6','#A78BFA','#2563EB','#0EA5E9','#7C3AED','#0891B2','#6366F1'],
};
let currentPalette = 'default';
let fontSize = 14;
let borderRadius = 6;
const TEMPLATES = [
  { title: '季度销售额', data: 'Q1, 120\nQ2, 180\nQ3, 150\nQ4, 210' },
  { title: '月度支出', data: '房租, 3000\n餐饮, 2000\n交通, 800\n娱乐, 1200\n购物, 1500' },
  { title: '市场份额', data: '产品A, 35\n产品B, 25\n产品C, 20\n产品D, 12\n其他, 8' },
  { title: '部门人数', data: '研发, 45\n产品, 12\n设计, 8\n市场, 15\n运营, 20' },
];

let chartType = 'bar', chart = null;

function parseData() {
  const lines = document.getElementById('dataInput').value.trim().split('\n').filter(l => l.trim());
  const labels = [], values = [];
  lines.forEach(l => {
    const parts = l.split(',').map(s => s.trim());
    if (parts.length >= 2) { labels.push(parts[0]); values.push(parseFloat(parts[1]) || 0); }
  });
  return { labels, values };
}

function generate() {
  const { labels, values } = parseData();
  if (!labels.length) return;
  const title = document.getElementById('chartTitle').value;

  if (chart) chart.destroy();

  const isPie = chartType === 'pie' || chartType === 'doughnut';
  const showGrid = document.getElementById('showGrid').checked;
  const showLegend = document.getElementById('showLegend').checked || isPie;
  const showValues = document.getElementById('showValues').checked;

  chart = new Chart(document.getElementById('chartCanvas'), buildConfig(chartType, title, labels, values, isPie, showGrid, showLegend, showValues));

  document.getElementById('statusInfo').textContent = `${chartType} · ${labels.length} 项数据`;
}

function buildConfig(type, title, labels, values, isPie, showGrid, showLegend, showValues) {
  const colors = PALETTES[currentPalette];
  const bgColor = document.getElementById('chartBgColor').value;
  return {
    type,
    data: {
      labels,
      datasets: [{
        label: title || '数据',
        data: values,
        backgroundColor: isPie ? colors.slice(0, labels.length) : colors[0] + 'CC',
        borderColor: isPie ? '#fff' : colors[0],
        borderWidth: 2,
        borderRadius: isPie ? 0 : borderRadius,
        tension: 0.3,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        title: { display: !!title, text: title, font: { size: fontSize + 2, weight: 'bold' } },
        legend: { display: showLegend, position: 'bottom', labels: { font: { size: fontSize } } },
      },
      scales: isPie ? {} : {
        y: { beginAtZero: true, grid: { display: showGrid }, ticks: { font: { size: fontSize } } },
        x: { grid: { display: showGrid }, ticks: { font: { size: fontSize } } },
      },
      layout: { padding: 10 },
    },
    plugins: [{
      id: 'customBg',
      beforeDraw: (chart) => {
        if (bgColor && bgColor !== '#FFFFFF' && bgColor !== '#ffffff') {
          const { ctx, width, height } = chart;
          ctx.save(); ctx.fillStyle = bgColor; ctx.fillRect(0, 0, width, height); ctx.restore();
        }
      }
    }].concat(showValues ? [{
      id: 'datalabels',
      afterDatasetsDraw: (chart) => {
        const { ctx } = chart;
        chart.data.datasets.forEach((ds, di) => {
          const meta = chart.getDatasetMeta(di);
          meta.data.forEach((el, i) => {
            const val = ds.data[i];
            ctx.save(); ctx.fillStyle = isPie ? '#fff' : colors[0];
            ctx.font = `bold ${fontSize - 2}px sans-serif`; ctx.textAlign = 'center';
            if (isPie) {
              const { x, y } = el.tooltipPosition();
              ctx.fillText(val, x, y);
            } else {
              ctx.fillText(val, el.x, el.y - 8);
            }
            ctx.restore();
          });
        });
      }
    }] : [])
  };
}

/* ===== Fullscreen ===== */
let fsChart = null;
document.getElementById('fsBtn').addEventListener('click', () => {
  const overlay = document.getElementById('fsOverlay');
  overlay.style.display = 'flex';
  const { labels, values } = parseData();
  if (!labels.length) return;
  const title = document.getElementById('chartTitle').value;
  const isPie = chartType === 'pie' || chartType === 'doughnut';
  const showGrid = document.getElementById('showGrid').checked;
  const showLegend = document.getElementById('showLegend').checked || isPie;
  const showValues = document.getElementById('showValues').checked;
  if (fsChart) fsChart.destroy();
  fsChart = new Chart(document.getElementById('fsCanvas'), buildConfig(chartType, title, labels, values, isPie, showGrid, showLegend, showValues));
});
document.getElementById('fsClose').addEventListener('click', () => {
  document.getElementById('fsOverlay').style.display = 'none';
  if (fsChart) { fsChart.destroy(); fsChart = null; }
});
document.getElementById('fsOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) {
    document.getElementById('fsOverlay').style.display = 'none';
    if (fsChart) { fsChart.destroy(); fsChart = null; }
  }
});

/* ===== Style controls ===== */
document.getElementById('paletteRow').addEventListener('click', e => {
  const chip = e.target.closest('[data-palette]');
  if (!chip) return;
  currentPalette = chip.dataset.palette;
  document.querySelectorAll('.palette-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  generate();
});

document.getElementById('fontSizeRow').addEventListener('click', e => {
  const chip = e.target.closest('[data-fsize]');
  if (!chip) return;
  fontSize = parseInt(chip.dataset.fsize);
  document.querySelectorAll('#fontSizeRow .tpl-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  generate();
});

document.getElementById('borderRadius').addEventListener('input', e => {
  borderRadius = parseInt(e.target.value);
  document.getElementById('radiusVal').textContent = borderRadius + 'px';
  generate();
});

document.getElementById('chartBgColor').addEventListener('input', generate);
document.getElementById('showGrid').addEventListener('change', generate);
document.getElementById('showLegend').addEventListener('change', generate);
document.getElementById('showValues').addEventListener('change', generate);

/* ===== Events ===== */
document.getElementById('typeTabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  chartType = tab.dataset.type;
  document.querySelectorAll('#typeTabs .tab').forEach(t => t.classList.toggle('active', t.dataset.type === chartType));
  generate();
});

document.getElementById('tplRow').addEventListener('click', e => {
  const chip = e.target.closest('.tpl-chip');
  if (!chip) return;
  const tpl = TEMPLATES[parseInt(chip.dataset.tpl)];
  document.getElementById('chartTitle').value = tpl.title;
  document.getElementById('dataInput').value = tpl.data;
  generate();
});

document.getElementById('chartTitle').addEventListener('input', generate);
document.getElementById('dataInput').addEventListener('input', generate);
document.getElementById('genBtn').addEventListener('click', generate);

document.getElementById('downloadBtn').addEventListener('click', () => {
  if (!chart) return;
  const url = document.getElementById('chartCanvas').toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url; a.download = 'chart.png'; a.click();
});

generate();
</script>
