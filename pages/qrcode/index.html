<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

/* ===== 状态 ===== */
let currentType = 'link';
let downloadFormat = 'png';
let logoImg = null;
let logoUrl = null;
let debounceTimer = null;

/* ===== DOM ===== */
const textInput = document.getElementById('textInput');
const qrCanvas = document.getElementById('qrCanvas');
const sizeSelect = document.getElementById('sizeSelect');
const ecSelect = document.getElementById('ecSelect');
const fgColor = document.getElementById('fgColor');
const bgColor = document.getElementById('bgColor');

const EC_LABELS = { L: 'L (7%)', M: 'M (15%)', Q: 'Q (25%)', H: 'H (30%)' };

/* ===== 获取内容 ===== */
function getContent() {
  if (currentType === 'wifi') {
    const ssid = document.getElementById('wifiSSID').value;
    const pass = document.getElementById('wifiPassword').value;
    const enc = document.querySelector('.wifi-enc-tab.active').dataset.enc;
    if (!ssid) return '';
    return `WIFI:T:${enc};S:${ssid};P:${pass};;`;
  }
  if (currentType === 'email') {
    const to = document.getElementById('emailTo').value;
    const subj = document.getElementById('emailSubject').value;
    const body = document.getElementById('emailBody').value;
    if (!to) return '';
    return `mailto:${to}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
  }
  return textInput.value;
}

/* ===== 生成二维码 ===== */
async function generate() {
  const content = getContent();
  if (!content) {
    qrCanvas.width = 0; qrCanvas.height = 0;
    document.getElementById('statusInfo').textContent = '输入内容即可生成二维码';
    return;
  }

  const size = parseInt(sizeSelect.value);
  let ec = ecSelect.value;

  // Logo 时强制 H 级别
  if (logoImg) {
    ec = 'H';
    ecSelect.value = 'H';
  }

  try {
    // 先生成到临时 canvas
    const tmpCanvas = document.createElement('canvas');
    await QRCode.toCanvas(tmpCanvas, content, {
      width: size,
      margin: 2,
      color: { dark: fgColor.value, light: bgColor.value },
      errorCorrectionLevel: ec,
    });

    // 复制到显示 canvas
    qrCanvas.width = size;
    qrCanvas.height = size;
    const ctx = qrCanvas.getContext('2d');
    ctx.drawImage(tmpCanvas, 0, 0);

    // 叠加 Logo
    if (logoImg) {
      const logoSize = Math.round(size * 0.22);
      const x = Math.round((size - logoSize) / 2);
      const y = Math.round((size - logoSize) / 2);
      const pad = Math.round(logoSize * 0.1);

      // 白底圆角
      ctx.fillStyle = bgColor.value;
      roundRect(ctx, x - pad, y - pad, logoSize + pad * 2, logoSize + pad * 2, 8);
      ctx.fill();

      // Logo
      ctx.drawImage(logoImg, x, y, logoSize, logoSize);
    }

    document.getElementById('previewInfo').textContent = `${size} × ${size} · 容错 ${EC_LABELS[ec]}`;
    document.getElementById('statusInfo').textContent = `二维码已生成 · ${content.length} 字符`;
  } catch (e) {
    document.getElementById('statusInfo').textContent = '生成失败：' + e.message;
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function debouncedGenerate() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(generate, 200);
}

/* ===== 下载 ===== */
function download() {
  const content = getContent();
  if (!content) return;

  const size = parseInt(sizeSelect.value);
  const ec = logoImg ? 'H' : ecSelect.value;

  if (downloadFormat === 'svg') {
    QRCode.toString(content, {
      type: 'svg', width: size, margin: 2,
      color: { dark: fgColor.value, light: bgColor.value },
      errorCorrectionLevel: ec,
    }).then(svg => {
      const blob = new Blob([svg], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'qrcode.svg'; a.click();
      URL.revokeObjectURL(url);
    });
    return;
  }

  // PNG or JPG — use the current canvas
  const mime = downloadFormat === 'jpg' ? 'image/jpeg' : 'image/png';
  const ext = downloadFormat === 'jpg' ? 'jpg' : 'png';

  // For JPG, need white background
  if (downloadFormat === 'jpg') {
    const tmpCanvas = document.createElement('canvas');
    tmpCanvas.width = qrCanvas.width;
    tmpCanvas.height = qrCanvas.height;
    const ctx = tmpCanvas.getContext('2d');
    ctx.fillStyle = bgColor.value;
    ctx.fillRect(0, 0, tmpCanvas.width, tmpCanvas.height);
    ctx.drawImage(qrCanvas, 0, 0);
    tmpCanvas.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `qrcode.${ext}`; a.click();
      URL.revokeObjectURL(url);
    }, mime, 0.95);
    return;
  }

  qrCanvas.toBlob((blob) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `qrcode.${ext}`; a.click();
    URL.revokeObjectURL(url);
  }, mime);
}

/* ===== Logo ===== */
document.getElementById('logoInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const img = new Image();
  img.onload = () => {
    logoImg = img;
    document.getElementById('logoText').style.display = 'none';
    const preview = document.getElementById('logoPreview');
    preview.classList.add('show');
    document.getElementById('logoPreviewImg').src = logoUrl;
    document.getElementById('logoName').textContent = file.name;
    document.getElementById('logoHint').style.display = '';
    document.getElementById('logoRemove').style.display = 'flex';
    debouncedGenerate();
  };
  if (logoUrl) URL.revokeObjectURL(logoUrl);
  logoUrl = URL.createObjectURL(file);
  img.src = logoUrl;
});

document.getElementById('logoRemove').addEventListener('click', (e) => {
  e.stopPropagation();
  e.preventDefault();
  logoImg = null;
  if (logoUrl) { URL.revokeObjectURL(logoUrl); logoUrl = null; }
  document.getElementById('logoText').style.display = '';
  document.getElementById('logoPreview').classList.remove('show');
  document.getElementById('logoHint').style.display = 'none';
  document.getElementById('logoRemove').style.display = 'none';
  document.getElementById('logoInput').value = '';
  debouncedGenerate();
});
