<style>
body { min-height: 100vh; display: flex; flex-direction: column; }
.main { flex: 1; position: relative; z-index: 1; padding: 24px 24px 24px; max-width: 960px; margin: 0 auto; width: 100%; }
.dual { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 16px; align-items: start; }
.panel {
  padding: 24px; border-radius: 16px; margin-bottom: 16px;
  background: var(--bg-glass); backdrop-filter: blur(20px);
  border: 0.5px solid var(--border-glass);
}
.section-title { font-size: 14px; font-weight: 800; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }

/* Month nav */
.month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.month-label { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.month-sub { font-size: 12px; color: var(--text-caption); margin-top: 2px; }
.month-btns { display: flex; gap: 6px; }
.month-btn {
  width: 36px; height: 36px; border-radius: 6px; border: 1.5px solid var(--border-glass);
  background: var(--bg-glass); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center; transition: all 150ms; color: var(--text-secondary);
}
.month-btn:hover { border-color: var(--brand-500); color: var(--brand-500); }
.today-btn {
  padding: 6px 14px; border-radius: 6px; border: 1.5px solid var(--brand-500);
  background: rgba(99,102,241,0.08); color: var(--brand-500);
  font-size: 11px; font-weight: 700; cursor: pointer; transition: all 150ms;
}
.today-btn:hover { background: var(--brand-500); color: #fff; }
.jump-select {
  padding: 4px 8px; border-radius: 6px; border: 1.5px solid var(--border-glass);
  background: var(--bg-glass-input); font-size: 13px; font-weight: 700;
  color: var(--text-primary); cursor: pointer; outline: none;
}
.jump-select:focus { border-color: var(--brand-500); }
.jump-row { display: flex; gap: 6px; align-items: center; margin-top: 4px; }

/* Calendar grid */
.cal-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 4px; }
.cal-header span { font-size: 11px; font-weight: 700; color: var(--text-caption); padding: 6px 0; }
.cal-header span:first-child, .cal-header span:last-child { color: #EF4444; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-day {
  padding: 6px 2px; text-align: center; border-radius: 6px;
  cursor: pointer; transition: all 150ms; min-height: 56px;
}
.cal-day:hover { background: rgba(99,102,241,0.06); }
.cal-day.other { opacity: 0.3; }
.cal-day.today { background: var(--brand-500); border-radius: 6px; }
.cal-day.today .day-num { color: #fff; }
.cal-day.today .day-lunar { color: rgba(255,255,255,0.7); }
.cal-day.selected { outline: 2px solid var(--brand-500); outline-offset: -2px; }
.cal-day.holiday { background: rgba(239,68,68,0.06); }
.day-num { font-size: 16px; font-weight: 700; line-height: 1.3; }
.day-lunar { font-size: 9px; color: var(--text-caption); line-height: 1.2; margin-top: 1px; }
.day-lunar.festival { color: #EF4444; font-weight: 700; }
.day-lunar.jieqi { color: #10B981; font-weight: 700; }
.weekend .day-num { color: #EF4444; }

/* Detail */
.detail-card { text-align: center; margin-bottom: 16px; }
.detail-date { font-size: 48px; font-weight: 800; color: var(--brand-500); line-height: 1; }
.detail-weekday { font-size: 14px; font-weight: 700; color: var(--text-secondary); margin-top: 4px; }
.detail-lunar { font-size: 16px; font-weight: 700; margin-top: 8px; }
.detail-ganzhi { font-size: 13px; color: var(--text-caption); margin-top: 4px; font-family: var(--font-code); }
.detail-shengxiao { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

/* Yi Ji */
.yiji-section { margin-top: 14px; }
.yiji-title { font-size: 12px; font-weight: 800; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
.yiji-yi .yiji-title { color: #10B981; }
.yiji-ji .yiji-title { color: #EF4444; }
.yiji-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.yiji-tag { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.yiji-yi .yiji-tag { background: rgba(16,185,129,0.08); color: #10B981; }
.yiji-ji .yiji-tag { background: rgba(239,68,68,0.06); color: #EF4444; }

/* Jieqi */
.jieqi-card {
  padding: 12px; border-radius: 6px; border: 1px solid var(--border-glass);
  background: var(--bg-glass); display: flex; align-items: center; gap: 10px;
}
.jieqi-icon { font-size: 24px; }
.jieqi-name { font-size: 13px; font-weight: 700; }
.jieqi-date { font-size: 11px; color: var(--text-caption); font-family: var(--font-code); }

@media (max-width: 768px) {
  .main { padding: 16px 16px 60px; }
  .dual { grid-template-columns: 1fr; }
  .detail-date { font-size: 36px; }
}

<script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.6.13/lunar.min.js" integrity="sha384-o7vcMy3w0DlC6AO+QxZzfRKT7zO2djI5QbNDoyX3VKklerUACSv0/rOMj+LFRbd/" crossorigin="anonymous"></script>
<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

const WEEKDAYS = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
const JIEQI_ICONS = {'立春':'◎','雨水':'◎️','惊蛰':'⛈️','春分':'◎','清明':'◎','谷雨':'◎','立夏':'☀️','小满':'◎','芒种':'◎','夏至':'◈','小暑':'◎️','大暑':'♨️','立秋':'◎','处暑':'◎️','白露':'◆','秋分':'◎','寒露':'◎','霜降':'❄️','立冬':'◎️','小雪':'◎️','大雪':'❄️','冬至':'⛄','小寒':'◎','大寒':'◎'};

// 法定节假日 2025-2026 (硬编码)
const HOLIDAYS = {
  '2025-1-1':true,'2025-1-28':true,'2025-1-29':true,'2025-1-30':true,'2025-1-31':true,'2025-2-1':true,'2025-2-2':true,'2025-2-3':true,'2025-2-4':true,
  '2025-4-4':true,'2025-4-5':true,'2025-4-6':true,
  '2025-5-1':true,'2025-5-2':true,'2025-5-3':true,'2025-5-4':true,'2025-5-5':true,
  '2025-5-31':true,'2025-6-1':true,'2025-6-2':true,
  '2025-10-1':true,'2025-10-2':true,'2025-10-3':true,'2025-10-4':true,'2025-10-5':true,'2025-10-6':true,'2025-10-7':true,'2025-10-8':true,
  '2026-1-1':true,'2026-1-2':true,'2026-1-3':true,
  '2026-2-17':true,'2026-2-18':true,'2026-2-19':true,'2026-2-20':true,'2026-2-21':true,'2026-2-22':true,'2026-2-23':true,
  '2026-4-5':true,'2026-4-6':true,'2026-4-7':true,
  '2026-5-1':true,'2026-5-2':true,'2026-5-3':true,'2026-5-4':true,'2026-5-5':true,
  '2026-6-19':true,'2026-6-20':true,'2026-6-21':true,
  '2026-10-1':true,'2026-10-2':true,'2026-10-3':true,'2026-10-4':true,'2026-10-5':true,'2026-10-6':true,'2026-10-7':true,
};

const { Solar, Lunar, SolarUtil } = window;

let curYear, curMonth, selDay;

function initJumpSelects() {
  const ySel = document.getElementById('jumpYear');
  const mSel = document.getElementById('jumpMonth');
  let yHtml = '';
  for (let y = 1900; y <= 2100; y++) yHtml += `<option value="${y}">${y}年</option>`;
  ySel.innerHTML = yHtml;
  let mHtml = '';
  for (let m = 1; m <= 12; m++) mHtml += `<option value="${m}">${m}月</option>`;
  mSel.innerHTML = mHtml;

  ySel.addEventListener('change', () => { curYear = parseInt(ySel.value); selDay = 1; renderCal(); selectDay(1); });
  mSel.addEventListener('change', () => { curMonth = parseInt(mSel.value); selDay = 1; renderCal(); selectDay(1); });
}

function syncJumpSelects() {
  document.getElementById('jumpYear').value = curYear;
  document.getElementById('jumpMonth').value = curMonth;
}

function init() {
  const t = new Date();
  curYear = t.getFullYear();
  curMonth = t.getMonth() + 1;
  selDay = t.getDate();
  initJumpSelects();
  renderCal();
  selectDay(selDay);
}

function renderCal() {
  // Month label
  const solar = Solar.fromYmd(curYear, curMonth, 1);
  const lunar = solar.getLunar();
  document.getElementById('monthLabel').textContent = `${curYear}年${curMonth}月`;
  document.getElementById('monthSub').textContent = `${lunar.getYearInGanZhi()}年 ${lunar.getMonthInChinese()}月`;
  syncJumpSelects();

  const firstDay = new Date(curYear, curMonth - 1, 1).getDay();
  const daysInMonth = SolarUtil.getDaysOfMonth(curYear, curMonth);
  const prevDays = curMonth === 1 ? SolarUtil.getDaysOfMonth(curYear - 1, 12) : SolarUtil.getDaysOfMonth(curYear, curMonth - 1);
  const today = new Date();
  const isThisMonth = today.getFullYear() === curYear && today.getMonth() + 1 === curMonth;

  let html = '';

  // Prev month padding
  for (let i = firstDay - 1; i >= 0; i--) {
    const d = prevDays - i;
    const py = curMonth === 1 ? curYear - 1 : curYear;
    const pm = curMonth === 1 ? 12 : curMonth - 1;
    const s = Solar.fromYmd(py, pm, d);
    const l = s.getLunar();
    html += `<div class="cal-day other"><div class="day-num">${d}</div><div class="day-lunar">${getLunarLabel(l)}</div></div>`;
  }

  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const s = Solar.fromYmd(curYear, curMonth, d);
    const l = s.getLunar();
    const dow = new Date(curYear, curMonth - 1, d).getDay();
    const isToday = isThisMonth && d === today.getDate();
    const isSel = d === selDay && !isToday;
    const isWeekend = dow === 0 || dow === 6;
    const key = `${curYear}-${curMonth}-${d}`;
    const isHoliday = HOLIDAYS[key];

    const label = getLunarLabel(l);
    const labelType = getLabelType(l);

    let cls = 'cal-day';
    if (isToday) cls += ' today';
    if (isSel) cls += ' selected';
    if (isWeekend) cls += ' weekend';
    if (isHoliday) cls += ' holiday';

    let lunarCls = 'day-lunar';
    if (labelType === 'festival') lunarCls += ' festival';
    else if (labelType === 'jieqi') lunarCls += ' jieqi';

    html += `<div class="${cls}" data-day="${d}"><div class="day-num">${d}</div><div class="${lunarCls}">${label}</div></div>`;
  }

  // Next month padding
  const total = firstDay + daysInMonth;
  const remaining = Math.ceil(total / 7) * 7 - total;
  for (let d = 1; d <= remaining; d++) {
    const ny = curMonth === 12 ? curYear + 1 : curYear;
    const nm = curMonth === 12 ? 1 : curMonth + 1;
    const s = Solar.fromYmd(ny, nm, d);
    const l = s.getLunar();
    html += `<div class="cal-day other"><div class="day-num">${d}</div><div class="day-lunar">${getLunarLabel(l)}</div></div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
}

function getLunarLabel(l) {
  // Priority: solar festival > lunar festival > jieqi > lunar day
  const solarFestivals = l.getSolar().getFestivals();
  if (solarFestivals.length) return solarFestivals[0].length > 4 ? solarFestivals[0].substring(0, 4) : solarFestivals[0];
  const lunarFestivals = l.getFestivals();
  if (lunarFestivals.length) return lunarFestivals[0].length > 4 ? lunarFestivals[0].substring(0, 4) : lunarFestivals[0];
  const jq = l.getJieQi();
  if (jq) return jq;
  return l.getDayInChinese();
}

function getLabelType(l) {
  if (l.getSolar().getFestivals().length) return 'festival';
  if (l.getFestivals().length) return 'festival';
  if (l.getJieQi()) return 'jieqi';
  return '';
}

function selectDay(d) {
  selDay = d;
  // Update selected highlight
  document.querySelectorAll('.cal-day').forEach(el => el.classList.remove('selected'));
  const target = document.querySelector(`.cal-day[data-day="${d}"]:not(.other)`);
  if (target && !target.classList.contains('today')) target.classList.add('selected');

  const s = Solar.fromYmd(curYear, curMonth, d);
  const l = s.getLunar();

  document.getElementById('detailDate').textContent = d;
  document.getElementById('detailWeekday').textContent = WEEKDAYS[new Date(curYear, curMonth - 1, d).getDay()];
  document.getElementById('detailLunar').textContent = `${l.getMonthInChinese()}月${l.getDayInChinese()}`;
  document.getElementById('detailGanzhi').textContent = `${l.getYearInGanZhi()}年 ${l.getMonthInGanZhi()}月 ${l.getDayInGanZhi()}日`;
  document.getElementById('detailShengxiao').textContent = `${l.getYearShengXiao()}年`;

  // 宜忌
  const yi = l.getDayYi();
  const ji = l.getDayJi();
  document.getElementById('yiTags').innerHTML = yi.map(t => `<span class="yiji-tag">${t}</span>`).join('');
  document.getElementById('jiTags').innerHTML = ji.map(t => `<span class="yiji-tag">${t}</span>`).join('');

  // 下一个节气
  const jieqi = l.getCurrentJieQi() || l.getNextJieQi();
  if (jieqi) {
    const jqName = jieqi.getName();
    const jqSolar = jieqi.getSolar();
    const icon = JIEQI_ICONS[jqName] || '◎';
    document.getElementById('jieqiCard').innerHTML = `<span class="jieqi-icon">${icon}</span><div><div class="jieqi-name">${jqName}</div><div class="jieqi-date">${jqSolar.toYmd()}</div></div>`;
  }

  document.getElementById('statusInfo').textContent = `${curYear}年${curMonth}月${d}日 ${l.getYearInGanZhi()}年${l.getMonthInChinese()}月${l.getDayInChinese()}`;
}

/* ===== Events ===== */
document.getElementById('calGrid').addEventListener('click', e => {
  const day = e.target.closest('.cal-day:not(.other)');
  if (!day) return;
  selectDay(parseInt(day.dataset.day));
});

document.getElementById('prevBtn').addEventListener('click', () => {
  curMonth--;
  if (curMonth < 1) { curMonth = 12; curYear--; }
  selDay = 1; renderCal(); selectDay(1);
});

document.getElementById('nextBtn').addEventListener('click', () => {
  curMonth++;
  if (curMonth > 12) { curMonth = 1; curYear++; }
  selDay = 1; renderCal(); selectDay(1);
});

document.getElementById('todayBtn').addEventListener('click', () => {
  const t = new Date();
  curYear = t.getFullYear(); curMonth = t.getMonth() + 1; selDay = t.getDate();
  renderCal(); selectDay(selDay);
});

init();
</script>
