<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';
const PI=Math.PI,a=6378245.0,ee=0.00669342162296594323,x_pi=PI*3000.0/180.0;
function transformLat(x,y){let r=-100+2*x+3*y+0.2*y*y+0.1*x*y+0.2*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(y*PI)+40*Math.sin(y/3*PI))*2/3;r+=(160*Math.sin(y/12*PI)+320*Math.sin(y*PI/30))*2/3;return r}
function transformLng(x,y){let r=300+x+2*y+0.1*x*x+0.1*x*y+0.1*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(x*PI)+40*Math.sin(x/3*PI))*2/3;r+=(150*Math.sin(x/12*PI)+300*Math.sin(x/30*PI))*2/3;return r}
function outOfChina(lat,lng){return lng<72.004||lng>137.8347||lat<0.8293||lat>55.8271}

function wgs84ToGcj02(lat,lng){
  if(outOfChina(lat,lng))return[lat,lng];
  let dLat=transformLat(lng-105,lat-35),dLng=transformLng(lng-105,lat-35);
  const radLat=lat/180*PI,magic=Math.sin(radLat);
  const sqrtMagic=Math.sqrt(1-ee*magic*magic);
  dLat=(dLat*180)/(a*(1-ee)/(sqrtMagic*sqrtMagic*sqrtMagic)*PI);
  dLng=(dLng*180)/(a/sqrtMagic*Math.cos(radLat)*PI);
  return[lat+dLat,lng+dLng];
}
function gcj02ToWgs84(lat,lng){
  const [gLat,gLng]=wgs84ToGcj02(lat,lng);
  return[lat*2-gLat,lng*2-gLng];
}
function gcj02ToBd09(lat,lng){
  const z=Math.sqrt(lng*lng+lat*lat)+0.00002*Math.sin(lat*x_pi);
  const theta=Math.atan2(lat,lng)+0.000003*Math.cos(lng*x_pi);
  return[z*Math.sin(theta)+0.006,z*Math.cos(theta)+0.0065];
}
function bd09ToGcj02(lat,lng){
  const x=lng-0.0065,y=lat-0.006;
  const z=Math.sqrt(x*x+y*y)-0.00002*Math.sin(y*x_pi);
  const theta=Math.atan2(y,x)-0.000003*Math.cos(x*x_pi);
  return[z*Math.sin(theta),z*Math.cos(theta)];
}

function updateFrom(sys){
  const lat=parseFloat(document.getElementById(sys+'Lat').value);
  const lng=parseFloat(document.getElementById(sys+'Lng').value);
  if(isNaN(lat)||isNaN(lng))return;
  let wLat,wLng,gLat,gLng,bLat,bLng;
  if(sys==='wgs84'){
    [wLat,wLng]=[lat,lng];
    [gLat,gLng]=wgs84ToGcj02(lat,lng);
    [bLat,bLng]=gcj02ToBd09(gLat,gLng);
  }else if(sys==='gcj02'){
    [gLat,gLng]=[lat,lng];
    [wLat,wLng]=gcj02ToWgs84(lat,lng);
    [bLat,bLng]=gcj02ToBd09(lat,lng);
  }else{
    [bLat,bLng]=[lat,lng];
    [gLat,gLng]=bd09ToGcj02(lat,lng);
    [wLat,wLng]=gcj02ToWgs84(gLat,gLng);
  }
  if(sys!=='wgs84'){document.getElementById('wgs84Lat').value=wLat.toFixed(6);document.getElementById('wgs84Lng').value=wLng.toFixed(6)}
  if(sys!=='gcj02'){document.getElementById('gcj02Lat').value=gLat.toFixed(6);document.getElementById('gcj02Lng').value=gLng.toFixed(6)}
  if(sys!=='bd09'){document.getElementById('bd09Lat').value=bLat.toFixed(6);document.getElementById('bd09Lng').value=bLng.toFixed(6)}
}

document.querySelectorAll('.coord-input').forEach(input=>{
  input.addEventListener('input',()=>updateFrom(input.dataset.sys));
});
updateFrom('wgs84');
</script>
