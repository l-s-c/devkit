<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

const fmt = n => '¥' + Math.round(n).toLocaleString();
let loanType = 'equal';

/* ===== 等额本息月供公式 ===== */
function calcMonthlyPayment(P, r, n) {
  if (r === 0) return P / n;
  const factor = Math.pow(1 + r, n);
  return P * r * factor / (factor - 1);
}

/* ===== 模拟还款计划 ===== */
function simulate(P, r, totalN, prepays, mode) {
  // mode: 'none' | 'shorten' | 'reduce'
  let balance = P;
  let monthly = loanType === 'equal'
    ? calcMonthlyPayment(P, r, totalN)
    : 0; // 等额本金每期不同
  let totalInt = 0;
  const timeline = [];
  let prepayIdx = 0;
  let remainN = totalN;
  let principalPart = loanType === 'principal' ? P / totalN : 0;

  for (let i = 1; balance > 0.01; i++) {
    if (i > 7200) break; // 安全上限 600 年

    const intPart = balance * r;
    let capPart;
    if (loanType === 'equal') {
      capPart = monthly - intPart;
    } else {
      capPart = principalPart;
      monthly = capPart + intPart;
    }
    if (capPart > balance) capPart = balance;
    balance -= capPart;
    totalInt += intPart;
    let event = '';

    // 检查提前还款
    if (prepayIdx < prepays.length && i === prepays[prepayIdx].month && mode !== 'none') {
      const amt = Math.min(prepays[prepayIdx].amount, balance);
      balance -= amt;
      event = `提前还款 ${fmt(amt)}`;
      prepayIdx++;

      if (balance > 0.01) {
        remainN = totalN - i;
        if (mode === 'shorten') {
          // 月供不变，自然缩短
        } else if (mode === 'reduce') {
          // 期限不变，重算月供
          if (loanType === 'equal') {
            monthly = calcMonthlyPayment(balance, r, remainN);
          } else {
            principalPart = balance / remainN;
          }
        }
      }
    }

    timeline.push({ period: i, payment: monthly, capital: capPart, interest: intPart, balance: Math.max(0, balance), event });
    if (balance <= 0.01) break;
  }
  return { totalInt, timeline, finalPeriod: timeline.length };
}

/* ===== 获取提前还款列表 ===== */
function getPrepays() {
  const items = document.querySelectorAll('.prepay-item');
  const list = [];
  items.forEach(item => {
    const month = parseInt(item.querySelector('.prepay-month').value) || 0;
    const amount = parseFloat(item.querySelector('.prepay-amount').value) || 0;
    if (month > 0 && amount > 0) list.push({ month, amount });
  });
  return list.sort((a, b) => a.month - b.month);
}

/* ===== 主计算 ===== */
function calc() {
  const P = parseFloat(document.getElementById('loanAmount').value) || 0;
  const annualR = (parseFloat(document.getElementById('loanRate').value) || 0) / 100;
  const r = annualR / 12;
  const totalN = (parseInt(document.getElementById('loanYears').value) || 0) * 12;
  if (!P || !totalN) return;

  const prepays = getPrepays();
  const errEl = document.getElementById('errorMsg');

  // AC-05: 验证提前还款时间
  for (const p of prepays) {
    if (p.month >= totalN) {
      errEl.textContent = `⚠️ 第 ${p.month} 期超出总期限 ${totalN} 期`;
      errEl.style.display = 'block';
      return;
    }
  }
  errEl.style.display = 'none';

  const origMonthly = loanType === 'equal'
    ? calcMonthlyPayment(P, r, totalN)
    : P / totalN + P * r;
  const origResult = simulate(P, r, totalN, [], 'none');
  const shortenResult = simulate(P, r, totalN, prepays, 'shorten');
  const reduceResult = simulate(P, r, totalN, prepays, 'reduce');

  // 原贷款信息
  document.getElementById('origMonthly').textContent = fmt(origMonthly) + (loanType === 'principal' ? '（首月）' : '');
  document.getElementById('origInterest').textContent = fmt(origResult.totalInt);

  // 节省利息
  const shortenSaved = origResult.totalInt - shortenResult.totalInt;
  const reduceSaved = origResult.totalInt - reduceResult.totalInt;
  const bestSaved = Math.max(shortenSaved, reduceSaved);
  const bestPct = origResult.totalInt > 0 ? Math.round(bestSaved / origResult.totalInt * 100) : 0;

  document.getElementById('totalSaved').textContent = fmt(bestSaved);
  document.getElementById('savedDesc').textContent = `相当于原利息的 ${bestPct}%`;

  // 缩短期限卡片
  document.getElementById('shortenSaved').textContent = fmt(shortenSaved);
  const sY = Math.floor(shortenResult.finalPeriod / 12), sM = shortenResult.finalPeriod % 12;
  const origY = Math.floor(totalN / 12);
  document.getElementById('shortenTerm').textContent = `期限 ${origY}年→${sY}年${sM ? sM + '月' : ''}`;
  document.getElementById('shortenMonthly').textContent = `月供不变 ${fmt(loanType === 'equal' ? calcMonthlyPayment(P, r, totalN) : origMonthly)}`;

  // 减少月供卡片
  document.getElementById('reduceSaved').textContent = fmt(reduceSaved);
  // 找提前还款后的新月供
  let reduceNewMonthly = origMonthly;
  const afterPrepayEntries = reduceResult.timeline.filter(t => t.event);
  if (afterPrepayEntries.length) {
    const lastPP = afterPrepayEntries[afterPrepayEntries.length - 1].period;
    const next = reduceResult.timeline.find(t => t.period > lastPP);
    if (next) reduceNewMonthly = next.payment;
  }
  const rY = Math.floor(reduceResult.finalPeriod / 12), rM = reduceResult.finalPeriod % 12;
  document.getElementById('reduceTerm').textContent = `期限 ${rY}年${rM ? rM + '月' : ''}`;
  document.getElementById('reduceMonthly').textContent = `月供 ${fmt(origMonthly)}→${fmt(reduceNewMonthly)}`;

  // 智能建议
  const diff = Math.abs(shortenSaved - reduceSaved);
  if (shortenSaved > reduceSaved) {
    document.getElementById('adviceText').innerHTML = `<strong>建议选择「缩短期限」</strong>，比减少月供多节省 <strong>${fmt(diff)}</strong>。虽然月供不变，但总利息显著减少。`;
  } else {
    document.getElementById('adviceText').innerHTML = `<strong>建议选择「减少月供」</strong>，比缩短期限多节省 <strong>${fmt(diff)}</strong>。月供压力更小。`;
  }

  // 三条对比进度条
  const maxInt = origResult.totalInt;
  document.getElementById('barOrigVal').textContent = fmt(maxInt);
  document.getElementById('barShortenVal').textContent = fmt(shortenResult.totalInt);
  document.getElementById('barReduceVal').textContent = fmt(reduceResult.totalInt);
  document.getElementById('barShorten').style.width = maxInt > 0 ? Math.round(shortenResult.totalInt / maxInt * 100) + '%' : '0%';
  document.getElementById('barReduce').style.width = maxInt > 0 ? Math.round(reduceResult.totalInt / maxInt * 100) + '%' : '0%';

  // 还款时间线（缩短期限方案，关键期数）
  const tl = shortenResult.timeline;
  const keyPeriods = new Set();
  for (let i = 0; i < Math.min(6, tl.length); i++) keyPeriods.add(i);
  tl.forEach((t, i) => { if (t.event) { keyPeriods.add(i); if (i + 1 < tl.length) keyPeriods.add(i + 1); } });
  for (let i = Math.max(0, tl.length - 3); i < tl.length; i++) keyPeriods.add(i);
  const sorted = [...keyPeriods].sort((a, b) => a - b);
  let html = '';
  let lastIdx = -1;
  sorted.forEach(idx => {
    if (lastIdx >= 0 && idx - lastIdx > 1) html += '<tr><td colspan="6" style="text-align:center;color:var(--text-caption);font-size:10px">···</td></tr>';
    const t = tl[idx];
    const cls = t.event ? ' class="prepay-row"' : '';
    html += `<tr${cls}><td>${t.period}</td><td>${fmt(t.payment)}</td><td>${fmt(t.capital)}</td><td>${fmt(t.interest)}</td><td>${fmt(t.balance)}</td><td style="color:#10B981;font-size:11px">${t.event}</td></tr>`;
    lastIdx = idx;
  });
  document.getElementById('timelineBody').innerHTML = html;

  document.getElementById('statusInfo').textContent = `${fmtShort(P)} · ${parseFloat((annualR * 100).toPrecision(10))}% · ${origY}年 · 节省 ${fmt(bestSaved)}（${bestPct}%）`;
}

function fmtShort(n) { return n >= 10000 ? (n / 10000).toFixed(0) + '万' : n.toLocaleString() + '元'; }

/* ===== 事件绑定 ===== */
['loanAmount', 'loanRate', 'loanYears'].forEach(id =>
  document.getElementById(id).addEventListener('input', calc)
);

document.getElementById('btnEqual').addEventListener('click', () => {
  loanType = 'equal';
  document.getElementById('btnEqual').classList.add('active');
  document.getElementById('btnPrincipal').classList.remove('active');
  calc();
});
document.getElementById('btnPrincipal').addEventListener('click', () => {
  loanType = 'principal';
  document.getElementById('btnPrincipal').classList.add('active');
  document.getElementById('btnEqual').classList.remove('active');
  calc();
});

// 添加提前还款
document.getElementById('btnAdd').addEventListener('click', () => {
  const list = document.getElementById('prepayList');
  const div = document.createElement('div');
  div.className = 'prepay-item';
  div.innerHTML = `
    <div class="field"><div class="field-label">📅 第 N 期后</div><input type="number" class="field-input prepay-month" value="60"></div>
    <div class="field"><div class="field-label">💰 还款金额</div><input type="number" class="field-input prepay-amount" value="100000"></div>
    <button class="remove-btn" title="删除">✕</button>`;
  list.appendChild(div);
  // 绑定新输入的 input 事件
  div.querySelectorAll('.field-input').forEach(el => el.addEventListener('input', calc));
  calc();
});

// 删除提前还款（事件委托）
document.getElementById('prepayList').addEventListener('click', e => {
  if (e.target.closest('.remove-btn')) {
    if (document.querySelectorAll('.prepay-item').length <= 1) return;
    e.target.closest('.prepay-item').remove();
    calc();
  }
});

// 初始 prepay-item 输入绑定
document.querySelectorAll('.prepay-item .field-input').forEach(el => el.addEventListener('input', calc));

// 还款时间线展开/收起
document.getElementById('timelineToggle').addEventListener('click', () => {
  const w = document.getElementById('timelineWrap');
  const t = document.getElementById('timelineToggle');
  if (w.style.display === 'none') { w.style.display = 'block'; t.textContent = '收起 ↑'; }
  else { w.style.display = 'none'; t.textContent = '展开 ↓'; }
});

calc();
</script>
