body { min-height: 100vh; display: flex; flex-direction: column; }
.main { flex: 1; position: relative; z-index: 1; padding: 24px 24px 24px; max-width: 960px; margin: 0 auto; width: 100%; }
.dual { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
.panel {
  padding: 24px; border-radius: 16px; margin-bottom: 16px;
  background: var(--bg-glass); backdrop-filter: blur(20px);
  border: 0.5px solid var(--border-glass);

.section-title { font-size: 14px; font-weight: 800; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }

/* Quick pair pills */
.pair-row { display: flex; gap: 6px; flex-wrap: wrap; }
.pair-pill {
  padding: 7px 14px; border-radius: 20px; border: 1.5px solid var(--border-glass);
  background: var(--bg-glass-input); font-size: 11px; font-weight: 700;
  color: var(--text-secondary); cursor: pointer; transition: all 150ms;
  display: flex; align-items: center; gap: 4px;
}
.pair-pill:hover { border-color: var(--brand-500); color: var(--brand-500); }
.pair-pill.active { border-color: var(--brand-500); background: rgba(99,102,241,0.08); color: var(--brand-500); }

/* Hero converter */
.hero-convert {
  background: linear-gradient(135deg, rgba(99,102,241,0.06), rgba(16,185,129,0.04));
  border: 1.5px solid rgba(99,102,241,0.12); border-radius: 16px; padding: 28px;
}
.currency-row { display: flex; align-items: center; gap: 12px; }
.curr-flag { font-size: 32px; flex-shrink: 0; }
.curr-body { flex: 1; }
.curr-label { font-size: 11px; font-weight: 700; color: var(--text-caption); margin-bottom: 4px; }
.curr-input {
  width: 100%; padding: 0; border: none; background: none;
  font-size: 32px; font-weight: 800; font-family: var(--font-code);
  color: var(--text-primary); outline: none; letter-spacing: -1px;
}
.curr-input::placeholder { color: var(--text-caption); }
.curr-dropdown {
  padding: 10px 14px; border-radius: 6px; border: 1.5px solid var(--border-glass);
  background: var(--bg-glass-input); font-size: 14px; font-weight: 700;
  color: var(--text-primary); cursor: pointer; min-width: 110px;
}
.curr-name { font-size: 11px; color: var(--text-caption); margin-top: 2px; }

/* Swap */
.swap-line { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
.swap-line-bar { flex: 1; height: 1px; background: var(--border-glass); }
.swap-btn {
  width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--border-glass);
  background: var(--bg-glass-input); cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: all 200ms; flex-shrink: 0;
}
.swap-btn:hover { border-color: var(--brand-500); background: rgba(99,102,241,0.08); transform: rotate(180deg); }

/* Rate display */
.rate-display {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-radius: 6px; background: var(--bg-glass-input);
  border: 1px solid var(--border-glass); margin-top: 16px;
}
.rate-text { font-family: var(--font-code); font-size: 13px; font-weight: 700; color: var(--text-secondary); }
.rate-badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
.rate-live { background: rgba(16,185,129,0.08); color: #10B981; }
.rate-cached { background: rgba(245,158,11,0.08); color: #F59E0B; }

/* Status */
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-radius: 6px; font-size: 11px; font-weight: 600;
}
.status-ok { background: rgba(16,185,129,0.08); color: #10B981; }
.status-cache { background: rgba(245,158,11,0.08); color: #F59E0B; }
.status-err { background: rgba(239,68,68,0.08); color: #EF4444; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; margin-right: 6px; display: inline-block; }

/* History */
.history-item {
  display: flex; align-items: center; gap: 8px; padding: 10px 0;
  border-bottom: 1px solid var(--border-glass); font-size: 12px;
}
.history-item:last-child { border-bottom: none; }
.history-pair { font-weight: 700; min-width: 80px; }
.history-val { font-family: var(--font-code); font-weight: 700; color: var(--brand-500); flex: 1; }
.history-time { font-family: var(--font-code); font-size: 10px; color: var(--text-caption); }
.history-empty { text-align: center; padding: 20px; color: var(--text-caption); font-size: 12px; }

/* Category tabs */
.cat-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
.cat-tab {
  padding: 6px 14px; border-radius: 16px; font-size: 11px; font-weight: 700;
  color: var(--text-caption); cursor: pointer; transition: all 150ms; border: 1.5px solid transparent;
}
.cat-tab:hover { color: var(--text-secondary); }
.cat-tab.active { background: rgba(99,102,241,0.08); color: var(--brand-500); border-color: rgba(99,102,241,0.15); }

/* Multi currency grid */
.multi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.multi-item {
  padding: 14px; border-radius: 6px; border: 1px solid var(--border-glass);
  background: var(--bg-glass-input); display: flex; align-items: center; gap: 10px;
  transition: all 150ms; cursor: pointer;
}
.multi-item:hover { border-color: var(--brand-500); transform: translateY(-1px); }
.multi-flag { font-size: 24px; }
.multi-info { flex: 1; }
.multi-code { font-size: 10px; font-weight: 700; color: var(--text-caption); }
.multi-val { font-size: 16px; font-weight: 800; font-family: var(--font-code); color: var(--text-primary); margin-top: 1px; }
.multi-rate { font-size: 9px; font-family: var(--font-code); color: var(--text-caption); margin-top: 1px; }

/* Cross rates table */
.cross-table { width: 100%; border-collapse: collapse; font-size: 10px; font-family: var(--font-code); }
.cross-table th { padding: 8px 4px; text-align: right; color: var(--text-caption); font-weight: 700; }
.cross-table th:first-child { text-align: left; }
.cross-table td { padding: 6px 4px; text-align: right; color: var(--text-primary); font-weight: 600; }
.cross-table td:first-child { text-align: left; font-weight: 700; color: var(--text-secondary); }
.cross-table td.dash { color: var(--text-caption); }

@media (max-width: 768px) {
  .main { padding: 16px 16px 60px; }
  .dual { grid-template-columns: 1fr; }
  .curr-input { font-size: 24px; }
  .multi-grid { grid-template-columns: 1fr; }
}

<div class="statusbar">

<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

const FLAGS = { CNY:'🇨🇳',USD:'🇺🇸',EUR:'🇪🇺',JPY:'🇯🇵',GBP:'🇬🇧',HKD:'🇭🇰',KRW:'🇰🇷',AUD:'🇦🇺',CAD:'🇨🇦',SGD:'🇸🇬',THB:'🇹🇭',TWD:'🇹🇼',MYR:'🇲🇾',INR:'🇮🇳',CHF:'🇨🇭' };
const NAMES = { CNY:'人民币',USD:'美元',EUR:'欧元',JPY:'日元',GBP:'英镑',HKD:'港币',KRW:'韩元',AUD:'澳元',CAD:'加元',SGD:'新元',THB:'泰铢',TWD:'台币',MYR:'林吉特',INR:'卢比',CHF:'瑞郎' };
const ALL = Object.keys(FLAGS);
const CATS = {
  common: ['USD','EUR','JPY','GBP','HKD','KRW','AUD','SGD'],
  asia:   ['JPY','HKD','KRW','SGD','THB','TWD','MYR','INR'],
  west:   ['USD','EUR','GBP','CHF','CAD','AUD'],
  all:    ['USD','EUR','JPY','GBP','HKD','KRW','AUD','CAD','SGD','THB','TWD','MYR','INR','CHF']
};
const CROSS_ROWS = ['CNY','USD','EUR','JPY','GBP'];
const CROSS_COLS = ['USD','EUR','JPY','GBP'];

let rates = null, currentCat = 'common';
let history = JSON.parse(localStorage.getItem('devkit-currency-hist') || '[]');

/* Init selects */
function initSelects() {
  const opts = ALL.map(c => `<option value="${c}">${FLAGS[c]} ${c}</option>`).join('');
  document.getElementById('fromCurrency').innerHTML = opts;
  document.getElementById('toCurrency').innerHTML = opts;
  document.getElementById('fromCurrency').value = 'CNY';
  document.getElementById('toCurrency').value = 'USD';
}

/* Fetch rates */
async function fetchRates() {
  const CACHE_KEY = 'devkit-currency-rates';
  const CACHE_TTL = 24 * 60 * 60 * 1000;

  const cached = localStorage.getItem(CACHE_KEY);
  if (cached) {
    try {
      const d = JSON.parse(cached);
      if (Date.now() - d.timestamp < CACHE_TTL) {
        rates = d.rates;
        showStatus('ok', d.timestamp);
        convert(); updateMulti(); updateCross();
        return;
      }
    } catch(e) {}
  }

  try {
    const res = await fetch('https://open.er-api.com/v6/latest/CNY');
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    if (data.result !== 'success') throw new Error('API failed');
    rates = data.rates;
    const ts = Date.now();
    localStorage.setItem(CACHE_KEY, JSON.stringify({ rates, timestamp: ts }));
    showStatus('ok', ts);
  } catch(e) {
    if (cached) {
      try { const d = JSON.parse(cached); rates = d.rates; showStatus('cache', d.timestamp); }
      catch(e2) { showStatus('err', null); return; }
    } else { showStatus('err', null); return; }
  }
  convert(); updateMulti(); updateCross();
}

function showStatus(type, ts) {
  const bar = document.getElementById('statusBar');
  const badge = document.getElementById('rateBadge');
  const time = ts ? new Date(ts).toLocaleString('zh-CN') : '—';
  const map = {
    ok:    ['status-ok', '汇率已更新', '● 实时', 'rate-live'],
    cache: ['status-cache', '使用缓存汇率', '● 缓存', 'rate-cached'],
    err:   ['status-err', 'API 请求失败', '● 离线', 'rate-cached'],
  };
  const [cls, label, badgeText, badgeCls] = map[type];
  bar.className = 'status-bar ' + cls;
  bar.innerHTML = `<span><span class="status-dot"></span>${label}</span><span>${time}</span>`;
  badge.textContent = badgeText;
  badge.className = 'rate-badge ' + badgeCls;
}

/* Convert */
function convert() {
  if (!rates) return;
  const amt = parseFloat(document.getElementById('fromAmount').value) || 0;
  const from = document.getElementById('fromCurrency').value;
  const to = document.getElementById('toCurrency').value;
  const rate = rates[to] / rates[from];
  const result = amt * rate;

  document.getElementById('resultAmount').textContent = result.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
  document.getElementById('rateText').textContent = `1 ${from} = ${rate.toFixed(4)} ${to}`;
  document.getElementById('fromFlag').textContent = FLAGS[from] || '';
  document.getElementById('toFlag').textContent = FLAGS[to] || '';
  document.getElementById('fromName').textContent = NAMES[from] || from;
  document.getElementById('toName').textContent = NAMES[to] || to;
  document.getElementById('statusInfo').textContent = `${amt} ${from} → ${result.toFixed(2)} ${to}`;

  // Save history
  if (amt > 0) {
    const now = new Date();
    const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    if (!history.length || history[0].from !== from || history[0].to !== to || history[0].amt !== amt) {
      history.unshift({ from, to, amt, result: result.toFixed(2), time });
      if (history.length > 10) history.pop();
      localStorage.setItem('devkit-currency-hist', JSON.stringify(history));
    }
    renderHistory();
  }
}

/* Multi currency */
function updateMulti() {
  if (!rates) return;
  const amt = parseFloat(document.getElementById('fromAmount').value) || 0;
  const from = document.getElementById('fromCurrency').value;
  const list = CATS[currentCat].filter(c => c !== from);
  document.getElementById('multiGrid').innerHTML = list.map(c => {
    const val = amt * rates[c] / rates[from];
    const unitRate = (rates[c] / rates[from]).toFixed(4);
    return `<div class="multi-item" data-curr="${c}">
      <span class="multi-flag">${FLAGS[c]}</span>
      <div class="multi-info">
        <div class="multi-code">${c} ${NAMES[c]}</div>
        <div class="multi-val">${val.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
        <div class="multi-rate">1 ${from} = ${unitRate}</div>
      </div>
    </div>`;
  }).join('');
}

/* Cross rates table */
function updateCross() {
  if (!rates) return;
  document.getElementById('crossTable').innerHTML = CROSS_ROWS.map(r =>
    `<tr><td>${FLAGS[r]} ${r}</td>${CROSS_COLS.map(c =>
      r === c ? '<td class="dash">—</td>' : `<td>${(rates[c] / rates[r]).toFixed(4)}</td>`
    ).join('')}</tr>`
  ).join('');
}

/* History */
function renderHistory() {
  if (!history.length) {
    document.getElementById('historyList').innerHTML = '<div class="history-empty">换算后自动记录</div>';
    return;
  }
  document.getElementById('historyList').innerHTML = history.slice(0, 8).map(h => `
    <div class="history-item">
      <span class="history-pair">${FLAGS[h.from] || ''}→${FLAGS[h.to] || ''}</span>
      <span class="history-val">${Number(h.amt).toLocaleString()} → ${Number(h.result).toLocaleString()}</span>
      <span class="history-time">${h.time}</span>
    </div>`).join('');
}

/* Events */
document.getElementById('fromAmount').addEventListener('input', () => { convert(); updateMulti(); });
document.getElementById('fromCurrency').addEventListener('change', () => { convert(); updateMulti(); updateCross(); });
document.getElementById('toCurrency').addEventListener('change', () => { convert(); updateMulti(); });

document.getElementById('swapBtn').addEventListener('click', () => {
  const f = document.getElementById('fromCurrency'), t = document.getElementById('toCurrency');
  [f.value, t.value] = [t.value, f.value];
  convert(); updateMulti();
});

/* Pair pills */
document.getElementById('pairRow').addEventListener('click', e => {
  const pill = e.target.closest('.pair-pill');
  if (!pill) return;
  document.getElementById('fromCurrency').value = pill.dataset.from;
  document.getElementById('toCurrency').value = pill.dataset.to;
  document.querySelectorAll('.pair-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  convert(); updateMulti(); updateCross();
});

/* Category tabs */
document.getElementById('catTabs').addEventListener('click', e => {
  const tab = e.target.closest('.cat-tab');
  if (!tab) return;
  currentCat = tab.dataset.cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === currentCat));
  updateMulti();
});

/* Click multi-currency card to switch target */
document.getElementById('multiGrid').addEventListener('click', e => {
  const item = e.target.closest('.multi-item');
  if (!item) return;
  document.getElementById('toCurrency').value = item.dataset.curr;
  convert(); updateMulti();
});

/* Cross table toggle */
document.getElementById('crossToggle').addEventListener('click', () => {
  const wrap = document.getElementById('crossWrap');
  const arrow = document.getElementById('crossArrow');
  const open = wrap.style.display === 'none';
  wrap.style.display = open ? 'block' : 'none';
  arrow.textContent = open ? '▼' : '▶';
});

/* Init */
initSelects();
renderHistory();
fetchRates();
</script>
