<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

const ANIMALS = ['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];
const ANIMAL_EMOJI = ['🐭','🐂','🐯','🐰','🐲','🐍','🐴','🐑','🐵','🐔','🐶','🐷'];
const STARS = [
  [1,20,'摩羯座','♑'],[2,19,'水瓶座','♒'],[3,21,'双鱼座','♓'],[4,20,'白羊座','♈'],
  [5,21,'金牛座','♉'],[6,22,'双子座','♊'],[7,23,'巨蟹座','♋'],[8,23,'狮子座','♌'],
  [9,23,'处女座','♍'],[10,24,'天秤座','♎'],[11,23,'天蝎座','♏'],[12,22,'射手座','♐'],
  [13,31,'摩羯座','♑']
];
const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];

let timer = null;

function getConstellation(month, day) {
  for (let i = 0; i < 12; i++) {
    if ((month === STARS[i][0] && day >= STARS[i][1]) || (month === STARS[i + 1][0] && day < STARS[i + 1][1])) {
      return STARS[i];
    }
  }
  return STARS[0];
}

function calculate() {
  const input = document.getElementById('birthDate').value;
  if (!input) return;

  const birth = new Date(input + 'T00:00:00');
  const now = new Date();

  // 未来日期检查（AC-06）
  if (birth > now) {
    document.getElementById('errorMsg').style.display = 'block';
    document.querySelector('.age-hero').style.display = 'none';
    if (timer) { clearInterval(timer); timer = null; }
    return;
  }
  document.getElementById('errorMsg').style.display = 'none';
  document.querySelector('.age-hero').style.display = '';

  // 精确年龄
  let years = now.getFullYear() - birth.getFullYear();
  let months = now.getMonth() - birth.getMonth();
  let days = now.getDate() - birth.getDate();
  if (days < 0) { months--; days += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
  if (months < 0) { years--; months += 12; }

  document.getElementById('ageYears').textContent = years;
  document.getElementById('ageMonths').textContent = months;
  document.getElementById('ageDays').textContent = days;

  // 生肖
  const zi = (birth.getFullYear() - 4) % 12;
  document.getElementById('zodiacAnimal').textContent = ANIMAL_EMOJI[zi];
  document.getElementById('zodiacAnimalName').textContent = ANIMALS[zi];

  // 星座
  const star = getConstellation(birth.getMonth() + 1, birth.getDate());
  document.getElementById('zodiacStar').textContent = star[3];
  document.getElementById('zodiacStarName').textContent = star[2];

  // 下次生日
  let nextBday = new Date(now.getFullYear(), birth.getMonth(), birth.getDate());
  // 闰年 2/29 处理（AC-05）
  if (birth.getMonth() === 1 && birth.getDate() === 29) {
    // 找下一个闰年的 2/29，或者今年如果是闰年且还没过
    let y = now.getFullYear();
    for (let i = 0; i < 8; i++) {
      const test = new Date(y + i, 1, 29);
      if (test.getMonth() === 1 && test > now) { nextBday = test; break; }
    }
  } else {
    if (nextBday <= now) nextBday = new Date(now.getFullYear() + 1, birth.getMonth(), birth.getDate());
  }

  const bdayDiff = Math.ceil((nextBday - now) / (1000 * 60 * 60 * 24));
  const bdayCard = document.getElementById('bdayCard');

  if (bdayDiff === 0 || (now.getMonth() === birth.getMonth() && now.getDate() === birth.getDate())) {
    // 今天生日（AC-07）
    document.getElementById('bdayDays').textContent = '🎂';
    document.getElementById('bdayLabel').textContent = '今天是你的生日！';
    document.getElementById('bdayLabel').classList.add('bday-today');
    document.getElementById('bdayDate').textContent = '';
  } else {
    document.getElementById('bdayDays').textContent = bdayDiff;
    document.getElementById('bdayLabel').textContent = '天后是你的生日';
    document.getElementById('bdayLabel').classList.remove('bday-today');
    document.getElementById('bdayDate').textContent = `${nextBday.getFullYear()}-${String(nextBday.getMonth() + 1).padStart(2, '0')}-${String(nextBday.getDate()).padStart(2, '0')}（${WEEKDAYS[nextBday.getDay()]}）`;
  }

  // 实时计数（AC-08: clearInterval 防泄漏）
  if (timer) clearInterval(timer);
  function updateLive() {
    const n = new Date();
    const diff = n - birth;
    const secs = Math.floor(diff / 1000);
    const mins = Math.floor(secs / 60);
    const hrs = Math.floor(mins / 60);
    const d = Math.floor(hrs / 24);
    const w = Math.floor(d / 7);
    document.getElementById('liveDays').textContent = d.toLocaleString();
    document.getElementById('liveWeeks').textContent = w.toLocaleString();
    document.getElementById('liveHours').textContent = hrs.toLocaleString();
    document.getElementById('liveMinutes').textContent = mins.toLocaleString();
    document.getElementById('liveSeconds').textContent = secs.toLocaleString();
  }
  updateLive();
  timer = setInterval(updateLive, 1000);

  document.getElementById('statusInfo').textContent = `${years} 岁 ${months} 月 ${days} 日 · ${ANIMALS[zi]} · ${star[2]}`;
}

document.getElementById('birthDate').addEventListener('change', calculate);

// 页面离开清理（AC-08）
document.addEventListener('visibilitychange', () => {
  if (document.hidden && timer) { clearInterval(timer); timer = null; }
  else if (!document.hidden) calculate();
});

calculate();
</script>
