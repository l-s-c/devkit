<script type="module">
import '../../shared/theme.js';

let type = 'linear', angle = 135, activeStop = 0;
let stops = [
  { color: '#6366F1', pos: 0 },
  { color: '#EC4899', pos: 50 },
  { color: '#F59E0B', pos: 100 }
];

const PRESETS = [
  [{ color: '#667eea', pos: 0 }, { color: '#764ba2', pos: 100 }],
  [{ color: '#f093fb', pos: 0 }, { color: '#f5576c', pos: 100 }],
  [{ color: '#4facfe', pos: 0 }, { color: '#00f2fe', pos: 100 }],
  [{ color: '#43e97b', pos: 0 }, { color: '#38f9d7', pos: 100 }],
  [{ color: '#fa709a', pos: 0 }, { color: '#fee140', pos: 100 }],
  [{ color: '#a18cd1', pos: 0 }, { color: '#fbc2eb', pos: 100 }],
  [{ color: '#ffecd2', pos: 0 }, { color: '#fcb69f', pos: 100 }],
  [{ color: '#ff9a9e', pos: 0 }, { color: '#fecfef', pos: 100 }],
  [{ color: '#667eea', pos: 0 }, { color: '#764ba2', pos: 50 }, { color: '#f093fb', pos: 100 }],
  [{ color: '#0F2027', pos: 0 }, { color: '#203A43', pos: 50 }, { color: '#2C5364', pos: 100 }],
];

/* ===== CSS 生成 ===== */
function getGradientCSS() {
  const sorted = [...stops].sort((a, b) => a.pos - b.pos);
  const stopsStr = sorted.map(s => `${s.color} ${s.pos}%`).join(', ');
  if (type === 'linear') return `linear-gradient(${angle}deg, ${stopsStr})`;
  if (type === 'radial') return `radial-gradient(circle, ${stopsStr})`;
  return `conic-gradient(from ${angle}deg, ${stopsStr})`;
}

/* ===== 渲染 ===== */
function render() {
  const css = getGradientCSS();
  document.getElementById('preview').style.background = css;

  // 渐变条始终用 linear 展示色标分布
  const sorted = [...stops].sort((a, b) => a.pos - b.pos);
  document.getElementById('gradientBar').style.background =
    `linear-gradient(90deg, ${sorted.map(s => `${s.color} ${s.pos}%`).join(', ')})`;

  document.getElementById('cssOutput').textContent = `background: ${css};`;
  document.getElementById('statusInfo').textContent = `${type} · ${stops.length} 色标 · ${angle}°`;
  renderHandles();
  renderStopList();
}

function renderHandles() {
  const container = document.getElementById('handles');
  container.innerHTML = '';
  stops.forEach((s, i) => {
    const h = document.createElement('div');
    h.className = 'stop-handle' + (i === activeStop ? ' active' : '');
    h.style.left = s.pos + '%';
    h.style.background = s.color;
    h.addEventListener('mousedown', e => startDrag(e, i));
    h.addEventListener('click', e => { e.stopPropagation(); activeStop = i; render(); });
    container.appendChild(h);
  });
}

function renderStopList() {
  const list = document.getElementById('stopList');
  list.innerHTML = '';
  stops.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'stop-item';

    const colorInput = document.createElement('input');
    colorInput.type = 'color';
    colorInput.className = 'stop-color';
    colorInput.value = s.color;
    colorInput.addEventListener('input', () => { stops[i].color = colorInput.value; render(); });

    const posInput = document.createElement('input');
    posInput.type = 'number';
    posInput.className = 'stop-pos';
    posInput.value = s.pos;
    posInput.min = 0;
    posInput.max = 100;
    posInput.addEventListener('input', () => { stops[i].pos = Math.max(0, Math.min(100, parseInt(posInput.value) || 0)); render(); });

    const pct = document.createElement('span');
    pct.style.cssText = 'font-size:10px;color:var(--text-caption)';
    pct.textContent = '%';

    item.appendChild(colorInput);
    item.appendChild(posInput);
    item.appendChild(pct);

    if (stops.length > 2) {
      const del = document.createElement('button');
      del.className = 'stop-del';
      del.textContent = '✕';
      del.addEventListener('click', () => {
        stops.splice(i, 1);
        if (activeStop >= stops.length) activeStop = 0;
        render();
      });
      item.appendChild(del);
    }

    list.appendChild(item);
  });
}

/* ===== 拖拽色标 ===== */
function startDrag(e, idx) {
  e.preventDefault();
  activeStop = idx;
  const bar = document.getElementById('gradientBar');
  const rect = bar.getBoundingClientRect();
  const move = ev => {
    const pos = Math.round((ev.clientX - rect.left) / rect.width * 100);
    stops[idx].pos = Math.max(0, Math.min(100, pos));
    render();
  };
  const up = () => {
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', up);
  };
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', up);
}

/* ===== 添加色标 ===== */
function addStop() {
  if (stops.length >= 10) return;
  const sorted = [...stops].sort((a, b) => a.pos - b.pos);
  const mid = Math.round((sorted[0].pos + sorted[1].pos) / 2);
  stops.push({ color: '#818CF8', pos: mid });
  activeStop = stops.length - 1;
  render();
}

function addStopAt(e) {
  if (stops.length >= 10) return;
  const bar = document.getElementById('gradientBar');
  const rect = bar.getBoundingClientRect();
  const pos = Math.round((e.clientX - rect.left) / rect.width * 100);
  stops.push({ color: '#818CF8', pos: Math.max(0, Math.min(100, pos)) });
  activeStop = stops.length - 1;
  render();
}

/* ===== 事件绑定 ===== */
document.getElementById('typeTabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  type = tab.dataset.type;
  document.querySelectorAll('#typeTabs .tab').forEach(t => t.classList.toggle('active', t.dataset.type === type));
  document.getElementById('angleRow').style.display = type === 'radial' ? 'none' : 'flex';
  render();
});

document.getElementById('angle').addEventListener('input', function() {
  angle = parseInt(this.value);
  document.getElementById('angleVal').textContent = angle + '°';
  render();
});

document.getElementById('gradientBar').addEventListener('click', addStopAt);
document.getElementById('addStopBtn').addEventListener('click', addStop);

document.getElementById('copyBtn').addEventListener('click', function() {
  navigator.clipboard.writeText(`background: ${getGradientCSS()};`).then(() => {
    this.textContent = '已复制 ✓';
    setTimeout(() => this.textContent = '📋 复制', 1500);
  });
});

/* ===== 初始化预设 ===== */
const pg = document.getElementById('presetGrid');
PRESETS.forEach(preset => {
  const d = document.createElement('div');
  d.className = 'preset-swatch';
  d.style.background = `linear-gradient(135deg, ${preset.map(s => `${s.color} ${s.pos}%`).join(', ')})`;
  d.addEventListener('click', () => {
    stops = preset.map(s => ({ ...s }));
    activeStop = 0;
    render();
  });
  pg.appendChild(d);
});

render();
</script>
