      <div>
        <div class="pane-title" id="leftTitle">📝 简体中文 <span class="badge">输入</span></div>
        <textarea id="inputText" placeholder="输入文字...">中华人民共和国万岁，世界人民大团结万岁。科学技术是第一生产力。</textarea>
        <div class="stats"><span id="charCount">0</span> 字</div>

      <div>
        <div class="pane-title" id="rightTitle">📄 繁體中文 <span class="badge">輸出</span></div>
        <textarea id="outputText" readonly placeholder="转换结果..."></textarea>
        <div class="action-row">
          <button class="btn btn-primary" id="copyBtn">📋 复制</button>

<script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.min.js" integrity="sha384-DnXH/hsXaoW1DNaNY4N0kiwNuX9BsiaMeyB2AB+OyTTIfYnwVv+1/ciFfLaZmUrx" crossorigin="anonymous"></script>
<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';
let s2t,t2s,mode='s2t';
const loading=document.getElementById('loading');

try{
  loading.style.display='block';
  s2t=OpenCC.Converter({from:'cn',to:'twp'});
  t2s=OpenCC.Converter({from:'twp',to:'cn'});
  loading.style.display='none';
}catch(e){
  loading.textContent='❌ OpenCC 加载失败';
}

function convert(){
  const input=document.getElementById('inputText').value;
  document.getElementById('charCount').textContent=input.length;
  if(!input.trim()){document.getElementById('outputText').value='';return}
  try{
    document.getElementById('outputText').value=mode==='s2t'?s2t(input):t2s(input);
  }catch(e){document.getElementById('outputText').value='转换出错'}
}

document.getElementById('inputText').addEventListener('input',convert);
document.getElementById('swapBtn').addEventListener('click',()=>{
  mode=mode==='s2t'?'t2s':'s2t';
  document.getElementById('leftTitle').innerHTML=mode==='s2t'?'📝 简体中文 <span class="badge">输入</span>':'📝 繁體中文 <span class="badge">輸入</span>';
  document.getElementById('rightTitle').innerHTML=mode==='s2t'?'📄 繁體中文 <span class="badge">輸出</span>':'📄 简体中文 <span class="badge">输出</span>';
  const tmp=document.getElementById('inputText').value;
  document.getElementById('inputText').value=document.getElementById('outputText').value;
  document.getElementById('outputText').value=tmp;
});
document.getElementById('copyBtn').addEventListener('click',()=>navigator.clipboard.writeText(document.getElementById('outputText').value));
document.getElementById('clearBtn').addEventListener('click',()=>{document.getElementById('inputText').value='';document.getElementById('outputText').value='';document.getElementById('charCount').textContent='0'});
convert();
</script>
