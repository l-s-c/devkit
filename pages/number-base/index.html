    <div class="output-card" data-type="dec">

    <div class="output-card" data-type="hex">
      <div class="output-left">
        <div class="output-badge hex">HEX</div>
        <div class="output-info">

          <div class="output-value" id="hexOutput"></div>

      </div>

  <!-- 位信息栏 -->

<div class="statusbar">
  <span id="statusInfo">输入任意进制数字，实时转换</span>
  <div class="statusbar-spacer"></div>
  <span>BigInt 大数支持</span>
</div>

<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

/* ===== 文案常量（预留 i18n） ===== */
const LABELS = {
  invalidChars: {
    2:  '请输入有效的二进制数字 (0 和 1)',
    8:  '请输入有效的八进制数字 (0-7)',
    10: '请输入有效的十进制数字 (0-9)',
    16: '请输入有效的十六进制数字 (0-9, A-F)',
  },
  ready: '输入任意进制数字，实时转换',
  bits: (n) => n + ' bits',
  bytes: (n) => n + (n === 1 ? ' byte' : ' bytes'),
  dash: '—',
};

/* ===== 验证规则 ===== */
const VALIDATORS = {
  2:  /^-?[01]+$/,
  8:  /^-?[0-7]+$/,
  10: /^-?[0-9]+$/,
  16: /^-?[0-9a-fA-F]+$/,
};

/* ===== 进制转换核心（BigInt 大数支持） ===== */
function parseToBigInt(value, radix) {
  const cleaned = value.replace(/[\s_]/g, '');
  if (!cleaned) return null;

  const isNeg = cleaned.startsWith('-');
  const abs = isNeg ? cleaned.slice(1) : cleaned;
  if (!abs) return null;

  const testVal = isNeg ? '-' + abs : abs;
  if (!VALIDATORS[radix].test(testVal)) return null;

  try {
    let n;
    if (radix === 10) n = BigInt(abs);
    else if (radix === 16) n = BigInt('0x' + abs);
    else if (radix === 8) n = BigInt('0o' + abs);
    else if (radix === 2) n = BigInt('0b' + abs);
    return isNeg ? -n : n;
  } catch {
    return null;
  }
}

function toBase(n, base) {
  if (n === 0n) return '0';
  const isNeg = n < 0n;
  const abs = isNeg ? -n : n;
  const str = abs.toString(base).toUpperCase();
  return isNeg ? '-' + str : str;
}

function formatBinary(binStr) {
  // 4 位一组，从右往左分组
  const isNeg = binStr.startsWith('-');
  const abs = isNeg ? binStr.slice(1) : binStr;
  const groups = [];
  for (let i = abs.length; i > 0; i -= 4) {
    groups.unshift(abs.slice(Math.max(0, i - 4), i));
  }
  return (isNeg ? '-' : '') + groups.join(' ');
}

/* ===== 输出结果 ===== */
const outputIds = { bin: 'binOutput', oct: 'octOutput', dec: 'decOutput', hex: 'hexOutput' };
// 存储未格式化的值用于复制
const rawValues = { bin: '', oct: '', dec: '', hex: '' };

function clearOutputs() {
  Object.values(outputIds).forEach(id => { document.getElementById(id).textContent = LABELS.dash; });
  document.getElementById('bitCount').textContent = LABELS.dash;
  document.getElementById('byteCount').textContent = LABELS.dash;
  document.getElementById('signedRange').textContent = LABELS.dash;
  rawValues.bin = rawValues.oct = rawValues.dec = rawValues.hex = '';
}

function convert() {
  const input = document.getElementById('numberInput');
  const radix = parseInt(document.getElementById('inputRadix').value);
  const errEl = document.getElementById('errorMsg');
  const raw = input.value.trim();

  // 清除错误
  errEl.classList.remove('show');
  input.classList.remove('error');

  if (!raw) {
    clearOutputs();
    document.getElementById('statusInfo').textContent = LABELS.ready;
    return;
  }

  const n = parseToBigInt(raw, radix);
  if (n === null) {
    errEl.textContent = LABELS.invalidChars[radix];
    errEl.classList.add('show');
    input.classList.add('error');
    clearOutputs();
    return;
  }

  // 转换并显示
  const bin = toBase(n, 2);
  const oct = toBase(n, 8);
  const dec = toBase(n, 10);
  const hex = toBase(n, 16);

  rawValues.bin = bin;
  rawValues.oct = oct;
  rawValues.dec = dec;
  rawValues.hex = hex;

  document.getElementById('binOutput').textContent = formatBinary(bin);
  document.getElementById('octOutput').textContent = oct;
  document.getElementById('decOutput').textContent = dec;
  document.getElementById('hexOutput').textContent = hex;

  // 位信息
  const absN = n < 0n ? -n : n;
  const absBin = toBase(absN, 2);
  const bits = absBin.length;
  const byteCount = Math.ceil(bits / 8);
  document.getElementById('bitCount').textContent = LABELS.bits(bits);
  document.getElementById('byteCount').textContent = LABELS.bytes(byteCount);

  // 有符号范围（基于字节数）
  if (byteCount <= 8) {
    const signedMin = -(2n ** (BigInt(byteCount * 8 - 1)));
    const signedMax = 2n ** (BigInt(byteCount * 8 - 1)) - 1n;
    document.getElementById('signedRange').textContent = signedMin.toString() + ' ~ ' + signedMax.toString();
  } else {
    document.getElementById('signedRange').textContent = '超出常规范围';
  }

  document.getElementById('statusInfo').textContent = 'DEC ' + dec;
}

/* ===== 事件绑定 ===== */
document.getElementById('numberInput').addEventListener('input', convert);
document.getElementById('inputRadix').addEventListener('change', convert);

// 复制按钮
document.querySelectorAll('.output-copy').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const type = btn.dataset.type;
    const text = rawValues[type];
    if (!text) return;
    navigator.clipboard.writeText(text);
    btn.textContent = '✅';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = '📋'; btn.classList.remove('ok'); }, 1200);
  });
});

// 卡片点击也复制
document.querySelectorAll('.output-card').forEach(card => {
  card.addEventListener('click', () => {
    const type = card.dataset.type;
    const text = rawValues[type];
    if (text) navigator.clipboard.writeText(text);
  });
});

// 快捷值按钮
document.querySelectorAll('.quick-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('inputRadix').value = '10';
    document.getElementById('numberInput').value = btn.dataset.value;
    convert();
  });
});

// 初始化
convert();
</script>
