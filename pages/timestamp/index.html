<script>
// 实时时钟
function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=n.toTimeString().slice(0,8);
  document.getElementById('unix').textContent=Math.floor(n.getTime()/1000);
  const days=['日','一','二','三','四','五','六'];
  document.getElementById('date').textContent=`${n.getFullYear()} 年 ${n.getMonth()+1} 月 ${n.getDate()} 日 · 星期${days[n.getDay()]}`;
}
setInterval(updateClock,1000);updateClock();

// 填入当前时间
const now=new Date();
document.getElementById('tsInput').value=Math.floor(now.getTime()/1000);
const pad2=n=>String(n).padStart(2,'0');
document.getElementById('dtInput').value=`${now.getFullYear()}-${pad2(now.getMonth()+1)}-${pad2(now.getDate())} ${pad2(now.getHours())}:${pad2(now.getMinutes())}:${pad2(now.getSeconds())}`;

// 复制结果卡片
function copyResult(el){
  const v=el.querySelector('.result-value').textContent;
  if(v==='—')return;
  if(window.copyText){copyText(v,'✓ 已复制');return;}
  navigator.clipboard.writeText(v);
  el.style.background='rgba(99,102,241,0.1)';
  setTimeout(()=>el.style.background='',600);
}
window.copyResult=copyResult;

// 相对时间
function relativeTime(ms){
  const diff=Date.now()-ms;
  const abs=Math.abs(diff);
  const suffix=diff>0?'前':'后';
  if(abs<60000)return'刚刚';
  if(abs<3600000)return Math.round(abs/60000)+' 分钟'+suffix;
  if(abs<86400000)return Math.round(abs/3600000)+' 小时'+suffix;
  return Math.round(abs/86400000)+' 天'+suffix;
}

// 时间戳 → 可读时间
function showBadge(id,ok,msg){
  const b=document.getElementById(id);
  if(ok){b.style.display='';b.textContent='✓ 已转换';b.style.color='var(--success)';b.style.background='rgba(48,209,88,0.1)';}
  else if(msg){b.style.display='';b.textContent=msg;b.style.color='#FF453A';b.style.background='rgba(255,69,58,0.1)';}
  else{b.style.display='none';}
}
function convertTs(){
  const v=document.getElementById('tsInput').value.trim();
  if(!v){showBadge('badge1');return;}
  if(isNaN(v)){showBadge('badge1',false,'⚠ 请输入数字');return;}
  let ms=Number(v);
  if(document.getElementById('tsUnit').value==='s')ms*=1000;
  const d=new Date(ms);
  if(isNaN(d.getTime())){showBadge('badge1',false,'⚠ 无效时间戳');return;}
  const items=document.querySelectorAll('#tsResult .result-value');
  items[0].textContent=d.toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  items[1].textContent=d.toISOString();
  items[2].textContent=d.toUTCString();
  items[3].textContent=relativeTime(ms);
  showBadge('badge1',true);
}
document.getElementById('tsInput').addEventListener('input',convertTs);
document.getElementById('tsUnit').addEventListener('change',convertTs);

// 可读时间 → 时间戳（单输入框，支持粘贴）
document.getElementById('dtInput').addEventListener('input',convertDt);
function convertDt(){
  const v=document.getElementById('dtInput').value.trim();
  if(!v){showBadge('badge2');return;}
  const normalized=v.replace(/\//g,'-');
  const date=new Date(normalized);
  if(isNaN(date.getTime())){showBadge('badge2',false,'⚠ 无法识别的时间格式');return;}
  const items=document.querySelectorAll('#dtResult .result-value');
  items[0].textContent=Math.floor(date.getTime()/1000);
  items[1].textContent=date.getTime();
  showBadge('badge2',true);
}

convertTs();convertDt();
</script>
