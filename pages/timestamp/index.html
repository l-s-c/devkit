<style>
body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
.main { flex: 1; overflow-y: auto; position: relative; z-index: 1; padding: 32px; display: flex; flex-direction: column; align-items: center; gap: 24px; }
.clock-card { text-align: center; padding: 40px 60px; }
.clock-time { font-size: 64px; font-weight: 700; letter-spacing: -2px; font-family: var(--font-code); color: var(--text-primary); }
.clock-date { font-size: 15px; color: var(--text-secondary); margin-top: 8px; }
.clock-unix { font-size: 13px; color: var(--text-tertiary); margin-top: 4px; font-family: var(--font-code); }
.clock-copy { margin-top: 12px; }
.convert-card { width: 100%; max-width: 640px; }
.convert-title { font-size: 13px; font-weight: 600; color: var(--text-tertiary); margin-bottom: 12px; }
.convert-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
.convert-result { background: var(--bg-glass-input); border: 0.5px solid var(--border-input); border-radius: 8px; padding: 12px 14px; font-family: var(--font-code); font-size: 13px; line-height: 1.7; color: var(--text-primary); }
</style>

<body>
<h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">时间戳转换 — DevKit 在线开发者工具箱</h1>

<div class="mesh-bg"><div class="mesh-blob"></div><div class="mesh-blob"></div><div class="mesh-blob"></div></div>

<div class="topbar">
  <a class="topbar-logo" href="/"><div class="topbar-logo-icon">{ }</div><span class="topbar-logo-text">DevKit</span></a>
  <span class="topbar-tool-name">时间戳转换</span>
  <div class="topbar-spacer"></div>
  <a class="topbar-btn" href="/">← 返回首页</a>
  <button class="theme-btn" onclick="toggleTheme()">🌙</button>
</div>

<div class="main">
  <div class="glass-card clock-card">
    <div class="clock-time" id="clockTime">--:--:--</div>
    <div class="clock-date" id="clockDate"></div>
    <div class="clock-unix" id="clockUnix"></div>
    <button class="btn-tool clock-copy" id="btnCopyTs">📋 复制时间戳</button>
  </div>

  <div class="glass-card convert-card">
    <div class="convert-title">时间戳 → 可读时间</div>
    <div class="convert-row">
      <input type="text" class="glass-input" id="tsInput" placeholder="输入 Unix 时间戳" style="flex:1">
      <select class="glass-select" id="tsUnit"><option value="s">秒</option><option value="ms">毫秒</option></select>
      <span style="font-size:12px;color:var(--text-caption)">实时转换 →</span>
    </div>
    <div class="convert-result" id="tsResult" style="display:none"></div>
  </div>

  <div class="glass-card convert-card">
    <div class="convert-title">可读时间 → 时间戳</div>
    <div class="convert-row">
      <input type="datetime-local" class="glass-input" id="dtInput" step="1" style="flex:1">
      <span style="font-size:12px;color:var(--text-caption)">← 实时转换</span>
    </div>
    <div class="convert-result" id="dtResult" style="display:none"></div>
  </div>
</div>

<div class="statusbar">
  <span>UTC+8 · 北京时间</span>
  <div class="statusbar-spacer"></div>
  <a href="/uuid">UUID 生成</a>
  <a href="/hash">Hash 计算</a>
  <a href="/base64">Base64</a>
</div>

<script type="module">
import '../../shared/theme.js';

const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

function updateClock() {
  const now = new Date();
  document.getElementById('clockTime').textContent = now.toLocaleTimeString('zh-CN', {hour12:false});
  document.getElementById('clockDate').textContent = `${now.getFullYear()} 年 ${now.getMonth()+1} 月 ${now.getDate()} 日 · ${weekdays[now.getDay()]}`;
  document.getElementById('clockUnix').textContent = `Unix: ${Math.floor(now.getTime()/1000)} · UTC+8`;
}
updateClock();
setInterval(updateClock, 1000);

// Init datetime-local
const d = new Date();
document.getElementById('dtInput').value = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'T'+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
document.getElementById('tsInput').value = Math.floor(d.getTime()/1000);

document.getElementById('btnCopyTs').addEventListener('click', () => {
  navigator.clipboard.writeText(String(Math.floor(Date.now()/1000)));
});

function tsToDate() {
  const val = parseInt(document.getElementById('tsInput').value);
  if (isNaN(val)) return;
  const ms = document.getElementById('tsUnit').value === 's' ? val*1000 : val;
  const date = new Date(ms);
  const el = document.getElementById('tsResult');
  el.style.display = '';
  el.innerHTML = `${date.toLocaleString('zh-CN')}<br>ISO 8601: ${date.toISOString()}<br>RFC 2822: ${date.toUTCString()}<br>秒: ${Math.floor(ms/1000)}<br>毫秒: ${ms}`;
}

function dateToTs() {
  const val = document.getElementById('dtInput').value;
  if (!val) return;
  const date = new Date(val);
  const el = document.getElementById('dtResult');
  el.style.display = '';
  el.innerHTML = `<span style="font-size:18px;font-weight:600">${Math.floor(date.getTime()/1000)}</span> <span style="color:var(--text-caption)">秒</span>&nbsp;&nbsp;&nbsp;<span style="font-size:18px;font-weight:600">${date.getTime()}</span> <span style="color:var(--text-caption)">毫秒</span>`;
}

document.getElementById('btnToDate').addEventListener('click', tsToDate);
document.getElementById('btnToTs').addEventListener('click', dateToTs);
document.getElementById('tsInput').addEventListener('input', tsToDate);
document.getElementById('tsUnit').addEventListener('change', tsToDate);
document.getElementById('dtInput').addEventListener('input', dateToTs);

// Auto-convert on load
tsToDate();
</script>
  <noscript><p>时间戳转换 — DevKit 在线开发者工具箱。请启用 JavaScript 以使用本工具。</p></noscript>
</body>
</html>
