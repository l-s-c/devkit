},{b:'shoot',p:'shot',pp:'shot',cn:'射击',t:'ABB'},{b:'get',p:'got',pp:'got',cn:'得到',t:'ABB'},{b:'find',p:'found',pp:'found',cn:'找到',t:'ABB'},{b:'hear',p:'heard',pp:'heard',cn:'听到',t:'ABB'},{b:'shine',p:'shone',pp:'shone',cn:'发光',t:'ABB'},{b:'light',p:'lit',pp:'lit',cn:'点亮',t:'ABB'},
// ABC
{b:'go',p:'went',pp:'gone',cn:'去',t:'ABC'},{b:'do',p:'did',pp:'done',cn:'做',t:'ABC'},{b:'see',p:'saw',pp:'seen',cn:'看见',t:'ABC'},{b:'take',p:'took',pp:'taken',cn:'拿/带',t:'ABC'},{b:'give',p:'gave',pp:'given',cn:'给',t:'ABC'},{b:'know',p:'knew',pp:'known',cn:'知道',t:'ABC'},{b:'grow',p:'grew',pp:'grown',cn:'生长',t:'ABC'},{b:'show',p:'showed',pp:'shown',cn:'展示',t:'ABC'},{b:'blow',p:'blew',pp:'blown',cn:'吹',t:'ABC'},{b:'throw',p:'threw',pp:'thrown',cn:'扔',t:'ABC'},{b:'draw',p:'drew',pp:'drawn',cn:'画/拉',t:'ABC'},{b:'fly',p:'flew',pp:'flown',cn:'飞',t:'ABC'},{b:'write',p:'wrote',pp:'written',cn:'写',t:'ABC'},{b:'ride',p:'rode',pp:'ridden',cn:'骑',t:'ABC'},{b:'drive',p:'drove',pp:'driven',cn:'驾驶',t:'ABC'},{b:'rise',p:'rose',pp:'risen',cn:'升起',t:'ABC'},{b:'speak',p:'spoke',pp:'spoken',cn:'说/讲',t:'ABC'},{b:'break',p:'broke',pp:'broken',cn:'打破',t:'ABC'},{b:'choose',p:'chose',pp:'chosen',cn:'选择',t:'ABC'},{b:'freeze',p:'froze',pp:'frozen',cn:'冷冻',t:'ABC'},{b:'steal',p:'stole',pp:'stolen',cn:'偷',t:'ABC'},{b:'wake',p:'woke',pp:'woken',cn:'醒来',t:'ABC'},{b:'wear',p:'wore',pp:'worn',cn:'穿',t:'ABC'},{b:'tear',p:'tore',pp:'torn',cn:'撕',t:'ABC'},{b:'bear',p:'bore',pp:'born',cn:'忍受/生育',t:'ABC'},{b:'swear',p:'swore',pp:'sworn',cn:'发誓',t:'ABC'},{b:'begin',p:'began',pp:'begun',cn:'开始',t:'ABC'},{b:'drink',p:'drank',pp:'drunk',cn:'喝',t:'ABC'},{b:'swim',p:'swam',pp:'swum',cn:'游泳',t:'ABC'},{b:'ring',p:'rang',pp:'rung',cn:'响/打电话',t:'ABC'},{b:'sing',p:'sang',pp:'sung',cn:'唱',t:'ABC'},{b:'sink',p:'sank',pp:'sunk',cn:'下沉',t:'ABC'},{b:'eat',p:'ate',pp:'eaten',cn:'吃',t:'ABC'},{b:'fall',p:'fell',pp:'fallen',cn:'落下',t:'ABC'},{b:'forget',p:'forgot',pp:'forgotten',cn:'忘记',t:'ABC'},{b:'hide',p:'hid',pp:'hidden',cn:'藏',t:'ABC'},{b:'bite',p:'bit',pp:'bitten',cn:'咬',t:'ABC'},{b:'lie',p:'lay',pp:'lain',cn:'躺/位于',t:'ABC'},{b:'shake',p:'shook',pp:'shaken',cn:'摇/震动',t:'ABC'},{b:'mistake',p:'mistook',pp:'mistaken',cn:'弄错',t:'ABC'},
// ABA
{b:'come',p:'came',pp:'come',cn:'来',t:'ABA'},{b:'become',p:'became',pp:'become',cn:'变成',t:'ABA'},{b:'run',p:'ran',pp:'run',cn:'跑',t:'ABA'},{b:'overcome',p:'overcame',pp:'overcome',cn:'克服',t:'ABA'}
];

let currentFilter='all';
const body=document.getElementById('verbBody');
const searchInput=document.getElementById('searchInput');
const tableSection=document.getElementById('tableSection');
const practiceSection=document.getElementById('practiceSection');
const countInfo=document.getElementById('countInfo');

function speak(word){
  const u=new SpeechSynthesisUtterance(word);
  u.lang='en-US';u.rate=0.85;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}

function render(filter,query=''){
  const q=query.toLowerCase().trim();
  let list=VERBS;
  if(filter!=='all')list=list.filter(v=>v.t===filter);
  if(q)list=list.filter(v=>v.b.includes(q)||v.p.includes(q)||v.pp.includes(q)||v.cn.includes(q));
  body.innerHTML=list.map(v=>`<tr>
    <td onclick="speak('${v.b}')">${v.b} <button class="speak-btn">♪</button></td>
    <td onclick="speak('${v.p}')">${v.p}</td>
    <td onclick="speak('${v.pp}')">${v.pp}</td>
    <td><span class="verb-cn">${v.cn}</span><span class="pattern-badge pat-${v.t}">${v.t}</span></td>
  </tr>`).join('');
  countInfo.textContent=`共 ${list.length} 个`;
}

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const f=tab.dataset.filter;
    if(f==='practice'){
      tableSection.classList.add('hidden');practiceSection.classList.remove('hidden');
      nextQuestion();
    }else{
      currentFilter=f;
      tableSection.classList.remove('hidden');practiceSection.classList.add('hidden');
      render(f,searchInput.value);
    }
  });
});

searchInput.addEventListener('input',()=>render(currentFilter,searchInput.value));

// Practice
let currentVerb=null,score=0,total=0;
const practiceWord=document.getElementById('practiceWord');
const practiceCn=document.getElementById('practiceCn');
const pastInput=document.getElementById('pastInput');
const ppInput=document.getElementById('ppInput');
const resultMsg=document.getElementById('resultMsg');
const scoreDisplay=document.getElementById('scoreDisplay');

function nextQuestion(){
  currentVerb=VERBS[Math.floor(Math.random()*VERBS.length)];
  practiceWord.textContent=currentVerb.b;
  practiceCn.textContent=currentVerb.cn;
  pastInput.value='';ppInput.value='';
  pastInput.className='practice-input';ppInput.className='practice-input';
  resultMsg.textContent='';pastInput.focus();
}

document.getElementById('checkBtn').addEventListener('click',()=>{
  if(!currentVerb)return;
  const pOk=pastInput.value.trim().toLowerCase()===currentVerb.p.toLowerCase();
  const ppOk=ppInput.value.trim().toLowerCase()===currentVerb.pp.toLowerCase();
  pastInput.className='practice-input '+(pOk?'correct':'wrong');
  ppInput.className='practice-input '+(ppOk?'correct':'wrong');
  total++;
  if(pOk&&ppOk){score++;resultMsg.innerHTML='<span style="color:#10B981">✓ 正确！</span>';}
  else resultMsg.innerHTML=`<span style="color:#EF4444">✗ 答案：${currentVerb.p} / ${currentVerb.pp}</span>`;
  scoreDisplay.textContent=`${score}/${total}`;
});

document.getElementById('nextBtn').addEventListener('click',nextQuestion);
document.getElementById('practiceSpeak').addEventListener('click',()=>{if(currentVerb)speak(currentVerb.b)});
pastInput.addEventListener('keydown',e=>{if(e.key==='Enter')ppInput.focus()});
ppInput.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('checkBtn').click()});

render('all');
</script>
