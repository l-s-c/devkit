import '../../shared/theme.js';
import '../../shared/sidebar.js';
const SM=[['b','玻 bō'],['p','坡 pō'],['m','摸 mō'],['f','佛 fó'],['d','得 dé'],['t','特 tè'],['n','讷 nè'],['l','勒 lè'],['g','哥 gē'],['k','科 kē'],['h','喝 hē'],['j','鸡 jī'],['q','七 qī'],['x','西 xī'],['zh','知 zhī'],['ch','吃 chī'],['sh','狮 shī'],['r','日 rì'],['z','字 zì'],['c','刺 cì'],['s','丝 sī'],['y','衣 yī'],['w','乌 wū']];
const YM=[['a','啊 ā'],['o','喔 ō'],['e','鹅 é'],['i','衣 yī'],['u','乌 wū'],['ü','迂 yū'],['ai','爱 ài'],['ei','诶 éi'],['ui','归 guī'],['ao','凹 āo'],['ou','欧 ōu'],['iu','优 yōu'],['an','安 ān'],['en','恩 ēn'],['in','因 yīn'],['un','温 wēn'],['ün','晕 yūn'],['ang','昂 áng'],['eng','鹰 yīng'],['ing','英 yīng'],['ong','翁 wēng'],['er','耳 ěr'],['ie','耶 yē'],['üe','约 yuē']];
const ZT=[['zhi','知 zhī'],['chi','吃 chī'],['shi','狮 shī'],['ri','日 rì'],['zi','字 zì'],['ci','刺 cì'],['si','丝 sī'],['yi','一 yī'],['wu','五 wǔ'],['yu','鱼 yú'],['ye','夜 yè'],['yue','月 yuè'],['yuan','圆 yuán'],['yin','因 yīn'],['yun','云 yún'],['ying','鹰 yīng']];
function renderGrid(data,cls,elId){
  document.getElementById(elId).innerHTML=data.map(([letter,ex])=>`<div class="py-card ${cls}" data-py="${ex.split(' ')[1]||letter}"><div class="py-letter">${letter}</div><div class="py-example">${ex}</div></div>`).join('');
}
renderGrid(SM,'sm','smGrid');renderGrid(YM,'ym','ymGrid');renderGrid(ZT,'zt','ztGrid');
// Click to speak using speechSynthesis (best effort for Chinese pinyin)
document.querySelectorAll('.py-card').forEach(card=>card.addEventListener('click',function(){
  if(!('speechSynthesis' in window))return;
  speechSynthesis.cancel();
  const py=this.querySelector('.py-example').textContent.split(' ')[0];// get the Chinese char
  const u=new SpeechSynthesisUtterance(py);u.lang='zh-CN';u.rate=0.6;speechSynthesis.speak(u);
}));
</script>
