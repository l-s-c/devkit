}

/* 常用日期 */

}

}

.quick-days { font-family: var(--font-code); font-size: 13px; font-weight: 700; color: var(--brand-500); flex-shrink: 0; }

/* 日期差值 */

  margin-top: 16px; padding: 24px; border-radius: 16px;
  background: var(--bg-glass); backdrop-filter: blur(20px);

.diff-result {
  margin-top: 16px; padding: 16px; border-radius: 10px;
  background: rgba(99,102,241,0.08); text-align: center;
}
.diff-number { font-family: var(--font-code); font-size: 32px; font-weight: 900; color: var(--brand-500); }
.diff-unit { font-size: 16px; font-weight: 700; color: var(--text-secondary); }
.diff-detail { font-size: 12px; color: var(--text-secondary); margin-top: 4px; font-family: var(--font-code); }

  .detail-grid { grid-template-columns: repeat(2, 1fr); }
  .input-row { flex-direction: column; }

<body>
<h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">倒数日计算器 — DevKit 在线开发者工具箱</h1>

</div>

<div class="main">
  <!-- Hero 卡片 -->
  <div class="hero-card" id="heroCard">
    <div class="hero-number" id="heroDays">0</div>
    <div class="hero-unit" id="heroUnit">天</div>
    <div class="hero-event" id="heroEvent"></div>
    <div class="hero-date" id="heroDate"></div>

    <div class="detail-grid">
      <div class="detail-item">
        <div class="detail-number" id="detailMonths">0</div>
        <div class="detail-label">月</div>
      </div>
      <div class="detail-item">
        <div class="detail-number" id="detailWeeks">0</div>
        <div class="detail-label">周</div>
      </div>
      <div class="detail-item">
        <div class="detail-number" id="detailHours">0</div>
        <div class="detail-label">小时</div>
      </div>
      <div class="detail-item">
        <div class="detail-number" id="detailMins">0</div>
        <div class="detail-label">分钟</div>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-label">
        <span>今年已过</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- 输入区 -->
  <div class="input-section">
    <div class="section-label">设置目标日期</div>
    <div class="input-row">
      <div class="input-group">
        <div class="input-name">目标日期</div>
        <input type="date" class="date-input" id="targetDate">
      </div>
      <button class="btn-calc" id="btnCalc">计算</button>
    </div>
    <input type="text" class="event-input" id="eventName" placeholder="事件名称（可选）：如 国庆节">
  </div>

  <!-- 常用日期 -->
  <div class="quick-section">
    <div class="section-label">常用日期</div>
    <div class="quick-grid" id="quickGrid"></div>
  </div>

  <!-- 日期差值 -->
  <div class="diff-section">
    <div class="section-label">日期差值计算</div>
    <div class="input-row">
      <div class="input-group">
        <div class="input-name">起始日期</div>
        <input type="date" class="date-input" id="diffStart">
      </div>
      <div class="input-group">
        <div class="input-name">结束日期</div>
        <input type="date" class="date-input" id="diffEnd">
      </div>
    </div>
    <div class="diff-result" id="diffResult">
      <div class="diff-number" id="diffDays">0</div>
      <div class="diff-unit">天</div>
      <div class="diff-detail" id="diffDetail"></div>
    </div>
  </div>
</div>

<div class="statusbar">
  <span id="statusInfo">选择日期开始计算</span>
  <div class="statusbar-spacer"></div>
  <span>纯本地计算</span>
</div>

<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

const WEEKDAYS = ['日', '一', '二', '三', '四', '五', '六'];

/* ===== 获取下一个节日日期 ===== */
function getNextDate(month, day) {
  const now = new Date();
  const thisYear = new Date(now.getFullYear(), month - 1, day);
  if (thisYear > now) return thisYear;
  return new Date(now.getFullYear() + 1, month - 1, day);
}

function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

function daysFromNow(d) {
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  const target = new Date(d);
  target.setHours(0, 0, 0, 0);
  return Math.ceil((target - now) / (1000 * 60 * 60 * 24));
}

function formatNum(n) {
  if (n >= 100000) return (n / 1000).toFixed(0) + 'K';
  return n.toLocaleString();
}

/* ===== 常用日期（动态计算下一个） ===== */
const QUICK_DATES = [
  { emoji: '🎈', name: '儿童节', month: 6, day: 1 },
  { emoji: '🇨🇳', name: '国庆节', month: 10, day: 1 },
  { emoji: '🎆', name: '元旦', month: 1, day: 1 },
  { emoji: '🎄', name: '圣诞节', month: 12, day: 25 },
  { emoji: '🛒', name: '618 购物节', month: 6, day: 18 },
  { emoji: '🛍️', name: '双十一', month: 11, day: 11 },
];

function renderQuickDates() {
  const grid = document.getElementById('quickGrid');
  grid.innerHTML = QUICK_DATES.map((q, i) => {
    const d = getNextDate(q.month, q.day);
    const days = daysFromNow(d);
    return `<div class="quick-card" data-date="${formatDate(d)}" data-name="${q.name}">
      <span class="quick-emoji">${q.emoji}</span>
      <div class="quick-info">
        <div class="quick-name">${q.name}</div>
        <div class="quick-date">${formatDate(d)}</div>
      </div>
      <span class="quick-days">${days}天</span>
    </div>`;
  }).join('');
}

/* ===== Hero 计算 ===== */
function calculate() {
  const dateStr = document.getElementById('targetDate').value;
  if (!dateStr) return;

  const target = new Date(dateStr + 'T00:00:00');
  const now = new Date();
  now.setHours(0, 0, 0, 0);

  const diffMs = target - now;
  const days = Math.ceil(diffMs / (1000 * 60 * 60 * 24));
  const absDays = Math.abs(days);
  const eventName = document.getElementById('eventName').value || dateStr;

  // Hero
  document.getElementById('heroDays').textContent = absDays;
  document.getElementById('heroUnit').textContent = '天';
  document.getElementById('heroEvent').textContent = days >= 0 ? `距离 ${eventName}` : `${eventName} 已过`;
  document.getElementById('heroDate').textContent = `${dateStr} · 星期${WEEKDAYS[target.getDay()]}`;

  if (days < 0) {
    document.getElementById('heroDate').classList.add('hero-past');
  } else {
    document.getElementById('heroDate').classList.remove('hero-past');
  }

  // 明细
  document.getElementById('detailMonths').textContent = Math.floor(absDays / 30);
  document.getElementById('detailWeeks').textContent = Math.floor(absDays / 7);
  document.getElementById('detailHours').textContent = formatNum(absDays * 24);
  document.getElementById('detailMins').textContent = formatNum(absDays * 24 * 60);

  // 今年进度
  const yearStart = new Date(now.getFullYear(), 0, 1);
  const yearEnd = new Date(now.getFullYear(), 11, 31);
  const pct = Math.round(((now - yearStart) / (yearEnd - yearStart)) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  document.getElementById('statusInfo').textContent = days >= 0
    ? `距离 ${eventName} 还有 ${absDays} 天`
    : `${eventName} 已过 ${absDays} 天`;
}

/* ===== 日期差值 ===== */
function calcDiff() {
  const startStr = document.getElementById('diffStart').value;
  const endStr = document.getElementById('diffEnd').value;
  if (!startStr || !endStr) return;

  const start = new Date(startStr + 'T00:00:00');
  const end = new Date(endStr + 'T00:00:00');
  const diffMs = end - start;
  const days = Math.round(diffMs / (1000 * 60 * 60 * 24));
  const absDays = Math.abs(days);

  document.getElementById('diffDays').textContent = absDays;
  const months = Math.floor(absDays / 30);
  const weeks = Math.floor(absDays / 7);
  const hours = absDays * 24;
  document.getElementById('diffDetail').textContent = `= ${months} 个月 · ${weeks} 周 · ${formatNum(hours)} 小时`;
}

/* ===== 事件绑定 ===== */
document.getElementById('btnCalc').addEventListener('click', calculate);
document.getElementById('targetDate').addEventListener('change', calculate);
document.getElementById('eventName').addEventListener('input', calculate);

document.getElementById('quickGrid').addEventListener('click', (e) => {
  const card = e.target.closest('.quick-card');
  if (!card) return;
  document.getElementById('targetDate').value = card.dataset.date;
  document.getElementById('eventName').value = card.dataset.name;
  calculate();
});

document.getElementById('diffStart').addEventListener('change', calcDiff);
document.getElementById('diffEnd').addEventListener('change', calcDiff);

/* ===== 初始化 ===== */
renderQuickDates();

// 默认计算国庆节
const defaultDate = getNextDate(10, 1);
document.getElementById('targetDate').value = formatDate(defaultDate);
document.getElementById('eventName').value = '国庆节';
calculate();

// 日期差默认值
const now = new Date();
document.getElementById('diffStart').value = `${now.getFullYear()}-01-01`;
document.getElementById('diffEnd').value = `${now.getFullYear()}-12-31`;
calcDiff();
</script>
