<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';
// === Recursive descent parser (no eval) ===
function tokenize(expr){
  const tokens=[];let i=0;
  while(i<expr.length){
    if(' \t'.includes(expr[i])){i++;continue}
    if('+-*/^()'.includes(expr[i])){tokens.push({type:'op',value:expr[i]});i++;continue}
    if(expr[i]>='0'&&expr[i]<='9'||expr[i]==='.'){
      let n='';while(i<expr.length&&(expr[i]>='0'&&expr[i]<='9'||expr[i]==='.'))n+=expr[i++];
      tokens.push({type:'num',value:parseFloat(n)});continue}
    if(expr[i]>='a'&&expr[i]<='z'||expr[i]>='A'&&expr[i]<='Z'){
      let id='';while(i<expr.length&&(expr[i]>='a'&&expr[i]<='z'||expr[i]>='A'&&expr[i]<='Z'))id+=expr[i++];
      if(id==='pi'||id==='π')tokens.push({type:'num',value:Math.PI});
      else if(id==='e'&&(i>=expr.length||expr[i]!=='x'))tokens.push({type:'num',value:Math.E});
      else tokens.push({type:'id',value:id});continue}
    if(expr[i]==='π'){tokens.push({type:'num',value:Math.PI});i++;continue}
    throw new Error(`未知字符: ${expr[i]}`);
  }
  return tokens;
}
const FUNCS={sin:Math.sin,cos:Math.cos,tan:Math.tan,log:Math.log10,ln:Math.log,sqrt:Math.sqrt,abs:Math.abs};
function parse(tokens){
  let pos=0;
  function peek(){return tokens[pos]}
  function eat(v){if(peek()&&peek().value===v){pos++;return true}return false}
  function expression(){
    let node=term();
    while(peek()&&(peek().value==='+'||peek().value==='-')){
      const op=peek().value;pos++;const r=term();node={type:'bin',op,left:node,right:r}}
    return node;
  }
  function term(){
    let node=factor();
    while(peek()&&(peek().value==='*'||peek().value==='/')){
      const op=peek().value;pos++;const r=factor();node={type:'bin',op,left:node,right:r}}
    return node;
  }
  function factor(){
    let node=unary();
    if(peek()&&peek().value==='^'){pos++;const r=factor();node={type:'bin',op:'^',left:node,right:r}}
    return node;
  }
  function unary(){
    if(peek()&&peek().value==='-'){pos++;return{type:'neg',child:unary()}}
    if(peek()&&peek().value==='+'){pos++;return unary()}
    return primary();
  }
  function primary(){
    const t=peek();
    if(!t)throw new Error('表达式不完整');
    if(t.type==='num'){pos++;return{type:'num',value:t.value}}
    if(t.type==='id'){
      if(t.value==='x'){pos++;return{type:'var'}}
      if(FUNCS[t.value]){const fn=t.value;pos++;if(!eat('('))throw new Error(`${fn} 后缺少 (`);const arg=expression();if(!eat(')'))throw new Error(`${fn} 缺少 )`);return{type:'fn',fn,arg}}
      throw new Error(`未知标识符: ${t.value}`);
    }
    if(t.value==='('){pos++;const node=expression();if(!eat(')'))throw new Error('缺少 )');return node}
    throw new Error(`意外的 token: ${t.value}`);
  }
  const ast=expression();
  if(pos<tokens.length)throw new Error('多余的内容');
  return ast;
}
function evalAST(node,x){
  if(node.type==='num')return node.value;
  if(node.type==='var')return x;
  if(node.type==='neg')return -evalAST(node.child,x);
  if(node.type==='fn')return FUNCS[node.fn](evalAST(node.arg,x));
  if(node.type==='bin'){
    const l=evalAST(node.left,x),r=evalAST(node.right,x);
    if(node.op==='+')return l+r;if(node.op==='-')return l-r;
    if(node.op==='*')return l*r;if(node.op==='/')return l/r;
    if(node.op==='^')return Math.pow(l,r);
  }
  return NaN;
}
// === Multi-function support ===
const COLORS=['#8B5CF6','#EF4444','#10B981','#F59E0B','#3B82F6'];
let funcs=[{expr:'x^2'}];
function renderFuncRows(){
  document.getElementById('funcRows').innerHTML=funcs.map((f,i)=>`<div class="func-row"><div class="func-color" style="background:${COLORS[i]}"></div><span class="func-label">y${funcs.length>1?i+1:''} =</span><input class="func-input fi" data-idx="${i}" value="${f.expr}" placeholder="输入表达式">${funcs.length>1?`<button class="func-del" data-idx="${i}">✕</button>`:''}</div>`).join('');
}
document.getElementById('funcRows').addEventListener('input',e=>{if(e.target.classList.contains('fi'))funcs[+e.target.dataset.idx].expr=e.target.value});
document.getElementById('funcRows').addEventListener('click',e=>{const b=e.target.closest('.func-del');if(!b)return;funcs.splice(+b.dataset.idx,1);renderFuncRows();plotAll()});
document.getElementById('funcRows').addEventListener('keydown',e=>{if(e.key==='Enter'&&e.target.classList.contains('fi'))plotAll()});
document.getElementById('addBtn').addEventListener('click',()=>{if(funcs.length>=5)return;funcs.push({expr:''});renderFuncRows();document.querySelector('.fi:last-of-type')?.focus()});
document.getElementById('clearBtn').addEventListener('click',()=>{funcs=[{expr:''}];renderFuncRows();plotAll()});
// === Canvas plotting ===
function plotAll(){
  const canvas=document.getElementById('plotCanvas');
  const rect=canvas.parentElement.getBoundingClientRect();
  const W=rect.width*2,H=rect.height*2;
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  const xMin=-10,xMax=10,yMin=-10,yMax=10;
  const scaleX=W/(xMax-xMin),scaleY=H/(yMax-yMin);
  function toX(x){return(x-xMin)*scaleX}
  function toY(y){return(yMax-y)*scaleY}
  const isDark=document.documentElement.dataset.theme==='dark';
  ctx.fillStyle=isDark?'#1E293B':'#FAFAFA';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle=isDark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.05)';ctx.lineWidth=1;
  for(let i=Math.ceil(xMin);i<=xMax;i++){ctx.beginPath();ctx.moveTo(toX(i),0);ctx.lineTo(toX(i),H);ctx.stroke()}
  for(let i=Math.ceil(yMin);i<=yMax;i++){ctx.beginPath();ctx.moveTo(0,toY(i));ctx.lineTo(W,toY(i));ctx.stroke()}
  ctx.strokeStyle=isDark?'#64748B':'#9CA3AF';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(toX(xMin),toY(0));ctx.lineTo(toX(xMax),toY(0));ctx.stroke();
  ctx.beginPath();ctx.moveTo(toX(0),toY(yMin));ctx.lineTo(toX(0),toY(yMax));ctx.stroke();
  ctx.fillStyle=isDark?'#64748B':'#9CA3AF';ctx.font='20px monospace';
  for(let i=Math.ceil(xMin);i<=xMax;i++){if(i===0)continue;ctx.fillText(i.toString(),toX(i)-6,toY(0)+18)}
  for(let i=Math.ceil(yMin);i<=yMax;i++){if(i===0)continue;ctx.fillText(i.toString(),toX(0)+4,toY(i)+6)}
  const err=document.getElementById('errMsg');err.textContent='';
  const drawn=[];
  funcs.forEach((f,idx)=>{
    const exprStr=f.expr.trim();if(!exprStr)return;
    let ast;
    try{const tokens=tokenize(exprStr);ast=parse(tokens)}catch(e){err.textContent+=`函数${idx+1} 解析错误：${e.message}\n`;return}
    ctx.strokeStyle=COLORS[idx];ctx.lineWidth=3;ctx.beginPath();
    let started=false,prevY=0;
    for(let px=0;px<W;px++){
      const x=xMin+px/scaleX;
      let y;try{y=evalAST(ast,x)}catch(e){started=false;continue}
      if(!isFinite(y)||isNaN(y)){started=false;continue}
      const canvasY=toY(y);
      if(!started||Math.abs(canvasY-prevY)>H*0.5){ctx.moveTo(px,canvasY);started=true}
      else ctx.lineTo(px,canvasY);
      prevY=canvasY;
    }
    ctx.stroke();
    drawn.push({color:COLORS[idx],expr:exprStr});
  });
  document.getElementById('statusInfo').textContent=drawn.map(d=>`y = ${d.expr}`).join(' | ')||'函数图像绘制';
}
document.getElementById('plotBtn').addEventListener('click',plotAll);
document.querySelectorAll('.preset-pill').forEach(p=>p.addEventListener('click',function(){funcs[0].expr=this.dataset.f;renderFuncRows();plotAll()}));
renderFuncRows();plotAll();
</script>
