body{min-height:100vh;display:flex;flex-direction:column}

.pt-cell .sym{font-size:13px;font-weight:800;line-height:1}
.pt-cell .nm{font-size:6px;font-weight:600;opacity:0.8;margin-top:1px}
.pt-cell.e{background:transparent;pointer-events:none}
.pt-cell.label{background:transparent;pointer-events:none;font-size:8px;font-weight:700;color:var(--text-caption)}
.c0{background:rgba(239,68,68,0.12);color:#DC2626}.c1{background:rgba(245,158,11,0.12);color:#D97706}
.c2{background:rgba(99,102,241,0.1);color:#4F46E5}.c3{background:rgba(16,185,129,0.1);color:#059669}
.c4{background:rgba(168,85,247,0.1);color:#7C3AED}.c5{background:rgba(6,182,212,0.1);color:#0891B2}
.c6{background:rgba(236,72,153,0.1);color:#DB2777}.c7{background:rgba(107,114,128,0.1);color:#4B5563}
.c8{background:rgba(251,191,36,0.1);color:#B45309}.c9{background:rgba(190,24,93,0.1);color:#9D174D}
.sep-label{grid-column:1/span 3;font-size:8px;font-weight:700;color:var(--text-caption);display:flex;align-items:center;padding-left:4px}
.detail-card{display:none;padding:20px;border-radius:10px;border:2px solid var(--brand-500);background:var(--bg-glass-input);text-align:center}
.detail-card.show{display:block}
.detail-symbol{font-size:56px;font-weight:800;margin-bottom:4px}
.detail-name{font-size:20px;font-weight:800;margin-bottom:2px}
.detail-name-en{font-size:12px;color:var(--text-caption);margin-bottom:12px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center}
.detail-item{padding:8px;border-radius:6px;background:rgba(99,102,241,0.05)}
.detail-label{font-size:8px;font-weight:700;color:var(--text-caption)}
.detail-value{font-size:13px;font-weight:800;margin-top:2px;font-family:var(--font-code)}
@media(max-width:768px){.pt-grid{grid-template-columns:repeat(18,30px);overflow-x:scroll}.pt-cell .nm{display:none}}

[19,'K','钾','Potassium','39.10',0,4,1],[20,'Ca','钙','Calcium','40.08',1,4,2],[21,'Sc','钪','Scandium','44.96',2,4,3],[22,'Ti','钛','Titanium','47.87',2,4,4],[23,'V','钒','Vanadium','50.94',2,4,5],[24,'Cr','铬','Chromium','52.00',2,4,6],[25,'Mn','锰','Manganese','54.94',2,4,7],[26,'Fe','铁','Iron','55.85',2,4,8],[27,'Co','钴','Cobalt','58.93',2,4,9],[28,'Ni','镍','Nickel','58.69',2,4,10],[29,'Cu','铜','Copper','63.55',2,4,11],[30,'Zn','锌','Zinc','65.38',2,4,12],[31,'Ga','镓','Gallium','69.72',3,4,13],[32,'Ge','锗','Germanium','72.63',4,4,14],[33,'As','砷','Arsenic','74.92',4,4,15],[34,'Se','硒','Selenium','78.97',5,4,16],[35,'Br','溴','Bromine','79.90',6,4,17],[36,'Kr','氪','Krypton','83.80',7,4,18],
[37,'Rb','铷','Rubidium','85.47',0,5,1],[38,'Sr','锶','Strontium','87.62',1,5,2],[39,'Y','钇','Yttrium','88.91',2,5,3],[40,'Zr','锆','Zirconium','91.22',2,5,4],[41,'Nb','铌','Niobium','92.91',2,5,5],[42,'Mo','钼','Molybdenum','95.95',2,5,6],[43,'Tc','锝','Technetium','(98)',2,5,7],[44,'Ru','钌','Ruthenium','101.1',2,5,8],[45,'Rh','铑','Rhodium','102.9',2,5,9],[46,'Pd','钯','Palladium','106.4',2,5,10],[47,'Ag','银','Silver','107.9',2,5,11],[48,'Cd','镉','Cadmium','112.4',2,5,12],[49,'In','铟','Indium','114.8',3,5,13],[50,'Sn','锡','Tin','118.7',3,5,14],[51,'Sb','锑','Antimony','121.8',4,5,15],[52,'Te','碲','Tellurium','127.6',4,5,16],[53,'I','碘','Iodine','126.9',6,5,17],[54,'Xe','氙','Xenon','131.3',7,5,18],
[55,'Cs','铯','Caesium','132.9',0,6,1],[56,'Ba','钡','Barium','137.3',1,6,2],
// La-Lu → lanthanide row 9
[57,'La','镧','Lanthanum','138.9',8,9,4],[58,'Ce','铈','Cerium','140.1',8,9,5],[59,'Pr','镨','Praseodymium','140.9',8,9,6],[60,'Nd','钕','Neodymium','144.2',8,9,7],[61,'Pm','钷','Promethium','(145)',8,9,8],[62,'Sm','钐','Samarium','150.4',8,9,9],[63,'Eu','铕','Europium','152.0',8,9,10],[64,'Gd','钆','Gadolinium','157.3',8,9,11],[65,'Tb','铽','Terbium','158.9',8,9,12],[66,'Dy','镝','Dysprosium','162.5',8,9,13],[67,'Ho','钬','Holmium','164.9',8,9,14],[68,'Er','铒','Erbium','167.3',8,9,15],[69,'Tm','铥','Thulium','168.9',8,9,16],[70,'Yb','镱','Ytterbium','173.0',8,9,17],[71,'Lu','镥','Lutetium','175.0',8,9,18],
[72,'Hf','铪','Hafnium','178.5',2,6,4],[73,'Ta','钽','Tantalum','180.9',2,6,5],[74,'W','钨','Tungsten','183.8',2,6,6],[75,'Re','铼','Rhenium','186.2',2,6,7],[76,'Os','锇','Osmium','190.2',2,6,8],[77,'Ir','铱','Iridium','192.2',2,6,9],[78,'Pt','铂','Platinum','195.1',2,6,10],[79,'Au','金','Gold','197.0',2,6,11],[80,'Hg','汞','Mercury','200.6',2,6,12],[81,'Tl','铊','Thallium','204.4',3,6,13],[82,'Pb','铅','Lead','207.2',3,6,14],[83,'Bi','铋','Bismuth','209.0',3,6,15],[84,'Po','钋','Polonium','(209)',4,6,16],[85,'At','砹','Astatine','(210)',6,6,17],[86,'Rn','氡','Radon','(222)',7,6,18],
[87,'Fr','钫','Francium','(223)',0,7,1],[88,'Ra','镭','Radium','(226)',1,7,2],

[89,'Ac','锕','Actinium','(227)',9,10,4],[90,'Th','钍','Thorium','232.0',9,10,5],[91,'Pa','镤','Protactinium','231.0',9,10,6],[92,'U','铀','Uranium','238.0',9,10,7],[93,'Np','镎','Neptunium','(237)',9,10,8],[94,'Pu','钚','Plutonium','(244)',9,10,9],[95,'Am','镅','Americium','(243)',9,10,10],[96,'Cm','锔','Curium','(247)',9,10,11],[97,'Bk','锫','Berkelium','(247)',9,10,12],[98,'Cf','锎','Californium','(251)',9,10,13],[99,'Es','锿','Einsteinium','(252)',9,10,14],[100,'Fm','镄','Fermium','(257)',9,10,15],[101,'Md','钔','Mendelevium','(258)',9,10,16],[102,'No','锘','Nobelium','(259)',9,10,17],[103,'Lr','铹','Lawrencium','(266)',9,10,18],
[104,'Rf','𬬻','Rutherfordium','(267)',2,7,4],[105,'Db','𬭊','Dubnium','(268)',2,7,5],[106,'Sg','𬭳','Seaborgium','(269)',2,7,6],[107,'Bh','𬭛','Bohrium','(270)',2,7,7],[108,'Hs','𬭶','Hassium','(277)',2,7,8],[109,'Mt','鿏','Meitnerium','(278)',2,7,9],[110,'Ds','𫟼','Darmstadtium','(281)',2,7,10],[111,'Rg','𬬭','Roentgenium','(282)',2,7,11],[112,'Cn','鿔','Copernicium','(285)',2,7,12],[113,'Nh','鿭','Nihonium','(286)',3,7,13],[114,'Fl','𫓧','Flerovium','(289)',3,7,14],[115,'Mc','镆','Moscovium','(290)',3,7,15],[116,'Lv','鿫','Livermorium','(293)',3,7,16],[117,'Ts','鿬','Tennessine','(294)',6,7,17],[118,'Og','鿖','Oganesson','(294)',7,7,18],
];

// Build grid — 10 rows × 18 cols; row 8 is empty spacer, 9=lanthanide, 10=actinide
const grid=document.getElementById('ptGrid');
// Placeholder markers for lanthanide/actinide in main table row 6 col 3 and row 7 col 3
const LAmarker={6:{3:['57-71','La-Lu','镧系',8]},7:{3:['89-103','Ac-Lr','锕系',9]}};

for(let r=1;r<=10;r++){
  if(r===8){
    // spacer row
    for(let c=0;c<18;c++){const d=document.createElement('div');d.className='pt-cell e';d.style.height='8px';d.style.aspectRatio='auto';grid.appendChild(d)}
    continue;
  }
  for(let c=1;c<=18;c++){
    // Check for LA/Ac markers
    if(LAmarker[r]&&LAmarker[r][c]){
      const [range,sym,nm,cat]=LAmarker[r][c];
      const d=document.createElement('div');d.className=`pt-cell c${cat}`;d.style.fontSize='8px';
      d.innerHTML=`<span class="sym" style="font-size:9px">${range}</span><span class="nm">${nm}</span>`;
      grid.appendChild(d);continue;
    }
    // Lanthanide/actinide labels
    if((r===9||r===10)&&c<=3){
      if(c===1){const d=document.createElement('div');d.className='pt-cell label';d.textContent=r===9?'镧系':'锕系';grid.appendChild(d)}
      else{const d=document.createElement('div');d.className='pt-cell e';grid.appendChild(d)}
      continue;
    }
    const el=E.find(e=>e[6]===r&&e[7]===c);
    if(el){
      const d=document.createElement('div');d.className=`pt-cell c${el[5]}`;
      d.dataset.z=el[0];d.dataset.sym=el[1];d.dataset.name=el[2];d.dataset.en=el[3];d.dataset.mass=el[4];d.dataset.cat=el[5];
      d.innerHTML=`<span class="num">${el[0]}</span><span class="sym">${el[1]}</span><span class="nm">${el[2]}</span>`;
      d.addEventListener('click',()=>showDetail(el));
      grid.appendChild(d);
    }else{
      const d=document.createElement('div');d.className='pt-cell e';grid.appendChild(d);
    }
  }
}

function showDetail(el){
  const card=document.getElementById('detailCard');card.classList.add('show');
  document.getElementById('dSym').textContent=el[1];
  document.getElementById('dName').textContent=el[2];
  document.getElementById('dEn').textContent=el[3];
  document.getElementById('dZ').textContent=el[0];
  document.getElementById('dM').textContent=el[4];
  document.getElementById('dC').textContent=CAT_NAMES[el[5]];
  card.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// Search
document.getElementById('searchInput').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  document.querySelectorAll('.pt-cell[data-z]').forEach(cell=>{
    const match=!q||cell.dataset.sym.toLowerCase().includes(q)||cell.dataset.name.includes(q)||cell.dataset.en.toLowerCase().includes(q)||cell.dataset.z===q;
    cell.classList.toggle('highlight',!!q&&match);
    cell.style.opacity=q&&!match?'0.2':'1';
  });
});
</script>
