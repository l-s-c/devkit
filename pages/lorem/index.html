<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

let lang = 'en', unit = 'paragraphs';

const EN_SENTENCES = [
  'Lorem ipsum dolor sit amet, consectetur adipiscing elit.',
  'Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.',
  'Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris.',
  'Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore.',
  'Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia.',
  'Nemo enim ipsam voluptatem quia voluptas sit aspernatur aut odit aut fugit.',
  'Neque porro quisquam est, qui dolorem ipsum quia dolor sit amet.',
  'Ut enim ad minima veniam, quis nostrum exercitationem ullam corporis.',
  'Quis autem vel eum iure reprehenderit qui in ea voluptate velit esse.',
  'At vero eos et accusamus et iusto odio dignissimos ducimus qui blanditiis.',
  'Nam libero tempore, cum soluta nobis est eligendi optio cumque nihil impedit.',
  'Temporibus autem quibusdam et aut officiis debitis aut rerum necessitatibus.',
  'Itaque earum rerum hic tenetur a sapiente delectus, ut aut reiciendis.',
  'Nulla facilisi. Morbi tempus iaculis urna id volutpat lacus laoreet non.',
  'Viverra justo nec ultrices dui sapien eget mi proin sed libero.',
  'Pellentesque habitant morbi tristique senectus et netus et malesuada fames.',
  'Integer feugiat scelerisque varius morbi enim nunc faucibus a pellentesque.',
  'Amet consectetur adipiscing elit ut aliquam purus sit amet luctus.',
  'Facilisis magna etiam tempor orci eu lobortis elementum nibh tellus.',
  'Turpis egestas integer eget aliquet nibh praesent tristique magna sit.'
];
const EN_CLASSIC = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit.';

const ZH_SENTENCES = [
  '天地玄黄，宇宙洪荒，日月盈昃，辰宿列张。',
  '寒来暑往，秋收冬藏，闰余成岁，律吕调阳。',
  '云腾致雨，露结为霜，金生丽水，玉出昆冈。',
  '剑号巨阙，珠称夜光，果珍李柰，菜重芥姜。',
  '海咸河淡，鳞潜羽翔，龙师火帝，鸟官人皇。',
  '始制文字，乃服衣裳，推位让国，有虞陶唐。',
  '吊民伐罪，周发殷汤，坐朝问道，垂拱平章。',
  '爱育黎首，臣伏戎羌，遐迩一体，率宾归王。',
  '鸣凤在竹，白驹食场，化被草木，赖及万方。',
  '盖此身发，四大五常，恭惟鞠养，岂敢毁伤。',
  '大江东去浪淘尽，千古风流人物。',
  '明月几时有，把酒问青天，不知天上宫阙，今夕是何年。',
  '人生若只如初见，何事秋风悲画扇，等闲变却故人心，却道故人心易变。',
  '春江潮水连海平，海上明月共潮生，滟滟随波千万里，何处春江无月明。',
  '落霞与孤鹜齐飞，秋水共长天一色。',
  '山不在高有仙则名，水不在深有龙则灵。',
  '前不见古人后不见来者，念天地之悠悠独怆然而涕下。',
  '会当凌绝顶一览众山小，欲穷千里目更上一层楼。',
  '长风破浪会有时直挂云帆济沧海。',
  '不畏浮云遮望眼自缘身在最高层。'
];
const ZH_CLASSIC = '天地玄黄，宇宙洪荒，日月盈昃，辰宿列张。';

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function makeSentences(n) {
  const src = lang === 'en' ? EN_SENTENCES : ZH_SENTENCES;
  const classic = lang === 'en' ? EN_CLASSIC : ZH_CLASSIC;
  const useClassic = document.getElementById('toggleClassic').classList.contains('on');
  const result = [];
  if (useClassic && n > 0) { result.push(classic); n--; }
  for (let i = 0; i < n; i++) result.push(pick(src));
  return result;
}

function makeParagraph(isFirst) {
  const count = 3 + Math.floor(Math.random() * 4);
  const useClassic = isFirst && document.getElementById('toggleClassic').classList.contains('on');
  const classic = lang === 'en' ? EN_CLASSIC : ZH_CLASSIC;
  const src = lang === 'en' ? EN_SENTENCES : ZH_SENTENCES;
  const sep = lang === 'en' ? ' ' : '';
  const sents = [];
  if (useClassic) sents.push(classic);
  for (let i = sents.length; i < count; i++) sents.push(pick(src));
  return sents.join(sep);
}

function generate() {
  const count = Math.max(0, Math.min(1000, parseInt(document.getElementById('count').value) || 0));
  const useHtml = document.getElementById('toggleHtml').classList.contains('on');
  let text = '';

  if (count === 0) { document.getElementById('output').value = ''; updateStats(''); return; }

  const sep = lang === 'en' ? ' ' : '';

  if (unit === 'paragraphs') {
    const paras = [];
    for (let i = 0; i < count; i++) paras.push(makeParagraph(i === 0));
    text = useHtml ? paras.map(p => '<p>' + p + '</p>').join('\n\n') : paras.join('\n\n');
  } else if (unit === 'sentences') {
    const sents = makeSentences(count);
    text = useHtml ? '<p>' + sents.join(sep) + '</p>' : sents.join(sep);
  } else if (unit === 'words') {
    if (lang === 'en') {
      const allWords = EN_SENTENCES.join(' ').replace(/[.,]/g, '').split(/\s+/);
      const useClassic = document.getElementById('toggleClassic').classList.contains('on');
      const words = [];
      if (useClassic) words.push('Lorem', 'ipsum', 'dolor', 'sit', 'amet');
      while (words.length < count) words.push(pick(allWords));
      text = words.slice(0, count).join(' ') + '.';
    } else {
      const allChars = ZH_SENTENCES.join('').replace(/[，。、]/g, '');
      const chars = [];
      while (chars.length < count) chars.push(allChars[Math.floor(Math.random() * allChars.length)]);
      text = chars.slice(0, count).join('');
    }
  } else if (unit === 'chars') {
    const src = lang === 'en' ? EN_SENTENCES.join(' ') : ZH_SENTENCES.join('');
    let result = '';
    while (result.length < count) result += src;
    text = result.slice(0, count);
  }

  document.getElementById('output').value = text;
  updateStats(text);
}

function updateStats(text) {
  const words = lang === 'en' ? text.split(/\s+/).filter(Boolean).length : [...text].length;
  const chars = text.length;
  document.getElementById('statWords').textContent = words + (lang === 'en' ? ' 词' : ' 字');
  document.getElementById('statChars').textContent = chars + ' 字符';
  document.getElementById('statusInfo').textContent = `${lang === 'en' ? 'English' : '中文'} · ${unit} · ${words}${lang === 'en' ? ' words' : ' 字'} · ${chars} chars`;
}

/* ===== 事件绑定 ===== */
document.getElementById('langTabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  lang = tab.dataset.lang;
  document.querySelectorAll('#langTabs .tab').forEach(t => t.classList.toggle('active', t.dataset.lang === lang));
  generate();
});

document.getElementById('modeRow').addEventListener('click', e => {
  const chip = e.target.closest('.mode-chip');
  if (!chip) return;
  unit = chip.dataset.unit;
  document.querySelectorAll('.mode-chip').forEach(c => c.classList.toggle('active', c.dataset.unit === unit));
  const maxMap = { paragraphs: 20, sentences: 50, words: 200, chars: 1000 };
  const defMap = { paragraphs: 3, sentences: 5, words: 50, chars: 200 };
  document.getElementById('countSlider').max = maxMap[unit];
  document.getElementById('countSlider').value = defMap[unit];
  document.getElementById('count').value = defMap[unit];
  generate();
});

document.getElementById('count').addEventListener('input', function() {
  document.getElementById('countSlider').value = this.value;
  generate();
});
document.getElementById('countSlider').addEventListener('input', function() {
  document.getElementById('count').value = this.value;
  generate();
});

document.getElementById('toggleClassic').addEventListener('click', function() { this.classList.toggle('on'); generate(); });
document.getElementById('toggleHtml').addEventListener('click', function() { this.classList.toggle('on'); generate(); });

document.getElementById('genBtn').addEventListener('click', generate);

document.getElementById('copyBtn').addEventListener('click', function() {
  navigator.clipboard.writeText(document.getElementById('output').value).then(() => {
    this.textContent = '已复制 ✓';
    setTimeout(() => this.textContent = '📋 复制', 1500);
  });
});

generate();
</script>
