<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';
/* ABO inheritance: genotype-based accurate calculation
   A: AA or AO, B: BB or BO, AB: AB, O: OO
   Each phenotype parent can be multiple genotypes with assumed equal probability */
const GENO={A:['AA','AO'],B:['BB','BO'],AB:['AB'],O:['OO']};
function cross(g1,g2){
  const results={A:0,B:0,AB:0,O:0};
  let total=0;
  for(const p1 of g1)for(const p2 of g2){
    for(const a1 of p1)for(const a2 of p2){
      const pair=[a1,a2].sort().join('');
      let pheno;
      if(pair==='AA'||pair==='AO')pheno='A';
      else if(pair==='BB'||pair==='BO')pheno='B';
      else if(pair==='AB')pheno='AB';
      else pheno='O';
      results[pheno]++;total++;
    }
  }
  const out={};for(const k in results)if(results[k])out[k]=Math.round(results[k]/total*100);
  return out;
}

let father='A',mother='A';
const types=['A','B','AB','O'];

function renderPills(id,selected,parent){
  document.getElementById(id).innerHTML=types.map(t=>
    `<div class="blood-pill${t===selected?' active':''}" data-type="${t}">${t}</div>`).join('');
}

function render(){
  const result=cross(GENO[father],GENO[mother]);
  document.getElementById('resultPills').innerHTML=types.map(t=>{
    const prob=result[t]||0;
    return `<div class="result-item"><div class="result-circle ${prob?'possible':'impossible'}">${t}</div><div class="result-prob">${prob?prob+'%':'-'}</div><div class="result-label-sm">${prob?'可能':'不可能'}</div></div>`;
  }).join('');
}

renderPills('fatherPills',father);renderPills('motherPills',mother);

document.getElementById('fatherPills').addEventListener('click',e=>{
  const p=e.target.closest('[data-type]');if(!p)return;father=p.dataset.type;renderPills('fatherPills',father);render()});
document.getElementById('motherPills').addEventListener('click',e=>{
  const p=e.target.closest('[data-type]');if(!p)return;mother=p.dataset.type;renderPills('motherPills',mother);render()});
render();
</script>
