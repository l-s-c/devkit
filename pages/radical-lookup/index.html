{r:'目',n:'目字旁',s:5,chars:[['看','kàn'],['眼','yǎn'],['睛','jīng'],['睡','shuì'],['盯','dīng'],['眉','méi'],['瞧','qiáo'],['瞪','dèng'],['盲','máng'],['相','xiāng']]},

{r:'雨',n:'雨字头',s:8,chars:[['雪','xuě'],['雷','léi'],['电','diàn'],['零','líng'],['雾','wù'],['霜','shuāng'],['露','lù'],['霞','xiá'],['需','xū'],['震','zhèn']]},

];
let currentStroke='全部',currentIdx=0;
const STROKES=['全部','1画','2画','3画','4画','5画','6画','7+画'];
function renderStrokes(){
  document.getElementById('strokeRow').innerHTML=STROKES.map(s=>`<div class="stroke-pill${s===currentStroke?' active':''}" data-stroke="${s}">${s}</div>`).join('');
}
function renderRadicals(q=''){
  const filtered=DATA.filter(d=>{
    if(currentStroke!=='全部'){const sn=parseInt(currentStroke);if(currentStroke.includes('+'))return d.s>=sn;return d.s===sn}
    if(q)return d.n.includes(q)||d.r.includes(q);
    return true;
  });
  document.getElementById('radicalGrid').innerHTML=filtered.map((d,i)=>`<div class="ri${DATA.indexOf(d)===currentIdx?' active':''}" data-idx="${DATA.indexOf(d)}"><div class="ri-char">${d.r}</div><div class="ri-name">${d.n}</div></div>`).join('');
  document.getElementById('statusInfo').textContent=`${filtered.length} 个部首`;
  showDetail();
}
function showDetail(){
  const d=DATA[currentIdx];if(!d)return;
  document.getElementById('detailPanel').style.display='';
  document.getElementById('detailChar').textContent=d.r;
  document.getElementById('detailName').textContent=d.n;
  document.getElementById('detailMeta').textContent=`笔画：${d.s} | 例字：${d.chars.length} 个`;
  document.getElementById('charGrid').innerHTML=d.chars.map(([c,p])=>`<div class="ci">${c}<div class="ci-py">${p}</div></div>`).join('');
}
document.getElementById('strokeRow').addEventListener('click',e=>{if(!e.target.classList.contains('stroke-pill'))return;currentStroke=e.target.dataset.stroke;renderStrokes();renderRadicals(document.getElementById('searchInput').value.trim())});
document.getElementById('radicalGrid').addEventListener('click',e=>{const ri=e.target.closest('.ri');if(!ri)return;currentIdx=+ri.dataset.idx;renderRadicals(document.getElementById('searchInput').value.trim())});
document.getElementById('searchInput').addEventListener('input',function(){renderRadicals(this.value.trim())});
renderStrokes();renderRadicals();
</script>
