<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Ola1kmFsp8Ro+a4ARGYoMRhq5OERqXGr9BXSI1y" crossorigin="anonymous"></script>
<script>
(function(){
  // === DOM ===
  const canvas = document.getElementById('pendulumCanvas');
  const ctx = canvas.getContext('2d');
  const sliderL = document.getElementById('sliderL');
  const sliderG = document.getElementById('sliderG');
  const sliderTheta = document.getElementById('sliderTheta');
  const sliderDamp = document.getElementById('sliderDamp');
  const btnPlay = document.getElementById('btnPlay');
  const btnReset = document.getElementById('btnReset');

  // === 状态 ===
  let L = 1.5, g = 9.8, theta0 = 30 * Math.PI / 180, damping = 0;
  let theta = theta0, omega = 0;
  let running = false, dragging = false;
  let swingCount = 0, lastSign = 0;
  let accumulator = 0, lastTime = 0;
  const DT = 1 / 60;
  const MAX_ACC = 0.1; // 最大累积时间，防切tab飞掉

  // === 高DPI Canvas ===
  function resizeCanvas() {
    const rect = canvas.parentElement.getBoundingClientRect();
    const w = rect.width;
    const h = Math.max(400, Math.min(560, w * 0.875));
    const dpr = window.devicePixelRatio || 1;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // === 物理引擎 (Velocity Verlet) ===
  function accel(th, om) {
    return -(g / L) * Math.sin(th) - damping * om;
  }

  function physicsStep() {
    const a = accel(theta, omega);
    theta += omega * DT + 0.5 * a * DT * DT;
    const aNew = accel(theta, omega + a * DT);
    omega += 0.5 * (a + aNew) * DT;

    // 计数摆动（过零点计数）
    const sign = theta > 0 ? 1 : -1;
    if (lastSign !== 0 && sign !== lastSign) swingCount++;
    lastSign = sign;
  }

  // === 渲染 ===
  const PIVOT_Y_RATIO = 0.08;
  const SCALE_BASE = 120; // px per meter at L=1.5

  function render() {
    const W = parseFloat(canvas.style.width);
    const H = parseFloat(canvas.style.height);
    ctx.clearRect(0, 0, W, H);

    const pivotX = W / 2;
    const pivotY = H * PIVOT_Y_RATIO;
    const scale = Math.min(SCALE_BASE, (H - pivotY - 40) / (L + 0.3));
    const ropeLen = L * scale;
    const ballR = Math.max(12, Math.min(20, 0.15 * scale));

    const ballX = pivotX + ropeLen * Math.sin(theta);
    const ballY = pivotY + ropeLen * Math.cos(theta);

    // 支架
    ctx.strokeStyle = '#94A3B8';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(pivotX - 40, pivotY);
    ctx.lineTo(pivotX + 40, pivotY);
    ctx.stroke();

    // 轨迹弧（虚线）
    ctx.save();
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = 'rgba(59,130,246,0.15)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(pivotX, pivotY, ropeLen, Math.PI / 2 - 1.2, Math.PI / 2 + 1.2);
    ctx.stroke();
    ctx.restore();

    // 垂直参考线（虚线）
    ctx.save();
    ctx.setLineDash([3, 5]);
    ctx.strokeStyle = 'rgba(148,163,184,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pivotX, pivotY);
    ctx.lineTo(pivotX, pivotY + ropeLen + 30);
    ctx.stroke();
    ctx.restore();

    // 角度弧
    if (Math.abs(theta) > 0.01) {
      ctx.strokeStyle = 'rgba(59,130,246,0.4)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      const arcR = 40;
      const startA = Math.PI / 2;
      const endA = Math.PI / 2 - theta;
      ctx.arc(pivotX, pivotY, arcR, Math.min(startA, endA), Math.max(startA, endA));
      ctx.stroke();
      // 角度标注
      ctx.fillStyle = 'rgba(59,130,246,0.7)';
      ctx.font = '11px system-ui';
      ctx.textAlign = 'center';
      const labelA = (startA + endA) / 2;
      ctx.fillText(Math.abs(theta * 180 / Math.PI).toFixed(1) + '°', pivotX + (arcR + 14) * Math.cos(labelA), pivotY + (arcR + 14) * Math.sin(labelA));
    }

    // 绳子
    ctx.strokeStyle = '#475569';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(pivotX, pivotY);
    ctx.lineTo(ballX, ballY);
    ctx.stroke();

    // 摆球阴影
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.beginPath();
    ctx.ellipse(ballX + 3, ballY + 3, ballR, ballR * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();

    // 摆球
    const grad = ctx.createRadialGradient(ballX - ballR * 0.3, ballY - ballR * 0.3, ballR * 0.1, ballX, ballY, ballR);
    grad.addColorStop(0, '#60A5FA');
    grad.addColorStop(0.7, '#3B82F6');
    grad.addColorStop(1, '#1D4ED8');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(ballX, ballY, ballR, 0, Math.PI * 2);
    ctx.fill();

    // 摆球高光
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.arc(ballX - ballR * 0.25, ballY - ballR * 0.25, ballR * 0.35, 0, Math.PI * 2);
    ctx.fill();

    // 支点
    ctx.fillStyle = '#64748B';
    ctx.beginPath();
    ctx.arc(pivotX, pivotY, 5, 0, Math.PI * 2);
    ctx.fill();

    // 拖拽提示
    if (!running && !dragging && swingCount === 0) {
      ctx.fillStyle = 'rgba(59,130,246,0.5)';
      ctx.font = '12px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('拖拽摆球或点击「开始」', pivotX, H - 20);
    }
  }

  // === 数据更新 ===
  function updateData() {
    const angleDeg = theta * 180 / Math.PI;
    document.getElementById('dataAngle').textContent = angleDeg.toFixed(1) + '°';
    document.getElementById('dataOmega').textContent = omega.toFixed(2) + ' rad/s';
    const T = 2 * Math.PI * Math.sqrt(L / g);
    document.getElementById('dataPeriod').textContent = T.toFixed(2) + 's';
    document.getElementById('dataSwings').textContent = Math.floor(swingCount / 2); // 半摆=1次来回

    // 能量（归一化到总能量）
    const h = L * (1 - Math.cos(theta)); // 高度
    const v = omega * L; // 线速度
    const m = 1; // 单位质量
    const KE = 0.5 * m * v * v;
    const PE = m * g * h;
    const TE = KE + PE;
    const maxE = Math.max(TE, 0.001);

    document.getElementById('barKE').style.width = (KE / maxE * 100) + '%';
    document.getElementById('barPE').style.width = (PE / maxE * 100) + '%';
    document.getElementById('barTotal').style.width = '100%';
    document.getElementById('valKE').textContent = KE.toFixed(2);
    document.getElementById('valPE').textContent = PE.toFixed(2);
    document.getElementById('valTotal').textContent = TE.toFixed(2);
  }

  // === 动画循环 ===
  function loop(ts) {
    if (!running) { lastTime = 0; return; }
    if (lastTime === 0) { lastTime = ts; }
    let dt = (ts - lastTime) / 1000;
    lastTime = ts;
    if (dt > MAX_ACC) dt = MAX_ACC; // clamp

    accumulator += dt;
    while (accumulator >= DT) {
      physicsStep();
      accumulator -= DT;
    }

    render();
    updateData();
    requestAnimationFrame(loop);
  }

  // === 控件事件 ===
  function updateSliderValues() {
    L = parseFloat(sliderL.value);
    g = parseFloat(sliderG.value);
    damping = parseFloat(sliderDamp.value);
    document.getElementById('valL').textContent = L.toFixed(2) + ' m';
    document.getElementById('valG').textContent = g.toFixed(2) + ' m/s²';
    document.getElementById('valDamp').textContent = damping.toFixed(3);

    const T = 2 * Math.PI * Math.sqrt(L / g);
    document.getElementById('dataPeriod').textContent = T.toFixed(2) + 's';
  }

  function updateAngleSlider() {
    theta0 = parseFloat(sliderTheta.value) * Math.PI / 180;
    document.getElementById('valTheta').textContent = sliderTheta.value + '°';
    if (!running) {
      theta = theta0;
      omega = 0;
      render();
      updateData();
    }
  }

  sliderL.addEventListener('input', updateSliderValues);
  sliderG.addEventListener('input', updateSliderValues);
  sliderDamp.addEventListener('input', updateSliderValues);
  sliderTheta.addEventListener('input', updateAngleSlider);

  btnPlay.addEventListener('click', function() {
    if (running) {
      running = false;
      btnPlay.textContent = '▶ 继续';
    } else {
      if (swingCount === 0 && omega === 0) {
        theta = theta0;
      }
      running = true;
      lastTime = 0;
      btnPlay.textContent = '⏸ 暂停';
      requestAnimationFrame(loop);
    }
  });

  btnReset.addEventListener('click', function() {
    running = false;
    theta = theta0;
    omega = 0;
    swingCount = 0;
    lastSign = 0;
    accumulator = 0;
    lastTime = 0;
    btnPlay.textContent = '▶ 开始';
    render();
    updateData();
  });

  // === 拖拽交互 ===
  function getCanvasCoords(e) {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
    const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
    return { x, y };
  }

  function getBallPos() {
    const W = parseFloat(canvas.style.width);
    const H = parseFloat(canvas.style.height);
    const pivotX = W / 2;
    const pivotY = H * PIVOT_Y_RATIO;
    const scale = Math.min(SCALE_BASE, (H - pivotY - 40) / (L + 0.3));
    const ropeLen = L * scale;
    const ballR = Math.max(12, Math.min(20, 0.15 * scale));
    const ballX = pivotX + ropeLen * Math.sin(theta);
    const ballY = pivotY + ropeLen * Math.cos(theta);
    return { pivotX, pivotY, ballX, ballY, ballR, ropeLen };
  }

  function onDragStart(e) {
    e.preventDefault();
    const { x, y } = getCanvasCoords(e);
    const bp = getBallPos();
    const dx = x - bp.ballX, dy = y - bp.ballY;
    if (dx * dx + dy * dy < (bp.ballR + 15) * (bp.ballR + 15)) {
      dragging = true;
      running = false;
      btnPlay.textContent = '▶ 开始';
      canvas.classList.add('dragging');
    }
  }

  function onDragMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const { x, y } = getCanvasCoords(e);
    const bp = getBallPos();
    const dx = x - bp.pivotX;
    const dy = y - bp.pivotY;
    let angle = Math.atan2(dx, dy);
    // 限制角度范围 -90° ~ 90°
    angle = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, angle));
    theta = angle;
    omega = 0;
    // 同步滑块
    sliderTheta.value = Math.round(Math.abs(angle * 180 / Math.PI));
    document.getElementById('valTheta').textContent = sliderTheta.value + '°';
    theta0 = Math.abs(angle) * Math.sign(angle || 1);
    render();
    updateData();
  }

  function onDragEnd() {
    if (!dragging) return;
    dragging = false;
    canvas.classList.remove('dragging');
    // 释放后自动开始
    theta0 = theta;
    swingCount = 0;
    lastSign = 0;
    running = true;
    lastTime = 0;
    btnPlay.textContent = '⏸ 暂停';
    requestAnimationFrame(loop);
  }

  canvas.addEventListener('mousedown', onDragStart);
  canvas.addEventListener('mousemove', onDragMove);
  canvas.addEventListener('mouseup', onDragEnd);
  canvas.addEventListener('mouseleave', onDragEnd);
  canvas.addEventListener('touchstart', onDragStart, { passive: false });
  canvas.addEventListener('touchmove', onDragMove, { passive: false });
  canvas.addEventListener('touchend', onDragEnd);

  // === 切tab处理 ===
  document.addEventListener('visibilitychange', function() {
    if (!document.hidden && running) { lastTime = 0; accumulator = 0; }
  });

  // === KaTeX 渲染 ===
  if (typeof katex !== 'undefined') {
    katex.render('T = 2\\pi\\sqrt{\\dfrac{L}{g}}', document.getElementById('formulaT'), { displayMode: true });
  }

  // === 初始化 ===
  updateSliderValues();
  updateAngleSlider();
  render();
  updateData();
})();
</script>
