<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

let loanType = 'equal';
let depositType = 'compound';

const fmt = n => '¥' + n.toFixed(2).replace(/\B(?=(\d{3})+\.)/g, ',');
const fmtInt = n => '¥' + Math.round(n).toLocaleString();

/* ===== 贷款计算 ===== */
function calcLoan() {
  const P = parseFloat(document.getElementById('loanAmount').value) || 0;
  const annualRate = parseFloat(document.getElementById('loanRate').value) || 0;
  const r = annualRate / 100 / 12; // 月利率
  const years = parseInt(document.getElementById('loanYears').value) || 0;
  const n = years * 12;
  if (!P || !n) return;

  let monthly, totalPay, totalInt;
  const rows = [];

  if (loanType === 'equal') {
    // 等额本息: M = P × r(1+r)^n / ((1+r)^n - 1)
    if (r > 0) {
      const factor = Math.pow(1 + r, n);
      monthly = P * r * factor / (factor - 1);
    } else {
      monthly = P / n; // 利率为 0（AC-05）
    }
    totalPay = monthly * n;
    totalInt = totalPay - P;
    let balance = P;
    for (let i = 1; i <= n; i++) {
      const intPart = balance * r;
      const capPart = monthly - intPart;
      balance -= capPart;
      if (i === n) balance = 0; // 最后一期浮点误差修正
      rows.push([i, monthly, capPart, intPart, Math.max(0, balance)]);
    }
  } else {
    // 等额本金
    const capPart = P / n;
    totalPay = 0;
    totalInt = 0;
    let balance = P;
    for (let i = 1; i <= n; i++) {
      const intPart = balance * r;
      const m = capPart + intPart;
      totalPay += m;
      totalInt += intPart;
      balance -= capPart;
      if (i === n) balance = 0;
      rows.push([i, m, capPart, intPart, Math.max(0, balance)]);
    }
    monthly = rows[0][1];
  }

  // AC-07: 交叉验证 — 还款明细表总利息 = 各月利息之和
  const scheduleInterestSum = rows.reduce((s, r) => s + r[3], 0);
  // totalInt 和 scheduleInterestSum 应该一致（浮点误差 < 1 元）

  document.getElementById('monthlyPayment').textContent = fmtInt(monthly) + (loanType === 'principal' ? '（首月）' : '');
  document.getElementById('totalPayment').textContent = fmtInt(totalPay);
  document.getElementById('totalInterest').textContent = fmtInt(totalInt);

  const capPct = totalPay ? Math.round(P / totalPay * 100) : 100;
  document.getElementById('pieChart').style.background = `conic-gradient(var(--brand-500) 0% ${capPct}%, #F59E0B ${capPct}% 100%)`;
  document.getElementById('pieCapital').textContent = capPct + '%';
  document.getElementById('pieInterest').textContent = (100 - capPct) + '%';

  // 还款明细表
  document.getElementById('scheduleBody').innerHTML = rows.map(r =>
    `<tr><td>${r[0]}</td><td>${fmt(r[1])}</td><td>${fmt(r[2])}</td><td>${fmt(r[3])}</td><td>${fmtInt(r[4])}</td></tr>`
  ).join('');

  document.getElementById('statusInfo').textContent =
    `${fmtInt(P)} · ${annualRate}% · ${years}年 · 月供 ${fmtInt(monthly)} · 总利息 ${fmtInt(totalInt)}`;
}

/* ===== 提前还款计算 ===== */
let prepayMode = 'shorten'; // shorten | reduce

function calcPrepay() {
  const P = parseFloat(document.getElementById('loanAmount').value) || 0;
  const annualRate = parseFloat(document.getElementById('loanRate').value) || 0;
  const r = annualRate / 100 / 12;
  const years = parseInt(document.getElementById('loanYears').value) || 0;
  const n = years * 12;
  const prepayMonth = parseInt(document.getElementById('prepayMonth').value) || 0;
  const prepayAmount = parseFloat(document.getElementById('prepayAmount').value) || 0;

  const errEl = document.getElementById('prepayError');
  const resultArea = document.getElementById('prepayResultArea');

  if (!P || !n || !r) return;

  // AC-11: 提前还款时间 > 总期限
  if (prepayMonth >= n) {
    errEl.textContent = '⚠️ 已还月数不能大于等于总期限';
    errEl.style.display = 'block';
    resultArea.style.display = 'none';
    return;
  }

  // 先算原始还款计划到第 N 期的剩余本金
  let origMonthly, origTotalInt;
  let balance = P;

  if (loanType === 'equal' && r > 0) {
    const factor = Math.pow(1 + r, n);
    origMonthly = P * r * factor / (factor - 1);
    origTotalInt = origMonthly * n - P;
    for (let i = 0; i < prepayMonth; i++) {
      const intPart = balance * r;
      balance -= (origMonthly - intPart);
    }
  } else {
    const capPart = P / n;
    origTotalInt = 0;
    for (let i = 0; i < n; i++) {
      origTotalInt += balance * r;
      if (i < prepayMonth) balance -= capPart;
    }
    // recalc balance for principal method
    balance = P;
    for (let i = 0; i < prepayMonth; i++) balance -= P / n;
    origMonthly = P / n + P * r; // first month for display
  }

  // AC-12: 提前还款金额 > 剩余本金
  if (prepayAmount >= balance) {
    errEl.textContent = '⚠️ 提前还款金额不能大于等于剩余本金（' + fmtInt(balance) + '）';
    errEl.style.display = 'block';
    resultArea.style.display = 'none';
    return;
  }

  errEl.style.display = 'none';
  resultArea.style.display = '';

  const newBalance = balance - prepayAmount;
  let newMonthly, newTerm, newTotalInt;

  // 已还部分的利息
  let paidInterest = 0;
  let bal2 = P;
  if (loanType === 'equal' && r > 0) {
    const factor = Math.pow(1 + r, n);
    const m = P * r * factor / (factor - 1);
    for (let i = 0; i < prepayMonth; i++) {
      const intPart = bal2 * r;
      paidInterest += intPart;
      bal2 -= (m - intPart);
    }
  } else {
    const capPart = P / n;
    for (let i = 0; i < prepayMonth; i++) {
      paidInterest += bal2 * r;
      bal2 -= capPart;
    }
  }

  if (prepayMode === 'shorten') {
    // 缩短期限：月供不变，算新期限
    if (loanType === 'equal' && r > 0) {
      newMonthly = origMonthly; // 月供不变
      // newBalance = newMonthly * ((1-(1+r)^-newN) / r)
      // solve for newN: newN = -ln(1 - newBalance*r/newMonthly) / ln(1+r)
      const x = 1 - newBalance * r / newMonthly;
      if (x <= 0) { errEl.textContent = '⚠️ 参数无效'; errEl.style.display = 'block'; resultArea.style.display = 'none'; return; }
      newTerm = Math.ceil(-Math.log(x) / Math.log(1 + r));
      // 新总利息 = 已还利息 + 新期限月供总额 - 新剩余本金
      newTotalInt = paidInterest + newMonthly * newTerm - newBalance;
    } else {
      // 等额本金缩短期限：每月本金 = newBalance / newTerm，但月供不变 → 复杂，简化为重算
      const capPart = P / n; // 原每月本金不变
      newTerm = Math.ceil(newBalance / capPart);
      let ni = 0; let b = newBalance;
      for (let i = 0; i < newTerm; i++) { ni += b * r; b -= capPart; }
      newTotalInt = paidInterest + ni;
      newMonthly = capPart + newBalance * r; // 首月
    }
  } else {
    // 减少月供：期限不变
    const remainN = n - prepayMonth;
    newTerm = remainN;
    if (loanType === 'equal' && r > 0) {
      const factor2 = Math.pow(1 + r, remainN);
      newMonthly = newBalance * r * factor2 / (factor2 - 1);
      newTotalInt = paidInterest + newMonthly * remainN - newBalance;
    } else {
      const capPart = newBalance / remainN;
      let ni = 0; let b = newBalance;
      for (let i = 0; i < remainN; i++) { ni += b * r; b -= capPart; }
      newTotalInt = paidInterest + ni;
      newMonthly = capPart + newBalance * r; // 首月
    }
  }

  const saved = origTotalInt - newTotalInt;

  document.getElementById('prepayMonthly').textContent = fmtInt(newMonthly);
  document.getElementById('prepayMonthlyLabel').textContent = prepayMode === 'shorten' ? '月供（不变）' : '新月供';

  const termYears = Math.floor(newTerm / 12);
  const termMonths = newTerm % 12;
  document.getElementById('prepayTerm').textContent = termYears + '年' + (termMonths ? termMonths + '月' : '');
  document.getElementById('prepaySave').textContent = fmtInt(saved);
  document.getElementById('prepayOrigInt').textContent = fmtInt(origTotalInt);
  document.getElementById('prepayNewInt').textContent = fmtInt(newTotalInt);

  const pct = origTotalInt > 0 ? Math.round(newTotalInt / origTotalInt * 100) : 0;
  document.getElementById('prepayBar').style.width = pct + '%';
}

/* ===== 存款计算 ===== */
function calcDeposit() {
  const P = parseFloat(document.getElementById('depositAmount').value) || 0;
  const r = (parseFloat(document.getElementById('depositRate').value) || 0) / 100;
  const y = parseFloat(document.getElementById('depositYears').value) || 0;

  let total;
  if (depositType === 'compound') {
    total = P * Math.pow(1 + r, y);
  } else {
    total = P * (1 + r * y);
  }
  const interest = total - P;

  document.getElementById('depositTotal').textContent = fmtInt(total);
  document.getElementById('depositInterest').textContent = fmtInt(interest);
  document.getElementById('depositCapital').textContent = fmtInt(P);

  document.getElementById('statusInfo').textContent =
    `本金 ${fmtInt(P)} · ${depositType === 'compound' ? '复利' : '单利'} ${(r * 100).toFixed(2)}% · ${y}年 · 利息 ${fmtInt(interest)}`;
}

/* ===== 事件绑定 ===== */
// 模式 Tab
document.getElementById('modeTabs').addEventListener('click', e => {
  const tab = e.target.closest('.mode-tab');
  if (!tab) return;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  const mode = tab.dataset.mode;
  document.getElementById('loanPanel').style.display = mode === 'loan' ? '' : 'none';
  document.getElementById('depositPanel').style.display = mode === 'deposit' ? '' : 'none';
  if (mode === 'deposit') calcDeposit();
});

// 贷款输入
['loanAmount', 'loanRate', 'loanYears'].forEach(id =>
  document.getElementById(id).addEventListener('input', calcLoan)
);

// 等额本息/本金切换
document.getElementById('btnEqualPayment').addEventListener('click', () => {
  loanType = 'equal';
  document.getElementById('btnEqualPayment').classList.add('active');
  document.getElementById('btnEqualPrincipal').classList.remove('active');
  calcLoan();
});
document.getElementById('btnEqualPrincipal').addEventListener('click', () => {
  loanType = 'principal';
  document.getElementById('btnEqualPrincipal').classList.add('active');
  document.getElementById('btnEqualPayment').classList.remove('active');
  calcLoan();
});

// 提前还款展开/收起
document.getElementById('prepayToggle').addEventListener('click', () => {
  const content = document.getElementById('prepayContent');
  const toggle = document.getElementById('prepayToggle');
  if (content.style.display === 'none' || !content.style.display) {
    content.style.display = 'block';
    toggle.textContent = '收起 ↑';
    calcPrepay();
  } else {
    content.style.display = 'none';
    toggle.textContent = '展开 ↓';
  }
});

// 提前还款输入
['prepayMonth', 'prepayAmount'].forEach(id =>
  document.getElementById(id).addEventListener('input', calcPrepay)
);

// 缩短期限/减少月供
document.getElementById('btnShortenTerm').addEventListener('click', () => {
  prepayMode = 'shorten';
  document.getElementById('btnShortenTerm').classList.add('active');
  document.getElementById('btnReducePayment').classList.remove('active');
  calcPrepay();
});
document.getElementById('btnReducePayment').addEventListener('click', () => {
  prepayMode = 'reduce';
  document.getElementById('btnReducePayment').classList.add('active');
  document.getElementById('btnShortenTerm').classList.remove('active');
  calcPrepay();
});

// 贷款参数变化时也重新算提前还款
['loanAmount', 'loanRate', 'loanYears'].forEach(id =>
  document.getElementById(id).addEventListener('input', () => {
    if (document.getElementById('prepayContent').style.display === 'block') calcPrepay();
  })
);

// 存款输入
['depositAmount', 'depositRate', 'depositYears'].forEach(id =>
  document.getElementById(id).addEventListener('input', calcDeposit)
);

// 复利/单利切换
document.getElementById('btnCompound').addEventListener('click', () => {
  depositType = 'compound';
  document.getElementById('btnCompound').classList.add('active');
  document.getElementById('btnSimple').classList.remove('active');
  calcDeposit();
});
document.getElementById('btnSimple').addEventListener('click', () => {
  depositType = 'simple';
  document.getElementById('btnSimple').classList.add('active');
  document.getElementById('btnCompound').classList.remove('active');
  calcDeposit();
});

// 还款明细表展开/收起
document.getElementById('scheduleToggle').addEventListener('click', () => {
  const wrap = document.getElementById('scheduleWrap');
  const toggle = document.getElementById('scheduleToggle');
  if (wrap.style.display === 'none') {
    wrap.style.display = 'block';
    toggle.textContent = '收起 ↑';
  } else {
    wrap.style.display = 'none';
    toggle.textContent = '展开 ↓';
  }
});

calcLoan();
calcDeposit();
</script>
