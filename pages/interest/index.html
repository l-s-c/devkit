<script type="module">
import '../../shared/theme.js';

let loanType = 'equal';
let depositType = 'compound';

const fmt = n => '¥' + n.toFixed(2).replace(/\B(?=(\d{3})+\.)/g, ',');
const fmtInt = n => '¥' + Math.round(n).toLocaleString();

/* ===== 贷款计算 ===== */
function calcLoan() {
  const P = parseFloat(document.getElementById('loanAmount').value) || 0;
  const annualRate = parseFloat(document.getElementById('loanRate').value) || 0;
  const r = annualRate / 100 / 12; // 月利率
  const years = parseInt(document.getElementById('loanYears').value) || 0;
  const n = years * 12;
  if (!P || !n) return;

  let monthly, totalPay, totalInt;
  const rows = [];

  if (loanType === 'equal') {
    // 等额本息: M = P × r(1+r)^n / ((1+r)^n - 1)
    if (r > 0) {
      const factor = Math.pow(1 + r, n);
      monthly = P * r * factor / (factor - 1);
    } else {
      monthly = P / n; // 利率为 0（AC-05）
    }
    totalPay = monthly * n;
    totalInt = totalPay - P;
    let balance = P;
    for (let i = 1; i <= n; i++) {
      const intPart = balance * r;
      const capPart = monthly - intPart;
      balance -= capPart;
      if (i === n) balance = 0; // 最后一期浮点误差修正
      rows.push([i, monthly, capPart, intPart, Math.max(0, balance)]);
    }
  } else {
    // 等额本金
    const capPart = P / n;
    totalPay = 0;
    totalInt = 0;
    let balance = P;
    for (let i = 1; i <= n; i++) {
      const intPart = balance * r;
      const m = capPart + intPart;
      totalPay += m;
      totalInt += intPart;
      balance -= capPart;
      if (i === n) balance = 0;
      rows.push([i, m, capPart, intPart, Math.max(0, balance)]);
    }
    monthly = rows[0][1];
  }

  // AC-07: 交叉验证 — 还款明细表总利息 = 各月利息之和
  const scheduleInterestSum = rows.reduce((s, r) => s + r[3], 0);
  // totalInt 和 scheduleInterestSum 应该一致（浮点误差 < 1 元）

  document.getElementById('monthlyPayment').textContent = fmtInt(monthly) + (loanType === 'principal' ? '（首月）' : '');
  document.getElementById('totalPayment').textContent = fmtInt(totalPay);
  document.getElementById('totalInterest').textContent = fmtInt(totalInt);

  const capPct = totalPay ? Math.round(P / totalPay * 100) : 100;
  document.getElementById('pieChart').style.background = `conic-gradient(var(--brand-500) 0% ${capPct}%, #F59E0B ${capPct}% 100%)`;
  document.getElementById('pieCapital').textContent = capPct + '%';
  document.getElementById('pieInterest').textContent = (100 - capPct) + '%';

  // 还款明细表
  document.getElementById('scheduleBody').innerHTML = rows.map(r =>
    `<tr><td>${r[0]}</td><td>${fmt(r[1])}</td><td>${fmt(r[2])}</td><td>${fmt(r[3])}</td><td>${fmtInt(r[4])}</td></tr>`
  ).join('');

  document.getElementById('statusInfo').textContent =
    `${fmtInt(P)} · ${annualRate}% · ${years}年 · 月供 ${fmtInt(monthly)} · 总利息 ${fmtInt(totalInt)}`;
}

/* ===== 存款计算 ===== */
function calcDeposit() {
  const P = parseFloat(document.getElementById('depositAmount').value) || 0;
  const r = (parseFloat(document.getElementById('depositRate').value) || 0) / 100;
  const y = parseFloat(document.getElementById('depositYears').value) || 0;

  let total;
  if (depositType === 'compound') {
    total = P * Math.pow(1 + r, y);
  } else {
    total = P * (1 + r * y);
  }
  const interest = total - P;

  document.getElementById('depositTotal').textContent = fmtInt(total);
  document.getElementById('depositInterest').textContent = fmtInt(interest);
  document.getElementById('depositCapital').textContent = fmtInt(P);

  document.getElementById('statusInfo').textContent =
    `本金 ${fmtInt(P)} · ${depositType === 'compound' ? '复利' : '单利'} ${(r * 100).toFixed(2)}% · ${y}年 · 利息 ${fmtInt(interest)}`;
}

/* ===== 事件绑定 ===== */
// 模式 Tab
document.getElementById('modeTabs').addEventListener('click', e => {
  const tab = e.target.closest('.mode-tab');
  if (!tab) return;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  const mode = tab.dataset.mode;
  document.getElementById('loanPanel').style.display = mode === 'loan' ? '' : 'none';
  document.getElementById('depositPanel').style.display = mode === 'deposit' ? '' : 'none';
  if (mode === 'deposit') calcDeposit();
});

// 贷款输入
['loanAmount', 'loanRate', 'loanYears'].forEach(id =>
  document.getElementById(id).addEventListener('input', calcLoan)
);

// 等额本息/本金切换
document.getElementById('btnEqualPayment').addEventListener('click', () => {
  loanType = 'equal';
  document.getElementById('btnEqualPayment').classList.add('active');
  document.getElementById('btnEqualPrincipal').classList.remove('active');
  calcLoan();
});
document.getElementById('btnEqualPrincipal').addEventListener('click', () => {
  loanType = 'principal';
  document.getElementById('btnEqualPrincipal').classList.add('active');
  document.getElementById('btnEqualPayment').classList.remove('active');
  calcLoan();
});

// 存款输入
['depositAmount', 'depositRate', 'depositYears'].forEach(id =>
  document.getElementById(id).addEventListener('input', calcDeposit)
);

// 复利/单利切换
document.getElementById('btnCompound').addEventListener('click', () => {
  depositType = 'compound';
  document.getElementById('btnCompound').classList.add('active');
  document.getElementById('btnSimple').classList.remove('active');
  calcDeposit();
});
document.getElementById('btnSimple').addEventListener('click', () => {
  depositType = 'simple';
  document.getElementById('btnSimple').classList.add('active');
  document.getElementById('btnCompound').classList.remove('active');
  calcDeposit();
});

// 还款明细表展开/收起
document.getElementById('scheduleToggle').addEventListener('click', () => {
  const wrap = document.getElementById('scheduleWrap');
  const toggle = document.getElementById('scheduleToggle');
  if (wrap.style.display === 'none') {
    wrap.style.display = 'block';
    toggle.textContent = '收起 ↑';
  } else {
    wrap.style.display = 'none';
    toggle.textContent = '展开 ↓';
  }
});

calcLoan();
calcDeposit();
</script>
