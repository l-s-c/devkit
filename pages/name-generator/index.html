<script>
let CHARS=[], SURNAMES={}, POEMS=[], COMMON_NAMES=[], FAVORITES=[], KANGXI={};

// Load data
async function loadData() {
  const base = '/devkit/data/name-generator/';
  const [chars, surnames, poems, common, kangxi] = await Promise.all([
    fetch(base+'chars.json').then(r=>r.json()),
    fetch(base+'surnames.json').then(r=>r.json()),
    fetch(base+'poems.json').then(r=>r.json()),
    fetch(base+'common-names.json').then(r=>r.json()),
    fetch(base+'kangxi-strokes.json').then(r=>r.json())
  ]);
  CHARS=chars; SURNAMES=surnames; POEMS=poems; COMMON_NAMES=common; KANGXI=kangxi;
  FAVORITES=JSON.parse(localStorage.getItem('name-favs')||'[]');
  initPoetryTab();
}
loadData();

function switchTab(tab) {
  document.getElementById('tab-generate').style.display = tab==='generate'?'block':'none';
  document.getElementById('tab-analyze').style.display = tab==='analyze'?'block':'none';
  document.getElementById('tab-poetry').style.display = tab==='poetry'?'block':'none';
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0&&tab==='generate')||(i===1&&tab==='analyze')||(i===2&&tab==='poetry'));
  });
}

document.querySelectorAll('.pref-tag').forEach(t=>t.addEventListener('click',()=>t.classList.toggle('active')));

// ===== TAB 1: 智能取名 =====
function generateNames() {
  const surname = document.getElementById('surname').value.trim();
  if (!surname) { alert('请输入姓氏'); return; }
  const gender = document.getElementById('gender').value;
  const nameLen = parseInt(document.getElementById('charCount').value);
  const surnameStrokes = getSurnameStrokes(surname);
  if (!surnameStrokes) { alert('暂不支持该姓氏，请换一个试试'); return; }

  // Filter chars by gender
  const pool = CHARS.filter(c => {
    if (gender==='male') return c.g==='男'||c.g==='中';
    if (gender==='female') return c.g==='女'||c.g==='中';
    return true;
  });

  // Generate candidates
  const candidates = [];
  const seen = new Set();
  for (let i=0; i<500 && candidates.length<20; i++) {
    let nameChars;
    if (nameLen===1) {
      const c1 = pool[Math.floor(Math.random()*pool.length)];
      nameChars = [c1];
    } else {
      const c1 = pool[Math.floor(Math.random()*pool.length)];
      const c2 = pool[Math.floor(Math.random()*pool.length)];
      if (c1.ch===c2.ch) continue;
      nameChars = [c1,c2];
    }
    const nameStr = nameChars.map(c=>c.ch).join('');
    if (seen.has(nameStr)) continue;
    seen.add(nameStr);

    const nameStrokes = nameChars.map(c=>c.kx);
    const wuge = calcWuge(surnameStrokes, nameStrokes);
    const pinyinArr = [getSurnamePinyin(surname), ...nameChars.map(c=>c.py)];
    const toneResult = checkTones(pinyinArr);
    const poemMatch = findPoemMatch(nameChars);

    // Score
    const wugeScore = calcWugeScore(wuge);
    const toneScore = toneResult.score;
    const meaningScore = 70 + Math.floor(Math.random()*25);
    const totalScore = Math.round(wugeScore*0.35 + toneScore*0.3 + meaningScore*0.35);

    const isCommon = COMMON_NAMES.includes(nameStr) || COMMON_NAMES.includes(surname+nameStr);

    candidates.push({
      surname, nameChars, nameStr, wuge, pinyinArr, toneResult,
      poemMatch, wugeScore, toneScore, meaningScore, totalScore, isCommon
    });
  }

  // Sort by total score
  candidates.sort((a,b) => b.totalScore - a.totalScore);
  const top = candidates.slice(0, 8);

  // Render
  const gLabel = gender==='male'?'男':(gender==='female'?'女':'');
  document.getElementById('resultsTitle').textContent = '为「'+surname+'」姓'+gLabel+'孩推荐';
  document.getElementById('resultsCount').textContent = '共 '+top.length+' 个名字 · 按综合评分排序';
  document.getElementById('resultsArea').style.display = 'block';

  const grid = document.getElementById('nameGrid');
  grid.innerHTML = top.map(c => renderNameCard(c)).join('');

}

function renderNameCard(c) {
  const fullName = c.surname + c.nameStr;
  const pinyin = c.pinyinArr.join(' ');
  const sourceText = c.poemMatch ? '《'+c.poemMatch.a+'》' : '';
  const isFav = FAVORITES.includes(fullName);
  const meaning = c.nameChars.map(ch => ch.ch+'：'+ch.m).join('；');

  function scoreClass(s) { return s>=80?'high':s>=60?'mid':'low'; }

  return '<div class="name-card">'
    +'<div class="card-top"><div class="name-char">'
    +c.nameChars.map(ch=>'<div class="char">'+ch.ch+'</div>').join('')
    +'</div><div class="name-meta">'
    +'<div class="full-name">'+fullName+(c.isCommon?'<span class="common-warn">高频名</span>':'')+'</div>'
    +'<div class="pinyin">'+pinyin+'</div>'
    +'<div class="source">'+(sourceText||'寓意取名')+'</div>'
    +'</div></div>'
    +'<div class="card-scores">'
    +scoreItem('五格',c.wugeScore)+scoreItem('声调',c.toneScore)
    +scoreItem('寓意',c.meaningScore)+scoreItem('综合',c.totalScore)
    +'</div>'
    +'<div class="card-bottom"><div class="meaning">'+meaning+'</div>'
    +'<button class="fav-btn'+(isFav?' saved':'')+'" data-name="'+fullName+'">'
    +'<svg viewBox="0 0 24 24" fill="'+(isFav?'currentColor':'none')+'" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>'
    +'</button></div></div>';
}

function scoreItem(label, score) {
  const cls = score>=80?'high':score>=60?'mid':'low';
  return '<div class="score-item"><div class="score-label">'+label+'</div>'
    +'<div class="score-bar"><div class="score-bar-fill '+cls+'" style="width:'+score+'%"></div></div>'
    +'<div class="score-num">'+score+'</div></div>';
}

function calcWugeScore(wuge) {
  let s = 60;
  const items = [wuge.tian, wuge.ren, wuge.di, wuge.wai, wuge.zong];
  items.forEach(it => {
    if (it.lucky==='吉') s += 6;
    else if (it.lucky==='半吉') s += 2;
    else s -= 4;
  });
  s += Math.floor(wuge.sanCai * 0.1);
  return Math.min(100, Math.max(0, s));
}

function getSurnameStrokes(surname) {
  const v = SURNAMES[surname];
  if (!v) return null;
  return Array.isArray(v) ? v : [v];
}

function getSurnamePinyin(surname) {
  // Simple lookup from chars or hardcoded common ones
  const map = {"李":"lǐ","王":"wáng","张":"zhāng","刘":"liú","陈":"chén","杨":"yáng","黄":"huáng","赵":"zhào","周":"zhōu","吴":"wú","徐":"xú","孙":"sūn","马":"mǎ","胡":"hú","朱":"zhū","郭":"guō","何":"hé","林":"lín","罗":"luó","高":"gāo","梁":"liáng","郑":"zhèng","谢":"xiè","宋":"sòng","唐":"táng","韩":"hán","冯":"féng","董":"dǒng","程":"chéng","曹":"cáo","袁":"yuán","邓":"dèng","许":"xǔ","傅":"fù","沈":"shěn","曾":"zēng","彭":"péng","吕":"lǚ","苏":"sū","卢":"lú","蒋":"jiǎng","蔡":"cài","贾":"jiǎ","丁":"dīng","魏":"wèi","薛":"xuē","叶":"yè","阎":"yán","余":"yú","潘":"pān","杜":"dù","戴":"dài","夏":"xià","钟":"zhōng","汪":"wāng","田":"tián","任":"rèn","姜":"jiāng","范":"fàn","方":"fāng","石":"shí","姚":"yáo","谭":"tán","廖":"liào","邹":"zōu","熊":"xióng","金":"jīn","陆":"lù","郝":"hǎo","孔":"kǒng","白":"bái","崔":"cuī","康":"kāng","毛":"máo","邱":"qiū","秦":"qín","江":"jiāng","史":"shǐ","顾":"gù","侯":"hóu","邵":"shào","孟":"mèng","龙":"lóng","万":"wàn","段":"duàn","雷":"léi","钱":"qián","汤":"tāng","尹":"yǐn","黎":"lí","易":"yì","常":"cháng","武":"wǔ","乔":"qiáo","贺":"hè","赖":"lài","龚":"gōng","文":"wén"};
  return map[surname] || surname;
}

function findPoemMatch(nameChars) {
  for (const p of POEMS) {
    for (const ch of nameChars) {
      if (p.chars && p.chars.includes(ch.ch)) return p;
    }
  }
  return null;
}

// Event delegation for fav buttons
document.addEventListener('click', function(e) {
  const btn = e.target.closest('.fav-btn');
  if (!btn) return;
  e.stopPropagation();
  const name = btn.dataset.name;
  if (!name) return;
  const idx = FAVORITES.indexOf(name);
  if (idx >= 0) { FAVORITES.splice(idx,1); btn.classList.remove('saved'); btn.querySelector('svg').setAttribute('fill','none'); }
  else { FAVORITES.push(name); btn.classList.add('saved'); btn.querySelector('svg').setAttribute('fill','currentColor'); }
  localStorage.setItem('name-favs', JSON.stringify(FAVORITES));
});

// ===== TAB 2: 名字分析 =====
function analyzeName() {
  const name = document.getElementById('analyzeName').value.trim();
  if (name.length < 2 || name.length > 4) { alert('请输入2-4字的完整姓名'); return; }

  // Try to split surname (1 or 2 chars)
  let surname, givenChars;
  const twoCharSurname = name.substring(0,2);
  if (SURNAMES[twoCharSurname]) {
    surname = twoCharSurname;
    givenChars = name.substring(2).split('');
  } else {
    surname = name.substring(0,1);
    givenChars = name.substring(1).split('');
  }

  if (!SURNAMES[surname]) { alert('未识别姓氏「'+surname+'」'); return; }
  if (givenChars.length === 0) { alert('请输入完整姓名（姓+名）'); return; }

  const surnameStrokes = getSurnameStrokes(surname);
  // Use KANGXI table for strokes (broader coverage), fall back to CHARS data
  const givenCharData = givenChars.map(ch => {
    const fromChars = CHARS.find(c=>c.ch===ch);
    const kxStrokes = KANGXI[ch];
    if (fromChars) return fromChars;
    if (kxStrokes) return {ch, py:ch, kx:kxStrokes, wx:strokeToWuxing(kxStrokes), m:'', g:'中'};
    return null;
  });
  const hasAllData = givenCharData.every(c=>c);

  if (!hasAllData) {
    const missing = givenChars.filter((_,i)=>!givenCharData[i]).join('、');
    alert('「'+missing+'」为生僻字，暂无康熙笔画数据'); return;
  }

  const nameStrokes = givenCharData.map(c=>c.kx);
  const wuge = calcWuge(surnameStrokes, nameStrokes);
  const pinyinArr = [getSurnamePinyin(surname), ...givenCharData.map(c=>c.py)];
  const toneResult = checkTones(pinyinArr);
  const poemMatch = findPoemMatch(givenCharData);
  const toneNames = ['','阴平','阳平','上声','去声'];

  const container = document.getElementById('analysisResult');
  container.style.display = 'block';
  container.innerHTML = '<div class="analysis-card">'
    +'<div class="analysis-header">'
    +'<div class="big-name">'+name.split('').join(' ')+'</div>'
    +'<div class="pinyin-big">'+pinyinArr.join(' ')+'</div>'
    +'</div>'
    +'<div class="analysis-body">'
    // 三才五格
    +'<div class="analysis-section"><h3><span class="dot"></span> 三才五格</h3>'
    +'<div class="wuge-grid">'
    +wugeItem('天格',wuge.tian)+wugeItem('人格',wuge.ren)+wugeItem('地格',wuge.di)
    +wugeItem('外格',wuge.wai)+wugeItem('总格',wuge.zong)
    +'</div></div>'
    // 声调
    +'<div class="analysis-section"><h3><span class="dot"></span> 声调搭配</h3>'
    +'<div class="tone-visual">'
    +toneResult.tones.map((t,i) => {
      const h = t===0?20: 15+t*15;
      return '<div class="tone-bar" style="height:'+h+'px"><span class="tone-num">'+t+'</span><span class="tone-label">'+name[i]+' ('+(toneNames[t]||'轻声')+')</span></div>';
    }).join('')
    +'</div>'
    +'<p style="font-size:11px;color:'+(toneResult.allSame?'#E74C3C':'#27AE60')+';font-weight:600;margin-top:24px">'
    +'声调评分：'+toneResult.score+'分'+(toneResult.allSame?' · 三连同调，建议调整':'　·　抑扬顿挫，朗朗上口')
    +'</p></div>'
    // 诗词出处
    +'<div class="analysis-section"><h3><span class="dot"></span> 诗词出处</h3>'
    +(poemMatch ? '<div class="poetry-quote"><div class="verse">'+poemMatch.t+'</div>'
    +'<div class="author">— '+poemMatch.a+'（'+poemMatch.d+'）</div></div>' : '<p style="font-size:12px;color:#8B7355">暂无匹配的诗词典故记录</p>')
    +'</div>'
    // 五行
    +'<div class="analysis-section"><h3><span class="dot"></span> 五行分析</h3>'
    +'<div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">'
    +[surname,...givenChars].map((ch,i) => {
      const data = i===0 ? null : givenCharData[i-1];
      const wx = data ? data.wx : strokeToWuxing(surnameStrokes[0]);
      const colors = {"木":"#27AE60","火":"#E74C3C","土":"#F39C12","金":"#8B7355","水":"#2980B9"};
      return '<span style="padding:6px 16px;border-radius:6px;background:'+colors[wx]+'15;color:'+colors[wx]+';font-size:13px;font-weight:700">'+ch+'('+wx+')</span>';
    }).join('')
    +'</div></div>'
    +'</div></div>';
}

function wugeItem(label, data) {
  const cls = data.lucky==='吉'?'ji':data.lucky==='凶'?'xiong':'ban';
  return '<div class="wuge-item"><div class="wuge-name">'+label+'</div>'
    +'<div class="wuge-num">'+data.value+'</div>'
    +'<div class="wuge-luck '+cls+'">'+data.lucky+'</div></div>';
}

// ===== TAB 3: 诗词取名 =====
function initPoetryTab() {
  const dynasties = [...new Set(POEMS.map(p=>p.d))];
  const container = document.getElementById('dynastyTabs');
  container.innerHTML = dynasties.map((d,i) =>
    '<span class="dynasty-tab'+(i===0?' active':'')+'" data-dynasty="'+d+'">'+d+'</span>'
  ).join('');

  container.querySelectorAll('.dynasty-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      container.querySelectorAll('.dynasty-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      renderPoems(tab.dataset.dynasty);
    });
  });

  if (dynasties.length) renderPoems(dynasties[0]);
}

function renderPoems(dynasty) {
  const filtered = POEMS.filter(p=>p.d===dynasty);
  const list = document.getElementById('poemList');
  list.innerHTML = filtered.map(p => {
    let text = p.t;
    if (p.chars) {
      p.chars.forEach(ch => {
        text = text.replace(new RegExp(ch,'g'), '<em>'+ch+'</em>');
      });
    }
    const picks = p.chars ? p.chars.filter(ch => CHARS.find(c=>c.ch===ch)).slice(0,4) : [];
    return '<div class="poem-card">'
      +'<div class="poem-title">'+p.a.split('·').pop()+'</div>'
      +'<div class="poem-author">'+p.a+'（'+p.d+'）</div>'
      +'<div class="poem-text">'+text.replace(/，/g,'，<br/>')+'</div>'
      +(picks.length?'<div class="name-picks">'+picks.map(ch=>'<span class="pick" onclick="usePoetryChar(\''+ch+'\')">'+ch+'</span>').join('')+'</div>':'')
      +'</div>';
  }).join('');
}

function usePoetryChar(ch) {
  switchTab('generate');
  // Could pre-fill, for now just switch
}
