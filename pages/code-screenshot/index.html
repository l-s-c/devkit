.section-title{font-size:13px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px}

.code-input{width:100%;min-height:120px;border:1.5px solid var(--border-glass);border-radius:10px;background:var(--bg-glass-input);padding:12px;font-family:var(--font-code);font-size:13px;line-height:1.6;color:var(--text-primary);outline:none;resize:vertical}
.code-input:focus{border-color:var(--brand-500)}

.action-row{display:flex;gap:8px;margin-top:12px}

.btn-primary{background:linear-gradient(135deg,#6366F1,#818CF8);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(99,102,241,0.3)}
.btn-secondary{border:1.5px solid var(--border-glass);background:var(--bg-glass-input);color:var(--text-secondary)}

<body>
<h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">代码截图 — DevKit 在线开发者工具箱</h1>

<div class="main">
  <div class="panel">
    <div class="section-title">📸 代码截图</div>
    <div class="config-row">
      <span class="config-label">背景</span>
      <div class="pill-row" id="bgRow">
        <div class="grad-swatch active" style="background:linear-gradient(135deg,#6366F1,#A855F7)" data-bg="0"></div>
        <div class="grad-swatch" style="background:linear-gradient(135deg,#F97316,#EF4444)" data-bg="1"></div>
        <div class="grad-swatch" style="background:linear-gradient(135deg,#10B981,#06B6D4)" data-bg="2"></div>
        <div class="grad-swatch" style="background:linear-gradient(135deg,#3B82F6,#1D4ED8)" data-bg="3"></div>
        <div class="grad-swatch" style="background:linear-gradient(135deg,#F472B6,#A855F7)" data-bg="4"></div>
        <div class="grad-swatch" style="background:#1a1a2e" data-bg="5"></div>
      </div>
    </div>
    <div class="config-row">
      <span class="config-label">字号</span>
      <div class="pill-row" id="fontRow">
        <div class="pill" data-fs="12">12</div>
        <div class="pill active" data-fs="14">14</div>
        <div class="pill" data-fs="16">16</div>
        <div class="pill" data-fs="18">18</div>
      </div>
      <span class="config-label" style="margin-left:12px">标题栏</span>
      <div class="pill-row" id="titleRow">
        <div class="pill active" data-show="1">显示</div>
        <div class="pill" data-show="0">隐藏</div>
      </div>
    </div>
    <textarea class="code-input" id="codeInput" placeholder="粘贴代码...">function hello() {
  console.log('Hello, DevKit! 🚀');
  return 42;
}</textarea>

      <canvas id="cvs"></canvas>
    </div>
    <div class="action-row">
      <button class="btn btn-primary" id="exportBtn">📥 导出 PNG</button>
      <button class="btn btn-secondary" id="copyBtn">📋 复制图片</button>
    </div>
  </div>
</div>
<div class="statusbar"><span id="statusInfo">代码截图</span><div class="statusbar-spacer"></div><span>Canvas · 纯本地</span></div>

<script type="module">
import '../../shared/theme.js';
const BG_COLORS=[
  [[0,'#6366F1'],[1,'#A855F7']],[[0,'#F97316'],[1,'#EF4444']],
  [[0,'#10B981'],[1,'#06B6D4']],[[0,'#3B82F6'],[1,'#1D4ED8']],
  [[0,'#F472B6'],[1,'#A855F7']],[[0,'#1a1a2e'],[1,'#1a1a2e']]
];
const BG_CSS=['linear-gradient(135deg,#6366F1,#A855F7)','linear-gradient(135deg,#F97316,#EF4444)',
  'linear-gradient(135deg,#10B981,#06B6D4)','linear-gradient(135deg,#3B82F6,#1D4ED8)',
  'linear-gradient(135deg,#F472B6,#A855F7)','#1a1a2e'];
let bgIdx=0,fontSize=14,showTitle=true;
const cvs=document.getElementById('cvs'),ctx=cvs.getContext('2d');
const dpr=window.devicePixelRatio||1;

function render(){
  const code=document.getElementById('codeInput').value||' ';
  const lines=code.split('\n');
  const pad=32,cardPadX=20,cardPadY=16,titleH=showTitle?32:0;
  const font=`${fontSize}px "JetBrains Mono","SF Mono","Fira Code","Courier New",monospace`;
  ctx.font=font;
  const maxW=Math.max(...lines.map(l=>ctx.measureText(l).width),200);
  const lineH=fontSize*1.7;
  const cardW=maxW+cardPadX*2+20;
  const cardH=lines.length*lineH+cardPadY*2+titleH;
  const W=cardW+pad*2,H=cardH+pad*2;

  cvs.width=W*dpr;cvs.height=H*dpr;
  cvs.style.width=Math.min(W,860)+'px';cvs.style.height=Math.min(W,860)/W*H+'px';
  ctx.scale(dpr,dpr);

  // BG gradient
  const grad=ctx.createLinearGradient(0,0,W,H);
  BG_COLORS[bgIdx].forEach(([s,c])=>grad.addColorStop(s,c));
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  // Card
  const cx=pad,cy=pad;
  ctx.fillStyle='rgba(26,26,46,0.95)';
  ctx.beginPath();ctx.roundRect(cx,cy,cardW,cardH,12);ctx.fill();

  // Title bar dots
  if(showTitle){
    [[cx+16,cy+16,'#FF5F57'],[cx+30,cy+16,'#FFBD2E'],[cx+44,cy+16,'#28C840']].forEach(([x,y,c])=>{
      ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill();
    });
  }

  // Code
  ctx.font=font;ctx.fillStyle='#e4e4e7';ctx.textBaseline='top';
  lines.forEach((line,i)=>{
    ctx.fillText(line,cx+cardPadX,cy+titleH+cardPadY+i*lineH);
  });
}

document.getElementById('codeInput').addEventListener('input',render);

document.getElementById('bgRow').addEventListener('click',e=>{
  const s=e.target.closest('[data-bg]');if(!s)return;
  bgIdx=parseInt(s.dataset.bg);
  document.querySelectorAll('#bgRow .grad-swatch').forEach(el=>el.classList.remove('active'));
  s.classList.add('active');
  document.getElementById('previewWrap').style.background=BG_CSS[bgIdx];
  render();
});
document.getElementById('fontRow').addEventListener('click',e=>{
  const p=e.target.closest('[data-fs]');if(!p)return;
  fontSize=parseInt(p.dataset.fs);
  document.querySelectorAll('#fontRow .pill').forEach(el=>el.classList.remove('active'));
  p.classList.add('active');render();
});
document.getElementById('titleRow').addEventListener('click',e=>{
  const p=e.target.closest('[data-show]');if(!p)return;
  showTitle=p.dataset.show==='1';
  document.querySelectorAll('#titleRow .pill').forEach(el=>el.classList.remove('active'));
  p.classList.add('active');render();
});

document.getElementById('exportBtn').addEventListener('click',()=>{
  cvs.toBlob(blob=>{
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='code-screenshot.png';a.click();URL.revokeObjectURL(a.href);
  },'image/png');
});
document.getElementById('copyBtn').addEventListener('click',async()=>{
  try{
    const blob=await new Promise(r=>cvs.toBlob(r,'image/png'));
    await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
    document.getElementById('statusInfo').textContent='✅ 已复制到剪贴板';
  }catch(e){document.getElementById('statusInfo').textContent='❌ 复制失败，请用导出'}
});

render();
</script>
