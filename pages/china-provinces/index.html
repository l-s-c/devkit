let activeRegion = '全部';
let searchQuery = '';
let activeProvince = null;

const grid = document.getElementById('provGrid');
const detailCard = document.getElementById('detailCard');
const countBadge = document.getElementById('countBadge');
const noResult = document.getElementById('noResult');

function render() {
  const filtered = provinces.filter(p => {
    const regionMatch = activeRegion === '全部' || p.region === activeRegion;
    const q = searchQuery.toLowerCase();
    const searchMatch = !q || p.name.toLowerCase().includes(q) || p.abbr.toLowerCase().includes(q) || p.capital.toLowerCase().includes(q);
    return regionMatch && searchMatch;
  });
  countBadge.textContent = filtered.length + ' 省级行政区';
  grid.innerHTML = '';
  noResult.style.display = filtered.length === 0 ? 'block' : 'none';
  filtered.forEach(p => {
    const card = document.createElement('div');
    card.className = 'prov-card' + (activeProvince === p.name ? ' active' : '');
    card.innerHTML = `<div class="prov-name">${p.name}</div><div class="prov-abbr">${p.abbr} · ${p.type}</div><div class="prov-capital">◎ ${p.capital}</div>`;
    card.onclick = () => showDetail(p);
    grid.appendChild(card);
  });
}

function showDetail(p) {
  activeProvince = p.name;
  detailCard.className = 'detail-card show';
  detailCard.innerHTML = `<button class="detail-close" onclick="closeDetail()">✕</button>
    <div class="detail-name">${p.name}</div>
    <div class="detail-abbr">${p.abbr} · ${p.type}</div>
    <div class="detail-grid">
      <div class="detail-item"><div class="detail-label">◎️ 省会/首府</div><div class="detail-value">${p.capital}</div></div>
      <div class="detail-item"><div class="detail-label">∠ 面积</div><div class="detail-value">${p.area}</div></div>
      <div class="detail-item"><div class="detail-label">◎ 人口</div><div class="detail-value">${p.pop}</div></div>
      <div class="detail-item"><div class="detail-label">◈ GDP</div><div class="detail-value">${p.gdp}</div></div>
      <div class="detail-item"><div class="detail-label">◎ 特产</div><div class="detail-value">${p.specialties.join('、')}</div></div>
      <div class="detail-item"><div class="detail-label">☰ 历史</div><div class="detail-value">${p.history}</div></div>
    </div>
    <div class="detail-spots"><span style="font-size:10px;font-weight:700;color:var(--text-caption)">◎️ 景点：</span>${p.spots.map(s=>'<span class="spot-tag">'+s+'</span>').join('')}</div>`;
  render();
  detailCard.scrollIntoView({behavior:'smooth',block:'nearest'});
}

window.closeDetail = function() {
  activeProvince = null;
  detailCard.className = 'detail-card';
  render();
};

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

document.getElementById('regionPills').addEventListener('click', e => {
  const pill = e.target.closest('.region-pill');
  if (!pill) return;
  document.querySelectorAll('.region-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  activeRegion = pill.dataset.region;
  render();
});

render();
</script>
