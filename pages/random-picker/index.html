<style>
body { min-height: 100vh; display: flex; flex-direction: column; }
.main { flex: 1; position: relative; z-index: 1; padding: 24px 24px 24px; max-width: 960px; margin: 0 auto; width: 100%; }
.dual { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
.panel {
  padding: 24px; border-radius: 16px; margin-bottom: 16px;
  background: var(--bg-glass); backdrop-filter: blur(20px);
  border: 0.5px solid var(--border-glass);
}
.section-title { font-size: 14px; font-weight: 800; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }

/* Textarea */
.name-ta {
  width: 100%; height: 200px; padding: 14px; border-radius: 10px;
  border: 1.5px solid var(--border-glass); background: var(--bg-glass-input);
  font-size: 13px; line-height: 1.8; color: var(--text-primary); outline: none;
  resize: vertical; font-family: var(--font-family);
}
.name-ta:focus { border-color: var(--brand-500); }
.name-ta::placeholder { color: var(--text-caption); }
.name-count { font-family: var(--font-code); font-size: 11px; color: var(--text-caption); margin-top: 6px; text-align: right; }

/* Example pills */
.example-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.example-pill {
  padding: 5px 12px; border-radius: 16px; border: 1.5px solid var(--border-glass);
  background: var(--bg-glass-input); font-size: 10px; font-weight: 700;
  color: var(--text-secondary); cursor: pointer; transition: all 150ms;
}
.example-pill:hover { border-color: var(--brand-500); color: var(--brand-500); }

/* Pick count */
.pick-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.pick-label { font-size: 12px; font-weight: 700; color: var(--text-secondary); }
.pick-input {
  width: 60px; padding: 8px; border-radius: 6px; border: 1.5px solid var(--border-glass);
  background: var(--bg-glass-input); font-family: var(--font-code); font-size: 16px;
  font-weight: 700; text-align: center; color: var(--text-primary); outline: none;
}
.pick-input:focus { border-color: var(--brand-500); }
.pick-unit { font-size: 11px; color: var(--text-caption); }

/* Draw button */
.draw-btn {
  width: 100%; padding: 16px; border-radius: 10px; border: none;
  background: linear-gradient(135deg, #6366F1, #818CF8); color: #fff;
  font-size: 16px; font-weight: 800; cursor: pointer; transition: all 200ms;
}
.draw-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(99,102,241,0.3); }
.draw-btn:disabled { opacity: 0.4; transform: none; box-shadow: none; cursor: not-allowed; }
.draw-btn.drawing { background: linear-gradient(135deg, #F59E0B, #FBBF24); animation: shake 0.1s infinite; }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }

/* Reset */
.reset-btn {
  width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid var(--border-glass);
  background: var(--bg-glass-input); color: var(--text-secondary); font-size: 12px;
  font-weight: 700; cursor: pointer; margin-top: 8px; transition: all 150ms;
}
.reset-btn:hover { border-color: #EF4444; color: #EF4444; }

/* Result */
.result-stage {
  text-align: center; padding: 32px; min-height: 120px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.result-rolling { font-size: 36px; font-weight: 800; color: #F59E0B; transition: all 50ms; }
.result-final { font-size: 36px; font-weight: 800; color: var(--brand-500); animation: popIn 0.4s ease; }
@keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 60% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
.result-emoji { font-size: 48px; margin-bottom: 8px; }
.result-hint { font-size: 12px; color: var(--text-caption); margin-top: 8px; }

/* Winner list */
.winner-list { list-style: none; }
.winner-item {
  display: flex; align-items: center; gap: 8px; padding: 10px 14px;
  border-radius: 6px; border: 1px solid var(--border-glass); margin-bottom: 6px;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.winner-num {
  width: 24px; height: 24px; border-radius: 50%;
  background: linear-gradient(135deg, #6366F1, #818CF8); color: #fff;
  font-size: 11px; font-weight: 800; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0;
}
.winner-name { font-size: 14px; font-weight: 700; flex: 1; }
.winner-time { font-family: var(--font-code); font-size: 10px; color: var(--text-caption); }

/* Pool tags */
.pool-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.pool-tag { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; transition: all 150ms; }
.pool-tag.available { background: rgba(99,102,241,0.08); color: var(--brand-500); }
.pool-tag.picked { background: rgba(16,185,129,0.08); color: #10B981; text-decoration: line-through; opacity: 0.6; }

/* Crypto badge */
.crypto-badge {
  display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px;
  border-radius: 4px; background: rgba(16,185,129,0.08); font-size: 10px;
  font-weight: 700; color: #10B981; margin-top: 10px;
}

@media (max-width: 768px) {
  .main { padding: 16px 16px 60px; }
  .dual { grid-template-columns: 1fr; }
}

  <a class="topbar-logo" href="../index.html"><svg class="topbar-logo-icon" width="24" height="24" viewBox="0 0 512 512" fill="none"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#3B82F6"/><stop offset="1" stop-color="#1D4ED8"/></linearGradient></defs><rect width="512" height="512" rx="112" fill="url(#bg)"/><g transform="translate(256,256) rotate(-45) translate(-256,-256)"><path d="M352 108c-35.3 0-67.3 14.3-90.5 37.5L175 232c-5.6-1.3-11.5-2-17.5-2C111 230 72 269 72 315.5S111 401 157.5 401 243 362 243 315.5c0-6-0.7-11.9-2-17.5l86.5-86.5C350.7 235 383 249 418 249c8 0 15.8-0.7 23.3-2l-0.1 0.1C465 223.3 480 190.8 480 155c0-8.5-0.8-16.8-2.2-24.8L410 198l-56-14-14-56 68-67.8C400 59 391 58 382 58c-10 0-20 0.7-30 2zm-194.5 248a40 40 0 1 1 0-80 40 40 0 0 1 0 80z" fill="#fff" fill-opacity="0.95"/></g></svg><span class="topbar-logo-text">DevKit</span></a>

<div class="main">
  <div class="dual">
    <!-- Left: Input -->
    <div>
      <div class="panel">
        <div class="section-title">☰ 输入名单</div>
        <div class="example-row" id="exampleRow">
          <span class="example-pill" data-ex="class">◎‍◎ 班级名单</span>
          <span class="example-pill" data-ex="team">◎ 团队成员</span>
          <span class="example-pill" data-ex="food">◎ 今天吃什么</span>
        </div>
        <textarea class="name-ta" id="nameInput" placeholder="每行输入一个名字&#10;张三&#10;李四&#10;王五&#10;赵六&#10;…">张三
李四
王五
赵六
钱七
孙八
周九
吴十</textarea>
        <div class="name-count">共 <span id="nameCount">8</span> 人</div>
      </div>

      <div class="panel">
        <div class="pick-row">
          <span class="pick-label">◎ 抽取人数</span>
          <input type="number" class="pick-input" id="pickCount" value="1" min="1">
          <span class="pick-unit">人</span>
        </div>
        <button class="draw-btn" id="drawBtn">◎ 开始抽签</button>
        <button class="reset-btn" id="resetBtn">↻ 重置（恢复全部名单）</button>
        <div class="crypto-badge">⊕ crypto.getRandomValues — 密码学级随机</div>
      </div>

      <div class="panel">
        <div class="section-title">◎ 候选池</div>
        <div class="pool-wrap" id="poolWrap"></div>
      </div>
    </div>

    <!-- Right: Result -->
    <div>
      <div class="panel">
        <div class="section-title">✦ 抽签结果</div>
        <div class="result-stage" id="resultStage">
          <div class="result-emoji">◎</div>
          <div style="font-size:14px;color:var(--text-caption)">输入名单后点击「开始抽签」</div>
        </div>
      </div>

      <div class="panel">
        <div class="section-title">☰ 抽签历史</div>
        <ul class="winner-list" id="winnerList">
          <li style="text-align:center;padding:20px;color:var(--text-caption);font-size:12px">暂无记录</li>
        </ul>
      </div>
    </div>
  </div>
</div>

<div class="statusbar">
  <span id="statusInfo">在线抽签</span>
  <div class="statusbar-spacer"></div>
  <span>crypto.getRandomValues</span>
</div>

<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

const EXAMPLES = {
  class: '张三\n李四\n王五\n赵六\n钱七\n孙八\n周九\n吴十\n郑十一\n冯十二',
  team: 'Alice\nBob\nCharlie\nDiana\nEve\nFrank\nGrace\nHenry',
  food: '火锅\n烧烤\n麻辣烫\n披萨\n寿司\n汉堡\n炸鸡\n面条\n饺子\n沙拉'
};

let pool = [], picked = [], history = [], drawCount = 0;

function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function getNames() {
  return document.getElementById('nameInput').value.split('\n').map(s => s.trim()).filter(Boolean);
}

function cryptoRandom(max) {
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] % max;
}

function updateCount() {
  document.getElementById('nameCount').textContent = getNames().length;
}

function initPool() {
  pool = getNames().filter(n => !picked.includes(n));
  renderPool();
}

function renderPool() {
  const all = getNames();
  document.getElementById('poolWrap').innerHTML = all.map(n => {
    const isPicked = picked.includes(n);
    return `<span class="pool-tag ${isPicked ? 'picked' : 'available'}">${esc(n)}</span>`;
  }).join('');
}

function renderHistory() {
  const el = document.getElementById('winnerList');
  if (!history.length) {
    el.innerHTML = '<li style="text-align:center;padding:20px;color:var(--text-caption);font-size:12px">暂无记录</li>';
    return;
  }
  el.innerHTML = history.map((h, i) => `
    <li class="winner-item">
      <div class="winner-num">${history.length - i}</div>
      <div class="winner-name">${esc(h.name)}</div>
      <div class="winner-time">${h.time}</div>
    </li>`).join('');
}

/* Examples */
document.getElementById('exampleRow').addEventListener('click', e => {
  const pill = e.target.closest('[data-ex]');
  if (!pill) return;
  document.getElementById('nameInput').value = EXAMPLES[pill.dataset.ex];
  updateCount(); resetAll();
});

document.getElementById('nameInput').addEventListener('input', updateCount);

/* Draw */
document.getElementById('drawBtn').addEventListener('click', () => {
  initPool();
  const stage = document.getElementById('resultStage');
  if (!pool.length) {
    stage.innerHTML = '<div class="result-emoji">◎</div><div style="color:var(--text-caption)">候选池已空，请重置</div>';
    return;
  }

  const count = Math.min(parseInt(document.getElementById('pickCount').value) || 1, pool.length);
  const btn = document.getElementById('drawBtn');
  btn.disabled = true; btn.classList.add('drawing'); btn.textContent = '◎ 抽签中…';

  let tick = 0, maxTicks = 20 + cryptoRandom(10);

  const interval = setInterval(() => {
    const idx = cryptoRandom(pool.length);
    stage.innerHTML = `<div class="result-rolling">${esc(pool[idx])}</div><div class="result-hint">抽签中…</div>`;
    tick++;
    if (tick >= maxTicks) {
      clearInterval(interval);
      // Fisher-Yates shuffle
      const shuffled = [...pool];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = cryptoRandom(i + 1);
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      const winners = shuffled.slice(0, count);
      winners.forEach(w => picked.push(w));
      drawCount++;

      if (count === 1) {
        stage.innerHTML = `<div class="result-emoji">✦</div><div class="result-final">${esc(winners[0])}</div><div class="result-hint">恭喜中签！</div>`;
      } else {
        stage.innerHTML = `<div class="result-emoji">✦</div><div class="result-final">${winners.map(w => esc(w)).join('、')}</div><div class="result-hint">共 ${count} 人中签！</div>`;
      }

      const now = new Date();
      const time = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
      winners.forEach(w => { history.unshift({ name: w, round: drawCount, time }); });
      renderHistory(); renderPool();

      document.getElementById('statusInfo').textContent = `已抽 ${picked.length} 人 · 剩余 ${getNames().length - picked.length} 人`;
      btn.disabled = false; btn.classList.remove('drawing'); btn.textContent = '◎ 继续抽签';
    }
  }, 60 + tick * 8);
});

/* Reset */
document.getElementById('resetBtn').addEventListener('click', resetAll);

function resetAll() {
  picked = []; history = []; drawCount = 0;
  document.getElementById('resultStage').innerHTML = '<div class="result-emoji">◎</div><div style="font-size:14px;color:var(--text-caption)">输入名单后点击「开始抽签」</div>';
  document.getElementById('drawBtn').textContent = '◎ 开始抽签';
  document.getElementById('statusInfo').textContent = '在线抽签';
  renderHistory(); initPool();
}

updateCount(); initPool();
</script>
