.jwt-segment:last-child { border-right: none; }
.jwt-segment-header { height: 36px; padding: 0 16px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; border-bottom: 0.5px solid var(--border-glass-outer); background: var(--bg-glass); }
.jwt-segment-tag { padding: 2px 8px; font-size: 10px; font-weight: 700; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.tag-header { background: #DBEAFE; color: #1D4ED8; }

.jwt-segment-body { flex: 1; padding: 16px; overflow: auto; font-family: var(--font-code); font-size: 13px; line-height: 1.8; color: var(--text-primary); min-height: 0; white-space: pre-wrap; }

<div class="main">
  <div class="jwt-input-area">
    <div class="jwt-input-bar">
      <span class="jwt-input-label">JWT Token</span>
      <span class="badge" id="statusBadge" style="display:none"></span>
      <div class="toolbar-spacer"></div>
      <button class="btn-tool" id="btnSample">示例</button>
      <button class="btn-tool" id="btnClear">✕ 清空</button>
    </div>
    <textarea class="jwt-textarea" id="jwtInput" placeholder="粘贴 JWT Token（eyJhbG...）"></textarea>
  </div>
  <div class="jwt-result">
    <div class="jwt-segment"><div class="jwt-segment-header"><span class="jwt-segment-tag tag-header">Header</span><span class="jwt-segment-meta" id="headerMeta"></span></div><div class="jwt-segment-body" id="headerBody" style="color:var(--text-caption)">粘贴 JWT 后自动解析 Header</div></div>
    <div class="jwt-segment"><div class="jwt-segment-header"><span class="jwt-segment-tag tag-payload">Payload</span><span class="jwt-segment-meta" id="payloadMeta"></span></div><div class="jwt-segment-body" id="payloadBody" style="color:var(--text-caption)">Payload 将显示在这里</div></div>
  </div>
  <div class="expire-bar" id="expireBar" style="display:none"></div>
</div>

<div class="statusbar">
  <span id="algoLabel">—</span>
  <div class="statusbar-spacer"></div>
</div>

<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

function b64decode(str) {
  str = str.replace(/-/g,'+').replace(/_/g,'/');
  while (str.length % 4) str += '=';
  return decodeURIComponent(escape(atob(str)));
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatDate(ts) { return new Date(ts*1000).toLocaleString('zh-CN'); }

function decode() {
  const token = document.getElementById('jwtInput').value.trim();
  const badge = document.getElementById('statusBadge');
  const expireBar = document.getElementById('expireBar');
  if (!token) {
    document.getElementById('headerBody').textContent = '粘贴 JWT 后自动解析';
    document.getElementById('payloadBody').textContent = '';
    badge.style.display = 'none'; expireBar.style.display = 'none';
    document.getElementById('algoLabel').textContent = '—';
    return;
  }
  const parts = token.split('.');
  if (parts.length !== 3) {
    document.getElementById('headerBody').textContent = '无效的 JWT 格式（应有 3 段）';
    document.getElementById('payloadBody').textContent = '';
    badge.style.display = ''; badge.className = 'badge badge-error'; badge.textContent = '✗ 格式错误';
    expireBar.style.display = 'none'; return;
  }
  try {
    const header = JSON.parse(b64decode(parts[0]));
    const payload = JSON.parse(b64decode(parts[1]));
    document.getElementById('headerBody').textContent = JSON.stringify(header, null, 2);
    document.getElementById('headerMeta').textContent = header.alg || '';
    document.getElementById('algoLabel').textContent = (header.alg || '?') + ' · 3 段';
    
    let payloadStr = JSON.stringify(payload, null, 2);
    document.getElementById('payloadBody').textContent = payloadStr;
    document.getElementById('payloadMeta').textContent = Object.keys(payload).length + ' 个字段';
    
    // Expiration
    if (payload.exp) {
      const expDate = new Date(payload.exp * 1000);
      const isExpired = expDate < new Date();
      const diffDays = Math.ceil((expDate - new Date()) / 86400000);
      badge.style.display = ''; 
      badge.className = 'badge ' + (isExpired ? 'badge-error' : 'badge-success');
      badge.textContent = isExpired ? '● 已过期' : '● 未过期';
      
      let html = `<span class="expire-dot ${isExpired?'expired':'ok'}"></span>`;
      html += `<span>${isExpired?'已过期':'未过期'}</span>`;
      if (payload.iat) html += `<span style="color:var(--text-caption)">·</span><span>签发于 ${formatDate(payload.iat)}</span>`;
      html += `<span style="color:var(--text-caption)">·</span><span>过期于 ${formatDate(payload.exp)}</span>`;
      if (!isExpired) html += `<span style="color:var(--text-caption)">·</span><span style="color:var(--success)">剩余 ${diffDays} 天</span>`;
      expireBar.innerHTML = html;
      expireBar.style.display = '';
    } else {
      badge.style.display = ''; badge.className = 'badge badge-success'; badge.textContent = '✓ 已解码';
      expireBar.style.display = 'none';
    }
  } catch (e) {
    document.getElementById('headerBody').textContent = '解码失败：' + e.message;
    document.getElementById('payloadBody').textContent = '';
    badge.style.display = ''; badge.className = 'badge badge-error'; badge.textContent = '✗ 解码失败';
    expireBar.style.display = 'none';
  }
}

document.getElementById('jwtInput').addEventListener('input', decode);
document.getElementById('btnClear').addEventListener('click', () => { document.getElementById('jwtInput').value = ''; decode(); });
document.getElementById('btnSample').addEventListener('click', () => {
  const now = Math.floor(Date.now()/1000);
  const header = btoa(JSON.stringify({alg:'HS256',typ:'JWT'}));
  const payload = btoa(JSON.stringify({sub:'1234567890',name:'DevKit',role:'admin',iat:now,exp:now+86400*30}));
  document.getElementById('jwtInput').value = header.replace(/=/g,'') + '.' + payload.replace(/=/g,'') + '.demo_signature';
  decode();
});
</script>
