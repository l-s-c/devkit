    <div class="char-count">已输入 <span id="charCount">0</span> 字</div>

    </div>

<script>
const essayInput=document.getElementById('essayInput');
essayInput.addEventListener('input',()=>{document.getElementById('charCount').textContent=essayInput.value.replace(/\s/g,'').length});

const DIMS=[
  {name:'字数',color:'#3B82F6',key:'wordCount'},
  {name:'用词丰富度',color:'#10B981',key:'vocab'},
  {name:'句式多样性',color:'#8B5CF6',key:'sentence'},
  {name:'修辞手法',color:'#F59E0B',key:'rhetoric'},
  {name:'结构完整',color:'#EF4444',key:'structure'}
];

function scoreEssay(){
  const text=essayInput.value.trim();
  if(!text){alert('请输入作文内容');return}
  const chars=text.replace(/\s/g,'');
  const len=chars.length;

  // 1. Word count score (target ~400-800 for primary, ~600-1000 for middle)
  let wcScore=len<100?Math.round(len/100*8):len<200?8+Math.round((len-100)/100*4):len<400?12+Math.round((len-200)/200*3):len<800?15+Math.round((len-400)/400*5):20;
  wcScore=Math.min(20,wcScore);

  // 2. Vocabulary richness - unique chars / total
  const uniqueChars=new Set([...chars]).size;
  const richness=uniqueChars/Math.max(1,len);
  let vocabScore=Math.round(Math.min(1,richness*3.5)*20);

  // 3. Sentence diversity
  const sentences=text.split(/[。！？；\n]+/).filter(s=>s.trim().length>0);
  const avgLen=sentences.length?len/sentences.length:len;
  const lenVariance=sentences.length>1?sentences.reduce((s,sent)=>s+Math.pow(sent.length-avgLen,2),0)/sentences.length:0;
  const hasQuestion=text.includes('？')||text.includes('?');
  const hasExclamation=text.includes('！')||text.includes('!');
  let sentScore=Math.min(20,Math.round((Math.min(lenVariance,500)/500*10)+(hasQuestion?3:0)+(hasExclamation?3:0)+(sentences.length>3?4:sentences.length>1?2:0)));

  // 4. Rhetoric
  const rhetoricPatterns=[/像[^，。]*一样/g,/如同/g,/仿佛/g,/好像/g,/宛如/g,/犹如/g,/难道/g,/怎能/g,/岂不/g,/不是.*吗/g,/排比/g];
  let rhetoricCount=0;
  rhetoricPatterns.forEach(p=>{const m=text.match(p);if(m)rhetoricCount+=m.length});
  const hasParallel=sentences.filter(s=>s.length>5).some((s,i,arr)=>{
    if(i<2)return false;
    const prev1=arr[i-1],prev2=arr[i-2];
    return Math.abs(s.length-prev1.length)<5&&Math.abs(prev1.length-prev2.length)<5&&s.length>8;
  });
  if(hasParallel)rhetoricCount+=2;
  let rhetScore=Math.min(20,Math.round(Math.min(rhetoricCount,6)/6*20));

  // 5. Structure
  const hasParagraphs=text.split('\n').filter(l=>l.trim()).length;
  const hasStart=len>50;
  const hasEnd=text.match(/[。！？]$/);
  let structScore=Math.min(20,(hasParagraphs>=3?8:hasParagraphs>=2?5:2)+(hasStart?4:0)+(hasEnd?4:0)+(len>200?4:len>100?2:0));

  const scores={wordCount:wcScore,vocab:vocabScore,sentence:sentScore,rhetoric:rhetScore,structure:structScore};
  const total=Object.values(scores).reduce((a,b)=>a+b,0);

  // Render
  document.getElementById('scoreSection').style.display='block';
  document.getElementById('totalScore').textContent=total;
  drawRing(total);

  const dimList=document.getElementById('dimList');
  dimList.innerHTML='';
  DIMS.forEach(d=>{
    const v=scores[d.key];
    dimList.innerHTML+=`<div class="dim-item"><span class="dim-name">${d.name}</span><div class="dim-bar"><div class="dim-fill" style="width:${v/20*100}%;background:${d.color}"></div></div><span class="dim-val" style="color:${d.color}">${v}/20</span></div>`;
  });

  // Suggestions
  const sugs=[];
  if(wcScore>=16)sugs.push({type:'good',text:'✅ 字数充足，篇幅合理'});
  else if(len<200)sugs.push({type:'warn',text:'⚠️ 字数偏少（'+len+'字），建议充实内容，目标400字以上'});
  else sugs.push({type:'warn',text:'⚠️ 字数可再增加（'+len+'字），丰富细节描写'});

  if(vocabScore>=14)sugs.push({type:'good',text:'✅ 用词丰富，词汇多样'});
  else sugs.push({type:'warn',text:'⚠️ 用词重复较多，尝试使用近义词替换，丰富词汇量'});

  if(sentScore>=14)sugs.push({type:'good',text:'✅ 句式多样，长短句搭配得当'});
  else sugs.push({type:'warn',text:'⚠️ 句式较单一，可加入疑问句、感叹句、排比句等'});

  if(rhetScore>=10)sugs.push({type:'good',text:'✅ 运用了修辞手法，增强表达效果'});
  else sugs.push({type:'warn',text:'⚠️ 缺少修辞手法，可尝试比喻（像...一样）、排比、反问等'});

  if(structScore>=14)sugs.push({type:'good',text:'✅ 文章结构完整，层次分明'});
  else sugs.push({type:'warn',text:'⚠️ 注意文章结构：开头引入→中间展开→结尾总结，分段书写'});

  document.getElementById('sugList').innerHTML=sugs.map(s=>`<div class="sug-item ${s.type}">${s.text}</div>`).join('');
}

function drawRing(score){
  const canvas=document.getElementById('ringCanvas');
  const ctx=canvas.getContext('2d');
  const cx=80,cy=80,r=65,lw=12;
  ctx.clearRect(0,0,160,160);
  // bg
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='rgba(128,128,128,0.15)';ctx.lineWidth=lw;ctx.stroke();
  // fill
  const pct=score/100;
  const color=score>=80?'#10B981':score>=60?'#F59E0B':'#EF4444';
  ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+Math.PI*2*pct);ctx.strokeStyle=color;ctx.lineWidth=lw;ctx.lineCap='round';ctx.stroke();
}
</script>
