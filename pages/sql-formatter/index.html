<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

const majorKw = ['SELECT','FROM','WHERE','JOIN','LEFT JOIN','RIGHT JOIN','INNER JOIN','OUTER JOIN','FULL JOIN','CROSS JOIN','ON','AND','OR','ORDER BY','GROUP BY','HAVING','LIMIT','OFFSET','UNION','UNION ALL','INSERT INTO','VALUES','UPDATE','SET','DELETE FROM','CREATE TABLE','ALTER TABLE','DROP TABLE','CREATE INDEX','CASE','WHEN','THEN','ELSE','END','AS','IN','NOT IN','EXISTS','NOT EXISTS','BETWEEN','LIKE','IS NULL','IS NOT NULL','ASC','DESC','DISTINCT'];

function formatSql(sql, indent, upper) {
  // Normalize whitespace
  sql = sql.replace(/\s+/g, ' ').trim();

  // Uppercase keywords
  if (upper) {
    majorKw.forEach(kw => {
      const regex = new RegExp('\\b' + kw.replace(/ /g, '\\s+') + '\\b', 'gi');
      sql = sql.replace(regex, kw);
    });
  }

  // Add newlines before major keywords
  const breakBefore = ['SELECT','FROM','WHERE','JOIN','LEFT JOIN','RIGHT JOIN','INNER JOIN','OUTER JOIN','FULL JOIN','CROSS JOIN','ORDER BY','GROUP BY','HAVING','LIMIT','OFFSET','UNION','UNION ALL','INSERT INTO','UPDATE','DELETE FROM','CREATE TABLE','ALTER TABLE','SET','VALUES'];
  breakBefore.forEach(kw => {
    const regex = new RegExp('\\s+(' + kw.replace(/ /g, '\\s+') + ')\\b', 'gi');
    sql = sql.replace(regex, '\n$1');
  });

  // Indent after SELECT, etc.
  const lines = sql.split('\n');
  let result = [];
  let level = 0;
  lines.forEach(line => {
    line = line.trim();
    if (!line) return;
    const upper = line.toUpperCase();
    // Sub-indent for AND/OR
    if (upper.startsWith('AND ') || upper.startsWith('OR ')) {
      result.push(indent.repeat(level + 1) + line);
    } else if (upper.startsWith('ON ')) {
      result.push(indent.repeat(level + 1) + line);
    } else {
      result.push(indent.repeat(level) + line);
    }
  });

  // Handle commas in SELECT (one column per line)
  let final = result.join('\n');
  // Split SELECT columns
  final = final.replace(/(SELECT\s+)([\s\S]*?)(\n(?:FROM|$))/gi, (_, sel, cols, next) => {
    const parts = cols.split(',').map(c => c.trim()).filter(Boolean);
    if (parts.length <= 1) return sel + cols + next;
    return sel + '\n' + parts.map((p, i) => indent + p + (i < parts.length - 1 ? ',' : '')).join('\n') + next;
  });

  return final.trim();
}

function minifySql(sql) {
  return sql.replace(/\s+/g, ' ').replace(/\s*([(),;])\s*/g, '$1').trim();
}

function getIndent() {
  const v = document.getElementById('indent').value;
  return v === 'tab' ? '\t' : ' '.repeat(+v);
}

document.getElementById('btnFormat').addEventListener('click', () => {
  const sql = document.getElementById('input').value;
  const indent = getIndent();
  const upper = document.getElementById('upperKw').checked;
  const out = formatSql(sql, indent, upper);
  document.getElementById('output').value = out;
  document.getElementById('inputMeta').textContent = `${sql.length} 字符`;
  document.getElementById('outputMeta').textContent = `${out.split('\n').length} 行`;
});

document.getElementById('btnMinify').addEventListener('click', () => {
  const sql = document.getElementById('input').value;
  const out = minifySql(sql);
  document.getElementById('output').value = out;
  document.getElementById('inputMeta').textContent = `${sql.length} 字符`;
  document.getElementById('outputMeta').textContent = `${out.length} 字符`;
});

document.getElementById('btnCopy').addEventListener('click', () => {
  const v = document.getElementById('output').value;
  if(v) navigator.clipboard.writeText(v);
});
document.getElementById('btnSample').addEventListener('click', () => {
  document.getElementById('input').value = "select u.id, u.name, u.email, o.order_id, o.total from users u left join orders o on u.id = o.user_id where u.status = 'active' and o.created_at > '2024-01-01' order by o.total desc limit 50";
  document.getElementById('btnFormat').click();
});
document.getElementById('input').addEventListener('keydown', e => {
  if ((e.metaKey||e.ctrlKey) && e.key==='Enter') { e.preventDefault(); document.getElementById('btnFormat').click(); }
});
document.getElementById('btnClear').addEventListener('click', () => {
  document.getElementById('input').value=''; document.getElementById('output').value='';
  document.getElementById('inputMeta').textContent=''; document.getElementById('outputMeta').textContent='';
});
</script>
