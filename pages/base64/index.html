  <div class="work-pane">

  </div>
  <div class="work-pane">
    <div class="pane-header"><span class="pane-label">BASE64</span><span class="pane-meta" id="outputMeta"></span></div>
    <div class="pane-editor"><textarea id="output" readonly placeholder="结果将显示在这里..."></textarea></div>
  </div>

</div>

<div class="statusbar">
  <span class="statusbar-item">UTF-8</span>
  <span class="statusbar-item" id="modeLabel">Base64 标准模式</span>
  <div class="statusbar-spacer"></div>
</div>

<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

const input = document.getElementById('input');
const output = document.getElementById('output');
const statusBadge = document.getElementById('statusBadge');
let mode = 'encode';

function updateMeta() {
  document.getElementById('inputMeta').textContent = `${input.value.length} 字符`;
  document.getElementById('outputMeta').textContent = `${output.value.length} 字符`;
}

function process() {
  const text = input.value;
  if (!text) { output.value = ''; statusBadge.style.display = 'none'; updateMeta(); return; }
  const urlSafe = document.getElementById('urlSafe').checked;
  try {
    if (mode === 'encode') {
      let result = btoa(unescape(encodeURIComponent(text)));
      if (urlSafe) result = result.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
      output.value = result;
      statusBadge.textContent = '✓ 已编码';
    } else {
      let t = text.trim().replace(/-/g, '+').replace(/_/g, '/');
      while (t.length % 4) t += '=';
      if (!/^[A-Za-z0-9+/]*={0,2}$/.test(t)) throw new Error('包含非法字符');
      output.value = decodeURIComponent(escape(atob(t)));
      statusBadge.textContent = '✓ 已解码';
    }
    statusBadge.style.display = '';
  } catch (e) {
    output.value = (mode === 'encode' ? '编码' : '解码') + '失败：' + e.message;
    statusBadge.textContent = '✗ 无效输入';
    statusBadge.className = 'badge badge-error';
    statusBadge.style.display = '';
  }
  updateMeta();
}

document.getElementById('modeEncode').addEventListener('click', () => {
  mode = 'encode';
  document.getElementById('modeEncode').classList.add('active');
  document.getElementById('modeDecode').classList.remove('active');
  document.getElementById('modeLabel').textContent = 'Base64 ' + (document.getElementById('urlSafe').checked ? 'URL 安全模式' : '标准模式');
  process();
});
document.getElementById('modeDecode').addEventListener('click', () => {
  mode = 'decode';
  document.getElementById('modeDecode').classList.add('active');
  document.getElementById('modeEncode').classList.remove('active');
  document.getElementById('modeLabel').textContent = 'Base64 解码模式';
  process();
});

input.addEventListener('input', process);
document.getElementById('urlSafe').addEventListener('change', () => {
  document.getElementById('modeLabel').textContent = 'Base64 ' + (document.getElementById('urlSafe').checked ? 'URL 安全模式' : '标准模式');
  process();
});

function swap() { const tmp = input.value; input.value = output.value; output.value = tmp; updateMeta(); }
document.getElementById('btnSwap').addEventListener('click', swap);
document.getElementById('btnSwap2').addEventListener('click', swap);
document.getElementById('btnCopy').addEventListener('click', () => {
  if (output.value) navigator.clipboard.writeText(output.value);
});
document.getElementById('btnSample').addEventListener('click', () => {
  input.value = '你好，DevKit！Base64 编解码工具 ◆\nHello World! 1234 #$%^&*';
  process();
});
document.getElementById('btnClear').addEventListener('click', () => {
  input.value = ''; output.value = ''; statusBadge.style.display = 'none'; updateMeta();
});
</script>
