body { min-height: 100vh; display: flex; flex-direction: column; }

.canvas-hint {

/* Toolbar */

}
.tool-btn:hover { border-color: var(--brand-500); color: var(--brand-500); }
.tool-btn.danger:hover { border-color: #EF4444; color: #EF4444; }

/* Color */

.color-opt {
  width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent;

}
.color-opt:hover { transform: scale(1.15); }
.color-opt.active { border-color: var(--brand-500); box-shadow: 0 0 0 2px var(--bg-primary); }
.color-custom {
  width: 32px; height: 32px; border-radius: 50%; border: 2px dashed var(--border-glass);
  cursor: pointer; position: relative; overflow: hidden;
}
.color-custom input { position: absolute; inset: -4px; opacity: 0; cursor: pointer; }

/* Slider */
.ctrl-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.ctrl-label { font-size: 11px; font-weight: 700; color: var(--text-caption); width: 50px; flex-shrink: 0; }
.ctrl-slider { flex: 1; accent-color: var(--brand-500); }
.ctrl-val { font-family: var(--font-code); font-size: 11px; font-weight: 700; color: var(--brand-500); width: 30px; text-align: right; }

/* Bg toggle */
.bg-toggle { display: flex; gap: 6px; }
.bg-opt {
  flex: 1; padding: 10px; border-radius: 6px; border: 1.5px solid var(--border-glass);
  background: var(--bg-glass); font-size: 12px; font-weight: 700;
  color: var(--text-secondary); cursor: pointer; text-align: center; transition: all 150ms;
}
.bg-opt:hover { border-color: var(--brand-500); color: var(--brand-500); }
.bg-opt.active { border-color: var(--brand-500); background: rgba(99,102,241,0.08); color: var(--brand-500); }

/* Preview */
.preview-wrap {
  margin-top: 14px; padding: 16px; border-radius: 10px;
  background: repeating-conic-gradient(var(--border-glass) 0% 25%, transparent 0% 50%) 0 0/12px 12px;
  text-align: center; min-height: 80px; display: flex; align-items: center; justify-content: center;
}
.preview-wrap img { max-width: 100%; max-height: 100px; }

/* Action */
.action-btn {

  background: linear-gradient(135deg, #6366F1, #818CF8); color: #fff;

}
.action-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99,102,241,0.3); }

@media (max-width: 768px) {
  .main { padding: 16px 16px 60px; }
  .dual { grid-template-columns: 1fr; }
}

          <div class="color-opt" style="background:#10B981" data-color="#10B981"></div>
          <div class="color-opt" style="background:#3B82F6" data-color="#3B82F6"></div>

<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

const canvas = document.getElementById('sigCanvas');
const ctx = canvas.getContext('2d');
let drawing = false, penColor = '#1A1A2E', bgMode = 'transparent';
let strokes = [], currentStroke = [];

function initCanvas() {
  canvas.width = canvas.parentElement.clientWidth - 3;
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  redraw();
}

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: (t.clientX - r.left) * (canvas.width / r.width), y: (t.clientY - r.top) * (canvas.height / r.height) };
}

function startDraw(e) {
  e.preventDefault(); drawing = true;
  document.getElementById('hint').style.display = 'none';
  const p = getPos(e);
  const w = parseInt(document.getElementById('lineWidth').value);
  currentStroke = [{ x: p.x, y: p.y, color: penColor, width: w }];
  ctx.beginPath(); ctx.moveTo(p.x, p.y);
  ctx.strokeStyle = penColor; ctx.lineWidth = w;
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
}

function draw(e) {
  if (!drawing) return; e.preventDefault();
  const p = getPos(e);
  currentStroke.push({ x: p.x, y: p.y });
  ctx.lineTo(p.x, p.y); ctx.stroke();
}

function endDraw() {
  if (!drawing) return; drawing = false;
  if (currentStroke.length > 0) { strokes.push([...currentStroke]); currentStroke = []; }
  updatePreview();
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', draw, { passive: false });
canvas.addEventListener('touchend', endDraw);

function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  strokes.forEach(stroke => {
    if (stroke.length < 1) return;
    ctx.beginPath(); ctx.strokeStyle = stroke[0].color; ctx.lineWidth = stroke[0].width;
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.moveTo(stroke[0].x, stroke[0].y);
    stroke.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.stroke();
  });
}

function updatePreview() {
  if (!strokes.length) { document.getElementById('previewPanel').style.display = 'none'; return; }
  document.getElementById('previewPanel').style.display = 'block';
  document.getElementById('previewImg').src = canvas.toDataURL('image/png');
  document.getElementById('statusInfo').textContent = `${strokes.length} 笔 · ${bgMode === 'white' ? '白色底' : '透明底'}`;
}

/* ===== Events ===== */
document.getElementById('undoBtn').addEventListener('click', () => {
  if (strokes.length) { strokes.pop(); redraw(); updatePreview(); }
});

document.getElementById('clearBtn').addEventListener('click', () => {
  strokes = []; redraw();
  document.getElementById('hint').style.display = 'block';
  document.getElementById('previewPanel').style.display = 'none';
  document.getElementById('statusInfo').textContent = '电子签名';
});

document.getElementById('colorRow').addEventListener('click', e => {
  const opt = e.target.closest('.color-opt');
  if (!opt) return;
  penColor = opt.dataset.color;
  document.querySelectorAll('.color-opt').forEach(o => o.classList.remove('active'));
  opt.classList.add('active');
});

document.getElementById('customColor').addEventListener('input', function() {
  penColor = this.value;
  document.querySelectorAll('.color-opt').forEach(o => o.classList.remove('active'));
});

document.getElementById('lineWidth').addEventListener('input', function() {
  document.getElementById('widthVal').textContent = this.value + 'px';
});

document.getElementById('bgToggle').addEventListener('click', e => {
  const opt = e.target.closest('.bg-opt');
  if (!opt) return;
  bgMode = opt.dataset.bg;
  document.querySelectorAll('.bg-opt').forEach(o => o.classList.toggle('active', o.dataset.bg === bgMode));
  document.getElementById('canvasWrap').className = 'canvas-wrap ' + (bgMode === 'white' ? 'canvas-white' : 'canvas-checkerboard');
});

document.getElementById('downloadBtn').addEventListener('click', () => {
  if (!strokes.length) return;
  const c = document.createElement('canvas');
  c.width = canvas.width; c.height = canvas.height;
  const cx = c.getContext('2d');
  if (bgMode === 'white') { cx.fillStyle = '#fff'; cx.fillRect(0, 0, c.width, c.height); }
  cx.lineJoin = 'round'; cx.lineCap = 'round';
  strokes.forEach(stroke => {
    if (stroke.length < 1) return;
    cx.beginPath(); cx.strokeStyle = stroke[0].color; cx.lineWidth = stroke[0].width;
    cx.moveTo(stroke[0].x, stroke[0].y);
    stroke.forEach(p => cx.lineTo(p.x, p.y));
    cx.stroke();
  });
  c.toBlob(blob => {
    const a = document.createElement('a');
    const url = URL.createObjectURL(blob);
    a.href = url; a.download = 'signature.png'; a.click();
    URL.revokeObjectURL(url); c.width = 0; c.height = 0;
  }, 'image/png');
});

window.addEventListener('resize', () => {
  const w = canvas.parentElement.clientWidth - 3;
  if (Math.abs(canvas.width - w) > 10) { canvas.width = w; redraw(); }
});

initCanvas();
</script>
