let mode=0,questions=[],current=0,correct=0,wrong=0,answered=[];
function setMode(m){mode=m;document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',i===m)})}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function makePairs(){
  let pairs=[];
  POEMS.forEach(p=>{
    for(let i=0;i<p.length-2;i+=2){
      if(i+1<p.length-2) pairs.push({line1:p[i],line2:p[i+1],title:p[p.length-2],author:p[p.length-1]});
    }
  });
  return pairs;
}

function startQuiz(){
  let pairs=shuffle(makePairs());
  questions=pairs.slice(0,10);
  current=0;correct=0;wrong=0;answered=[];
  document.getElementById('resultSummary').style.display='none';
  document.getElementById('startBtn').textContent='↻ 重新开始';
  renderQuestion();
  updateScore();
}

function renderQuestion(){

  if(current>=questions.length){showResult();return}
  const q=questions[current];
  let m=mode===2?Math.round(Math.random()):mode;
  let prompt=m===0?q.line1:q.line2;
  let answer=m===0?q.line2:q.line1;
  area.innerHTML=`<div class="q-card"><div class="q-label">第 ${current+1}/10 题</div><div class="q-prompt">${prompt}，<span style="color:#F59E0B">___________</span></div><div class="q-source">—— ${q.author}《${q.title}》</div><input class="q-input" id="answerInput" placeholder="请输入答案..." autocomplete="off"><div class="q-answer" id="answerHint"></div></div>`;
  const input=document.getElementById('answerInput');
  input.focus();
  input.addEventListener('keydown',function handler(e){
    if(e.key==='Enter'&&this.value.trim()){
      const v=this.value.trim().replace(/[，。！？、；：""''（）]/g,'');
      const a=answer.replace(/[，。！？、；：""''（）]/g,'');
      const ok=v===a;
      this.classList.add(ok?'correct':'wrong');
      this.disabled=true;
      if(ok){correct++}else{wrong++;document.getElementById('answerHint').style.display='flex';document.getElementById('answerHint').innerHTML=`✓ 正确答案：${answer}`}
      answered.push(ok);
      updateScore();
      setTimeout(()=>{current++;renderQuestion()},1200);
    }
  });
}

function updateScore(){
  document.getElementById('correctNum').textContent=correct;
  document.getElementById('wrongNum').textContent=wrong;
  const done=correct+wrong;
  document.getElementById('progressNum').textContent=`${done}/${questions.length}`;
  document.getElementById('accuracyNum').textContent=done?Math.round(correct/done*100)+'%':'0%';
  document.getElementById('progressFill').style.width=(done/questions.length*100)+'%';
}

function showResult(){
  const area=document.getElementById('questionArea');
  area.innerHTML='';
  const s=document.getElementById('resultSummary');
  s.style.display='block';
  const pct=Math.round(correct/10*100);
  document.getElementById('resultTitle').textContent=pct>=80?'✦ 太棒了！':pct>=60?'✓ 继续加油！':'☰ 多多练习！';
  document.getElementById('resultDetail').textContent=`正确 ${correct} 题，错误 ${wrong} 题，正确率 ${pct}%`;
  updateScore();
}
</script>
