<style>
body { min-height: 100vh; display: flex; flex-direction: column; }
.main { flex: 1; position: relative; z-index: 1; padding: 24px 24px 24px; max-width: 960px; margin: 0 auto; width: 100%; }
.dual { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
.panel {
  padding: 24px; border-radius: 16px; margin-bottom: 16px;
  background: var(--bg-glass); backdrop-filter: blur(20px);
  border: 0.5px solid var(--border-glass);
}
.section-title { font-size: 13px; font-weight: 800; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

/* Phase tabs */
.phase-tabs { display: flex; gap: 0; border-radius: 10px; overflow: hidden; border: 1.5px solid var(--border-glass); margin-bottom: 20px; }
.phase-tab { flex: 1; padding: 10px 8px; text-align: center; font-size: 11px; font-weight: 800; cursor: pointer; transition: all 150ms; background: var(--bg-glass-input); color: var(--text-caption); }
.phase-tab.active-work { background: #EF4444; color: #fff; }
.phase-tab.active-break { background: #10B981; color: #fff; }
.phase-tab.active-long { background: #6366F1; color: #fff; }

/* Timer */
.timer-wrap { text-align: center; padding: 8px 0; }
.timer-ring { position: relative; display: inline-block; }
.timer-ring svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--border-glass); stroke-width: 5; }
.ring-fg { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
.timer-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.timer-time { font-family: var(--font-code); font-size: 48px; font-weight: 800; letter-spacing: -2px; }
.timer-phase { font-size: 12px; font-weight: 700; margin-top: 2px; }

/* Rounds */
.rounds-wrap { display: flex; justify-content: center; gap: 6px; margin: 12px 0; }
.round-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--border-glass); transition: all 200ms; }
.round-dot.done { background: #EF4444; border-color: #EF4444; }
.round-dot.current { border-color: #EF4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.15); }
.round-label { text-align: center; font-size: 10px; color: var(--text-caption); margin-bottom: 4px; }

/* Controls */
.controls { display: flex; gap: 8px; justify-content: center; margin-top: 4px; }
.ctrl-btn { padding: 12px 24px; border-radius: 24px; border: none; font-size: 13px; font-weight: 800; cursor: pointer; transition: all 200ms; display: flex; align-items: center; gap: 5px; }
.btn-start { background: #EF4444; color: #fff; min-width: 120px; justify-content: center; }
.btn-start:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(239,68,68,0.3); }
.btn-start.break-mode { background: #10B981; }
.btn-start.break-mode:hover { box-shadow: 0 4px 16px rgba(16,185,129,0.3); }
.btn-start.long-mode { background: #6366F1; }
.btn-start.long-mode:hover { box-shadow: 0 4px 16px rgba(99,102,241,0.3); }
.btn-skip, .btn-reset {
  border: 1.5px solid var(--border-glass); background: var(--bg-glass-input);
  color: var(--text-secondary); padding: 12px 16px;
}
.btn-skip:hover { border-color: var(--brand-500); color: var(--brand-500); }
.btn-reset:hover { border-color: #EF4444; color: #EF4444; }

/* Stats */
.stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.stat-card { text-align: center; padding: 14px 8px; border-radius: 6px; border: 1px solid var(--border-glass); background: var(--bg-glass-input); }
.stat-num { font-family: var(--font-code); font-size: 28px; font-weight: 800; }
.stat-label { font-size: 9px; color: var(--text-caption); margin-top: 2px; font-weight: 600; }

/* Settings */
.setting-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-glass); }
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 5px; }
.setting-input {
  width: 52px; padding: 5px; border-radius: 6px; border: 1.5px solid var(--border-glass);
  background: var(--bg-glass-input); font-family: var(--font-code); font-size: 13px;
  font-weight: 700; text-align: center; color: var(--text-primary); outline: none;
}
.setting-input:focus { border-color: var(--brand-500); }
.setting-unit { font-size: 10px; color: var(--text-caption); margin-left: 3px; }

/* Log */
.log-list { max-height: 140px; overflow-y: auto; }
.log-item { display: flex; align-items: center; gap: 6px; padding: 6px 0; border-bottom: 1px solid var(--border-glass); font-size: 11px; }
.log-item:last-child { border-bottom: none; }
.log-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.log-dot.work { background: #EF4444; }
.log-dot.rest { background: #10B981; }
.log-type { font-weight: 700; width: 32px; }
.log-dur { font-family: var(--font-code); color: var(--brand-500); font-weight: 700; flex: 1; }
.log-time { font-family: var(--font-code); color: var(--text-caption); font-size: 10px; }
.log-empty { text-align: center; padding: 16px; color: var(--text-caption); font-size: 11px; }

@media (max-width: 768px) {
  .main { padding: 16px 16px 60px; }
  .dual { grid-template-columns: 1fr; }
  .timer-time { font-size: 40px; }
}

<div class="main">
  <div class="dual">
    <!-- 左：计时核心 -->
    <div>
      <div class="panel">
        <div class="phase-tabs">
          <div class="phase-tab active-work" id="tabWork" data-phase="work">● 专注</div>
          <div class="phase-tab" id="tabBreak" data-phase="break">☕ 短休</div>
          <div class="phase-tab" id="tabLong" data-phase="long">◎ 长休</div>
        </div>
        <div class="timer-wrap">
          <div class="timer-ring">
            <svg width="220" height="220">
              <circle class="ring-bg" cx="110" cy="110" r="100"/>
              <circle class="ring-fg" id="ringFg" cx="110" cy="110" r="100" stroke="#EF4444" stroke-dasharray="628.32" stroke-dashoffset="0"/>
            </svg>
            <div class="timer-inner">
              <div class="timer-time" id="timerTime">25:00</div>
              <div class="timer-phase" id="timerPhase" style="color:#EF4444">● 专注时间</div>

          </div>

        <div class="stats-row">
          <div class="stat-card"><div class="stat-num" style="color:#EF4444" id="statRounds">0</div><div class="stat-label">完成轮次</div></div>
          <div class="stat-card"><div class="stat-num" style="color:#10B981" id="statBreaks">0</div><div class="stat-label">休息次数</div></div>
          <div class="stat-card"><div class="stat-num" style="color:var(--brand-500)" id="statMinutes">0</div><div class="stat-label">专注分钟</div></div>
        </div>
      </div>

      <div class="panel">
        <div class="section-title">⊕ 设置</div>
        <div class="setting-row">
          <div class="setting-label"><span>●</span> 专注时长</div>

        </div>
        <div class="setting-row">
          <div class="setting-label"><span>☕</span> 短休时长</div>
          <div><input class="setting-input" id="setBreak" value="5" type="number" min="1" max="30"><span class="setting-unit">分钟</span></div>
        </div>
        <div class="setting-row">
          <div class="setting-label"><span>◎</span> 长休时长</div>
          <div><input class="setting-input" id="setLong" value="15" type="number" min="1" max="60"><span class="setting-unit">分钟</span></div>
        </div>
        <div class="setting-row">
          <div class="setting-label"><span>↻</span> 长休间隔</div>

<div class="statusbar">
  <span id="statusInfo">番茄钟</span>
  <div class="statusbar-spacer"></div>
  <span>Date.now() 防漂移</span>
</div>

<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

const CIRC = 2 * Math.PI * 100;
const COLORS = { work: '#EF4444', break: '#10B981', long: '#6366F1' };
const LABELS = { work: '● 专注时间', break: '☕ 短休息', long: '◎ 长休息' };
const BTN_LABELS = { work: '开始专注', break: '开始休息', long: '开始休息' };
const BTN_CLASS = { work: '', break: ' break-mode', long: ' long-mode' };
const TAB_CLASS = { work: 'active-work', break: 'active-break', long: 'active-long' };
const TAB_IDS = { work: 'tabWork', break: 'tabBreak', long: 'tabLong' };

let phase = 'work', running = false, paused = false, timer = null;
let totalSec = 25 * 60, remainSec = 25 * 60, startTime = 0, pauseRemain = 0;
let round = 1, completedRounds = 0, breaks = 0, focusMin = 0;
let logs = [];

/* Load settings */
const saved = JSON.parse(localStorage.getItem('devkit-pomo') || '{}');
if (saved.work) document.getElementById('setWork').value = saved.work;
if (saved.brk) document.getElementById('setBreak').value = saved.brk;
if (saved.lng) document.getElementById('setLong').value = saved.lng;
if (saved.interval) document.getElementById('setInterval').value = saved.interval;

function saveSettings() {
  localStorage.setItem('devkit-pomo', JSON.stringify({
    work: parseInt(document.getElementById('setWork').value) || 25,
    brk: parseInt(document.getElementById('setBreak').value) || 5,
    lng: parseInt(document.getElementById('setLong').value) || 15,
    interval: parseInt(document.getElementById('setInterval').value) || 4
  }));
  if (!running) switchPhase(phase);
}

document.querySelectorAll('.setting-input').forEach(el => el.addEventListener('change', saveSettings));

function getTime(p) {
  if (p === 'work') return (parseInt(document.getElementById('setWork').value) || 25) * 60;
  if (p === 'break') return (parseInt(document.getElementById('setBreak').value) || 5) * 60;
  return (parseInt(document.getElementById('setLong').value) || 15) * 60;
}
function getInterval() { return parseInt(document.getElementById('setInterval').value) || 4; }
function fmt(s) { const m = Math.floor(s / 60); const sec = s % 60; return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`; }

function updateDisplay() {
  const s = Math.max(0, Math.ceil(remainSec));
  document.getElementById('timerTime').textContent = fmt(s);
  const progress = 1 - s / totalSec;
  document.getElementById('ringFg').style.strokeDashoffset = CIRC * (1 - progress);
  document.title = `${fmt(s)} — 番茄钟 | DevKit`;
}

function setPhaseUI() {
  document.getElementById('ringFg').setAttribute('stroke', COLORS[phase]);
  document.getElementById('timerPhase').textContent = LABELS[phase];
  document.getElementById('timerPhase').style.color = COLORS[phase];

  document.querySelectorAll('.phase-tab').forEach(t => t.className = 'phase-tab');
  document.getElementById(TAB_IDS[phase]).classList.add(TAB_CLASS[phase]);

  if (!running) {
    document.getElementById('startBtn').innerHTML = `▸ ${BTN_LABELS[phase]}`;
    document.getElementById('startBtn').className = 'ctrl-btn btn-start' + BTN_CLASS[phase];
  }

  const interval = getInterval();
  document.getElementById('roundLabel').textContent = `第 ${round} / ${interval} 轮`;
  let dots = '';
  for (let i = 1; i <= interval; i++) {
    let cls = 'round-dot';
    if (i < round) cls += ' done';
    else if (i === round && phase === 'work') cls += ' current';
    dots += `<div class="${cls}"></div>`;
  }
  document.getElementById('roundDots').innerHTML = dots;
}

function switchPhase(p) {
  if (running) return;
  phase = p; totalSec = getTime(p); remainSec = totalSec;
  updateDisplay(); setPhaseUI();
}

/* Phase tabs */
document.querySelector('.phase-tabs').addEventListener('click', e => {
  const tab = e.target.closest('.phase-tab');
  if (!tab || running) return;
  switchPhase(tab.dataset.phase);
});

/* Start / Pause */
document.getElementById('startBtn').addEventListener('click', () => {
  if (paused) {
    paused = false; running = true; startTime = Date.now(); pauseRemain = remainSec;
    timer = setInterval(tick, 200);
    document.getElementById('startBtn').innerHTML = '‖ 暂停';
    document.getElementById('startBtn').className = 'ctrl-btn btn-start' + BTN_CLASS[phase];
    return;
  }
  if (running) {
    paused = true; running = false; clearInterval(timer); pauseRemain = remainSec;
    document.getElementById('startBtn').innerHTML = '▸ 继续';
    return;
  }
  totalSec = getTime(phase); remainSec = totalSec; pauseRemain = totalSec;
  startTime = Date.now(); running = true; timer = setInterval(tick, 200);
  document.getElementById('startBtn').innerHTML = '‖ 暂停';
  document.getElementById('startBtn').className = 'ctrl-btn btn-start' + BTN_CLASS[phase];
});

function tick() {
  remainSec = pauseRemain - (Date.now() - startTime) / 1000;
  if (remainSec <= 0) {
    remainSec = 0; clearInterval(timer); running = false; paused = false;
    updateDisplay(); playBeep();

    const now = new Date();
    const time = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

    if (phase === 'work') {
      const dur = parseInt(document.getElementById('setWork').value) || 25;
      completedRounds++; focusMin += dur;
      logs.unshift({ type: '专注', dur: `${dur}分钟`, time, cls: 'work' });
      if (round >= getInterval()) { round = 1; phase = 'long'; } else { round++; phase = 'break'; }
      breaks++;
    } else {
      const dur = phase === 'break' ? (parseInt(document.getElementById('setBreak').value) || 5) : (parseInt(document.getElementById('setLong').value) || 15);
      logs.unshift({ type: '休息', dur: `${dur}分钟`, time, cls: 'rest' });
      if (phase === 'long') round = 1;
      phase = 'work';
    }

    totalSec = getTime(phase); remainSec = totalSec;
    updateDisplay(); setPhaseUI(); updateStats(); renderLog();
    document.getElementById('statusInfo').textContent = `✓ 完成 — 已专注 ${focusMin} 分钟`;
    return;
  }
  updateDisplay();
}

/* Skip / Reset */
document.getElementById('skipBtn').addEventListener('click', () => {
  clearInterval(timer); running = false; paused = false;
  if (phase === 'work') {
    if (round >= getInterval()) { round = 1; phase = 'long'; } else { round++; phase = 'break'; }
  } else {
    if (phase === 'long') round = 1; phase = 'work';
  }
  totalSec = getTime(phase); remainSec = totalSec; updateDisplay(); setPhaseUI();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  clearInterval(timer); running = false; paused = false; phase = 'work'; round = 1;
  totalSec = getTime('work'); remainSec = totalSec; updateDisplay(); setPhaseUI();
});

function updateStats() {
  document.getElementById('statRounds').textContent = completedRounds;
  document.getElementById('statBreaks').textContent = breaks;
  document.getElementById('statMinutes').textContent = focusMin;
}

function renderLog() {
  if (!logs.length) { document.getElementById('logList').innerHTML = '<div class="log-empty">完成专注后自动记录</div>'; return; }
  document.getElementById('logList').innerHTML = logs.slice(0, 10).map(l => `
    <div class="log-item"><div class="log-dot ${l.cls}"></div><span class="log-type">${l.type}</span><span class="log-dur">${l.dur}</span><span class="log-time">${l.time}</span></div>`).join('');
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.3, 0.6].forEach(d => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination); o.frequency.value = 880; o.type = 'sine';
      g.gain.setValueAtTime(0.3, ctx.currentTime + d);
      g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + d + 0.2);
      o.start(ctx.currentTime + d); o.stop(ctx.currentTime + d + 0.2);
    });
  } catch (e) {}
}

updateDisplay(); setPhaseUI();
</script>
