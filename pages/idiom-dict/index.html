{n:'画龙点睛',p:'huà lóng diǎn jīng',m:'比喻在关键处用几句话点明实质，使文章更加生动传神。',s:'唐·张彦远《历代名画记》',e:'他在文章结尾加了一句总结，真是画龙点睛之笔。',c:['🐾 动物','📖 学习']},

{n:'一心一意',p:'yī xīn yī yì',m:'形容做事专心，不分心。',s:'《三国志》',e:'上课时要一心一意听讲。',c:['🔢 数字','📖 学习']},

{n:'亡羊补牢',p:'wáng yáng bǔ láo',m:'比喻出了问题以后想办法补救，可以防止继续受损失。',s:'《战国策·楚策》',e:'虽然犯了错，但亡羊补牢为时未晚。',c:['🐾 动物']},
{n:'坐井观天',p:'zuò jǐng guān tiān',m:'比喻眼界狭小，见识短浅。',s:'《庄子·秋水》',e:'我们不能坐井观天，要多出去看看。',c:['🐾 动物','🍃 自然']},
{n:'叶公好龙',p:'yè gōng hào lóng',m:'比喻表面爱好某事物，实际上并不真正喜欢。',s:'汉·刘向《新序》',e:'他说喜欢运动但从不锻炼，真是叶公好龙。',c:['🐾 动物']},

{n:'狐假虎威',p:'hú jiǎ hǔ wēi',m:'比喻依仗别人的势力欺压人。',s:'《战国策·楚策》',e:'他只不过是狐假虎威罢了。',c:['🐾 动物']},
{n:'杯弓蛇影',p:'bēi gōng shé yǐng',m:'比喻因疑神疑鬼而引起恐惧。',s:'汉·应劭《风俗通义》',e:'别杯弓蛇影了，那只是树枝的影子。',c:['🐾 动物']},
{n:'春暖花开',p:'chūn nuǎn huā kāi',m:'形容春天温暖的气候和美好的景色。',s:'明·朱国祯《涌幢小品》',e:'春暖花开的季节，我们去郊游吧。',c:['🌸 四季','🍃 自然']},
{n:'秋高气爽',p:'qiū gāo qì shuǎng',m:'形容秋天天空晴朗高远，气候凉爽宜人。',s:'唐·杜甫《崔氏东山草堂》',e:'秋高气爽，是爬山的好时候。',c:['🌸 四季','🍃 自然']},
{n:'五颜六色',p:'wǔ yán liù sè',m:'形容颜色繁多，色彩绚丽。',s:'清·李汝珍《镜花缘》',e:'花园里的花五颜六色，非常漂亮。',c:['🔢 数字']},
{n:'七上八下',p:'qī shàng bā xià',m:'形容心神不定或慌乱不安。',s:'宋·宗杲《大慧普觉禅师语录》',e:'考试前他心里七上八下的。',c:['🔢 数字','😊 心情']},
{n:'十全十美',p:'shí quán shí měi',m:'各方面都非常完美，毫无缺陷。',s:'清·陈朗《雪月梅传》',e:'世上没有十全十美的事情。',c:['🔢 数字']},
{n:'百发百中',p:'bǎi fā bǎi zhòng',m:'形容射箭或射击技术非常高明。',s:'《战国策·西周策》',e:'他投篮百发百中。',c:['🔢 数字','⚔️ 战争']},
{n:'千军万马',p:'qiān jūn wàn mǎ',m:'形容雄壮的队伍或浩大的声势。',s:'唐·李白',e:'操场上呐喊声如千军万马。',c:['🔢 数字','⚔️ 战争']},
{n:'自强不息',p:'zì qiáng bù xī',m:'自己努力向上，永远不懈怠。',s:'《周易·乾》',e:'我们要自强不息，努力学习。',c:['📖 学习']},
{n:'勤能补拙',p:'qín néng bǔ zhuō',m:'勤奋能够弥补天资的不足。',s:'宋·邵雍《弄笔吟》',e:'只要勤能补拙，就一定能进步。',c:['📖 学习']},
{n:'学无止境',p:'xué wú zhǐ jìng',m:'学习是没有尽头的。',s:'清·刘开《问说》',e:'学无止境，我们要活到老学到老。',c:['📖 学习']},
{n:'废寝忘食',p:'fèi qǐn wàng shí',m:'顾不上睡觉和吃饭，形容学习或工作非常专心。',s:'南朝·王融《三月三日曲水诗序》',e:'他废寝忘食地准备考试。',c:['📖 学习']},
{n:'开天辟地',p:'kāi tiān pì dì',m:'比喻前所未有，有史以来第一次。',s:'《三五历记》',e:'这是开天辟地的大事。',c:['🍃 自然']},
{n:'山清水秀',p:'shān qīng shuǐ xiù',m:'形容风景优美。',s:'宋·黄庭坚',e:'这里山清水秀，令人心旷神怡。',c:['🍃 自然']},
{n:'风和日丽',p:'fēng hé rì lì',m:'和风习习，阳光灿烂，形容天气晴好。',s:'元·李爱山',e:'今天风和日丽，适合出去玩。',c:['🍃 自然','🌸 四季']},
{n:'兴高采烈',p:'xìng gāo cǎi liè',m:'形容兴致高，精神饱满。',s:'南朝·刘勰《文心雕龙》',e:'孩子们兴高采烈地去春游。',c:['😊 心情']},
{n:'心花怒放',p:'xīn huā nù fàng',m:'形容内心高兴极了。',s:'清·李宝嘉《文明小史》',e:'听到好消息，她心花怒放。',c:['😊 心情']},
{n:'愁眉苦脸',p:'chóu méi kǔ liǎn',m:'形容发愁的样子。',s:'元·王实甫《西厢记》',e:'别愁眉苦脸的，笑一笑吧。',c:['😊 心情']},
{n:'破釜沉舟',p:'pò fǔ chén zhōu',m:'比喻下定决心，不顾一切地干到底。',s:'《史记·项羽本纪》',e:'面对困难，我们要有破釜沉舟的勇气。',c:['⚔️ 战争']},
{n:'刻舟求剑',p:'kè zhōu qiú jiàn',m:'比喻拘泥不知变通，不懂得根据实际情况处理问题。',s:'《吕氏春秋》',e:'时代变了，不能刻舟求剑。',c:['⚔️ 战争']},
];
const CATS=['全部','🐾 动物','🔢 数字','🌸 四季','😊 心情','⚔️ 战争','📖 学习','🍃 自然'];
let currentCat='全部',mode='dict';
function renderCats(){
  document.getElementById('catPills').innerHTML=CATS.map(c=>`<div class="cat-pill${c===currentCat?' active':''}" data-cat="${c}">${c}</div>`).join('');
}
function renderList(q=''){
  const filtered=IDIOMS.filter(i=>{
    if(currentCat!=='全部'&&!i.c.includes(currentCat))return false;
    if(q&&!i.n.includes(q)&&!i.m.includes(q)&&!i.p.includes(q))return false;
    return true;
  });
  document.getElementById('idiomList').innerHTML=filtered.length?filtered.map(i=>`<div class="idiom-card"><div class="idiom-name">${i.n}</div><div class="idiom-pinyin">${i.p}</div><div class="idiom-meaning">${i.m}</div><div class="idiom-source">📜 出处：${i.s}</div><div class="idiom-example">💬 ${i.e}</div><div class="idiom-tags">${i.c.map(c=>`<span class="idiom-tag">${c}</span>`).join('')}</div></div>`).join(''):'<div style="text-align:center;padding:40px;color:var(--text-caption)">没有找到匹配的成语</div>';
  document.getElementById('statusInfo').textContent=`共 ${filtered.length} 条成语`;
}
// Tabs
document.querySelector('.tab-row').addEventListener('click',e=>{
  if(!e.target.classList.contains('tab'))return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  e.target.classList.add('active');
  mode=e.target.dataset.tab;
  document.getElementById('dictUI').classList.toggle('hidden',mode!=='dict');
  document.getElementById('dictPanel').classList.toggle('hidden',mode!=='dict');
  document.getElementById('solPanel').classList.toggle('hidden',mode!=='sol');
  if(mode==='sol')startSolitaire();
});
document.getElementById('catPills').addEventListener('click',e=>{
  if(!e.target.classList.contains('cat-pill'))return;
  currentCat=e.target.dataset.cat;renderCats();renderList(document.getElementById('searchInput').value.trim());
});
document.getElementById('searchInput').addEventListener('input',function(){renderList(this.value.trim())});
// Solitaire
let solChain=[],solUsed=new Set();
function getLastCharPinyin(name){
  const last=name[name.length-1];
  const found=IDIOMS.find(i=>i.n.includes(last));
  if(!found)return null;
  // extract last char's pinyin from the full pinyin
  const parts=found.p.split(' ');
  const idx=[...found.n].indexOf(last);
  return parts[idx]||parts[parts.length-1];
}
function startSolitaire(){
  solChain=[];solUsed=new Set();
  const start=IDIOMS[Math.floor(Math.random()*IDIOMS.length)];
  solChain.push(start.n);solUsed.add(start.n);
  renderSolitaire();
}
function renderSolitaire(){
  document.getElementById('solChain').innerHTML=solChain.map(s=>`<div class="sol-item">${s}</div>`).join('');
  const last=solChain[solChain.length-1];
  document.getElementById('solCurrent').textContent=last;
  const lastChar=last[last.length-1];
  document.getElementById('solHint').textContent=`请输入「${lastChar}」开头的成语`;
  document.getElementById('solInput').value='';
  document.getElementById('solInput').focus();
  document.getElementById('solScore').textContent=`已接 ${solChain.length-1} 个`;
}
document.getElementById('solInput').addEventListener('keydown',function(e){
  if(e.key!=='Enter')return;
  const v=this.value.trim();if(v.length<4){document.getElementById('solMsg').innerHTML='<span style="color:#EF4444">请输入四字成语</span>';return}
  const last=solChain[solChain.length-1];
  const lastChar=last[last.length-1];
  if(v[0]!==lastChar){
    // check pinyin match
    document.getElementById('solMsg').innerHTML=`<span style="color:#EF4444">需要「${lastChar}」开头的成语</span>`;return;
  }
  if(solUsed.has(v)){document.getElementById('solMsg').innerHTML='<span style="color:#EF4444">这个成语已经用过了</span>';return}
  // accept it (we don't validate against full dictionary for flexibility)
  solChain.push(v);solUsed.add(v);
  document.getElementById('solMsg').innerHTML='<span style="color:#10B981">✅ 接龙成功！</span>';
  renderSolitaire();
});
renderCats();renderList();
</script>
