.grid-cell::before{content:'';position:absolute;width:100%;height:0;top:50%;left:0;border-top:1px dashed #ccc}
.grid-cell::after{content:'';position:absolute;width:0;height:100%;left:50%;top:0;border-left:1px dashed #ccc}
.grid-cell.mi .diag{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.grid-cell.mi .diag::before,.grid-cell.mi .diag::after{content:'';position:absolute;width:141%;height:0;top:50%;left:-20%;border-top:1px dashed #ddd}
.grid-cell.mi .diag::before{transform:rotate(45deg)}
.grid-cell.mi .diag::after{transform:rotate(-45deg)}
.grid-cell.hui::before{border-top:none}
.grid-cell.hui::after{border-left:none}
.grid-cell.hui .inner{position:absolute;width:50%;height:50%;border:1px dashed #ccc;pointer-events:none}

<div class="main">
  <div class="panel">
    <div class="section-title">✍️ 字帖生成器</div>
    <div class="config-row">
      <span class="config-label">输入文字</span>
      <input class="text-input" id="charInput" value="人大山水日月天地" placeholder="输入要练习的汉字...">
    </div>
    <div class="config-row" id="gridRow">
      <span class="config-label">格式</span>
      <div class="pill active" data-v="tian">田字格</div>
      <div class="pill" data-v="mi">米字格</div>
      <div class="pill" data-v="hui">回宫格</div>
    </div>
    <div class="config-row" id="colsRow">
      <span class="config-label">每行</span>
      <div class="pill active" data-v="8">8 格</div>
      <div class="pill" data-v="10">10 格</div>
      <div class="pill" data-v="12">12 格</div>
    </div>
    <div class="config-row" id="fadeRow">
      <span class="config-label">描红</span>
      <div class="pill active" data-v="fade">渐淡模式</div>
      <div class="pill" data-v="full">全描红</div>
      <div class="pill" data-v="empty">全空格</div>
    </div>
    <div class="config-row">
      <span class="config-label">重复</span>
      <div class="slider-wrap">
        <input type="range" class="slider" id="repeatSlider" min="2" max="8" value="4">
        <span class="slider-val" id="repeatVal">4</span>
        <span style="font-size:10px;color:var(--text-caption)">次/字</span>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="renderBtn">🔄 重新生成</button>
      <button class="btn btn-secondary" onclick="window.print()">🖨️ 打印</button>
      <button class="btn btn-secondary" id="exportBtn">📥 导出 PNG</button>
    </div>
  </div>
  <div class="panel">
    <div class="section-title">📄 字帖预览 <span class="grade-desc" id="previewDesc">田字格 · 渐淡描红</span></div>
    <div class="preview-area" id="preview"></div>
  </div>

<div class="statusbar"><span id="statusInfo">字帖生成器</span><div class="statusbar-spacer"></div><span>楷体 · 可打印 · 纯本地</span></div>
<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';
let gridType='tian',cols=8,fadeMode='fade';

function setupPills(id,setter){
  document.getElementById(id).addEventListener('click',e=>{
    const p=e.target.closest('.pill');if(!p)return;
    document.querySelectorAll(`#${id} .pill`).forEach(x=>x.classList.remove('active'));
    p.classList.add('active');setter(p.dataset.v);render();
  });
}
setupPills('gridRow',v=>gridType=v);
setupPills('colsRow',v=>cols=parseInt(v));
setupPills('fadeRow',v=>fadeMode=v);
document.getElementById('repeatSlider').addEventListener('input',function(){
  document.getElementById('repeatVal').textContent=this.value;render();
});
document.getElementById('charInput').addEventListener('input',render);
document.getElementById('renderBtn').addEventListener('click',render);

function getOpacity(i){
  if(fadeMode==='full')return 0.85;
  if(fadeMode==='empty')return 0;
  if(i===0)return 0.85;
  if(i===1)return 0.35;
  if(i===2)return 0.15;
  return 0;
}

function render(){
  const chars=[...document.getElementById('charInput').value.replace(/\s/g,'')];
  if(!chars.length)return;
  const repeat=parseInt(document.getElementById('repeatSlider').value)||4;
  const preview=document.getElementById('preview');
  const gridClass=gridType==='mi'?' mi':gridType==='hui'?' hui':'';
  const innerEl=gridType==='hui'?'<div class="inner"></div>':'';
  const diagEl=gridType==='mi'?'<div class="diag"></div>':'';

  let html='';
  for(const ch of chars){
    // Each char gets ceil(repeat/cols) rows
    const cells=[];
    for(let i=0;i<repeat;i++){
      const op=getOpacity(i);
      const color=op>0?`rgba(220,38,38,${op})`:'transparent';
      cells.push(`<div class="grid-cell${gridClass}">${diagEl}${innerEl}<span class="char" style="color:${color}">${ch}</span></div>`);
    }
    // Fill remaining cols with empty cells
    const remaining=cols-(repeat%cols);
    if(remaining<cols){
      for(let i=0;i<remaining;i++){
        cells.push(`<div class="grid-cell${gridClass}">${diagEl}${innerEl}<span class="char" style="color:transparent">${ch}</span></div>`);
      }
    }
    // Split into rows of `cols`
    for(let r=0;r<cells.length;r+=cols){
      html+=`<div class="grid-row">${cells.slice(r,r+cols).join('')}</div>`;
    }
  }
  preview.innerHTML=html;
  const gridNames={tian:'田字格',mi:'米字格',hui:'回宫格'};
  const fadeNames={fade:'渐淡描红',full:'全描红',empty:'全空格'};
  document.getElementById('previewDesc').textContent=`${gridNames[gridType]} · ${fadeNames[fadeMode]}`;
}

document.getElementById('exportBtn').addEventListener('click',()=>{
  // Use Canvas to render the preview as PNG
  const el=document.getElementById('preview');
  const cellSize=72;const border=2;
  const chars=[...document.getElementById('charInput').value.replace(/\s/g,'')];
  const repeat=parseInt(document.getElementById('repeatSlider').value)||4;
  const totalCols=cols;
  const totalRows=chars.length;
  const w=totalCols*cellSize;const h=totalRows*cellSize;
  const cvs=document.createElement('canvas');
  const dpr=window.devicePixelRatio||1;
  cvs.width=w*dpr;cvs.height=h*dpr;
  const ctx=cvs.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);

  // Wait for font then draw
  document.fonts.ready.then(()=>{
    for(let row=0;row<chars.length;row++){
      for(let col=0;col<totalCols;col++){
        const x=col*cellSize,y=row*cellSize;
        // Cell border
        ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.setLineDash([]);
        ctx.strokeRect(x,y,cellSize,cellSize);
        // Dashed cross
        ctx.strokeStyle='#ccc';ctx.lineWidth=0.5;ctx.setLineDash([4,4]);
        ctx.beginPath();ctx.moveTo(x,y+cellSize/2);ctx.lineTo(x+cellSize,y+cellSize/2);ctx.stroke();
        ctx.beginPath();ctx.moveTo(x+cellSize/2,y);ctx.lineTo(x+cellSize/2,y+cellSize);ctx.stroke();
        ctx.setLineDash([]);
        // Char
        if(col<repeat){
          const op=getOpacity(col);
          if(op>0){
            ctx.fillStyle=`rgba(220,38,38,${op})`;
            ctx.font='48px KaiTi, STKaiti, 楷体, serif';
            ctx.textAlign='center';ctx.textBaseline='middle';
            ctx.fillText(chars[row],x+cellSize/2,y+cellSize/2+2);
          }
        }
      }
    }
    cvs.toBlob(b=>{
      const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='copybook.png';a.click();URL.revokeObjectURL(a.href);
    },'image/png');
    cvs.width=0;
  });
});

render();
</script>
