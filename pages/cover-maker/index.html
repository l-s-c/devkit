<script type="module">
import '../../shared/theme.js';

const TEMPLATES = [
  { name: '公众号封面', w: 900, h: 383 },
  { name: '小红书封面', w: 1242, h: 1660 },
  { name: '博客 Banner', w: 1200, h: 630 },
  { name: 'YouTube', w: 1280, h: 720 },
  { name: '自定义', w: 1200, h: 630 }
];

const FONT = "bold %spx -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif";
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');

let bgMode = 'solid', bgImg = null, bgImgUrl = null;
let textAlign = 'center';
let titlePos = null, subPos = null;
let dragging = null, dragOff = { x: 0, y: 0 };

/* === Template === */
document.getElementById('tplRow').addEventListener('click', e => {
  const pill = e.target.closest('[data-tpl]');
  if (!pill) return;
  const i = parseInt(pill.dataset.tpl);
  document.querySelectorAll('.tpl-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  document.getElementById('customSize').style.display = i === 4 ? 'flex' : 'none';
  if (i < 4) { cvs.width = TEMPLATES[i].w; cvs.height = TEMPLATES[i].h; }
  document.getElementById('sizeLabel').textContent = `${cvs.width} × ${cvs.height}`;
  titlePos = null; subPos = null; render();
});

document.getElementById('applyCustom').addEventListener('click', () => {
  cvs.width = parseInt(document.getElementById('cW').value) || 1200;
  cvs.height = parseInt(document.getElementById('cH').value) || 630;
  document.getElementById('sizeLabel').textContent = `${cvs.width} × ${cvs.height}`;
  titlePos = null; subPos = null; render();
});

/* === Background mode === */
document.querySelector('.radio-row').addEventListener('click', e => {
  const pill = e.target.closest('[data-bg]');
  if (!pill) return;
  bgMode = pill.dataset.bg;
  document.querySelectorAll('[data-bg]').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  document.getElementById('bgSolidConf').style.display = bgMode === 'solid' ? 'block' : 'none';
  document.getElementById('bgGradConf').style.display = bgMode === 'gradient' ? 'block' : 'none';
  document.getElementById('bgImgConf').style.display = bgMode === 'image' ? 'block' : 'none';
  render();
});

/* === Gradient presets === */
document.getElementById('gradRow').addEventListener('click', e => {
  const sw = e.target.closest('.grad-swatch');
  if (!sw) return;
  document.querySelectorAll('.grad-swatch').forEach(s => s.classList.remove('active'));
  sw.classList.add('active');
  document.getElementById('gradC1').value = sw.dataset.g1;
  document.getElementById('gradC2').value = sw.dataset.g2;
  render();
});

/* === Text align === */
document.getElementById('alignRow').addEventListener('click', e => {
  const btn = e.target.closest('[data-align]');
  if (!btn) return;
  textAlign = btn.dataset.align;
  document.querySelectorAll('[data-align]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

/* === Background image upload === */
const bgUpload = document.getElementById('bgUpload');
const bgFile = document.getElementById('bgFile');
bgUpload.addEventListener('click', () => bgFile.click());
bgUpload.addEventListener('dragover', e => { e.preventDefault(); bgUpload.style.borderColor = 'var(--brand-500)'; });
bgUpload.addEventListener('dragleave', () => { bgUpload.style.borderColor = 'var(--border-glass)'; });
bgUpload.addEventListener('drop', e => {
  e.preventDefault(); bgUpload.style.borderColor = 'var(--border-glass)';
  if (e.dataTransfer.files[0]) loadBgImage(e.dataTransfer.files[0]);
});
bgFile.addEventListener('change', () => { if (bgFile.files[0]) loadBgImage(bgFile.files[0]); });

function loadBgImage(file) {
  if (bgImgUrl) URL.revokeObjectURL(bgImgUrl);
  bgImgUrl = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => { bgImg = img; URL.revokeObjectURL(bgImgUrl); bgImgUrl = null; render(); };
  img.src = bgImgUrl;
  bgUpload.innerHTML = `✅ ${file.name}<input type="file" id="bgFile" accept="image/*" style="display:none">`;
}

/* === Live re-render on input === */
['solidColor', 'gradC1', 'gradC2', 'textColor'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
});
['titleText', 'subText'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
});
document.getElementById('titleSize').addEventListener('input', e => {
  document.getElementById('titleSizeVal').textContent = e.target.value;
  render();
});

/* === Render === */
function render() {
  const W = cvs.width, H = cvs.height;
  ctx.clearRect(0, 0, W, H);

  // Background
  if (bgMode === 'solid') {
    ctx.fillStyle = document.getElementById('solidColor').value;
    ctx.fillRect(0, 0, W, H);
  } else if (bgMode === 'gradient') {
    const c1 = document.getElementById('gradC1').value;
    const c2 = document.getElementById('gradC2').value;
    const g = ctx.createLinearGradient(0, 0, W, H);
    g.addColorStop(0, c1); g.addColorStop(1, c2);
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  } else if (bgMode === 'image' && bgImg) {
    // center-crop
    const ir = bgImg.width / bgImg.height, cr = W / H;
    let sw, sh, sx, sy;
    if (ir > cr) { sh = bgImg.height; sw = sh * cr; sx = (bgImg.width - sw) / 2; sy = 0; }
    else { sw = bgImg.width; sh = sw / cr; sx = 0; sy = (bgImg.height - sh) / 2; }
    ctx.drawImage(bgImg, sx, sy, sw, sh, 0, 0, W, H);
  } else {
    ctx.fillStyle = '#374151'; ctx.fillRect(0, 0, W, H);
  }

  // Title
  const title = document.getElementById('titleText').value;
  const fontSize = parseInt(document.getElementById('titleSize').value) || 48;
  const color = document.getElementById('textColor').value;
  if (title) {
    ctx.fillStyle = color;
    ctx.font = FONT.replace('%s', fontSize);
    ctx.textAlign = textAlign; ctx.textBaseline = 'middle';
    if (!titlePos) titlePos = { x: W / 2, y: H * 0.42 };
    const tx = textAlign === 'center' ? titlePos.x : textAlign === 'left' ? 40 : W - 40;
    ctx.fillText(title, tx, titlePos.y);
  }

  // Subtitle
  const sub = document.getElementById('subText').value;
  if (sub) {
    const subSize = Math.max(14, Math.round(fontSize * 0.45));
    ctx.fillStyle = color; ctx.globalAlpha = 0.8;
    ctx.font = FONT.replace('%s', subSize).replace('bold ', '');
    ctx.textAlign = textAlign;
    if (!subPos) subPos = { x: W / 2, y: (titlePos ? titlePos.y : H * 0.42) + fontSize * 0.8 };
    const sx = textAlign === 'center' ? subPos.x : textAlign === 'left' ? 40 : W - 40;
    ctx.fillText(sub, sx, subPos.y);
    ctx.globalAlpha = 1;
  }
}

/* === Drag text === */
function getPos(e) {
  const rect = cvs.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (cvs.width / rect.width),
    y: (e.clientY - rect.top) * (cvs.height / rect.height)
  };
}

cvs.addEventListener('mousedown', e => {
  const { x: mx, y: my } = getPos(e);
  const fontSize = parseInt(document.getElementById('titleSize').value) || 48;
  if (titlePos && Math.abs(my - titlePos.y) < fontSize * 0.6) {
    dragging = 'title'; dragOff = { x: mx - titlePos.x, y: my - titlePos.y }; return;
  }
  if (subPos && Math.abs(my - subPos.y) < fontSize * 0.4) {
    dragging = 'sub'; dragOff = { x: mx - subPos.x, y: my - subPos.y }; return;
  }
});

cvs.addEventListener('mousemove', e => {
  if (!dragging) return;
  const { x: mx, y: my } = getPos(e);
  const x = Math.max(20, Math.min(cvs.width - 20, mx - dragOff.x));
  const y = Math.max(20, Math.min(cvs.height - 20, my - dragOff.y));
  if (dragging === 'title') titlePos = { x, y }; else subPos = { x, y };
  render();
});

window.addEventListener('mouseup', () => { dragging = null; });

// Touch support
cvs.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const { x: mx, y: my } = getPos(t);
  const fontSize = parseInt(document.getElementById('titleSize').value) || 48;
  if (titlePos && Math.abs(my - titlePos.y) < fontSize * 0.6) {
    dragging = 'title'; dragOff = { x: mx - titlePos.x, y: my - titlePos.y }; return;
  }
  if (subPos && Math.abs(my - subPos.y) < fontSize * 0.4) {
    dragging = 'sub'; dragOff = { x: mx - subPos.x, y: my - subPos.y }; return;
  }
}, { passive: false });

cvs.addEventListener('touchmove', e => {
  if (!dragging) return;
  e.preventDefault();
  const t = e.touches[0];
  const { x: mx, y: my } = getPos(t);
  const x = Math.max(20, Math.min(cvs.width - 20, mx - dragOff.x));
  const y = Math.max(20, Math.min(cvs.height - 20, my - dragOff.y));
  if (dragging === 'title') titlePos = { x, y }; else subPos = { x, y };
  render();
}, { passive: false });

window.addEventListener('touchend', () => { dragging = null; });

/* === Export === */
document.getElementById('exportPng').addEventListener('click', () => exportImg('png'));
document.getElementById('exportJpg').addEventListener('click', () => exportImg('jpeg'));

function exportImg(fmt) {
  render();
  const link = document.createElement('a');
  link.download = `cover-${cvs.width}x${cvs.height}.${fmt === 'jpeg' ? 'jpg' : 'png'}`;
  link.href = cvs.toDataURL(`image/${fmt}`, fmt === 'jpeg' ? 0.92 : undefined);
  link.click();
  document.getElementById('statusInfo').textContent = `✅ 已导出 ${fmt.toUpperCase()} ${cvs.width}×${cvs.height}`;
}

render();
</script>
