<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

const fmt = n => '¥' + Math.round(n).toLocaleString();

// Architect 指定的税率表
const BRACKETS = [0, 36000, 144000, 300000, 420000, 660000, 960000];
const RATES    = [0.03, 0.10, 0.20, 0.25, 0.30, 0.35, 0.45];
const DEDUCTS  = [0, 2520, 16920, 31920, 52920, 85920, 181920];
const BRACKET_LABELS = ['≤36,000', '36,000~144,000', '144,000~300,000', '300,000~420,000', '420,000~660,000', '660,000~960,000', '>960,000'];

// 月度速算（年终奖单独计税用）
const M_BRACKETS = [0, 3000, 12000, 25000, 35000, 55000, 80000];

function findBracket(taxable, brackets) {
  let idx = 0;
  for (let i = brackets.length - 1; i >= 0; i--) {
    if (taxable > brackets[i]) { idx = i; break; }
  }
  return idx;
}

function calcYearTax(yearTaxable) {
  if (yearTaxable <= 0) return { tax: 0, rate: 0, bracket: 0 };
  const b = findBracket(yearTaxable, BRACKETS);
  const tax = Math.max(0, yearTaxable * RATES[b] - DEDUCTS[b]);
  return { tax, rate: RATES[b], bracket: b };
}

function calcBonusTax(bonus) {
  if (bonus <= 0) return { tax: 0, rate: 0 };
  const monthly = bonus / 12;
  const b = findBracket(monthly, M_BRACKETS);
  const tax = Math.max(0, bonus * RATES[b] - DEDUCTS[b]);
  return { tax, rate: RATES[b] };
}

function getDeductions() {
  let total = 0;
  document.querySelectorAll('#deductionGrid input:checked').forEach(cb => {
    total += parseInt(cb.dataset.amount) || 0;
  });
  return total;
}

function calc() {
  const salary = parseFloat(document.getElementById('salary').value) || 0;
  const bonus = parseFloat(document.getElementById('bonus').value) || 0;
  const pension = (parseFloat(document.getElementById('pension').value) || 0) / 100;
  const medical = (parseFloat(document.getElementById('medical').value) || 0) / 100;
  const unemploy = (parseFloat(document.getElementById('unemploy').value) || 0) / 100;
  const housing = (parseFloat(document.getElementById('housing').value) || 0) / 100;
  const insBase = parseFloat(document.getElementById('insBase').value) || salary;
  const base = Math.min(salary, insBase);
  const deductions = getDeductions();

  // 月五险一金
  const monthIns = base * (pension + medical + unemploy + housing);

  // 月应纳税所得额 → 年
  const monthTaxable = salary - monthIns - 5000 - deductions;
  const yearTaxable = Math.max(0, monthTaxable * 12);
  const { tax: yearTax, rate, bracket } = calcYearTax(yearTaxable);
  const monthTax = yearTax / 12;

  // 到手
  const takeHome = salary - monthIns - monthTax;
  const yearTakeHome = takeHome * 12;

  document.getElementById('takeHome').textContent = fmt(takeHome);
  document.getElementById('monthTax').textContent = fmt(monthTax);
  document.getElementById('monthIns').textContent = fmt(monthIns);
  document.getElementById('yearTax').textContent = fmt(yearTax);
  document.getElementById('yearTakeHome').textContent = fmt(yearTakeHome);
  document.getElementById('deductionTotal').textContent = fmt(deductions);

  // 分段条
  if (salary > 0) {
    const pctTake = Math.round(takeHome / salary * 100);
    const pctIns = Math.round(monthIns / salary * 100);
    const pctTax = Math.max(0, 100 - pctTake - pctIns);
    document.getElementById('segTakeHome').style.width = pctTake + '%';
    document.getElementById('segTakeHome').textContent = pctTake + '%';
    document.getElementById('segIns').style.width = pctIns + '%';
    document.getElementById('segIns').textContent = pctIns + '%';
    document.getElementById('segTax').style.width = Math.max(1, pctTax) + '%';
    document.getElementById('segTax').textContent = pctTax + '%';
  }

  // 年终奖对比
  if (bonus > 0) {
    document.getElementById('bonusPanel').style.display = 'block';
    // 单独计税
    const sep = calcBonusTax(bonus);
    document.getElementById('bonusSepTax').textContent = fmt(sep.tax);
    document.getElementById('bonusSepRate').textContent = Math.round(sep.rate * 100) + '%';
    document.getElementById('bonusSepNet').textContent = fmt(bonus - sep.tax);
    // 合并计税
    const combinedTaxable = yearTaxable + bonus;
    const cmbResult = calcYearTax(combinedTaxable);
    const cmbTax = cmbResult.tax - yearTax; // 年终奖导致的增量税
    document.getElementById('bonusCmbTax').textContent = fmt(cmbTax);
    document.getElementById('bonusCmbNet').textContent = fmt(bonus - cmbTax);
    // 哪个更好
    const sepBetter = sep.tax <= cmbTax;
    document.getElementById('bonusSeparate').className = 'bonus-card' + (sepBetter ? ' better' : '');
    document.getElementById('bonusCombined').className = 'bonus-card' + (sepBetter ? '' : ' better');
    const diff = Math.abs(sep.tax - cmbTax);
    document.getElementById('bonusAdviceText').textContent = sepBetter
      ? `建议选择「单独计税」，可多到手 ${fmt(diff)}`
      : `建议选择「合并计税」，可多到手 ${fmt(diff)}`;
  } else {
    document.getElementById('bonusPanel').style.display = 'none';
  }

  // 税率表
  renderTaxTable(bracket);

  // 状态栏
  document.getElementById('statusInfo').textContent =
    `月薪 ${fmt(salary)} · 到手 ${fmt(takeHome)} · 个税 ${fmt(monthTax)} · 税率 ${Math.round(rate * 100)}%`;
}

function renderTaxTable(currentBracket) {
  document.getElementById('taxTableBody').innerHTML = BRACKETS.map((b, i) => {
    const cls = i === currentBracket ? ' class="current"' : '';
    return `<tr${cls}><td>${i + 1}</td><td>${BRACKET_LABELS[i]}</td><td>${Math.round(RATES[i] * 100)}%</td><td>${DEDUCTS[i].toLocaleString()}</td></tr>`;
  }).join('');
}

/* ===== 事件绑定 ===== */
['salary', 'bonus'].forEach(id =>
  document.getElementById(id).addEventListener('input', calc)
);
document.querySelectorAll('.ins-input').forEach(el =>
  el.addEventListener('input', calc)
);

// 专项附加扣除 chip
document.getElementById('deductionGrid').addEventListener('change', e => {
  const chip = e.target.closest('.deduction-chip');
  if (chip) chip.classList.toggle('active', e.target.checked);
  calc();
});

// 五险一金展开/收起
document.getElementById('insToggle').addEventListener('click', () => {
  const p = document.getElementById('insPanel');
  const a = document.getElementById('insArrow');
  if (p.style.display === 'none') { p.style.display = 'block'; a.textContent = '▼'; }
