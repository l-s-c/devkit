<script>
// s=subject,v=verb/predicate,o=object,a=attributive,d=adverbial
const SENTENCES=[
// 简单句 SV
{text:'Birds fly.',parts:[{w:'Birds',r:'s',l:'主语'},{w:'fly',r:'v',l:'谓语'}],pattern:'S + V（主谓）',type:'simple',note:'最简单的主谓结构，Birds是主语，fly是不及物动词作谓语。'},
{text:'The sun rises.',parts:[{w:'The',r:'a',l:'定语'},{w:'sun',r:'s',l:'主语'},{w:'rises',r:'v',l:'谓语'}],pattern:'S + V（主谓）',type:'simple',note:'The是定冠词作定语修饰sun。rises是不及物动词。'},
{text:'She smiled happily.',parts:[{w:'She',r:'s',l:'主语'},{w:'smiled',r:'v',l:'谓语'},{w:'happily',r:'d',l:'状语'}],pattern:'S + V + Adv（主谓+状语）',type:'simple',note:'happily是副词作方式状语，修饰smiled。'},
// SVO
{text:'I love you.',parts:[{w:'I',r:'s',l:'主语'},{w:'love',r:'v',l:'谓语'},{w:'you',r:'o',l:'宾语'}],pattern:'S + V + O（主谓宾）',type:'simple',note:'最经典的SVO结构。love是及物动词，you是宾语。'},
{text:'Tom reads books.',parts:[{w:'Tom',r:'s',l:'主语'},{w:'reads',r:'v',l:'谓语'},{w:'books',r:'o',l:'宾语'}],pattern:'S + V + O（主谓宾）',type:'simple',note:'reads是及物动词，books是宾语。'},
{text:'She plays the piano.',parts:[{w:'She',r:'s',l:'主语'},{w:'plays',r:'v',l:'谓语'},{w:'the',r:'a',l:'定语'},{w:'piano',r:'o',l:'宾语'}],pattern:'S + V + O（主谓宾）',type:'simple',note:'the是定语修饰piano，piano是宾语。'},
{text:'We study English every day.',parts:[{w:'We',r:'s',l:'主语'},{w:'study',r:'v',l:'谓语'},{w:'English',r:'o',l:'宾语'},{w:'every day',r:'d',l:'状语'}],pattern:'S + V + O + Adv（主谓宾+状语）',type:'simple',note:'every day是时间状语。'},
{text:'He finished his homework quickly.',parts:[{w:'He',r:'s',l:'主语'},{w:'finished',r:'v',l:'谓语'},{w:'his',r:'a',l:'定语'},{w:'homework',r:'o',l:'宾语'},{w:'quickly',r:'d',l:'状语'}],pattern:'S + V + O + Adv',type:'simple',note:'his是物主代词作定语，quickly是方式状语。'},
// SVC
{text:'She is beautiful.',parts:[{w:'She',r:'s',l:'主语'},{w:'is',r:'v',l:'系动词'},{w:'beautiful',r:'o',l:'表语'}],pattern:'S + V + C（主系表）',type:'simple',note:'is是系动词，beautiful是形容词作表语。'},
{text:'The food tastes delicious.',parts:[{w:'The',r:'a',l:'定语'},{w:'food',r:'s',l:'主语'},{w:'tastes',r:'v',l:'系动词'},{w:'delicious',r:'o',l:'表语'}],pattern:'S + V + C（主系表）',type:'simple',note:'taste是感官系动词，delicious是表语。'},
{text:'He became a doctor.',parts:[{w:'He',r:'s',l:'主语'},{w:'became',r:'v',l:'系动词'},{w:'a',r:'a',l:'定语'},{w:'doctor',r:'o',l:'表语'}],pattern:'S + V + C（主系表）',type:'simple',note:'became是变化系动词，a doctor是名词作表语。'},
// SVOO
{text:'He gave me a book.',parts:[{w:'He',r:'s',l:'主语'},{w:'gave',r:'v',l:'谓语'},{w:'me',r:'o',l:'间接宾语'},{w:'a',r:'a',l:'定语'},{w:'book',r:'o',l:'直接宾语'}],pattern:'S + V + IO + DO（主谓双宾）',type:'simple',note:'gave后接双宾语，me是间接宾语（人），book是直接宾语（物）。'},
{text:'She told us a story.',parts:[{w:'She',r:'s',l:'主语'},{w:'told',r:'v',l:'谓语'},{w:'us',r:'o',l:'间接宾语'},{w:'a',r:'a',l:'定语'},{w:'story',r:'o',l:'直接宾语'}],pattern:'S + V + IO + DO（主谓双宾）',type:'simple',note:'told接双宾语，us是间接宾语，story是直接宾语。'},
{text:'Mom bought me a new dress.',parts:[{w:'Mom',r:'s',l:'主语'},{w:'bought',r:'v',l:'谓语'},{w:'me',r:'o',l:'间接宾语'},{w:'a new',r:'a',l:'定语'},{w:'dress',r:'o',l:'直接宾语'}],pattern:'S + V + IO + DO',type:'simple',note:'a new是定语修饰dress。'},
{text:'The teacher asked us a question.',parts:[{w:'The',r:'a',l:'定语'},{w:'teacher',r:'s',l:'主语'},{w:'asked',r:'v',l:'谓语'},{w:'us',r:'o',l:'间接宾语'},{w:'a',r:'a',l:'定语'},{w:'question',r:'o',l:'直接宾语'}],pattern:'S + V + IO + DO',type:'simple',note:'asked接双宾语结构。'},
// SVOC
{text:'They made him happy.',parts:[{w:'They',r:'s',l:'主语'},{w:'made',r:'v',l:'谓语'},{w:'him',r:'o',l:'宾语'},{w:'happy',r:'o',l:'宾补'}],pattern:'S + V + O + C（主谓宾补）',type:'simple',note:'happy是宾语补足语，补充说明him的状态。make sb. adj.是常见宾补结构。'},
{text:'We elected him monitor.',parts:[{w:'We',r:'s',l:'主语'},{w:'elected',r:'v',l:'谓语'},{w:'him',r:'o',l:'宾语'},{w:'monitor',r:'o',l:'宾补'}],pattern:'S + V + O + C（主谓宾补）',type:'simple',note:'monitor是名词作宾补，说明him的身份。'},
{text:'I saw her dancing.',parts:[{w:'I',r:'s',l:'主语'},{w:'saw',r:'v',l:'谓语'},{w:'her',r:'o',l:'宾语'},{w:'dancing',r:'o',l:'宾补'}],pattern:'S + V + O + C',type:'simple',note:'dancing是现在分词作宾补，表示正在进行的动作。'},
{text:'The news made everyone excited.',parts:[{w:'The',r:'a',l:'定语'},{w:'news',r:'s',l:'主语'},{w:'made',r:'v',l:'谓语'},{w:'everyone',r:'o',l:'宾语'},{w:'excited',r:'o',l:'宾补'}],pattern:'S + V + O + C',type:'simple',note:'excited是过去分词作宾补。'},
{text:'Please keep the door open.',parts:[{w:'Please',r:'d',l:'状语'},{w:'keep',r:'v',l:'谓语'},{w:'the',r:'a',l:'定语'},{w:'door',r:'o',l:'宾语'},{w:'open',r:'o',l:'宾补'}],pattern:'V + O + C（祈使句）',type:'simple',note:'祈使句省略主语you。keep sth. adj.是宾补结构。'},
// 带各种状语
{text:'In the morning, I go to school.',parts:[{w:'In the morning',r:'d',l:'时间状语'},{w:'I',r:'s',l:'主语'},{w:'go',r:'v',l:'谓语'},{w:'to school',r:'d',l:'地点状语'}],pattern:'Adv + S + V + Adv',type:'simple',note:'In the morning是时间状语前置，to school是地点状语。'},
{text:'He runs very fast.',parts:[{w:'He',r:'s',l:'主语'},{w:'runs',r:'v',l:'谓语'},{w:'very fast',r:'d',l:'状语'}],pattern:'S + V + Adv',type:'simple',note:'very fast是程度+方式状语。'},
{text:'Because of the rain, we stayed home.',parts:[{w:'Because of the rain',r:'d',l:'原因状语'},{w:'we',r:'s',l:'主语'},{w:'stayed',r:'v',l:'谓语'},{w:'home',r:'d',l:'地点状语'}],pattern:'Adv + S + V + Adv',type:'simple',note:'Because of the rain是介词短语作原因状语。'},
// 带定语
{text:'The tall boy is my brother.',parts:[{w:'The',r:'a',l:'定语'},{w:'tall',r:'a',l:'定语'},{w:'boy',r:'s',l:'主语'},{w:'is',r:'v',l:'系动词'},{w:'my',r:'a',l:'定语'},{w:'brother',r:'o',l:'表语'}],pattern:'S + V + C（带定语）',type:'simple',note:'The和tall都是定语修饰boy，my是定语修饰brother。'},
{text:'A girl in red dress came in.',parts:[{w:'A',r:'a',l:'定语'},{w:'girl',r:'s',l:'主语'},{w:'in red dress',r:'a',l:'后置定语'},{w:'came in',r:'v',l:'谓语'}],pattern:'S + V',type:'simple',note:'in red dress是介词短语作后置定语修饰girl。'},
// 被动语态
{text:'The window was broken by Tom.',parts:[{w:'The',r:'a',l:'定语'},{w:'window',r:'s',l:'主语'},{w:'was broken',r:'v',l:'谓语(被动)'},{w:'by Tom',r:'d',l:'施动者状语'}],pattern:'S + V(passive) + by…',type:'simple',note:'被动语态结构，by Tom表示施动者。'},
{text:'English is spoken worldwide.',parts:[{w:'English',r:'s',l:'主语'},{w:'is spoken',r:'v',l:'谓语(被动)'},{w:'worldwide',r:'d',l:'状语'}],pattern:'S + V(passive) + Adv',type:'simple',note:'被动语态，worldwide是范围状语。'},
// There be
{text:'There is a book on the desk.',parts:[{w:'There',r:'d',l:'引导词'},{w:'is',r:'v',l:'谓语'},{w:'a',r:'a',l:'定语'},{w:'book',r:'s',l:'主语'},{w:'on the desk',r:'d',l:'地点状语'}],pattern:'There be + S + Adv',type:'simple',note:'There be句型，真正主语是book，on the desk是地点状语。'},

// 并列句
{text:'I like tea, but she likes coffee.',parts:[{w:'I',r:'s',l:'主语₁'},{w:'like',r:'v',l:'谓语₁'},{w:'tea',r:'o',l:'宾语₁'},{w:', but',r:'d',l:'并列连词'},{w:'she',r:'s',l:'主语₂'},{w:'likes',r:'v',l:'谓语₂'},{w:'coffee',r:'o',l:'宾语₂'}],pattern:'S₁V₁O₁ + but + S₂V₂O₂',type:'compound',note:'but连接两个对比关系的简单句，表示转折。'},
{text:'He studied hard, and he passed the exam.',parts:[{w:'He',r:'s',l:'主语₁'},{w:'studied',r:'v',l:'谓语₁'},{w:'hard',r:'d',l:'状语'},{w:', and',r:'d',l:'并列连词'},{w:'he',r:'s',l:'主语₂'},{w:'passed',r:'v',l:'谓语₂'},{w:'the',r:'a',l:'定语'},{w:'exam',r:'o',l:'宾语₂'}],pattern:'S₁V₁ + and + S₂V₂O₂',type:'compound',note:'and连接两个递进关系的简单句。'},
{text:'Hurry up, or you will be late.',parts:[{w:'Hurry up',r:'v',l:'谓语₁'},{w:', or',r:'d',l:'并列连词'},{w:'you',r:'s',l:'主语₂'},{w:'will be',r:'v',l:'谓语₂'},{w:'late',r:'o',l:'表语₂'}],pattern:'V₁ + or + S₂V₂C₂',type:'compound',note:'or表示选择/否则，前句是祈使句。'},
{text:'It was raining, so we stayed inside.',parts:[{w:'It',r:'s',l:'主语₁'},{w:'was raining',r:'v',l:'谓语₁'},{w:', so',r:'d',l:'并列连词'},{w:'we',r:'s',l:'主语₂'},{w:'stayed',r:'v',l:'谓语₂'},{w:'inside',r:'d',l:'状语₂'}],pattern:'S₁V₁ + so + S₂V₂',type:'compound',note:'so表示因果关系。'},
{text:'She sang and he danced.',parts:[{w:'She',r:'s',l:'主语₁'},{w:'sang',r:'v',l:'谓语₁'},{w:'and',r:'d',l:'并列连词'},{w:'he',r:'s',l:'主语₂'},{w:'danced',r:'v',l:'谓语₂'}],pattern:'S₁V₁ + and + S₂V₂',type:'compound',note:'and连接两个并列的主谓结构。'},
{text:'Not only did he come, but he also helped.',parts:[{w:'Not only',r:'d',l:'关联连词'},{w:'did',r:'v',l:'助动词'},{w:'he',r:'s',l:'主语₁'},{w:'come',r:'v',l:'谓语₁'},{w:', but',r:'d',l:'关联连词'},{w:'he',r:'s',l:'主语₂'},{w:'also helped',r:'v',l:'谓语₂'}],pattern:'Not only…but also…',type:'compound',note:'not only…but also…关联并列结构，not only部分倒装。'},

// 复合句 - 定语从句
{text:'The man who is standing there is my father.',parts:[{w:'The',r:'a',l:'定语'},{w:'man',r:'s',l:'主语'},{w:'who is standing there',r:'a',l:'定语从句'},{w:'is',r:'v',l:'系动词'},{w:'my',r:'a',l:'定语'},{w:'father',r:'o',l:'表语'}],pattern:'S + 定语从句 + V + C',type:'complex',note:'who引导定语从句修饰the man，who在从句中作主语。'},
{text:'I like the book that you gave me.',parts:[{w:'I',r:'s',l:'主语'},{w:'like',r:'v',l:'谓语'},{w:'the',r:'a',l:'定语'},{w:'book',r:'o',l:'宾语'},{w:'that you gave me',r:'a',l:'定语从句'}],pattern:'S + V + O + 定语从句',type:'complex',note:'that引导定语从句修饰book，that在从句中作宾语。'},
{text:'This is the place where I was born.',parts:[{w:'This',r:'s',l:'主语'},{w:'is',r:'v',l:'系动词'},{w:'the',r:'a',l:'定语'},{w:'place',r:'o',l:'表语'},{w:'where I was born',r:'a',l:'定语从句'}],pattern:'S + V + C + 定语从句',type:'complex',note:'where引导定语从句修饰place，where在从句中作地点状语。'},
// 宾语从句
{text:'I think that he is right.',parts:[{w:'I',r:'s',l:'主语'},{w:'think',r:'v',l:'谓语'},{w:'that he is right',r:'o',l:'宾语从句'}],pattern:'S + V + 宾语从句',type:'complex',note:'that引导宾语从句作think的宾语。that可省略。'},
{text:'She asked me where I lived.',parts:[{w:'She',r:'s',l:'主语'},{w:'asked',r:'v',l:'谓语'},{w:'me',r:'o',l:'间接宾语'},{w:'where I lived',r:'o',l:'宾语从句'}],pattern:'S + V + IO + 宾语从句',type:'complex',note:'where引导宾语从句，注意从句用陈述语序。'},
{text:'I don\'t know whether he will come.',parts:[{w:'I',r:'s',l:'主语'},{w:'don\'t know',r:'v',l:'谓语'},{w:'whether he will come',r:'o',l:'宾语从句'}],pattern:'S + V + 宾语从句',type:'complex',note:'whether引导宾语从句，表示"是否"。'},
// 状语从句
{text:'If it rains, we will stay home.',parts:[{w:'If it rains',r:'d',l:'条件状语从句'},{w:'we',r:'s',l:'主语'},{w:'will stay',r:'v',l:'谓语'},{w:'home',r:'d',l:'地点状语'}],pattern:'条件状语从句 + S + V',type:'complex',note:'if引导条件状语从句，主将从现（主句将来时，从句现在时）。'},
{text:'When I got home, my mother was cooking.',parts:[{w:'When I got home',r:'d',l:'时间状语从句'},{w:'my',r:'a',l:'定语'},{w:'mother',r:'s',l:'主语'},{w:'was cooking',r:'v',l:'谓语'}],pattern:'时间状语从句 + S + V',type:'complex',note:'when引导时间状语从句，主句用过去进行时表示当时正在进行。'},

let currentCat='all';
const sentenceList=document.getElementById('sentenceList');
const parseResult=document.getElementById('parseResult');
const countInfo=document.getElementById('countInfo');

function renderList(){
  const list=currentCat==='all'?SENTENCES:SENTENCES.filter(s=>s.type===currentCat);
  countInfo.textContent=`共 ${list.length} 句`;
  sentenceList.innerHTML=list.map((s,i)=>{
    const idx=SENTENCES.indexOf(s);
    const typeMap={simple:'简单句',compound:'并列句',complex:'复合句'};
    return `<div class="sentence-card" data-idx="${idx}"><div class="sentence-text">${s.text}</div><div class="sentence-type">${typeMap[s.type]} · ${s.pattern}</div></div>`;
  }).join('');
  sentenceList.querySelectorAll('.sentence-card').forEach(c=>c.addEventListener('click',()=>{
    sentenceList.querySelectorAll('.sentence-card').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');
    showParse(SENTENCES[+c.dataset.idx]);
  }));
}

function showParse(s){
  const roleMap={s:'w-s',v:'w-v',o:'w-o',a:'w-a',d:'w-d'};
  parseResult.style.display='block';
  parseResult.innerHTML=`<div class="parsed">${s.parts.map(p=>`<span class="word-wrap ${roleMap[p.r]}"><span class="word-text">${p.w}</span><span class="word-label">${p.l}</span></span>`).join(' ')}</div>
  <div class="pattern-box"><div class="pattern-label">句型结构</div><div class="pattern-text">${s.pattern}</div></div>
  <div class="grammar-note">💡 ${s.note}</div>`;
  parseResult.scrollIntoView({behavior:'smooth',block:'nearest'});
}

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentCat=tab.dataset.cat;
    parseResult.style.display='none';
    renderList();
  });
});

renderList();
// Auto-show first
if(SENTENCES.length)showParse(SENTENCES[0]);
</script>
