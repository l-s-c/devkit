      <button class="cat-tab" data-cat="math">数学符号</button>
      <button class="cat-tab" data-cat="arrow">箭头符号</button>
      <button class="cat-tab" data-cat="currency">货币符号</button>

<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

let mode = 'encode';

const entities = {
  common: [
    ['&','&amp;','ampersand'],['<','&lt;','小于号'],['>','&gt;','大于号'],
    ['"','&quot;','双引号'],["'",'&apos;','单引号'],[' ','&nbsp;','空格'],
    ['©','&copy;','版权'],['®','&reg;','注册商标'],['™','&trade;','商标'],
    ['…','&hellip;','省略号'],['—','&mdash;','长破折号'],['–','&ndash;','短破折号'],
    ['·','&middot;','中间点'],['§','&sect;','章节号'],['¶','&para;','段落号'],
    ['†','&dagger;','匕首号'],['‡','&Dagger;','双匕首号'],['•','&bull;','圆点'],
  ],
  math: [
    ['±','&plusmn;','正负号'],['×','&times;','乘号'],['÷','&divide;','除号'],
    ['≠','&ne;','不等于'],['≈','&asymp;','约等于'],['≤','&le;','小于等于'],
    ['≥','&ge;','大于等于'],['∞','&infin;','无穷'],['√','&radic;','根号'],
    ['∑','&sum;','求和'],['∏','&prod;','乘积'],['∫','&int;','积分'],
    ['π','&pi;','圆周率'],['°','&deg;','度'],['%','&#37;','百分号'],
  ],
  arrow: [
    ['←','&larr;','左箭头'],['→','&rarr;','右箭头'],['↑','&uarr;','上箭头'],
    ['↓','&darr;','下箭头'],['↔','&harr;','双向箭头'],['⇐','&lArr;','双线左'],
    ['⇒','&rArr;','双线右'],['⇑','&uArr;','双线上'],['⇓','&dArr;','双线下'],
    ['⇔','&hArr;','双线双向'],
  ],
  currency: [
    ['¥','&yen;','人民币/日元'],['$','&#36;','美元'],['€','&euro;','欧元'],
    ['£','&pound;','英镑'],['¢','&cent;','美分'],['₩','&#8361;','韩元'],
    ['₹','&#8377;','印度卢比'],['₽','&#8381;','俄罗斯卢布'],
  ],
  special: [
    ['♠','&spades;','黑桃'],['♥','&hearts;','红心'],['♦','&diams;','方块'],
    ['♣','&clubs;','梅花'],['★','&#9733;','实心星'],['☆','&#9734;','空心星'],
    ['♪','&#9834;','音符'],['✓','&#10003;','对勾'],['✗','&#10007;','叉号'],
    ['☎','&#9742;','电话'],['✉','&#9993;','邮件'],['⚡','&#9889;','闪电'],
  ],
};

/* ===== 编码/解码 ===== */
function htmlEncode(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&apos;');
}

function htmlDecode(str) {
  // textarea.innerHTML trick: 只解码一次，不会双重解码 &amp;lt; → &lt;（不会变成 <）
  const ta = document.createElement('textarea');
  ta.innerHTML = str;
  return ta.value;
}

function convert() {
  const input = document.getElementById('inputText').value;
  const output = mode === 'encode' ? htmlEncode(input) : htmlDecode(input);
  document.getElementById('outputText').value = output;
}

/* ===== 模式切换 ===== */
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    document.getElementById('leftTitle').textContent = mode === 'encode' ? '📥 原始文本' : '📥 实体文本';
    document.getElementById('rightTitle').textContent = mode === 'encode' ? '📤 编码结果' : '📤 解码结果';
    convert();
  });
});

/* ===== 参考表 ===== */
function renderRef(cat) {
  const grid = document.getElementById('refGrid');
  grid.innerHTML = entities[cat].map(([ch, code, name]) => {
    const escapedCode = code.replace(/&/g, '&amp;');
    return `<div class="ref-item" data-code="${code.replace(/"/g, '&quot;')}">
      <span class="ref-char">${ch}</span>
      <div class="ref-info"><div class="ref-name">${name}</div><div class="ref-code">${escapedCode}</div></div>
      <span class="ref-copy">复制</span>
    </div>`;
  }).join('');
}

document.getElementById('catTabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.cat-tab');
  if (!tab) return;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  renderRef(tab.dataset.cat);
});

document.getElementById('refGrid').addEventListener('click', (e) => {
  const item = e.target.closest('.ref-item');
  if (item) navigator.clipboard.writeText(item.dataset.code);
});

/* ===== 事件 ===== */
document.getElementById('inputText').addEventListener('input', convert);

document.getElementById('btnSwap').addEventListener('click', () => {
  document.getElementById('inputText').value = document.getElementById('outputText').value;
  convert();
});

document.getElementById('btnClear').addEventListener('click', () => {
  document.getElementById('inputText').value = '';
  convert();
});

document.getElementById('btnPaste').addEventListener('click', async () => {
  try {
    document.getElementById('inputText').value = await navigator.clipboard.readText();
    convert();
  } catch (e) { /* denied */ }
});

document.getElementById('btnCopy').addEventListener('click', () => {
  const output = document.getElementById('outputText').value;
  if (output) navigator.clipboard.writeText(output);
});

renderRef('common');
</script>
