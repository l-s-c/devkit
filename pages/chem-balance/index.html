<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';
// Parse formula like Fe2O3 → {Fe:2,O:3}
function parseFormula(s){
  const atoms={};const re=/([A-Z][a-z]?)(\d*)/g;let m;
  while((m=re.exec(s))!==null){if(!m[1])continue;atoms[m[1]]=(atoms[m[1]]||0)+(parseInt(m[2])||1)}
  return atoms;
}
// Brute force balance (try coefficients 1-10 for up to 5 compounds)
function balance(compounds,splitIdx){
  const n=compounds.length;const max=10;
  function check(coeffs){
    const totals={};
    compounds.forEach((atoms,i)=>{
      const sign=i<splitIdx?1:-1;
      for(const[el,cnt]of Object.entries(atoms)){
        totals[el]=(totals[el]||0)+sign*coeffs[i]*cnt;
      }
    });
    return Object.values(totals).every(v=>v===0);
  }
  function tryCoeffs(idx,coeffs){
    if(idx===n)return check(coeffs)?[...coeffs]:null;
    for(let c=1;c<=max;c++){coeffs[idx]=c;const r=tryCoeffs(idx+1,coeffs);if(r)return r}
    return null;
  }
  return tryCoeffs(0,new Array(n).fill(1));
}
function doBalance(){
  const input=document.getElementById('eqInput').value.trim();
  const parts=input.split(/[→=]/);
  if(parts.length!==2){document.getElementById('errMsg').textContent='请使用 → 或 = 分隔反应物和生成物';document.getElementById('resultPanel').style.display='';return}
  const left=parts[0].split('+').map(s=>s.trim()).filter(Boolean);
  const right=parts[1].split('+').map(s=>s.trim()).filter(Boolean);
  if(!left.length||!right.length){document.getElementById('errMsg').textContent='请输入完整的方程式';document.getElementById('resultPanel').style.display='';return}
  const allRaw=[...left,...right];
  const compounds=allRaw.map(parseFormula);
  const coeffs=balance(compounds,left.length);
  const panel=document.getElementById('resultPanel');panel.style.display='';
  const errEl=document.getElementById('errMsg');
  if(!coeffs){errEl.textContent='无法自动配平此方程式（系数过大或方程式有误）';document.getElementById('resultEq').textContent='';document.getElementById('atomTable').innerHTML='';return}
  errEl.textContent='';
  // Display
  const leftStr=left.map((f,i)=>(coeffs[i]>1?`<span class="coeff">${coeffs[i]}</span>`:'')+f).join(' + ');
  const rightStr=right.map((f,i)=>(coeffs[left.length+i]>1?`<span class="coeff">${coeffs[left.length+i]}</span>`:'')+f).join(' + ');
  document.getElementById('resultEq').innerHTML=leftStr+' → '+rightStr;
  // Atom verification
  const elements=new Set();compounds.forEach(a=>Object.keys(a).forEach(e=>elements.add(e)));
  document.getElementById('atomTable').innerHTML=[...elements].map(el=>{
    let l=0,r=0;
    compounds.forEach((a,i)=>{const c=coeffs[i]*(a[el]||0);if(i<left.length)l+=c;else r+=c});
    return `<div class="atom-item"><div class="atom-sym">${el}</div><div class="atom-cnt">左 ${l} = 右 ${r} ✓</div></div>`;
  }).join('');
}
document.getElementById('balanceBtn').addEventListener('click',doBalance);
document.getElementById('clearBtn').addEventListener('click',()=>{document.getElementById('eqInput').value='';document.getElementById('resultPanel').style.display='none'});
document.querySelectorAll('.ex-pill').forEach(p=>p.addEventListener('click',function(){document.getElementById('eqInput').value=this.dataset.eq;doBalance()}));
document.getElementById('eqInput').addEventListener('keydown',e=>{if(e.key==='Enter')doBalance()});
</script>
