<h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">图片拼接 — DevKit 在线万能工具箱</h1>

<div class="topbar">

<div class="main">
  <div class="dual">
    <!-- 左：上传 + 列表 -->
    <div>
      <div class="panel">
        <div class="upload-area">
          <input type="file" accept="image/*" multiple id="fileInput">
          <div style="font-size:36px;margin-bottom:6px">🖼️</div>
          <div style="font-size:13px;font-weight:600;color:var(--text-secondary)">拖拽或点击上传多张图片</div>
        </div>
        <div style="margin-top:10px;display:none" id="statsWrap">
          <span class="stat-chip" id="statCount">0 张</span>
        </div>
        <div class="img-list" id="imgList"></div>
      </div>
    </div>

    <!-- 右：控件 + 预览（sticky） -->
    <div>
      <div class="panel">
        <div class="section-title">📐 拼接模式</div>
        <div class="tabs" id="modeTabs">
          <button class="tab active" data-mode="horizontal">➡️ 横向</button>
          <button class="tab" data-mode="vertical">⬇️ 纵向</button>
          <button class="tab" data-mode="grid">⊞ 网格</button>
        </div>
        <div id="gridPanel" style="display:none">
          <div class="grid-options" id="gridOptions">
            <button class="grid-opt active" data-cols="2">2×2</button>
            <button class="grid-opt" data-cols="3">3×3</button>
            <button class="grid-opt" data-cols="4">4×4</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="section-title">⚙️ 参数</div>
        <div class="slider-row">
          <span class="slider-label">间距</span>
          <input type="range" class="slider-input" id="gap" min="0" max="50" value="8">
          <span class="slider-val" id="gapVal">8px</span>
        </div>
        <div class="color-row">
          <span class="slider-label">背景色</span>
          <input type="color" class="color-input" id="bgColor" value="#FFFFFF">
          <span style="font-family:var(--font-code);font-size:12px;color:var(--text-secondary)" id="bgHex">#FFFFFF</span>
        </div>
      </div>

      <div class="panel">
        <div class="action-row">
          <button class="action-btn" id="downloadBtn" disabled>💾 导出拼接图</button>
          <select class="format-select" id="exportFormat">
            <option value="png">PNG</option>
            <option value="jpeg">JPG</option>
          </select>
        </div>
      </div>

      <div class="panel" id="previewPanel" style="display:none">
        <div class="section-title">👁️ 预览</div>
        <div class="preview-wrap"><canvas id="previewCanvas"></canvas></div>
      </div>
    </div>
  </div>
</div>

<div class="statusbar">
  <span id="statusInfo">上传多张图片开始拼接</span>
  <div class="statusbar-spacer"></div>
  <span>纯本地处理</span>
</div>

<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

let images = [], mode = 'horizontal', gridCols = 2;

/* ===== 渲染图片列表 ===== */
let listExpanded = false;

function renderList() {
  const list = document.getElementById('imgList');
  list.innerHTML = '';
  const showAll = listExpanded || images.length <= 3;
  const visible = showAll ? images : images.slice(0, 3);
  visible.forEach((im, i) => {
    const item = document.createElement('div');
    item.className = 'img-item';
    item.innerHTML = `
      <img class="img-thumb" src="${im.url}">
      <span class="img-name">${im.name}</span>
      <span class="img-dim">${im.w}×${im.h}</span>
    `;
    // ↑ 按钮
    const upBtn = document.createElement('button');
    upBtn.className = 'img-btn'; upBtn.textContent = '↑';
    upBtn.addEventListener('click', () => { if (i > 0) { [images[i], images[i-1]] = [images[i-1], images[i]]; renderList(); render(); } });
    // ↓ 按钮
    const downBtn = document.createElement('button');
    downBtn.className = 'img-btn'; downBtn.textContent = '↓';
    downBtn.addEventListener('click', () => { if (i < images.length - 1) { [images[i], images[i+1]] = [images[i+1], images[i]]; renderList(); render(); } });
    // ✕ 删除
    const delBtn = document.createElement('button');
    delBtn.className = 'img-btn img-del'; delBtn.textContent = '✕';
    delBtn.addEventListener('click', () => { URL.revokeObjectURL(images[i].url); images.splice(i, 1); renderList(); render(); });

    item.appendChild(upBtn);
    item.appendChild(downBtn);
    item.appendChild(delBtn);
    list.appendChild(item);
  });

  if (!showAll && images.length > 3) {
    const expandBtn = document.createElement('button');
    expandBtn.style.cssText = 'width:100%;padding:8px;border:1.5px dashed var(--border-glass);border-radius:6px;background:transparent;font-size:11px;font-weight:700;color:var(--text-caption);cursor:pointer;margin-top:6px';
    expandBtn.textContent = `展开全部（${images.length} 张）`;
    expandBtn.addEventListener('click', () => { listExpanded = true; renderList(); });
    list.appendChild(expandBtn);
  } else if (showAll && images.length > 3) {
    const collapseBtn = document.createElement('button');
    collapseBtn.style.cssText = 'width:100%;padding:8px;border:1.5px dashed var(--border-glass);border-radius:6px;background:transparent;font-size:11px;font-weight:700;color:var(--text-caption);cursor:pointer;margin-top:6px';
    collapseBtn.textContent = '收起';
    collapseBtn.addEventListener('click', () => { listExpanded = false; renderList(); });
    list.appendChild(collapseBtn);
  }

  const sw = document.getElementById('statsWrap');
  sw.style.display = images.length ? 'block' : 'none';
  document.getElementById('statCount').textContent = images.length + ' 张';
  document.getElementById('downloadBtn').disabled = images.length === 0;
}

/* ===== 绘制拼接（预览用缩放尺寸）===== */
function drawCollage(canvas, previewMode) {
  const ctx = canvas.getContext('2d');
  const gap = parseInt(document.getElementById('gap').value);
  const bg = document.getElementById('bgColor').value;

  if (mode === 'horizontal') {
    // 等高：预览用 300px 高，导出用原图最大高度
    const targetH = previewMode ? 300 : Math.max(...images.map(im => im.h));
    const scaled = images.map(im => ({ img: im.img, w: Math.round(im.w * (targetH / im.h)), h: targetH }));
    const totalW = scaled.reduce((s, im) => s + im.w, 0) + gap * (images.length - 1);
    canvas.width = totalW; canvas.height = targetH;
    ctx.fillStyle = bg; ctx.fillRect(0, 0, totalW, targetH);
    let x = 0;
    scaled.forEach(im => { ctx.drawImage(im.img, x, 0, im.w, im.h); x += im.w + gap; });
  } else if (mode === 'vertical') {
    // 等宽：预览用 400px 宽，导出用原图最大宽度
    const targetW = previewMode ? 400 : Math.max(...images.map(im => im.w));
    const scaled = images.map(im => ({ img: im.img, w: targetW, h: Math.round(im.h * (targetW / im.w)) }));
    const totalH = scaled.reduce((s, im) => s + im.h, 0) + gap * (images.length - 1);
    canvas.width = targetW; canvas.height = totalH;
    ctx.fillStyle = bg; ctx.fillRect(0, 0, targetW, totalH);
    let y = 0;
    scaled.forEach(im => { ctx.drawImage(im.img, 0, y, im.w, im.h); y += im.h + gap; });
  } else {
    // 网格：预览用 200px 格子，导出用 600px 格子
    const cols = gridCols;
    const rows = Math.ceil(images.length / cols);
    const cellW = previewMode ? 200 : 600;
    const cellH = cellW;
    canvas.width = cols * cellW + (cols - 1) * gap;
    canvas.height = rows * cellH + (rows - 1) * gap;
    ctx.fillStyle = bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
    images.forEach((im, i) => {
      const col = i % cols, row = Math.floor(i / cols);
      const x = col * (cellW + gap), y = row * (cellH + gap);
      const scale = Math.min(cellW / im.w, cellH / im.h);
      const dw = im.w * scale, dh = im.h * scale;
      ctx.drawImage(im.img, x + (cellW - dw) / 2, y + (cellH - dh) / 2, dw, dh);
    });
  }
}

function render() {
  if (!images.length) { document.getElementById('previewPanel').style.display = 'none'; return; }
  document.getElementById('previewPanel').style.display = 'block';
  drawCollage(document.getElementById('previewCanvas'), true);
  document.getElementById('statusInfo').textContent = `${images.length} 张 · ${mode} · 间距 ${document.getElementById('gap').value}px`;
}

/* ===== 导出（全尺寸渲染）===== */
function download() {
  if (!images.length) return;
  const canvas = document.createElement('canvas');
  drawCollage(canvas, false);
  const fmt = document.getElementById('exportFormat').value;
  const mimeType = fmt === 'jpeg' ? 'image/jpeg' : 'image/png';
  canvas.toBlob(blob => {
    const a = document.createElement('a');
    const url = URL.createObjectURL(blob);
    a.href = url;
    a.download = `collage.${fmt === 'jpeg' ? 'jpg' : 'png'}`;
    a.click();
    URL.revokeObjectURL(url);
    canvas.width = 0; canvas.height = 0;
  }, mimeType, 0.92);
}

/* ===== 事件绑定 ===== */
document.getElementById('fileInput').addEventListener('change', e => {
  const files = [...e.target.files];
  let loaded = 0;
  files.forEach(f => {
    const url = URL.createObjectURL(f);
    const img = new Image();
    img.onload = () => {
      images.push({ img, name: f.name, w: img.width, h: img.height, url });
      loaded++;
      if (loaded === files.length) { renderList(); render(); }
    };
    img.src = url;
  });
});

document.getElementById('modeTabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  mode = tab.dataset.mode;
  document.querySelectorAll('#modeTabs .tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  document.getElementById('gridPanel').style.display = mode === 'grid' ? 'block' : 'none';
  render();
});

document.getElementById('gridOptions').addEventListener('click', e => {
  const opt = e.target.closest('.grid-opt');
  if (!opt) return;
  gridCols = parseInt(opt.dataset.cols);
  document.querySelectorAll('.grid-opt').forEach(o => o.classList.toggle('active', o.dataset.cols === String(gridCols)));
  render();
});

document.getElementById('gap').addEventListener('input', function() {
  document.getElementById('gapVal').textContent = this.value + 'px';
  render();
});

document.getElementById('bgColor').addEventListener('input', function() {
  document.getElementById('bgHex').textContent = this.value;
  render();
});

document.getElementById('downloadBtn').addEventListener('click', download);
</script>
