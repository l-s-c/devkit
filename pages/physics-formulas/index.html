<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';
// n=name, f=formula(KaTeX), cat=category, d=description, v=variables[[symbol,name,unit],...]
const FORMULAS=[
// 力学
{n:'速度公式',f:'v = \\dfrac{s}{t}',cat:'力学',d:'物体在单位时间内通过的路程',v:[['v','速度','m/s'],['s','路程','m'],['t','时间','s']]},
{n:'牛顿第二定律',f:'F = ma',cat:'力学',d:'物体加速度与作用力成正比，与质量成反比',v:[['F','力','N'],['m','质量','kg'],['a','加速度','m/s²']]},
{n:'重力公式',f:'G = mg',cat:'力学',d:'物体所受重力与质量成正比，g ≈ 9.8 N/kg',v:[['G','重力','N'],['m','质量','kg'],['g','重力加速度','N/kg']]},
{n:'密度公式',f:'\\rho = \\dfrac{m}{V}',cat:'力学',d:'单位体积的质量',v:[['ρ','密度','kg/m³'],['m','质量','kg'],['V','体积','m³']]},
{n:'压强公式',f:'p = \\dfrac{F}{S}',cat:'力学',d:'单位面积上受到的压力',v:[['p','压强','Pa'],['F','压力','N'],['S','受力面积','m²']]},
{n:'液体压强',f:'p = \\rho g h',cat:'力学',d:'液体内部某深度处的压强',v:[['p','压强','Pa'],['ρ','密度','kg/m³'],['h','深度','m']]},
{n:'浮力公式',f:'F_{浮} = \\rho_{液} g V_{排}',cat:'力学',d:'阿基米德原理：浮力等于排开液体的重力',v:[['F浮','浮力','N'],['ρ液','液体密度','kg/m³'],['V排','排开体积','m³']]},
{n:'功',f:'W = Fs',cat:'力学',d:'力在力的方向上的位移之积',v:[['W','功','J'],['F','力','N'],['s','位移','m']]},
{n:'功率',f:'P = \\dfrac{W}{t}',cat:'力学',d:'单位时间完成的功',v:[['P','功率','W'],['W','功','J'],['t','时间','s']]},
{n:'动能',f:'E_k = \\dfrac{1}{2}mv^2',cat:'力学',d:'物体因运动而具有的能量',v:[['Ek','动能','J'],['m','质量','kg'],['v','速度','m/s']]},
{n:'势能',f:'E_p = mgh',cat:'力学',d:'物体因高度而具有的重力势能',v:[['Ep','势能','J'],['m','质量','kg'],['h','高度','m']]},
// 电学
{n:'欧姆定律',f:'I = \\dfrac{U}{R}',cat:'电学',d:'通过导体的电流与两端电压成正比，与电阻成反比',v:[['I','电流','A'],['U','电压','V'],['R','电阻','Ω']]},
{n:'电功',f:'W = UIt',cat:'电学',d:'电流做的功',v:[['W','电功','J'],['U','电压','V'],['I','电流','A'],['t','时间','s']]},
{n:'电功率',f:'P = UI',cat:'电学',d:'电流单位时间做的功',v:[['P','电功率','W'],['U','电压','V'],['I','电流','A']]},
{n:'焦耳定律',f:'Q = I^2 R t',cat:'电学',d:'电流通过电阻产生的热量',v:[['Q','热量','J'],['I','电流','A'],['R','电阻','Ω'],['t','时间','s']]},
{n:'串联电阻',f:'R = R_1 + R_2 + \\cdots',cat:'电学',d:'串联电路总电阻等于各电阻之和',v:[['R','总电阻','Ω']]},
{n:'并联电阻',f:'\\dfrac{1}{R} = \\dfrac{1}{R_1} + \\dfrac{1}{R_2}',cat:'电学',d:'并联电路总电阻的倒数等于各电阻倒数之和',v:[['R','总电阻','Ω']]},
// 热学
{n:'热量公式',f:'Q = cm\\Delta t',cat:'热学',d:'物体吸收（放出）的热量',v:[['Q','热量','J'],['c','比热容','J/(kg·℃)'],['m','质量','kg'],['Δt','温度变化','℃']]},
{n:'热值公式',f:'Q = mq',cat:'热学',d:'燃料完全燃烧放出的热量',v:[['Q','热量','J'],['m','燃料质量','kg'],['q','热值','J/kg']]},
// 光学
{n:'光的反射定律',f:'\\theta_i = \\theta_r',cat:'光学',d:'入射角等于反射角',v:[['θi','入射角','°'],['θr','反射角','°']]},
{n:'折射定律',f:'n = \\dfrac{\\sin\\theta_1}{\\sin\\theta_2}',cat:'光学',d:'入射角正弦与折射角正弦之比为折射率',v:[['n','折射率',''],['θ1','入射角','°'],['θ2','折射角','°']]},
// 波动
{n:'波速公式',f:'v = \\lambda f',cat:'波动',d:'波速等于波长乘以频率',v:[['v','波速','m/s'],['λ','波长','m'],['f','频率','Hz']]},
// 高中补充
{n:'万有引力',f:'F = G\\dfrac{m_1 m_2}{r^2}',cat:'力学',d:'两物体间引力与质量乘积成正比，与距离平方成反比',v:[['F','引力','N'],['G','引力常量',''],['m','质量','kg'],['r','距离','m']]},
{n:'库仑定律',f:'F = k\\dfrac{q_1 q_2}{r^2}',cat:'电学',d:'两点电荷间的作用力',v:[['F','电力','N'],['k','静电常量',''],['q','电荷量','C'],['r','距离','m']]},
{n:'电磁感应',f:'\\varepsilon = -\\dfrac{\\Delta\\Phi}{\\Delta t}',cat:'磁学',d:'感应电动势等于磁通量变化率',v:[['ε','感应电动势','V'],['ΔΦ','磁通量变化','Wb'],['Δt','时间','s']]},
{n:'质能方程',f:'E = mc^2',cat:'原子',d:'质量和能量的等价关系',v:[['E','能量','J'],['m','质量','kg'],['c','光速','m/s']]},
];
const CATS=['全部','力学','电学','热学','光学','波动','磁学','原子'];
let currentCat='全部';
function renderTabs(){
  document.getElementById('tabRow').innerHTML=CATS.map(c=>`<div class="tab${c===currentCat?' active':''}" data-cat="${c}">${c}</div>`).join('');
}
function renderFormulas(q=''){
  const filtered=FORMULAS.filter(f=>{
    if(currentCat!=='全部'&&f.cat!==currentCat)return false;
    if(q)return f.n.includes(q)||f.d.includes(q)||f.cat.includes(q);
    return true;
  });
  const el=document.getElementById('fList');
  el.innerHTML=filtered.map(f=>`<div class="fc"><div class="fc-name">${f.n} <span class="fc-tag">${f.cat}</span></div><div class="fc-expr" data-tex="${f.f.replace(/"/g,'&quot;')}">${f.f}</div><div class="fc-desc">${f.d}</div><div class="fc-vars">${f.v.map(v=>`<span class="fc-var"><b>${v[0]}</b> ${v[1]}${v[2]?' ('+v[2]+')':''}</span>`).join('')}</div></div>`).join('');
  document.getElementById('statusInfo').textContent=`共 ${filtered.length} 个公式`;
  // render KaTeX
  if(typeof katex!=='undefined'){
    el.querySelectorAll('.fc-expr[data-tex]').forEach(e=>{
      try{katex.render(e.dataset.tex,e,{throwOnError:false,displayMode:true})}catch(_){}
    });
  }
}
document.getElementById('tabRow').addEventListener('click',e=>{
  if(!e.target.classList.contains('tab'))return;
  currentCat=e.target.dataset.cat;renderTabs();renderFormulas(document.getElementById('searchInput').value.trim());
});
document.getElementById('searchInput').addEventListener('input',function(){renderFormulas(this.value.trim())});
// wait for KaTeX to load
function init(){renderTabs();renderFormulas()}
if(typeof katex!=='undefined')init();
else{const check=setInterval(()=>{if(typeof katex!=='undefined'){clearInterval(check);init()}},100);setTimeout(()=>clearInterval(check),5000);init()}
</script>
