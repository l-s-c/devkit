<div class="main">
  <div class="panel">
    <div class="section-title">🔍 User-Agent 字符串</div>
    <textarea id="uaInput" placeholder="粘贴 UA 字符串..."></textarea>
    <button class="btn" id="fillBtn">📱 填充当前浏览器 UA</button>
  </div>
  <div class="panel">
    <div class="section-title">📊 解析结果</div>
    <div class="info-grid" id="resultGrid"></div>
  </div>
</div>

<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';
const uaIn=document.getElementById('uaInput');
uaIn.value=navigator.userAgent;

function parse(ua){
  let browser='Unknown',version='',os='Unknown',device='Desktop',engine='Unknown',isBot=false;
  // Bot
  if(/bot|crawl|spider|slurp|teoma/i.test(ua)){isBot=true;browser='Bot';const m=ua.match(/(Googlebot|Bingbot|Baiduspider|YandexBot|DuckDuckBot)[\/\s]?([\d.]*)/i);if(m){browser=m[1];version=m[2]}}
  // Browser
  if(!isBot){
    if(/Edg[e\/]([\d.]+)/i.test(ua)){browser='Edge';version=RegExp.$1}
    else if(/OPR\/([\d.]+)/i.test(ua)){browser='Opera';version=RegExp.$1}
    else if(/Chrome\/([\d.]+)/i.test(ua)){browser='Chrome';version=RegExp.$1}
    else if(/Firefox\/([\d.]+)/i.test(ua)){browser='Firefox';version=RegExp.$1}
    else if(/Safari\/([\d.]+)/i.test(ua)&&/Version\/([\d.]+)/i.test(ua)){browser='Safari';version=RegExp.$1}
  }
  // OS
  if(/Windows NT ([\d.]+)/i.test(ua)){const v=RegExp.$1;os='Windows '+({'10.0':'10/11','6.3':'8.1','6.2':'8','6.1':'7'}[v]||v)}
  else if(/Mac OS X ([\d_.]+)/i.test(ua))os='macOS '+RegExp.$1.replace(/_/g,'.');
  else if(/Android ([\d.]+)/i.test(ua)){os='Android '+RegExp.$1;device='Mobile'}
  else if(/iPhone|iPad/i.test(ua)){os='iOS';if(/OS ([\d_]+)/i.test(ua))os+=' '+RegExp.$1.replace(/_/g,'.');device=/iPad/i.test(ua)?'Tablet':'Mobile'}
  else if(/Linux/i.test(ua))os='Linux';
  // Engine
  if(/AppleWebKit\/([\d.]+)/i.test(ua))engine='WebKit '+RegExp.$1;
  else if(/Gecko\/([\d.]+)/i.test(ua))engine='Gecko '+RegExp.$1;
  // Device
  if(/Mobile|Android/i.test(ua)&&!/iPad/i.test(ua))device='Mobile';
  else if(/iPad|Tablet/i.test(ua))device='Tablet';
  return[
    ['🌐','浏览器',browser+(version?' '+version:'')],
    ['🖥️','操作系统',os],
    ['📱','设备类型',device],
    ['⚙️','渲染引擎',engine],
    ['🤖','爬虫',isBot?'是':'否'],
    ['📏','UA 长度',ua.length+' 字符']
  ];
}

function render(){
  const items=parse(uaIn.value);
  document.getElementById('resultGrid').innerHTML=items.map(([icon,label,value])=>
    `<div class="info-card"><div class="info-icon">${icon}</div><div class="info-label">${label}</div><div class="info-value">${value}</div></div>`).join('');
}

uaIn.addEventListener('input',render);
document.getElementById('fillBtn').addEventListener('click',()=>{uaIn.value=navigator.userAgent;render()});
render();
</script>
