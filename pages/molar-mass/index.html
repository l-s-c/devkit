<div class="main">
  <div class="panel">
    <div class="section-title">⚗️ 化学分子量计算</div>
    <input class="mol-input" id="molInput" value="H2SO4" placeholder="输入分子式">
    <div class="hint">支持括号，如 Ca(OH)2、Al2(SO4)3</div>

      <div class="quick-pill" data-f="H2O">H₂O</div><div class="quick-pill" data-f="NaCl">NaCl</div>

<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';
const ELEMENTS={H:{m:1.008,n:'氢 Hydrogen'},He:{m:4.003,n:'氦 Helium'},Li:{m:6.941,n:'锂 Lithium'},Be:{m:9.012,n:'铍 Beryllium'},B:{m:10.81,n:'硼 Boron'},C:{m:12.011,n:'碳 Carbon'},N:{m:14.007,n:'氮 Nitrogen'},O:{m:15.999,n:'氧 Oxygen'},F:{m:18.998,n:'氟 Fluorine'},Ne:{m:20.180,n:'氖 Neon'},Na:{m:22.990,n:'钠 Sodium'},Mg:{m:24.305,n:'镁 Magnesium'},Al:{m:26.982,n:'铝 Aluminium'},Si:{m:28.086,n:'硅 Silicon'},P:{m:30.974,n:'磷 Phosphorus'},S:{m:32.065,n:'硫 Sulfur'},Cl:{m:35.453,n:'氯 Chlorine'},Ar:{m:39.948,n:'氩 Argon'},K:{m:39.098,n:'钾 Potassium'},Ca:{m:40.078,n:'钙 Calcium'},Fe:{m:55.845,n:'铁 Iron'},Cu:{m:63.546,n:'铜 Copper'},Zn:{m:65.38,n:'锌 Zinc'},Ag:{m:107.868,n:'银 Silver'},Ba:{m:137.327,n:'钡 Barium'},Mn:{m:54.938,n:'锰 Manganese'},Cr:{m:51.996,n:'铬 Chromium'},I:{m:126.904,n:'碘 Iodine'},Br:{m:79.904,n:'溴 Bromine'}};
// Parse formula with brackets support
function parseFormula(s){
  const atoms={};let i=0;
  function parse(mult){
    while(i<s.length){
      if(s[i]==='('){i++;parse(1);const n=readNum();for(const k in sub)atoms[k]=(atoms[k]||0)+sub[k]*n*mult;continue}
      if(s[i]===')'){i++;return}
      if(s[i]>='A'&&s[i]<='Z'){
        let el=s[i++];
        if(i<s.length&&s[i]>='a'&&s[i]<='z')el+=s[i++];
        const n=readNum();
        atoms[el]=(atoms[el]||0)+n*mult;
      } else i++;
    }
  }
  var sub={};
  // Simplified: direct recursive parse
  function parseR(mult){
    while(i<s.length){
      if(s[i]==='('){i++;const inner={};const save=i;parseInner(inner,1);const n=readNum();for(const k in inner)atoms[k]=(atoms[k]||0)+inner[k]*n*mult;continue}
      if(s[i]===')'){i++;return}
      if(s[i]>='A'&&s[i]<='Z'){let el=s[i++];if(i<s.length&&s[i]>='a'&&s[i]<='z')el+=s[i++];const n=readNum();atoms[el]=(atoms[el]||0)+n*mult}else i++
    }
  }
  function parseInner(at,mult){
    while(i<s.length){
      if(s[i]==='('){i++;const inner={};parseInner(inner,1);const n=readNum();for(const k in inner)at[k]=(at[k]||0)+inner[k]*n*mult;continue}
      if(s[i]===')'){i++;return}
      if(s[i]>='A'&&s[i]<='Z'){let el=s[i++];if(i<s.length&&s[i]>='a'&&s[i]<='z')el+=s[i++];const n=readNum();at[el]=(at[el]||0)+n*mult}else i++
    }
  }
  function readNum(){let n='';while(i<s.length&&s[i]>='0'&&s[i]<='9')n+=s[i++];return n?parseInt(n):1}
  parseR(1);return atoms;
}
function calc(){
  const formula=document.getElementById('molInput').value.trim();
  const err=document.getElementById('errMsg');err.textContent='';
  if(!formula){err.textContent='请输入分子式';return}
  const atoms=parseFormula(formula);
  if(!Object.keys(atoms).length){err.textContent='无法解析分子式';return}
  let total=0;const items=[];
  for(const[el,cnt]of Object.entries(atoms)){
    const info=ELEMENTS[el];
    if(!info){err.textContent=`未知元素：${el}`;return}
    const mass=info.m*cnt;total+=mass;
    items.push({el,cnt,mass,name:info.n,unitMass:info.m});
  }
  document.getElementById('resultPanel').style.display='';
  const display=formula.replace(/(\d+)/g,'<sub>$1</sub>');
  document.getElementById('resultFormula').innerHTML=display;
  document.getElementById('resultMass').textContent=total.toFixed(3);
  document.getElementById('breakdown').innerHTML=items.map(it=>`<div class="break-item"><div class="break-symbol">${it.el}</div><div class="break-name">${it.name}</div><div class="break-calc">${it.unitMass} × ${it.cnt}</div><div class="break-result">${it.mass.toFixed(3)}</div></div>`).join('');
}
document.getElementById('calcBtn').addEventListener('click',calc);
document.querySelectorAll('.quick-pill').forEach(p=>p.addEventListener('click',function(){document.getElementById('molInput').value=this.dataset.f;calc()}));
document.getElementById('molInput').addEventListener('keydown',e=>{if(e.key==='Enter')calc()});
calc();
</script>
