document.getElementById('tabArea').addEventListener('click',()=>{

});
document.getElementById('tabCode').addEventListener('click',()=>{

});

document.getElementById('totalStat').textContent=`共 ${DB.length} 条邮编数据`;

function search(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q){document.getElementById('resultList').innerHTML='<div class="empty-state">输入关键词开始搜索</div>';document.getElementById('resultCount').textContent='';return}
  let results;
  if(tabMode==='area'){results=DB.filter(([prov,dist])=>(prov+dist).includes(q))}
  else{results=DB.filter(([,,code])=>code.startsWith(q))}
  results=results.slice(0,50);
  document.getElementById('resultCount').textContent=results.length+' 条结果';
  if(!results.length){document.getElementById('resultList').innerHTML='<div class="empty-state">未找到匹配结果</div>';return}
  document.getElementById('resultList').innerHTML=results.map(([prov,dist,code])=>
    `<div class="result-item"><div><div class="result-location">${dist}</div><div class="result-path">${prov} → ${dist}</div></div><div style="display:flex;align-items:center"><span class="result-code">${code}</span><button class="copy-btn" onclick="navigator.clipboard.writeText('${code}')">📋</button></div></div>`
  ).join('');
}
