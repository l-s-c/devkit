<h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">PDF 拆分 — DevKit 在线开发者工具箱</h1>

<div class="main">
  <div class="panel" id="uploadPanel">
    <div class="security-badge">🔒 文件不上传服务器，全部本地处理</div>
    <div class="upload-zone" id="dropZone">
      <div style="font-size:32px;margin-bottom:8px">📄</div>
      <div style="font-size:14px;font-weight:700;margin-bottom:4px">拖拽 PDF 文件到此处</div>
      <div style="font-size:12px">或 <span style="color:var(--brand-500);font-weight:600">点击选择文件</span>（最大 50MB）</div>
      <input type="file" id="fileInput" accept=".pdf">
    </div>
  </div>

  <div class="panel" id="splitPanel" style="display:none">
    <div class="section-title">📄 <span id="fileName"></span> <span style="font-weight:400;font-size:11px;color:var(--text-caption)" id="pageInfo"></span></div>

    <div class="mode-tabs" id="modeTabs">
      <div class="mode-tab active" data-mode="select">🖱️ 点选页面</div>
      <div class="mode-tab" data-mode="range">📐 输入范围</div>
      <div class="mode-tab" data-mode="each">📑 逐页拆分</div>
    </div>

    <!-- Select mode -->
    <div id="selectMode">
      <div class="quick-row">
        <button class="quick-btn" id="selectAll">全选</button>
        <button class="quick-btn" id="selectOdd">奇数页</button>
        <button class="quick-btn" id="selectEven">偶数页</button>
        <button class="quick-btn" id="selectNone">清空</button>
      </div>
      <div class="page-grid" id="pageGrid"></div>
    </div>

    <!-- Range mode -->
    <div id="rangeMode" style="display:none">
      <input class="range-input" id="rangeInput" placeholder="输入页码范围，如：1-3, 5, 7-10">
      <div style="font-size:10px;color:var(--text-caption)">支持格式：1-3, 5, 7-10（逗号分隔）</div>
    </div>

    <!-- Each mode -->
    <div id="eachMode" style="display:none">
      <div style="font-size:12px;color:var(--text-secondary);padding:16px;text-align:center">
        📑 将每一页拆分为独立的 PDF 文件并打包下载
      </div>
    </div>

    <button class="split-btn" id="splitBtn">✂️ 拆分 PDF</button>
  </div>

  <div class="panel" id="resultPanel" style="display:none">
    <div style="text-align:center;padding:16px">
      <div style="font-size:48px;margin-bottom:8px">✅</div>
      <div style="font-size:16px;font-weight:800;margin-bottom:4px">拆分完成！</div>
      <div style="font-size:12px;color:var(--text-secondary);margin-bottom:16px" id="resultInfo"></div>
      <button class="btn-download" id="downloadBtn">📥 下载</button>
    </div>
  </div>
</div>

<div class="statusbar">
  <span id="statusInfo">PDF 拆分</span>
  <div class="statusbar-spacer"></div>
  <span>pdf-lib · 纯本地</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js" integrity="sha384-weMABwrltA6jWR8DDe9Jp5blk+tZQh7ugpCsF3JwSA53WZM9/14PjS5LAJNHNjAI" crossorigin="anonymous"></script>
<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

let pdfDoc = null, pdfBytes = null, totalPages = 0;
let selectedPages = new Set();
let mode = 'select';
let resultUrl = null;

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => e.preventDefault());
dropZone.addEventListener('drop', e => { e.preventDefault(); if (e.dataTransfer.files[0]) loadPDF(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadPDF(fileInput.files[0]); });

async function loadPDF(file) {
  if (file.size > 50 * 1024 * 1024) { document.getElementById('statusInfo').textContent = '⚠️ 文件超过 50MB'; return; }
  pdfBytes = await file.arrayBuffer();
  const { PDFDocument } = PDFLib;
  pdfDoc = await PDFDocument.load(pdfBytes);
  totalPages = pdfDoc.getPageCount();

  document.getElementById('fileName').textContent = file.name;
  document.getElementById('pageInfo').textContent = `${totalPages} 页 · ${(file.size / 1024).toFixed(1)} KB`;

  const grid = document.getElementById('pageGrid');
  grid.innerHTML = Array.from({ length: totalPages }, (_, i) =>
    `<div class="page-cell" data-page="${i + 1}">${i + 1}</div>`).join('');

  selectedPages.clear();
  document.getElementById('uploadPanel').style.display = 'none';
  document.getElementById('splitPanel').style.display = 'block';
  document.getElementById('resultPanel').style.display = 'none';
}

/* Page grid click */
document.getElementById('pageGrid').addEventListener('click', e => {
  const cell = e.target.closest('.page-cell');
  if (!cell) return;
  const p = parseInt(cell.dataset.page);
  if (selectedPages.has(p)) { selectedPages.delete(p); cell.classList.remove('selected'); }
  else { selectedPages.add(p); cell.classList.add('selected'); }
});

/* Quick select */
document.getElementById('selectAll').addEventListener('click', () => { for (let i = 1; i <= totalPages; i++) selectedPages.add(i); updateGrid(); });
document.getElementById('selectNone').addEventListener('click', () => { selectedPages.clear(); updateGrid(); });
document.getElementById('selectOdd').addEventListener('click', () => { selectedPages.clear(); for (let i = 1; i <= totalPages; i += 2) selectedPages.add(i); updateGrid(); });
document.getElementById('selectEven').addEventListener('click', () => { selectedPages.clear(); for (let i = 2; i <= totalPages; i += 2) selectedPages.add(i); updateGrid(); });

function updateGrid() {
  document.querySelectorAll('.page-cell').forEach(c => c.classList.toggle('selected', selectedPages.has(parseInt(c.dataset.page))));
}

/* Mode tabs */
document.getElementById('modeTabs').addEventListener('click', e => {
  const tab = e.target.closest('.mode-tab');
  if (!tab) return;
  mode = tab.dataset.mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('selectMode').style.display = mode === 'select' ? 'block' : 'none';
  document.getElementById('rangeMode').style.display = mode === 'range' ? 'block' : 'none';
  document.getElementById('eachMode').style.display = mode === 'each' ? 'block' : 'none';
});

/* Parse range string */
function parseRange(str) {
  const pages = new Set();
  str.split(',').forEach(part => {
    part = part.trim();
    const m = part.match(/^(\d+)\s*-\s*(\d+)$/);
    if (m) { for (let i = parseInt(m[1]); i <= Math.min(parseInt(m[2]), totalPages); i++) pages.add(i); }
    else { const n = parseInt(part); if (n >= 1 && n <= totalPages) pages.add(n); }
  });
  return Array.from(pages).sort((a, b) => a - b);
}

/* Split */
document.getElementById('splitBtn').addEventListener('click', async () => {
  const btn = document.getElementById('splitBtn');
  btn.disabled = true; btn.textContent = '⏳ 拆分中...';
  if (resultUrl) { URL.revokeObjectURL(resultUrl); resultUrl = null; }

  try {
    const { PDFDocument } = PDFLib;
    let pages;

    if (mode === 'select') {
      pages = Array.from(selectedPages).sort((a, b) => a - b);
      if (!pages.length) { document.getElementById('statusInfo').textContent = '⚠️ 请选择至少一页'; btn.disabled = false; btn.textContent = '✂️ 拆分 PDF'; return; }
    } else if (mode === 'range') {
      pages = parseRange(document.getElementById('rangeInput').value);
      if (!pages.length) { document.getElementById('statusInfo').textContent = '⚠️ 请输入有效页码范围'; btn.disabled = false; btn.textContent = '✂️ 拆分 PDF'; return; }
    } else {
      // Each page → download multiple
      for (let i = 0; i < totalPages; i++) {
        const newDoc = await PDFDocument.create();
        const [page] = await newDoc.copyPages(pdfDoc, [i]);
        newDoc.addPage(page);
        const bytes = await newDoc.save();
        const blob = new Blob([bytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `page-${i + 1}.pdf`; a.click();
        URL.revokeObjectURL(url);
      }
      document.getElementById('resultInfo').textContent = `${totalPages} 个 PDF 文件已下载`;
      document.getElementById('resultPanel').style.display = 'block';
      document.getElementById('downloadBtn').style.display = 'none';
      btn.disabled = false; btn.textContent = '✂️ 拆分 PDF';
      document.getElementById('statusInfo').textContent = `✅ 逐页拆分完成 ${totalPages} 页`;
      return;
    }

    // Extract selected pages into one PDF
    const newDoc = await PDFDocument.create();
    const indices = pages.map(p => p - 1);
    const copiedPages = await newDoc.copyPages(pdfDoc, indices);
    copiedPages.forEach(p => newDoc.addPage(p));
    const bytes = await newDoc.save();
    const blob = new Blob([bytes], { type: 'application/pdf' });
    resultUrl = URL.createObjectURL(blob);
    document.getElementById('resultInfo').textContent = `提取 ${pages.length} 页 · ${(blob.size / 1024).toFixed(1)} KB`;
    document.getElementById('resultPanel').style.display = 'block';
    document.getElementById('downloadBtn').style.display = 'inline-flex';
    document.getElementById('statusInfo').textContent = `✅ 拆分完成 ${pages.length} 页`;
  } catch (e) {
    document.getElementById('statusInfo').textContent = '❌ 拆分失败：' + e.message;
  }
  btn.disabled = false; btn.textContent = '✂️ 拆分 PDF';
});

document.getElementById('downloadBtn').addEventListener('click', () => {
  if (!resultUrl) return;
  const a = document.createElement('a'); a.href = resultUrl; a.download = 'split.pdf'; a.click();
});
</script>
