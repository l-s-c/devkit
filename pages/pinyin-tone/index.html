<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';
// Curated pinyin dictionary (common chars)
const PY={
'的':'de','一':'yī','是':'shì','不':'bù','了':'le','在':'zài','人':'rén','有':'yǒu','我':'wǒ','他':'tā',
'这':'zhè','中':'zhōng','大':'dà','来':'lái','上':'shàng','个':'gè','国':'guó','到':'dào','说':'shuō','们':'men',
'为':'wèi','子':'zǐ','和':'hé','你':'nǐ','地':'dì','出':'chū','会':'huì','时':'shí','要':'yào','也':'yě',
'以':'yǐ','生':'shēng','对':'duì','自':'zì','学':'xué','年':'nián','多':'duō','发':'fā','后':'hòu','作':'zuò',
'里':'lǐ','用':'yòng','道':'dào','行':'xíng','所':'suǒ','然':'rán','家':'jiā','种':'zhǒng','事':'shì','成':'chéng',
'方':'fāng','同':'tóng','日':'rì','三':'sān','小':'xiǎo','从':'cóng','内':'nèi','下':'xià','而':'ér','过':'guò',
'天':'tiān','去':'qù','月':'yuè','好':'hǎo','如':'rú','还':'hái','进':'jìn','新':'xīn','开':'kāi','把':'bǎ',
'但':'dàn','那':'nà','看':'kàn','又':'yòu','没':'méi','心':'xīn','想':'xiǎng','水':'shuǐ','之':'zhī','老':'lǎo',
'实':'shí','女':'nǚ','力':'lì','两':'liǎng','长':'cháng','很':'hěn','手':'shǒu','高':'gāo','面':'miàn','头':'tóu',
'目':'mù','回':'huí','问':'wèn','能':'néng','分':'fēn','动':'dòng','前':'qián','明':'míng','山':'shān','话':'huà',
'比':'bǐ','字':'zì','员':'yuán','文':'wén','名':'míng','思':'sī','等':'děng','号':'hào','先':'xiān','走':'zǒu',
'见':'jiàn','本':'běn','起':'qǐ','被':'bèi','打':'dǎ','无':'wú','正':'zhèng','气':'qì','最':'zuì','几':'jǐ',
'光':'guāng','门':'mén','书':'shū','听':'tīng','东':'dōng','少':'shǎo','白':'bái','关':'guān','间':'jiān','花':'huā',
'快':'kuài','直':'zhí','朋':'péng','友':'yǒu','全':'quán','海':'hǎi','风':'fēng','声':'shēng','些':'xiē','现':'xiàn',
'体':'tǐ','物':'wù','果':'guǒ','口':'kǒu','色':'sè','空':'kōng','路':'lù','南':'nán','城':'chéng','已':'yǐ',
'给':'gěi','情':'qíng','什':'shén','当':'dāng','市':'shì','金':'jīn','百':'bǎi','千':'qiān','太':'tài','意':'yì',
'夜':'yè','草':'cǎo','平':'píng','乐':'lè','春':'chūn','美':'měi','红':'hóng','黄':'huáng','绿':'lǜ','蓝':'lán',
'床':'chuáng','王':'wáng','车':'chē','石':'shí','田':'tián','雨':'yǔ','云':'yún','飞':'fēi','鸟':'niǎo','星':'xīng',
'河':'hé','火':'huǒ','林':'lín','叶':'yè','地':'dì','足':'zú','耳':'ěr','手':'shǒu','马':'mǎ','牛':'niú',
'虫':'chóng','鱼':'yú','狗':'gǒu','猫':'māo','哭':'kū','笑':'xiào','跑':'pǎo','站':'zhàn','坐':'zuò','吃':'chī',
'喝':'hē','写':'xiě','读':'dú','唱':'chàng','画':'huà','舞':'wǔ','跳':'tiào','爸':'bà','妈':'mā','爷':'yé',
'奶':'nǎi','哥':'gē','姐':'jiě','弟':'dì','妹':'mèi','她':'tā','它':'tā','谁':'shuí','早':'zǎo','晚':'wǎn',
'疑':'yí','霜':'shuāng','举':'jǔ','望':'wàng','低':'dī','故':'gù','乡':'xiāng','静':'jìng','思':'sī',
};
function getTone(py){if(!py)return 0;if(/[āēīōūǖ]/.test(py))return 1;if(/[áéíóúǘ]/.test(py))return 2;if(/[ǎěǐǒǔǚ]/.test(py))return 3;if(/[àèìòùǜ]/.test(py))return 4;return 0}
function annotate(){
  const text=document.getElementById('textInput').value.trim();
  if(!text)return;
  const chars=[...text];
  const htmlParts=[];const pinyinParts=[];
  chars.forEach(c=>{
    if(/[\u4e00-\u9fff]/.test(c)){
      const py=PY[c]||'?';
      const tone=getTone(py);
      htmlParts.push(`<span class="cw"><span class="cw-py t${tone}">${py}</span>${c}</span>`);
      pinyinParts.push(py);
    } else if(c==='\n'){
      htmlParts.push('<br>');pinyinParts.push('\n');
    } else {
      htmlParts.push(c);pinyinParts.push(c);
    }
  });
  document.getElementById('resultPanel').style.display='';
  document.getElementById('annotated').innerHTML=htmlParts.join('');
  document.getElementById('pinyinText').textContent=pinyinParts.join(' ');
  document.getElementById('statusInfo').textContent=`${chars.filter(c=>/[\u4e00-\u9fff]/.test(c)).length} 个汉字已标注`;
}
document.getElementById('annotateBtn').addEventListener('click',annotate);
document.getElementById('copyBtn').addEventListener('click',()=>{navigator.clipboard.writeText(document.getElementById('pinyinText').textContent).then(()=>{document.getElementById('copyBtn').textContent='✓ 已复制';setTimeout(()=>document.getElementById('copyBtn').textContent='☰ 复制拼音',1500)})});
document.getElementById('copyBtn2').addEventListener('click',()=>{navigator.clipboard.writeText(document.getElementById('pinyinText').textContent).then(()=>{document.getElementById('copyBtn2').textContent='✓';setTimeout(()=>document.getElementById('copyBtn2').textContent='☰ 复制',1500)})});
document.getElementById('readBtn').addEventListener('click',()=>{if(!('speechSynthesis' in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(document.getElementById('textInput').value);u.lang='zh-CN';u.rate=0.6;speechSynthesis.speak(u)});
annotate();
</script>
