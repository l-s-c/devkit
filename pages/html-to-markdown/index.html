<script src="https://cdn.jsdelivr.net/npm/turndown@7.2.0/dist/turndown.min.js"></script>
<script type="module">
import '../../shared/theme.js';
const td=new TurndownService({headingStyle:'atx',codeBlockStyle:'fenced'});

function convert(){
  const html=document.getElementById('htmlInput').value;
  if(!html.trim()){document.getElementById('mdOutput').value='';return}
  try{
    document.getElementById('mdOutput').value=td.turndown(html);
  }catch(e){
    document.getElementById('mdOutput').value='⚠️ 转换出错：'+e.message;
  }
}

document.getElementById('htmlInput').addEventListener('input',convert);
document.getElementById('copyBtn').addEventListener('click',()=>{
  navigator.clipboard.writeText(document.getElementById('mdOutput').value);
  document.getElementById('statusInfo').textContent='✅ 已复制';
  setTimeout(()=>{document.getElementById('statusInfo').textContent='HTML 转 Markdown'},1500);
});
document.getElementById('exportBtn').addEventListener('click',()=>{
  const blob=new Blob([document.getElementById('mdOutput').value],{type:'text/markdown'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='converted.md';a.click();URL.revokeObjectURL(a.href);
});
document.getElementById('clearBtn').addEventListener('click',()=>{
  document.getElementById('htmlInput').value='';document.getElementById('mdOutput').value='';
});
convert();
</script>
