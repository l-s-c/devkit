          <text x="102" y="183" font-size="7" fill="#9CA3AF" text-anchor="middle">3</text>

    </div>

    <button class="reset-btn" onclick="resetAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
      重置实验
    </button>
  </div>
</div>

<div class="related-bar">
  <span>相关实验</span>
  <a href="/devkit/pages/lab/spring/">弹簧测力计</a>
  <a href="/devkit/pages/lab/buoyancy/">浮力实验</a>
  <a href="/devkit/pages/lab/lever/">杠杆平衡</a>
  <a href="/devkit/pages/lab/pulley/">滑轮组</a>
</div>
<script>
const surfaces = {
  smooth: { mu: 0.20, label: '光滑木板', pattern: 'url(#patSmooth)' },
  rough:  { mu: 0.40, label: '粗糙木板', pattern: 'url(#patRough)' },
  towel:  { mu: 0.60, label: '毛巾', pattern: 'url(#patTowel)' }
};
let currentSurface = 'smooth';
let addedW = [false, false, false]; // 3 x 100g
let records = [];
const g = 9.8;
const baseMass = 0.2; // kg

function getTotalMass() {
  return baseMass + addedW.filter(Boolean).length * 0.1;
}

function getN() { return getTotalMass() * g; }
function getF() { return surfaces[currentSurface].mu * getN(); }

function setSurface(key) {
  currentSurface = key;
  document.querySelectorAll('.surface-btn').forEach((b, i) => {
    b.classList.toggle('active', ['smooth','rough','towel'][i] === key);
  });
  document.getElementById('surfaceRect').setAttribute('fill', surfaces[key].pattern);
  document.getElementById('surfaceLabel').textContent = surfaces[key].label;
  updateDisplay();
}

function toggleW(n) {
  addedW[n-1] = !addedW[n-1];
  document.getElementById('w'+n).classList.toggle('added', addedW[n-1]);
  updateDisplay();
}

function updateDisplay() {
  const mu = surfaces[currentSurface].mu;
  const totalMkg = getTotalMass();
  const totalMg = totalMkg * 1000;
  const addedMg = addedW.filter(Boolean).length * 100;
  const N = getN();
  const f = getF();

  document.getElementById('muVal').textContent = mu.toFixed(2);
  document.getElementById('addedM').textContent = addedMg + ' g';
  document.getElementById('totalM').textContent = totalMg.toFixed(0) + ' g';
  document.getElementById('normalN').textContent = N.toFixed(2) + ' N';
  document.getElementById('valF').textContent = f.toFixed(2) + ' N';
  document.getElementById('valPull').textContent = f.toFixed(2) + ' N';
  document.getElementById('valMuCheck').textContent = (f / N).toFixed(2);

  // Spring scale pointer
  const pointerX = 10 + (f / 4) * 95;
  document.getElementById('scalePointer').setAttribute('x1', pointerX);
  document.getElementById('scalePointer').setAttribute('x2', pointerX);
  document.getElementById('scaleReading').textContent = f.toFixed(2) + ' N';

  // Spring coil
  const coilLen = Math.min(100, 10 + f * 20);
  let d = `M5,0`;
  const segs = 8;
  const segW = coilLen / segs;
  for (let i = 1; i <= segs; i++) {
    d += ` L${5 + segW*i},${i%2===1?-5:5}`;
  }
  d += ` L${5+coilLen+5},0`;
  document.getElementById('springCoil').setAttribute('d', d);

  // Force arrows length
  const pullLen = 40 + f * 25;
  document.querySelector('#pullForce line').setAttribute('x2', 280 + pullLen);
  document.querySelector('#pullForce text').setAttribute('x', 280 + pullLen/2);
  const fricLen = 40 + f * 25;
  document.querySelector('#frictionForce line').setAttribute('x2', 180 - fricLen);
  document.querySelector('#frictionForce text').setAttribute('x', 180 - fricLen/2);

  // Stacked weights
  const sw = document.getElementById('stackedWeights');
  sw.innerHTML = '';
  let wy = 248;
  for (let i = 0; i < 3; i++) {
    if (addedW[i]) {
      wy -= 18;
      const r = document.createElementNS('http://www.w3.org/2000/svg','rect');
      r.setAttribute('x','195');r.setAttribute('y',wy);
      r.setAttribute('width','70');r.setAttribute('height','16');
      r.setAttribute('rx','3');r.setAttribute('fill','url(#weightGrad)');
      r.setAttribute('stroke','#6B7280');r.setAttribute('stroke-width','0.8');
      sw.appendChild(r);
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x','230');t.setAttribute('y',wy+11);
      t.setAttribute('text-anchor','middle');t.setAttribute('font-size','8');
      t.setAttribute('fill','#fff');t.setAttribute('font-weight','600');
      t.textContent='100g';
      sw.appendChild(t);
    }
  }

  // Graph dot
  const gx = N / 5 * 170;
  const gy = 170 - f / 3 * 170;
  document.getElementById('currentDot').setAttribute('cx', Math.min(170, gx));
  document.getElementById('currentDot').setAttribute('cy', Math.max(0, gy));
}

function recordData() {
  const N = getN();
  const f = getF();
  const mu = surfaces[currentSurface].mu;
  records.push({ surface: surfaces[currentSurface].label, N: N.toFixed(2), f: f.toFixed(2), mu: mu.toFixed(2) });

  let html = '<table class="data-table"><tr><th>#</th><th>接触面</th><th>N/N</th><th>f/N</th><th>μ</th></tr>';
  records.forEach((r, i) => {
    html += `<tr><td>${i+1}</td><td>${r.surface}</td><td>${r.N}</td><td>${r.f}</td><td>${r.mu}</td></tr>`;
  });
  html += '</table>';
  document.getElementById('dataTableArea').innerHTML = html;

  // Graph point
  const gx = parseFloat(records[records.length-1].N) / 5 * 170;
  const gy = 170 - parseFloat(records[records.length-1].f) / 3 * 170;
  const pts = document.getElementById('graphPoints');
  const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  c.setAttribute('cx', Math.min(170,gx)); c.setAttribute('cy', Math.max(0,gy));
  c.setAttribute('r', '3.5'); c.setAttribute('fill', '#059669');
  c.setAttribute('stroke', '#fff'); c.setAttribute('stroke-width', '1.5');
  pts.appendChild(c);

  if (records.length >= 2) {
    const tl = document.getElementById('trendLine');
    const lastMu = parseFloat(records[records.length-1].mu);
    tl.setAttribute('x1', 0); tl.setAttribute('y1', 170);
    tl.setAttribute('x2', 170); tl.setAttribute('y2', 170 - lastMu * 5 / 3 * 170);
    tl.setAttribute('opacity', '0.4');
  }
}

function resetAll() {
  currentSurface = 'smooth';
  addedW = [false, false, false];
  records = [];
  document.querySelectorAll('.surface-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  document.getElementById('surfaceRect').setAttribute('fill', 'url(#patSmooth)');
  document.getElementById('surfaceLabel').textContent = '光滑木板';
  [1,2,3].forEach(n => document.getElementById('w'+n).classList.remove('added'));
  document.getElementById('dataTableArea').innerHTML = '';
  document.getElementById('graphPoints').innerHTML = '';
  document.getElementById('trendLine').setAttribute('opacity', '0');
  updateDisplay();
}

function renderFormulas() {
  try {
    katex.render('f = \\mu N', document.getElementById('formula1'), { throwOnError: false, displayMode: true });
  } catch(e) {
    document.getElementById('formula1').textContent = 'f = μN';
  }
}

updateDisplay();
renderFormulas();
if (localStorage.getItem('friction-guide-seen')) { const g = document.getElementById('guideOverlay'); if(g) g.style.display='none'; } else { localStorage.setItem('friction-guide-seen','1'); }
</script>
<script src="/shared/theme.js"></script>
</body>
</html>
