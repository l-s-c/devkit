          <p>1. 分子在<strong>不停地做无规则运动</strong>（本实验验证）<br>2. 分子间有<strong>间隔</strong><br>3. 分子的<strong>体积和质量都很小</strong></p>
          <h3 style="font-size:11px;color:#0F172A;margin:6px 0 3px">温度与分子运动</h3>
          <p>温度越高，分子运动越剧烈。加热组酚酞变红更快就是直接证据。</p>
          <h3 style="font-size:11px;color:#0F172A;margin:6px 0 3px">中考易错</h3>
          <p style="color:#DC2626"><strong>酚酞变红 ≠ 分子在运动的"唯一"证据。</strong><br>闻到花香、墨水扩散也是分子运动的证据。</p>
        </div>

      <div class="panel-section">

const svg = $('mainSvg');

const state = {
  ammoniaAdded: false,
  phenolAdded: false,
  sealed: false,
  lampLit: false,
  diffusing: false,
  animFrame: null
};

// Two groups share structure
const groups = {
  normal: { diffTime: 0, done: false, speed: 1, particles: [] },
  heated: { diffTime: 0, done: false, speed: 1, particles: [] }
};

// Pre-conditions
const PRE = {
  seal:  () => state.ammoniaAdded && state.phenolAdded,
  light: () => state.sealed
};
const HINTS = {
  seal:  '先倒入浓氨水和酚酞，再盖玻璃片密封',
  light: '先盖玻璃片密封再加热'
};

// Regions (in scaled coordinates, adjusted for scale 0.85)
// Left group at translate(20,15) scale(0.85): beaker A at +20,+120, liquid at +2,+58 w76 h57
// Source (A center): 20+20+40=80 scaled → 20+80*0.85=88, 15+(120+80)*0.85=185
// Dest B region: 20+190=210 scaled → 20+210*0.85=198.5, same y
const L = {
  srcX: 88, srcY: 190,
  dstXMin: 185, dstXMax: 250, dstYMin: 175, dstYMax: 235,
  xMin: 22, xMax: 275, yMin: 20, yMax: 265
};
// Right group at translate(440,15) scale(0.85)
const R = {
  srcX: 508, srcY: 190,
  dstXMin: 605, dstXMax: 670, dstYMin: 175, dstYMax: 235,
  xMin: 442, xMax: 695, yMin: 20, yMax: 265
};

// Init particle pools
document.querySelectorAll('.molL').forEach(el => {
  groups.normal.particles.push({el, active:false, x:0, y:0, baseR:parseFloat(el.getAttribute('r')), r:0, opacity:0});
});
document.querySelectorAll('.molR').forEach(el => {
  groups.heated.particles.push({el, active:false, x:0, y:0, baseR:parseFloat(el.getAttribute('r')), r:0, opacity:0});
});

// ===== DRAG SETUP =====
function initDrag() {
  // Ammonia → both groups (drop on left A beaker)
  ChemDrag.makeDraggable($('toolAmmonia'), {
    snapTargets: [{id:'dropAL', action:'ammonia'}],
    onDrop: (action) => doAction(action), resetOnFail: true
  });
  // Phenol → both groups (drop on left B... actually any beaker)
  ChemDrag.makeDraggable($('toolPhenol'), {
    snapTargets: [{id:'dropBL', action:'phenol'}],
    onDrop: (action) => doAction(action), resetOnFail: true
  });
  // Glass cover → seal both
  ChemDrag.makeDraggable($('toolCover'), {
    snapTargets: [{id:'dropCoverL', action:'seal'}],
    onDrop: (action) => doAction(action), resetOnFail: true
  });
  // Match → right lamp only
  ChemDrag.makeDraggable($('toolMatch'), {
    snapTargets: [{id:'dropWick', action:'light'}],
    onDrop: (action) => doAction(action), resetOnFail: true
  });
}

function doAction(action) {
  switch(action) {
    case 'ammonia': addAmmonia(); break;
    case 'phenol':  addPhenol(); break;
    case 'seal':
      if (!PRE.seal()) { ChemDrag.showToast(svg, HINTS.seal); return; }
      sealBeakers(); break;
    case 'light':
      if (!PRE.light()) { ChemDrag.showToast(svg, HINTS.light); return; }
      lightLamp(); break;
  }
}

// ===== ACTIONS (both groups sync) =====
function addAmmonia() {
  if (state.ammoniaAdded) return;
  state.ammoniaAdded = true;
  $('toolAmmonia').classList.add('used');
  $('ammoniaL').setAttribute('opacity','1');
  $('ammoniaR').setAttribute('opacity','1');
  checkObs('obs1');
  updateHint();
}

function addPhenol() {
  if (state.phenolAdded) return;
  state.phenolAdded = true;
  $('toolPhenol').classList.add('used');
  $('phenolL').setAttribute('opacity','1');
  $('phenolR').setAttribute('opacity','1');
  checkObs('obs2');
  updateHint();
}

function sealBeakers() {
  if (state.sealed) return;
  state.sealed = true;
  $('toolCover').classList.add('used');
  // Both covers
  $('coverL').setAttribute('opacity','1');
  $('coverR').setAttribute('opacity','1');
  $('sealLabelL').setAttribute('opacity','1');
  $('sealLabelR').setAttribute('opacity','1');
  $('arrowL').setAttribute('opacity','1');
  $('arrowR').setAttribute('opacity','1');
  checkObs('obs3');

  // Init particles for both groups
  initParticles(groups.normal, L);
  initParticles(groups.heated, R);
  state.diffusing = true;
  startDiffusion();
  updateHint();
}

function lightLamp() {
  if (state.lampLit) return;
  state.lampLit = true;
  $('toolMatch').classList.add('used');
  $('lampFlame').setAttribute('opacity','1');
  groups.heated.speed = 2;

  // Flame flicker
  (function flick() {
    if (!state.lampLit) return;
    const s = 0.85 + Math.sin(Date.now() * 0.008) * 0.15;
    $('lampFlame').setAttribute('transform', 'scale(' + s + ')');
    requestAnimationFrame(flick);
  })();
  updateHint();
}

function initParticles(g, region) {
  g.diffTime = 0; g.done = false;
  g.particles.forEach(m => {
    m.active = true;
    m.x = region.srcX + (Math.random() - 0.5) * 40;
    m.y = region.srcY + (Math.random() - 0.5) * 30;
    m.r = m.baseR; m.opacity = 0.7 + Math.random() * 0.2;
    m.el.setAttribute('cx', m.x); m.el.setAttribute('cy', m.y);
    m.el.setAttribute('r', m.r); m.el.setAttribute('opacity', m.opacity);
  });
}

// ===== SINGLE RAF LOOP FOR BOTH GROUPS =====
function startDiffusion() {
  const TARGET = 480; // 8s at 60fps for speed=1

  function tick() {
    if (!state.diffusing) return;
    let anyActive = false;

    [['normal', L, 'phenolL', 'barL', 'timeL'],
     ['heated', R, 'phenolR', 'barR', 'timeR']].forEach(([key, region, phenolId, barId, timeId]) => {
      const g = groups[key];
      if (g.done) return;
      anyActive = true;
      g.diffTime++;

      const effectiveTime = g.diffTime * g.speed;
      const progress = Math.min(effectiveTime / TARGET, 1);
      const elapsed = (g.diffTime / 60).toFixed(1);

      $(barId).setAttribute('width', String(progress * 300));
      $(timeId).textContent = elapsed + 's';

      // Move particles
      const speed = 1.5 * g.speed;
      for (const m of g.particles) {
        if (!m.active) continue;
        m.x += (Math.random() - 0.4) * speed;
        m.y += (Math.random() - 0.5) * speed;
        m.x = Math.max(region.xMin, Math.min(region.xMax, m.x));
        m.y = Math.max(region.yMin, Math.min(region.yMax, m.y));
        const inB = m.x >= region.dstXMin && m.x <= region.dstXMax && m.y >= region.dstYMin && m.y <= region.dstYMax;
        if (inB) {
          m.r = Math.max(0.6, m.r - 0.005 * g.speed);
          m.opacity = Math.max(0.1, m.opacity - 0.002 * g.speed);
        }
        m.el.setAttribute('cx', m.x); m.el.setAttribute('cy', m.y);
        m.el.setAttribute('r', m.r); m.el.setAttribute('opacity', m.opacity);
      }

      // Phenol color
      const s = progress * 70, l = 95 - progress * 35;
      $(phenolId).setAttribute('fill', 'hsl(340,' + s + '%,' + l + '%)');

      if (progress >= 1) {
        g.done = true;
        if (key === 'normal') checkObs('obs4');
        if (key === 'heated') checkObs('obs5');
      }
    });

    // Check completion
    if (groups.normal.done && groups.heated.done) {
      const tN = (groups.normal.diffTime / 60).toFixed(1);
      const tH = (groups.heated.diffTime / 60).toFixed(1);
      $('resultText').textContent = '常温 ' + tN + 's vs 加热 ' + tH + 's — 温度越高分子运动越快！';
      $('resultText').setAttribute('opacity', '1');
      $('canvasHint').textContent = '实验完成！加热组明显更快';
      state.diffusing = false;
      return;
    }

    if (anyActive) state.animFrame = requestAnimationFrame(tick);
  }
  state.animFrame = requestAnimationFrame(tick);
}

// ===== HINT =====
function updateHint() {
  if (!state.ammoniaAdded || !state.phenolAdded) {
    $('canvasHint').textContent = '拖拽氨水和酚酞到烧杯（两组同步）';
  } else if (!state.sealed) {
    $('canvasHint').textContent = '拖拽玻璃片密封烧杯';
  } else if (!state.lampLit) {
    $('canvasHint').textContent = '拖火柴到右组酒精灯加热，对比速度！';
  } else if (state.diffusing) {
    $('canvasHint').textContent = '观察对比：加热组变红更快...';
  }
}

// ===== UTILS =====
function checkObs(id) {
  const el = $(id);
  if (!el.classList.contains('checked')) {
    el.classList.add('checked');
    el.querySelector('.obs-check').textContent = '✓';
  }
}

function resetExperiment() {
  if (state.animFrame) cancelAnimationFrame(state.animFrame);
  state.diffusing = false;
  Object.assign(state, {ammoniaAdded:false, phenolAdded:false, sealed:false, lampLit:false, diffusing:false});
  groups.normal.diffTime = 0; groups.normal.done = false; groups.normal.speed = 1;
  groups.heated.diffTime = 0; groups.heated.done = false; groups.heated.speed = 1;

  ['ammoniaL','ammoniaR'].forEach(id => $(id).setAttribute('opacity','0'));
  ['phenolL','phenolR'].forEach(id => { $(id).setAttribute('opacity','0'); $(id).setAttribute('fill','hsl(0,0%,95%)'); });
  ['coverL','coverR','sealLabelL','sealLabelR','arrowL','arrowR'].forEach(id => $(id).setAttribute('opacity','0'));
  $('lampFlame').setAttribute('opacity','0');
  $('barL').setAttribute('width','0'); $('barR').setAttribute('width','0');
  $('timeL').textContent = '0.0s'; $('timeR').textContent = '0.0s';
  $('resultText').setAttribute('opacity','0');

  [...groups.normal.particles, ...groups.heated.particles].forEach(m => {
    m.active = false; m.el.setAttribute('opacity','0');
  });
  ['toolAmmonia','toolPhenol','toolCover','toolMatch'].forEach(id => $(id).classList.remove('used'));
  document.querySelectorAll('.obs-item').forEach(el => {
    el.classList.remove('checked'); el.querySelector('.obs-check').textContent = '';
  });
  $('canvasHint').textContent = '拖拽右侧器材到实验区 · 两组同步操作';
}

initDrag();

// ===== KATEX =====
function renderFormulas() {
  if (!window.katex) return;
  try {
    katex.render('\\text{NH}_3 + \\text{H}_2\\text{O} \\rightleftharpoons \\text{NH}_3{\\cdot}\\text{H}_2\\text{O} \\text{（氨水，碱性）}', $('formula1'), { throwOnError: false, displayMode: true });
  } catch(e) {}
}
function tryKatex(n) {
  if (window.katex) { renderFormulas(); return; }
  if ((n || 0) < 20) setTimeout(() => tryKatex((n || 0) + 1), 500);
}
tryKatex();
</script>
</body>
</html>
