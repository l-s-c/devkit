<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>杠杆平衡模拟实验 - 在线物理实验室 \</title>
<meta name="keywords" content="杠杆平衡实验,杠杆原理模拟,力矩计算,初中物理力学">
<meta name="description" content="DevKit">
<meta property="og:title" content="杠杆平衡模拟实验 - 在线物理实验室 \">
<meta property="og:description" content="DevKit">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F8FAFC;color:#1C1C1E;overflow-x:hidden}
.lab-header{background:rgba(255,255,255,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,0.06);padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.lab-header a{color:#3B82F6;text-decoration:none;font-size:13px;font-weight:600}
.lab-header h1{font-size:16px;font-weight:700}
.lab-container{display:flex;max-width:1080px;margin:20px auto;gap:16px;padding:0 16px}
.canvas-area{flex:1;background:#fff;border-radius:16px;border:1px solid rgba(0,0,0,0.06);overflow:hidden;min-height:450px}
.canvas-area svg{width:100%;height:100%;display:block}
.panel{width:260px;flex-shrink:0;display:flex;flex-direction:column;gap:12px}
.panel-card{background:#fff;border-radius:14px;border:1px solid rgba(0,0,0,0.06);padding:16px}
.panel-title{font-size:12px;font-weight:700;color:#8E8E93;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px}
.reading{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.04);font-size:12px}
.reading:last-child{border-bottom:none}
.reading .rl{color:#8E8E93}
.reading .rv{font-weight:700;font-family:'JetBrains Mono',monospace}
.formula{background:rgba(59,130,246,0.05);border-radius:10px;padding:12px;text-align:center;font-size:14px;font-weight:600;color:#3B82F6;font-family:'JetBrains Mono',monospace;margin-top:8px}
.badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:700}
.badge-ok{background:rgba(34,197,94,0.1);color:#16A34A}
.badge-warn{background:rgba(239,68,68,0.1);color:#DC2626}

@media(max-width:768px){.lab-container{flex-direction:column}.panel{width:100%}}
</style>
<link rel="canonical" href="https://l-s-c.github.io/devkit/pages/lab/lever/">
<meta property="og:image" content="https://l-s-c.github.io/devkit/images/lab/lever.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous"></script>
</head>
<body>
<header class="lab-header">
  <a href="../" style="display:flex;align-items:center;gap:4px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>实验室</a><span style="background:rgba(34,197,94,0.1);color:#16A34A;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700">物理实验</span>
  <h1>🔬 杠杆平衡实验</h1>
</header>

<div class="lab-container">
  <div class="canvas-area">
    <svg id="lab-svg" viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="weightShadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25"/></filter>
        <linearGradient id="leverGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#D4A054"/>
          <stop offset="20%" stop-color="#C8922E"/>
          <stop offset="40%" stop-color="#A16207"/>
          <stop offset="60%" stop-color="#B8860B"/>
          <stop offset="80%" stop-color="#92400E"/>
          <stop offset="100%" stop-color="#7C3A0A"/>
        </linearGradient>
        <!-- 1N 银灰金属 -->
        <linearGradient id="weightGrad1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#E5E7EB"/>
          <stop offset="15%" stop-color="#F9FAFB"/>
          <stop offset="50%" stop-color="#9CA3AF"/>
          <stop offset="85%" stop-color="#6B7280"/>
          <stop offset="100%" stop-color="#4B5563"/>
        </linearGradient>
        <!-- 2N 铜金属 -->
        <linearGradient id="weightGrad2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#FCD34D"/>
          <stop offset="15%" stop-color="#FDE68A"/>
          <stop offset="50%" stop-color="#D97706"/>
          <stop offset="85%" stop-color="#B45309"/>
          <stop offset="100%" stop-color="#92400E"/>
        </linearGradient>
        <!-- 5N 深铁金属 -->
        <linearGradient id="weightGrad5" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#9CA3AF"/>
          <stop offset="15%" stop-color="#6B7280"/>
          <stop offset="50%" stop-color="#4B5563"/>
          <stop offset="85%" stop-color="#374151"/>
          <stop offset="100%" stop-color="#1F2937"/>
        </linearGradient>
        <!-- 高光条 -->
        <linearGradient id="weightSheen" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
          <stop offset="40%" stop-color="rgba(255,255,255,0.3)"/>
          <stop offset="60%" stop-color="rgba(255,255,255,0.3)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </linearGradient>
      
        <!-- V2 支架/底座渐变 -->
        <linearGradient id="fulcrumGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#9CA3AF"/><stop offset="50%" stop-color="#6B7280"/><stop offset="100%" stop-color="#4B5563"/>
        </linearGradient>
        <linearGradient id="baseGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#D1D5DB"/><stop offset="100%" stop-color="#9CA3AF"/>
        </linearGradient>
        <filter id="beamShadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/></filter>
      </defs>

      <!-- Background ruler marks -->
      <g id="ruler-marks"></g>

      <!-- Fulcrum (triangle) -->
      <polygon id="fulcrum" points="300,260 285,300 315,300" fill="url(#fulcrumGrad)" stroke="#4B5563" stroke-width="1"/>
      <line x1="285" y1="300" x2="315" y2="300" stroke="#4B5563" stroke-width="2"/>

      <!-- Base -->
      <rect x="250" y="298" width="100" height="12" rx="3" fill="url(#baseGrad)" stroke="#9CA3AF" stroke-width="0.8"/>
      <ellipse cx="300" cy="314" rx="60" ry="4" fill="rgba(0,0,0,0.06)"/>

      <!-- Lever beam -->
      <g id="lever-group" transform="rotate(0,300,260)">
        <rect id="lever-beam" x="50" y="250" width="500" height="14" rx="4" fill="url(#leverGrad)" stroke="#78350F" stroke-width="0.8" filter="url(#beamShadow)"/>
        <line x1="70" y1="254" x2="530" y2="254" stroke="#78350F" stroke-width="0.4" opacity="0.2" pointer-events="none"/>
        <line x1="60" y1="258" x2="540" y2="258" stroke="#78350F" stroke-width="0.4" opacity="0.15" pointer-events="none"/>
        <line x1="75" y1="261" x2="525" y2="261" stroke="#78350F" stroke-width="0.3" opacity="0.15" pointer-events="none"/>
        <rect x="52" y="250" width="496" height="3" rx="2" fill="rgba(255,255,255,0.2)" pointer-events="none"/>
        <!-- Hook points (5 on each side) -->
        <g id="hook-points"></g>
        <!-- Weights on lever -->
        <g id="lever-weights"></g>
      </g>

      <!-- Fulcrum red marker (after lever-group so it renders on top) -->
      <circle cx="300" cy="260" r="5" fill="#EF4444" stroke="#fff" stroke-width="1.5"/>

      <!-- Weight box inside canvas -->
      <rect x="60" y="360" width="480" height="80" rx="10" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
      <text x="80" y="378" font-size="10" fill="#9CA3AF" font-weight="700">砝码盒 — 拖到杠杆刻度上 ↑</text>
      <g id="weight-box-svg"></g>

      <!-- Reset button hidden from canvas -->
      <g id="btn-reset-svg" cursor="pointer" visibility="hidden"></g>
    </svg>
  </div>

  <div class="panel">
    <div class="panel-card">
      <div class="panel-title">📊 力矩分析</div>
      <div style="font-size:11px;color:#9CA3AF;font-weight:600;margin:8px 0 4px">⬅️ 左侧</div>
      <div class="reading"><span class="rl">力 F₁</span><span class="rv" id="r-f1">0 N</span></div>
      <div class="reading"><span class="rl">力臂 L₁</span><span class="rv" id="r-l1">0 格</span></div>
      <div class="reading"><span class="rl">力矩 F₁L₁</span><span class="rv" id="r-m1">0</span></div>
      <hr style="border:none;border-top:1px solid #F3F4F6;margin:8px 0">
      <div style="font-size:11px;color:#9CA3AF;font-weight:600;margin:0 0 4px">➡️ 右侧</div>
      <div class="reading"><span class="rl">力 F₂</span><span class="rv" id="r-f2">0 N</span></div>
      <div class="reading"><span class="rl">力臂 L₂</span><span class="rv" id="r-l2">0 格</span></div>
      <div class="reading"><span class="rl">力矩 F₂L₂</span><span class="rv" id="r-m2">0</span></div>
      <hr style="border:none;border-top:1px solid #F3F4F6;margin:8px 0">
      <div class="reading"><span class="rl">状态</span><span id="r-status"><span class="badge badge-warn">空杠杆</span></span></div>
      <div class="formula" id="formula-display"></div>
    </div>
    <button id="btn-reset-panel" style="width:100%;padding:10px;border:2px solid #EF4444;border-radius:10px;background:rgba(239,68,68,0.06);color:#DC2626;font-weight:700;font-size:14px;cursor:pointer;transition:all 0.2s">🔄 清空重来</button>
  </div>
</div>

<script>
const svg = document.getElementById('lab-svg');
const leverGroup = document.getElementById('lever-group');
const hookPointsG = document.getElementById('hook-points');
const leverWeightsG = document.getElementById('lever-weights');
const rulerMarksG = document.getElementById('ruler-marks');
const pivotX = 300, pivotY = 260;
const hookSpacing = 45; // pixels between hooks
const hooks = []; // { pos: -5 to 5, x, y }
const placed = []; // { pos, weight, el }

// Create hook points
for (let i = -5; i <= 5; i++) {
  if (i === 0) continue; // skip center
  const x = pivotX + i * hookSpacing;
  const y = 264; // bottom of lever
  hooks.push({ pos: i, x, y });

  // Draw hook mark
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', x); line.setAttribute('y1', 250);
  line.setAttribute('x2', x); line.setAttribute('y2', 268);
  line.setAttribute('stroke', '#57534E'); line.setAttribute('stroke-width', '1');
  hookPointsG.appendChild(line);

  // Label
  const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  txt.setAttribute('x', x); txt.setAttribute('y', 248);
  txt.setAttribute('font-size', '9'); txt.setAttribute('fill', '#9CA3AF');
  txt.setAttribute('text-anchor', 'middle'); txt.setAttribute('font-weight', '600');
  txt.textContent = Math.abs(i);
  hookPointsG.appendChild(txt);
}

// Background ruler
for (let i = -5; i <= 5; i++) {
  const x = pivotX + i * hookSpacing;
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', x); line.setAttribute('y1', 255);
  line.setAttribute('x2', x); line.setAttribute('y2', 320);
  line.setAttribute('stroke', 'rgba(0,0,0,0.04)'); line.setAttribute('stroke-width', '1');
  line.setAttribute('stroke-dasharray', '2 4');
  rulerMarksG.appendChild(line);
}

function svgPoint(e) {
  const rect = svg.getBoundingClientRect();
  return { x: (e.clientX - rect.left) / rect.width * 600, y: (e.clientY - rect.top) / rect.height * 400 };
}

function findNearestHook(x) {
  let best = null, bestDist = Infinity;
  for (const h of hooks) {
    const d = Math.abs(x - h.x);
    if (d < bestDist) { bestDist = d; best = h; }
  }
  return bestDist < 30 ? best : null;
}

function getWeightsAtPos(pos) {
  return placed.filter(p => p.pos === pos);
}

function calculate() {
  let leftTorque = 0, rightTorque = 0;
  let leftForce = 0, rightForce = 0;
  let leftArm = 0, rightArm = 0;

  // Group by position
  const leftWeights = placed.filter(p => p.pos < 0);
  const rightWeights = placed.filter(p => p.pos > 0);

  // Calculate torques
  for (const w of leftWeights) {
    leftTorque += w.weight * Math.abs(w.pos);
    leftForce += w.weight;
  }
  for (const w of rightWeights) {
    rightTorque += w.weight * Math.abs(w.pos);
    rightForce += w.weight;
  }

  // Average arm (weighted)
  if (leftForce > 0) leftArm = (leftTorque / leftForce).toFixed(1);
  if (rightForce > 0) rightArm = (rightTorque / rightForce).toFixed(1);

  const balanced = placed.length > 0 && Math.abs(leftTorque - rightTorque) < 0.01;
  const tiltAngle = placed.length === 0 ? 0 : balanced ? 0 : Math.min(15, Math.max(-15, (rightTorque - leftTorque) * 2));

  // Animate lever tilt
  leverGroup.style.transition = 'transform 0.4s ease-out';
  leverGroup.setAttribute('transform', `rotate(${tiltAngle},${pivotX},${pivotY})`);

  // Update readings
  document.getElementById('r-f1').textContent = leftForce + ' N';
  document.getElementById('r-l1').textContent = leftArm + ' 格';
  document.getElementById('r-m1').textContent = leftTorque.toFixed(0);
  document.getElementById('r-f2').textContent = rightForce + ' N';
  document.getElementById('r-l2').textContent = rightArm + ' 格';
  document.getElementById('r-m2').textContent = rightTorque.toFixed(0);

  if (placed.length === 0) {
    document.getElementById('r-status').innerHTML = '<span class="badge badge-warn">空杠杆</span>';
    if(window.katex){katex.render('F_1 L_1 = F_2 L_2',document.getElementById('formula-display'),{throwOnError:false})}else{document.getElementById('formula-display').textContent='F₁L₁ = F₂L₂';}
  } else if (balanced) {
    document.getElementById('r-status').innerHTML = '<span class="badge badge-ok">✅ 平衡！</span>';
    if(window.katex){katex.render(`${leftTorque} = ${rightTorque} \\; ✅`,document.getElementById('formula-display'),{throwOnError:false})}else{document.getElementById('formula-display').textContent=`${leftTorque} = ${rightTorque} ✅`;}
  } else {
    const side = leftTorque > rightTorque ? '左偏' : '右偏';
    document.getElementById('r-status').innerHTML = `<span class="badge badge-warn">${side}</span>`;
    if(window.katex){katex.render(`${leftTorque} \\neq ${rightTorque}`,document.getElementById('formula-display'),{throwOnError:false})}else{document.getElementById('formula-display').textContent=`${leftTorque} ≠ ${rightTorque}`;}
  }
}

// Create trapezoid weight SVG group at (cx, topY)
function createWeightSVG(cx, topY, weight) {
  const cfg = weight >= 5
    ? { w:22, h:30, hw:10, hh:4, grad:'weightGrad5', stroke:'#374151', txtFill:'#D1D5DB', fs:14 }
    : weight >= 2
    ? { w:18, h:26, hw:8, hh:3.5, grad:'weightGrad2', stroke:'#92400E', txtFill:'#78350F', fs:12 }
    : { w:14, h:22, hw:6, hh:3, grad:'weightGrad1', stroke:'#6B7280', txtFill:'#374151', fs:10 };

  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  // Handle (提手)
  const handle = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  handle.setAttribute('x', cx - cfg.hw/2); handle.setAttribute('y', topY);
  handle.setAttribute('width', cfg.hw); handle.setAttribute('height', cfg.hh);
  handle.setAttribute('rx', cfg.hh/2); handle.setAttribute('fill', cfg.stroke);
  handle.setAttribute('opacity', '0.7');
  g.appendChild(handle);

  // Trapezoid body
  const by = topY + cfg.hh + 1;
  const topW = cfg.w * 0.7, botW = cfg.w;
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  const d = `M${cx-botW/2},${by+cfg.h} Q${cx-botW/2},${by+cfg.h+3} ${cx-botW/2+3},${by+cfg.h+3} L${cx+botW/2-3},${by+cfg.h+3} Q${cx+botW/2},${by+cfg.h+3} ${cx+botW/2},${by+cfg.h} L${cx+topW/2+2},${by} L${cx-topW/2-2},${by} Z`;
  path.setAttribute('d', d);
  path.setAttribute('fill', `url(#${cfg.grad})`);
  path.setAttribute('stroke', cfg.stroke); path.setAttribute('stroke-width', '0.6');
  g.appendChild(path);

  // Sheen highlight
  const sheen = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  sheen.setAttribute('x', cx - topW/2); sheen.setAttribute('y', by+1);
  sheen.setAttribute('width', topW); sheen.setAttribute('height', cfg.h * 0.3);
  sheen.setAttribute('rx', '1'); sheen.setAttribute('fill', 'url(#weightSheen)');
  sheen.setAttribute('opacity', '0.4'); sheen.setAttribute('pointer-events', 'none');
  g.appendChild(sheen);

  // Weight text (刻印)
  const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  txt.setAttribute('x', cx); txt.setAttribute('y', by + cfg.h * 0.55);
  txt.setAttribute('font-size', cfg.fs); txt.setAttribute('fill', cfg.txtFill);
  txt.setAttribute('text-anchor', 'middle'); txt.setAttribute('font-weight', '800');
  txt.setAttribute('font-family', 'Georgia, serif'); txt.setAttribute('pointer-events', 'none');
  txt.textContent = weight;
  g.appendChild(txt);

  const unit = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  unit.setAttribute('x', cx); unit.setAttribute('y', by + cfg.h * 0.85);
  unit.setAttribute('font-size', cfg.fs * 0.55); unit.setAttribute('fill', cfg.txtFill);
  unit.setAttribute('text-anchor', 'middle'); unit.setAttribute('font-weight', '600');
  unit.setAttribute('pointer-events', 'none');
  unit.textContent = 'N';
  g.appendChild(unit);

  g.totalH = cfg.hh + 1 + cfg.h + 3; // total height for stacking
  return g;
}

function renderWeights() {
  leverWeightsG.innerHTML = '';
  const groups = {};
  for (const p of placed) {
    if (!groups[p.pos]) groups[p.pos] = [];
    groups[p.pos].push(p);
  }

  for (const [pos, weights] of Object.entries(groups)) {
    const hook = hooks.find(h => h.pos === parseInt(pos));
    if (!hook) continue;

    // Hook line
    const totalH = weights.reduce((s, w) => s + (w.weight >= 5 ? 34 : w.weight >= 2 ? 31 : 27), 0);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', hook.x); line.setAttribute('y1', 264);
    line.setAttribute('x2', hook.x); line.setAttribute('y2', 270);
    line.setAttribute('stroke', '#78716C'); line.setAttribute('stroke-width', '1');
    leverWeightsG.appendChild(line);

    let curY = 270;
    for (let i = 0; i < weights.length; i++) {
      const w = weights[i];
      const wg = createWeightSVG(hook.x, curY, w.weight);
      wg.style.cursor = 'grab';

      wg.addEventListener('pointerdown', e => {
        e.preventDefault(); e.stopPropagation();
        const idx = placed.indexOf(w);
        if (idx >= 0) {
          placed.splice(idx, 1);
          renderWeights();
          calculate();
        }
      });

      leverWeightsG.appendChild(wg);
      curY += wg.totalH + 2;
    }
  }
}

// SVG weight box sources
const weightBoxG = document.getElementById('weight-box-svg');
const weightSources = [
  {w:1},{w:1},{w:1},{w:1},{w:1},{w:1},
  {w:2},{w:2},
  {w:5}
];

function renderWeightBox() {
  weightBoxG.innerHTML = '';
  weightSources.forEach((src, i) => {
    const bx = 80 + i * 46;
    const by = 388;

    const g = createWeightSVG(bx, by, src.w);
    g.style.cursor = 'grab';
    g.addEventListener('pointerenter', () => g.setAttribute('filter', 'url(#weightShadow)'));
    g.addEventListener('pointerleave', () => g.removeAttribute('filter'));
    weightBoxG.appendChild(g);

    // Drag interaction
    let dragging = false, ghost = null;
    g.addEventListener('pointerdown', e => {
      e.preventDefault();
      dragging = true;
      ghost = createWeightSVG(0, 0, src.w);
      ghost.setAttribute('opacity', '0.7');
      ghost.setAttribute('pointer-events', 'none');
      svg.appendChild(ghost);
    });
    document.addEventListener('pointermove', ev => {
      if (!dragging || !ghost) return;
      const pt = svgPoint(ev);
      ghost.setAttribute('transform', `translate(${pt.x},${pt.y - 15})`);
    });
    document.addEventListener('pointerup', ev => {
      if (!dragging) return;
      dragging = false;
      if (ghost) { ghost.remove(); ghost = null; }
      const pt = svgPoint(ev);
      const hook = findNearestHook(pt.x);
      if (hook && pt.y > 200 && pt.y < 360) {
        const existing = getWeightsAtPos(hook.pos);
        if (existing.length < 3) {
          placed.push({ pos: hook.pos, weight: src.w });
          renderWeights();
          calculate();
        }
      }
    });
  });
}

renderWeightBox();

// Reset (SVG button)
function resetAll() {
  placed.length = 0;
  renderWeights();
  calculate();
}
document.getElementById('btn-reset-svg').addEventListener('click', resetAll);
document.getElementById('btn-reset-panel').addEventListener('click', resetAll);

// Init
calculate();
</script>
</body>
</html>
