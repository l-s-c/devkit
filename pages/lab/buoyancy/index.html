            <stop offset="100%" stop-color="rgba(37,99,235,0.25)"/>

            <stop offset="0%" stop-color="rgba(148,163,184,0.3)"/>
            <stop offset="100%" stop-color="rgba(148,163,184,0.05)"/>
          </linearGradient>
          <linearGradient id="glassRight" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="rgba(148,163,184,0.05)"/>
            <stop offset="100%" stop-color="rgba(148,163,184,0.3)"/>
          </linearGradient>
          <!-- Object gradients -->
          <linearGradient id="aluminumGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#D1D5DB"/>
            <stop offset="50%" stop-color="#9CA3AF"/>
            <stop offset="100%" stop-color="#6B7280"/>
          </linearGradient>
          <linearGradient id="ironGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#6B7280"/>
            <stop offset="50%" stop-color="#4B5563"/>
            <stop offset="100%" stop-color="#374151"/>
          </linearGradient>
          <linearGradient id="copperGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FCD34D"/>
            <stop offset="50%" stop-color="#D97706"/>
            <stop offset="100%" stop-color="#92400E"/>
          </linearGradient>
          <!-- Spring gradient -->
          <linearGradient id="springGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#9CA3AF"/>
            <stop offset="50%" stop-color="#6B7280"/>
            <stop offset="100%" stop-color="#4B5563"/>
          </linearGradient>
          <filter id="objShadow">
            <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
          </filter>
          <filter id="waterGlow">
            <feGaussianBlur stdDeviation="2" result="g"/>
            <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- Background -->
        <rect width="700" height="440" fill="#FAFBFE"/>

        <!-- === Support stand (left side visual) === -->
        <rect x="200" y="8" width="4" height="20" rx="1" fill="#6B7280"/>
        <rect x="190" y="6" width="24" height="4" rx="1" fill="#4B5563"/>

        <!-- === Spring Scale (centered above container) === -->
        <g id="springScale" transform="translate(350, 8)">
          <!-- Mount bar -->
          <rect x="-100" y="0" width="200" height="6" rx="2" fill="#4B5563"/>

          <text x="15" y="41" font-size="7" fill="#9CA3AF">2</text>
          <line x1="-12" y1="46" x2="12" y2="46" stroke="#E5E7EB" stroke-width="0.5"/>
          <text x="15" y="49" font-size="7" fill="#9CA3AF">3</text>
          <line x1="-12" y1="54" x2="12" y2="54" stroke="#E5E7EB" stroke-width="0.5"/>
          <text x="15" y="57" font-size="7" fill="#9CA3AF">4</text>
          <line x1="-12" y1="62" x2="12" y2="62" stroke="#E5E7EB" stroke-width="0.5"/>
          <text x="15" y="65" font-size="7" fill="#9CA3AF">5</text>

          <text id="scaleReadout" x="0" y="81" font-size="9" fill="#10B981" text-anchor="middle" font-weight="700" font-family="JetBrains Mono, monospace">2.7N</text>
          <!-- Label -->
          <text x="0" y="100" font-size="7" fill="#6B7280" text-anchor="middle" font-weight="600">弹簧秤</text>
          <!-- Spring coils -->
          <g id="springCoils">
            <path d="M0,105 Q6,108 0,111 Q-6,114 0,117 Q6,120 0,123" fill="none" stroke="url(#springGrad)" stroke-width="1.5"/>
          </g>
          <!-- Hook -->
          <circle cx="0" cy="128" r="2.5" fill="none" stroke="#6B7280" stroke-width="1.5"/>
        </g>

        <!-- === String from scale to object === -->
        <line id="string" x1="350" y1="136" x2="350" y2="230" stroke="#78350F" stroke-width="1.5" stroke-linecap="round"/>

        <!-- === Water Container (centered) === -->
        <g id="container" transform="translate(350, 160)">
          <!-- Container back wall -->
          <rect x="-90" y="0" width="180" height="250" rx="4" fill="none" stroke="#94A3B8" stroke-width="1.5" opacity="0.4"/>
          <!-- Glass walls -->
          <rect x="-90" y="0" width="6" height="250" fill="url(#glassLeft)"/>
          <rect x="84" y="0" width="6" height="250" fill="url(#glassRight)"/>

          <rect id="waterBody" x="-84" y="60" width="168" height="186" fill="url(#waterGrad)"/>

          <!-- Water level marker -->
          <line x1="86" y1="60" x2="94" y2="60" stroke="#3B82F6" stroke-width="0.8"/>
          <text x="97" y="63" font-size="7" fill="#3B82F6" font-weight="500">水面</text>

          <!-- Container markings -->
          <g opacity="0.3">
            <line x1="-86" y1="100" x2="-82" y2="100" stroke="#64748B" stroke-width="0.5"/>
            <line x1="-86" y1="140" x2="-82" y2="140" stroke="#64748B" stroke-width="0.5"/>
            <line x1="-86" y1="180" x2="-82" y2="180" stroke="#64748B" stroke-width="0.5"/>
            <line x1="-86" y1="220" x2="-82" y2="220" stroke="#64748B" stroke-width="0.5"/>
          </g>
        </g>

        <!-- === Draggable Object (inside container) === -->
        <g id="objectGroup" cursor="grab" filter="url(#objShadow)">
          <rect id="objBody" x="325" y="230" width="50" height="50" rx="4" fill="url(#aluminumGrad)" stroke="#4B5563" stroke-width="0.8"/>

          <circle cx="350" cy="228" r="2" fill="#6B7280"/>
        </g>

        <!-- === Force Arrows (positioned relative to object) === -->
        <g id="forceArrows">
          <!-- Gravity (red, down) -->
          <g id="gravityArrow">
            <line x1="385" y1="245" x2="385" y2="295" stroke="#DC2626" stroke-width="2"/>
            <polygon points="380,290 385,305 390,290" fill="#DC2626"/>
            <text x="395" y="275" font-size="9" fill="#DC2626" font-weight="700" font-family="JetBrains Mono, monospace">G</text>
          </g>
          <!-- Buoyancy (blue, up) -->
          <g id="buoyancyArrow">
            <line x1="315" y1="280" x2="315" y2="255" stroke="#2563EB" stroke-width="2"/>
            <polygon points="310,260 315,245 320,260" fill="#2563EB"/>
            <text x="295" y="268" font-size="9" fill="#2563EB" font-weight="700" font-family="JetBrains Mono, monospace">F浮</text>

          <!-- Tension (green, up) -->

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h6M4 17h6M14 4l-4 16M18 7h2m-2 10h2"/></svg>

      <div class="formula-box" id="formulaBox"></div>
      <div style="margin-top:6px;font-size:10px;color:#8E8E93;line-height:1.5">

      </div>
    </div>

    <!-- Records -->
    <div class="panel-section">
      <h3>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        实验记录
      </h3>
      <button class="record-btn" onclick="recordData()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        记录本次数据
      </button>
      <div class="records-list" id="recordsList"></div>
    </div>

    <!-- Reset -->
    <button class="reset-btn" onclick="resetAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
      重置实验
    </button>
  </div>
</div>

<div class="related-bar">
  <span>相关实验</span>
  <a href="/devkit/pages/lab/lever/">杠杆平衡</a><a href="/devkit/pages/lab/pulley/">滑轮组</a><a href="/devkit/pages/lab/pendulum/">单摆运动</a><a href="/devkit/pages/lab/lens/">凸透镜成像</a>
</div>
<script>
// === Physics constants ===
  const g = 10; // m/s², simplified
  const rhoWater = 1.0; // g/cm³

  // === Materials ===
  const materials = {
    aluminum: { name: '铝', label: 'Al', density: 2.7, volume: 100, color: 'aluminumGrad', stroke: '#4B5563' },
    iron:     { name: '铁', label: 'Fe', density: 7.8, volume: 100, color: 'ironGrad', stroke: '#1F2937' },
    copper:   { name: '铜', label: 'Cu', density: 8.9, volume: 100, color: 'copperGrad', stroke: '#92400E' }
  };

  let currentMat = 'aluminum';
  let objY = 190; // top of object in SVG coords (starts just above water)
  const objSize = 50;
  const containerTop = 160; // container g translate y
  const waterSurfaceY = 220; // absolute y of water surface (containerTop + 60)
  const containerBottom = 406; // containerTop + 246
  const objMinY = 165; // just inside container top
  const objMaxY = 350; // near container bottom
  let records = [];

  function getGravity(mat) {
    return mat.density * mat.volume / 1000 * g; // N
  }

  function getSubmergedVolume(mat, y) {
    const objTop = y;
    const objBottom = y + objSize;
    if (objBottom <= waterSurfaceY) return 0; // fully above water
    if (objTop >= waterSurfaceY) {
      // fully below water surface
      return mat.volume;
    }
    // partially submerged
    const subDepth = objBottom - waterSurfaceY;
    const fraction = Math.min(subDepth / objSize, 1);
    return mat.volume * fraction;
  }

  function getBuoyancy(subVol) {
    return rhoWater * subVol / 1000 * g; // N
  }

  function render() {
    const mat = materials[currentMat];
    const G = getGravity(mat);
    const subVol = getSubmergedVolume(mat, objY);
    const Fb = getBuoyancy(subVol);
    const Ft = G - Fb;

    // Update object position (centered at x=350)
    document.getElementById('objBody').setAttribute('x', 325);
    document.getElementById('objBody').setAttribute('y', objY);
    document.getElementById('objBody').setAttribute('fill', `url(#${mat.color})`);
    document.getElementById('objBody').setAttribute('stroke', mat.stroke);
    document.getElementById('objLabel').setAttribute('x', 350);
    document.getElementById('objLabel').setAttribute('y', objY + 30);
    document.getElementById('objLabel').textContent = mat.label;
    document.querySelector('#objectGroup circle').setAttribute('cx', 350);
    document.querySelector('#objectGroup circle').setAttribute('cy', objY - 2);

    // Update string from spring hook to object
    document.getElementById('string').setAttribute('x1', 350);
    document.getElementById('string').setAttribute('x2', 350);
    document.getElementById('string').setAttribute('y2', objY - 2);

    // Spring scale pointer position (0N at y=22, 5N at y=62)
    const pointerY = 22 + (Ft / 5) * 40;
    document.getElementById('scalePointer').setAttribute('y1', pointerY);
    document.getElementById('scalePointer').setAttribute('y2', pointerY);
    document.getElementById('scaleReadout').textContent = Ft.toFixed(1) + 'N';

    // Water level rise (simplified visual)
    const riseAmount = subVol / 1000 * 0.3;
    const newWaterY = 60 - riseAmount * 6;
    document.getElementById('waterBody').setAttribute('y', containerTop - containerTop + newWaterY);
    document.getElementById('waterBody').setAttribute('height', 246 - newWaterY);

    // Panel data
    document.getElementById('matName').textContent = mat.name;
    document.getElementById('matDensity').textContent = mat.density + ' g/cm³';
    document.getElementById('matVolume').textContent = mat.volume + ' cm³';
    document.getElementById('matGravity').textContent = G.toFixed(1) + ' N';

    document.getElementById('forceG').textContent = G.toFixed(2) + ' N';
    document.getElementById('forceFb').textContent = Fb.toFixed(2) + ' N';
    document.getElementById('forceFt').textContent = Ft.toFixed(2) + ' N';
    document.getElementById('subVolume').textContent = Math.round(subVol) + ' cm³';

    // Status
    const sa = document.getElementById('statusArea');
    if (subVol === 0) {
      sa.innerHTML = '<div class="status-pill partial"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg> 未浸入水中</div>';
    } else if (subVol >= mat.volume * 0.99) {
      sa.innerHTML = '<div class="status-pill submerged"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg> 完全浸没</div>';
    } else {
      const pct = Math.round(subVol / mat.volume * 100);
      sa.innerHTML = `<div class="status-pill partial"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/></svg> 浸入 ${pct}%</div>`;
    }

    // Verification
    const verify = Math.abs(Ft - (G - Fb)) < 0.01;
  }

  // === Drag interaction ===
  let dragging = false;
  let dragStartY = 0;
  let objStartY = 0;

  const svg = document.getElementById('canvas');
  const objGroup = document.getElementById('objectGroup');

  function startDrag(clientY) {
    dragging = true;
    const rect = svg.getBoundingClientRect();
    dragStartY = clientY;
    objStartY = objY;
    objGroup.style.cursor = 'grabbing';
  }

  function moveDrag(clientY) {
    if (!dragging) return;
    const rect = svg.getBoundingClientRect();
    const scale = 440 / rect.height;
    const dy = (clientY - dragStartY) * scale;
    objY = Math.max(objMinY, Math.min(objMaxY, objStartY + dy));
    render();
  }

  function endDrag() {
    dragging = false;
    objGroup.style.cursor = 'grab';
  }

  objGroup.addEventListener('mousedown', (e) => { e.preventDefault(); startDrag(e.clientY); });
  document.addEventListener('mousemove', (e) => moveDrag(e.clientY));
  document.addEventListener('mouseup', endDrag);

  objGroup.addEventListener('touchstart', (e) => { e.preventDefault(); startDrag(e.touches[0].clientY); }, { passive: false });
  document.addEventListener('touchmove', (e) => { if (dragging) { e.preventDefault(); moveDrag(e.touches[0].clientY); } }, { passive: false });
  document.addEventListener('touchend', endDrag);

  // === Presets ===
  function loadPreset(name) {
    currentMat = name;
    objY = 190; // start just above water surface
    document.querySelectorAll('.preset-pill').forEach(p => p.classList.remove('active'));
    document.querySelector(`.preset-pill[onclick="loadPreset('${name}')"]`).classList.add('active');
    render();
  }

  function resetAll() {
    objY = 190;
    render();
  }

  // === Record data ===
  function recordData() {
    const mat = materials[currentMat];
    const G = getGravity(mat);
    const subVol = getSubmergedVolume(mat, objY);
    const Fb = getBuoyancy(subVol);
    const Ft = G - Fb;
    records.push({ id: records.length + 1, mat: mat.name, subVol: Math.round(subVol), Fb: Fb.toFixed(2), Ft: Ft.toFixed(2) });

    const list = document.getElementById('recordsList');
    list.classList.add('open');
    let html = '';
    records.forEach(r => {
      html += `<div class="record-item">
        <span class="r-num">#${r.id}</span>
        <span class="r-data">${r.mat} V排=${r.subVol}cm³ F浮=${r.Fb}N</span>
      </div>`;
    });
    list.innerHTML = html;
  }

  // === Init ===
  loadPreset('aluminum');
  function renderFormula() {
    try {
      katex.render('F_{\\text{浮}} = \\rho_{\\text{液}} \\cdot g \\cdot V_{\\text{排}}', document.getElementById('formulaBox'), { throwOnError: false, displayMode: true });
    } catch(e) {
      document.getElementById('formulaBox').textContent = 'F浮 = ρ液 · g · V排';
    }
  }
  renderFormula();

  // Guide
  if (localStorage.getItem('buoyancy-guide-seen')) {
    const g = document.getElementById('guideOverlay');
    if (g) g.style.display = 'none';
  } else {
    localStorage.setItem('buoyancy-guide-seen', '1');
  }
</script>
<script src="/shared/theme.js"></script>
</body>
</html>
