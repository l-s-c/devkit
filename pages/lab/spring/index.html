<script>
const k = 25; // N/m
  const L0 = 10; // cm natural length
  const pxPerCm = 15; // pixels per cm in SVG
  const springTopY = 30; // top of spring in SVG
  const coils = 12; // number of coils
  let F = 0;
  let records = [];

  function getExtension() {
    // x = F/k in meters, convert to cm
    return (F / k) * 100;
  }

  function drawSpring(topY, bottomY) {
    const amplitude = 12;
    const segments = coils * 2;
    const totalH = bottomY - topY;
    const segH = totalH / segments;
    let d = `M200,${topY}`;
    for (let i = 1; i <= segments; i++) {
      const y = topY + segH * i;
      const x = 200 + (i % 2 === 1 ? amplitude : -amplitude);
      d += ` L${x},${y}`;
    }
    d += ` L200,${bottomY}`;
    return d;
  }

  function drawWeights(hookBottomY, force) {
    const wg = document.getElementById('weightsGroup');
    wg.innerHTML = '';
    if (force <= 0) return;

    const numWeights = Math.ceil(force);
    const wH = 22, wW = 36, gap = 2;
    for (let i = 0; i < Math.min(numWeights, 5); i++) {
      const wy = hookBottomY + 8 + i * (wH + gap);
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', 200 - wW/2);
      rect.setAttribute('y', wy);
      rect.setAttribute('width', wW);
      rect.setAttribute('height', wH);
      rect.setAttribute('rx', '3');
      rect.setAttribute('fill', 'url(#weightGrad)');
      rect.setAttribute('stroke', '#4B5563');
      rect.setAttribute('stroke-width', '0.8');
      wg.appendChild(rect);

      const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      label.setAttribute('x', 200);
      label.setAttribute('y', wy + 14);
      label.setAttribute('text-anchor', 'middle');
      label.setAttribute('font-size', '9');
      label.setAttribute('fill', '#fff');
      label.setAttribute('font-weight', '700');
      const w = i < numWeights - 1 ? '1N' : (force % 1 > 0.01 ? (force % 1).toFixed(1)+'N' : '1N');
      label.textContent = i < Math.floor(force) ? '1N' : (force - Math.floor(force) > 0.01 ? (force - Math.floor(force)).toFixed(1)+'N' : '1N');
      wg.appendChild(label);
    }
  }

  function updateSpring() {
    F = parseFloat(document.getElementById('forceSlider').value);
    const x = getExtension(); // cm
    const L = L0 + x; // cm

    // Spring visual
    const springBottomY = springTopY + L0 * pxPerCm + x * pxPerCm;
    const springPath = drawSpring(springTopY, springBottomY);
    const sp = document.getElementById('springPath');
    sp.setAttribute('d', springPath);
    sp.setAttribute('stroke', F > 5 ? 'url(#springWarn)' : 'url(#springColor)');

    // Hook
    const hookY = springBottomY;
    document.getElementById('hookPath').setAttribute('d',
      `M200,${hookY} C200,${hookY+6} 196,${hookY+10} 192,${hookY+10} C188,${hookY+10} 186,${hookY+6} 190,${hookY+2}`);

    // Weights
    drawWeights(hookY + 10, F);

    // Extension marker
    const em = document.getElementById('extensionMarker');
    if (x > 0.1) {
      em.setAttribute('opacity', '1');
      const natBottomY = springTopY + L0 * pxPerCm;
      document.getElementById('extLine').setAttribute('y1', natBottomY);
      document.getElementById('extLine').setAttribute('y2', springBottomY);
      document.getElementById('extTop').setAttribute('y1', natBottomY);
      document.getElementById('extTop').setAttribute('y2', natBottomY);
      document.getElementById('extBottom').setAttribute('y1', springBottomY);
      document.getElementById('extBottom').setAttribute('y2', springBottomY);
      document.getElementById('extArrowUp').setAttribute('points', `265,${natBottomY+5} 270,${natBottomY} 275,${natBottomY+5}`);
      document.getElementById('extArrowDown').setAttribute('points', `265,${springBottomY-5} 270,${springBottomY} 275,${springBottomY-5}`);
      const midY = (natBottomY + springBottomY) / 2;
      document.getElementById('extBg').setAttribute('y', midY - 8);
      document.getElementById('extText').setAttribute('y', midY + 4);
      document.getElementById('extText').textContent = `x=${x.toFixed(1)}cm`;
    } else {
      em.setAttribute('opacity', '0');
    }

    // Natural length marker
    const natBottom = springTopY + L0 * pxPerCm;
    document.querySelector('#naturalLenMarker line').setAttribute('y2', natBottom);
    document.querySelector('#naturalLenMarker text').setAttribute('y', (springTopY + natBottom) / 2);

    // Panel
    document.getElementById('forceVal').textContent = F.toFixed(1) + ' N';
    document.getElementById('valF').textContent = F.toFixed(2) + ' N';
    document.getElementById('valX').textContent = x.toFixed(1) + ' cm';
    document.getElementById('valL').textContent = L.toFixed(1) + ' cm';
    document.getElementById('valK').textContent = x > 0.1 ? ((F / (x/100)).toFixed(1) + ' N/m') : '— N/m';

    // Status
    const sa = document.getElementById('statusArea');
    if (F > 5) {
      sa.innerHTML = '<div class="status-pill status-warn"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><path d="M12 9v4M12 17h.01"/></svg> 超过弹性限度！</div>';
    } else if (F > 0.1) {
      sa.innerHTML = '<div class="status-pill status-ok"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg> 弹性范围内</div>';
    } else {
      sa.innerHTML = '';
    }

    // Graph dot
    const gx = x / 20 * 260; // 20cm max
    const gy = 200 - F / 5 * 200; // 5N max
    document.getElementById('currentDot').setAttribute('cx', gx);
    document.getElementById('currentDot').setAttribute('cy', Math.max(0, gy));
  }

  function recordData() {
    const x = getExtension();
    records.push({ F: F.toFixed(2), x: x.toFixed(1), k: x > 0.1 ? (F/(x/100)).toFixed(1) : '—' });

    let html = '<table class="data-table"><tr><th>#</th><th>F/N</th><th>x/cm</th><th>k/(N/m)</th></tr>';
    records.forEach((r, i) => {
      html += `<tr><td>${i+1}</td><td>${r.F}</td><td>${r.x}</td><td>${r.k}</td></tr>`;
    });
    html += '</table>';
    document.getElementById('dataTableArea').innerHTML = html;

    // Graph point
    const x_cm = parseFloat(records[records.length-1].x);
    const f_n = parseFloat(records[records.length-1].F);
    const gx = x_cm / 20 * 260;
    const gy = 200 - f_n / 5 * 200;
    const pts = document.getElementById('graphPoints');
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', gx); c.setAttribute('cy', Math.max(0,gy));
    c.setAttribute('r', '4'); c.setAttribute('fill', '#059669');
    c.setAttribute('stroke', '#fff'); c.setAttribute('stroke-width', '1.5');
    pts.appendChild(c);

    if (records.length >= 2) {
      const tl = document.getElementById('trendLine');
      tl.setAttribute('x1', 0); tl.setAttribute('y1', 200);
      const maxX = 20, maxF = k * maxX / 100;
      tl.setAttribute('x2', 260); tl.setAttribute('y2', 200 - maxF/5*200);
      tl.setAttribute('opacity', '0.5');
    }
  }

  function resetAll() {
    F = 0;
    records = [];
    document.getElementById('forceSlider').value = 0;
    document.getElementById('dataTableArea').innerHTML = '';
    document.getElementById('graphPoints').innerHTML = '';
    document.getElementById('trendLine').setAttribute('opacity', '0');
    updateSpring();
  }

  // Ruler ticks
  function drawRuler() {
    const g = document.getElementById('rulerTicks');
    for (let cm = 0; cm <= 26; cm++) {
      const y = cm * pxPerCm;
      const isMajor = cm % 5 === 0;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', 0); line.setAttribute('x2', isMajor ? 15 : 8);
      line.setAttribute('y1', y); line.setAttribute('y2', y);
      line.setAttribute('stroke', '#9CA3AF'); line.setAttribute('stroke-width', isMajor ? '1' : '0.5');
      g.appendChild(line);
      if (isMajor) {
        const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        t.setAttribute('x', 22); t.setAttribute('y', y + 3);
        t.setAttribute('font-size', '8'); t.setAttribute('fill', '#6B7280');
        t.setAttribute('text-anchor', 'middle');
        t.textContent = cm;
        g.appendChild(t);
      }
    }
  }

  function renderFormulas() {
    try {
      katex.render('F = k \\cdot x', document.getElementById('formula1'), { throwOnError: false, displayMode: true });
    } catch(e) {
      document.getElementById('formula1').textContent = 'F = k · x';
    }
  }

  drawRuler();
  updateSpring();
  renderFormulas();
  if (localStorage.getItem('spring-guide-seen')) { const g = document.getElementById('guideOverlay'); if (g) g.style.display = 'none'; } else { localStorage.setItem('spring-guide-seen', '1'); }
</script>
<script src="/shared/theme.js"></script>
</body>
</html>
