<script>
const E = 6;
let N = 100;
let R = 20;
let showField = false;
let records = [];

function getI() { return E / (R + 2); } // 2Ω internal resistance
function getNI() { return N * getI(); }
function getClips() { return Math.min(10, Math.max(0, Math.round(getNI() / 12))); }

function setCoils(n) {
  N = n;
  document.querySelectorAll('.coil-btn').forEach((b, i) => {
    b.classList.toggle('active', [50,100,200][i] === n);
  });
  drawCoils();
  updateEM();
}

function drawCoils() {
  const cg = document.getElementById('coilGroup');
  cg.innerHTML = '';
  const numVisible = N === 50 ? 6 : (N === 100 ? 10 : 16);
  const spacing = 150 / numVisible;
  for (let i = 0; i < numVisible; i++) {
    const y = 5 + i * spacing;
    const el = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
    el.setAttribute('cx','0'); el.setAttribute('cy', y);
    el.setAttribute('rx','22'); el.setAttribute('ry','6');
    el.setAttribute('fill','none'); el.setAttribute('stroke','url(#coilGrad)');
    el.setAttribute('stroke-width', N === 200 ? '3' : '2.5');
    cg.appendChild(el);
  }
}

function drawPaperclips(count) {
  const attracted = document.getElementById('attractedClips');
  const scattered = document.getElementById('scatteredClips');
  attracted.innerHTML = '';
  scattered.innerHTML = '';

  // Attracted clips (hanging from bottom of iron core)
  for (let i = 0; i < count; i++) {
    const x = -20 + (i % 5) * 10;
    const y = -10 + Math.floor(i / 5) * 18;
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('transform', `translate(${x},${y})`);
    // Paperclip shape
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d', 'M0,0 L0,12 A3,3 0 0,0 6,12 L6,3 A2,2 0 0,0 2,3 L2,10');
    p.setAttribute('fill','none'); p.setAttribute('stroke','#6B7280');
    p.setAttribute('stroke-width','1.2'); p.setAttribute('stroke-linecap','round');
    g.appendChild(p);
    attracted.appendChild(g);
  }

  // Scattered clips on table (remaining)
  const scatteredCount = Math.max(0, 10 - count);
  for (let i = 0; i < scatteredCount; i++) {
    const x = -60 + i * 14 + (i % 3) * 5;
    const y = 55 + (i % 2) * 8;
    const rot = -30 + (i * 47) % 60;
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('transform', `translate(${x},${y}) rotate(${rot})`);
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d', 'M0,0 L0,10 A2.5,2.5 0 0,0 5,10 L5,2 A1.5,1.5 0 0,0 2,2 L2,8');
    p.setAttribute('fill','none'); p.setAttribute('stroke','#9CA3AF');
    p.setAttribute('stroke-width','1'); p.setAttribute('stroke-linecap','round');
    g.appendChild(p);
    scattered.appendChild(g);
  }
}

function updateEM() {
  R = parseInt(document.getElementById('rSlider').value);
  const I = getI();
  const ni = getNI();
  const clips = getClips();

  document.getElementById('rVal').textContent = R + ' Ω';
  document.getElementById('valI').textContent = I.toFixed(2) + ' A';
  document.getElementById('valI2').textContent = I.toFixed(2) + ' A';
  document.getElementById('valN').textContent = N;
  document.getElementById('valNI').textContent = ni.toFixed(0);
  document.getElementById('valClips').textContent = clips + ' 个';
  document.getElementById('clipCountText').textContent = clips + ' 个';

  // Strength
  const pct = Math.min(100, ni / 120 * 100);
  document.getElementById('strengthFill').style.width = pct + '%';
  const sl = document.getElementById('strengthLabel');
  if (pct < 20) { sl.textContent = '磁性：很弱'; document.getElementById('strengthFill').style.background = '#93C5FD'; }
  else if (pct < 40) { sl.textContent = '磁性：较弱'; document.getElementById('strengthFill').style.background = '#818CF8'; }
  else if (pct < 60) { sl.textContent = '磁性：中等'; document.getElementById('strengthFill').style.background = '#4338CA'; }
  else if (pct < 80) { sl.textContent = '磁性：较强'; document.getElementById('strengthFill').style.background = '#3730A3'; }
  else { sl.textContent = '磁性：很强'; document.getElementById('strengthFill').style.background = '#312E81'; }

  // Magnetic glow
  const glow = document.getElementById('magGlow');
  glow.setAttribute('opacity', Math.min(0.6, pct / 100 * 0.6));
  glow.setAttribute('rx', 30 + pct * 0.3);

  // Ammeter pointer
  const aAng = -60 + (I / 1.2) * 120;
  document.getElementById('ammeterPtr').setAttribute('transform', `rotate(${Math.min(60,aAng)},0,2)`);

  // Paperclips
  drawPaperclips(clips);

  // Field lines intensity
  if (showField) {
    document.getElementById('fieldLines').setAttribute('opacity', Math.min(0.8, 0.2 + pct/100*0.6));
  }
}

function toggleField() {
  showField = !showField;
  document.getElementById('fieldToggle').classList.toggle('on', showField);
  document.getElementById('fieldLines').setAttribute('opacity', showField ? '0.5' : '0');
  if (showField) updateEM();
}

function recordData() {
  const I = getI();
  const clips = getClips();
  records.push({ N, I: I.toFixed(2), NI: (N*I).toFixed(0), clips });

  let html = '<table class="data-table"><tr><th>#</th><th>N/匝</th><th>I/A</th><th>N×I</th><th>回形针</th></tr>';
  records.forEach((r, i) => {
    html += `<tr><td>${i+1}</td><td>${r.N}</td><td>${r.I}</td><td>${r.NI}</td><td>${r.clips}</td></tr>`;
  });
  html += '</table>';
  document.getElementById('dataTableArea').innerHTML = html;
}

function resetAll() {
  N = 100; R = 20; records = [];
  document.getElementById('rSlider').value = 20;
  document.querySelectorAll('.coil-btn').forEach((b,i) => b.classList.toggle('active', i===1));
  document.getElementById('dataTableArea').innerHTML = '';
  showField = false;
  document.getElementById('fieldToggle').classList.remove('on');
  document.getElementById('fieldLines').setAttribute('opacity', '0');
  drawCoils();
  updateEM();
}

function renderFormulas() {
  try {
    katex.render('B \\propto N \\cdot I', document.getElementById('formula1'), { throwOnError: false, displayMode: true });
  } catch(e) {
    document.getElementById('formula1').textContent = 'B ∝ N·I';
  }
}

drawCoils();
updateEM();
renderFormulas();
if (localStorage.getItem('em-guide-seen')) { const g = document.getElementById('guideOverlay'); if(g) g.style.display='none'; } else { localStorage.setItem('em-guide-seen','1'); }
</script>
<script src="/shared/theme.js"></script>
</body>
