let activeCat='全部',searchQuery='',expandedIdx=null;
const recordList=document.getElementById('recordList');
const countBadge=document.getElementById('countBadge');
const noResult=document.getElementById('noResult');
const randomBox=document.getElementById('randomBox');

function getFiltered(){
  return records.filter(r=>{
    const catMatch=activeCat==='全部'||r.cat===activeCat;
    const q=searchQuery.toLowerCase();
    const sMatch=!q||r.title.toLowerCase().includes(q)||r.answer.toLowerCase().includes(q)||r.cat.includes(q);
    return catMatch&&sMatch;
  });
}

function render(){
  const filtered=getFiltered();
  countBadge.textContent=filtered.length+' 条记录';
  noResult.style.display=filtered.length?'none':'block';
  recordList.innerHTML='';
  filtered.forEach((r,i)=>{
    const globalIdx=records.indexOf(r);
    const expanded=expandedIdx===globalIdx;
    const card=document.createElement('div');
    card.className='record-card'+(expanded?' expanded':'');
    card.innerHTML=`<div class="record-header"><span class="record-emoji">${r.emoji}</span><span class="record-title">${r.title}</span><span class="record-badge">${r.emoji} ${r.cat}</span></div>
      <div class="record-answer">${r.answer}</div>
      <div class="record-data">${r.data}</div>
      <div class="record-detail">
        ${r.detail}
        ${r.fun.map(f=>'<div class="record-fun">💡 '+f+'</div>').join('')}
        <div class="record-loc">📍 ${r.loc}</div>
      </div>`;
    card.onclick=()=>{expandedIdx=expanded?null:globalIdx;render();};
    recordList.appendChild(card);
  });
}

function showRandom(){
  const r=records[Math.floor(Math.random()*records.length)];
  randomBox.innerHTML=`<div class="random-label">💡 你知道吗？</div><div class="random-title">${r.emoji} ${r.title}</div><div class="random-answer">${r.answer}</div><div style="font-size:11px;color:var(--text-secondary);margin-top:4px">${r.data}</div><button class="random-btn" onclick="event.stopPropagation();refreshRandom()">🔄 换一条</button>`;
}
window.refreshRandom=showRandom;

document.getElementById('searchInput').addEventListener('input',e=>{searchQuery=e.target.value;render();});
document.getElementById('catPills').addEventListener('click',e=>{
  const pill=e.target.closest('.cat-pill');
  if(!pill)return;
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active'));
  pill.classList.add('active');
  activeCat=pill.dataset.cat;
  render();
});

showRandom();
render();
</script>
