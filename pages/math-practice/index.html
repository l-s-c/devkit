.q-item{padding:14px 16px;border-radius:6px;border:1px solid var(--border-glass);background:var(--bg-glass-input);display:flex;align-items:center;gap:8px}
.q-num{font-size:10px;font-weight:800;color:var(--text-caption);min-width:24px}
.q-expr{font-family:var(--font-code);font-size:16px;font-weight:700;flex:1}
.q-blank{width:48px;padding:4px;border-radius:4px;border:1.5px dashed var(--border-glass);background:rgba(99,102,241,0.05);text-align:center;font-family:var(--font-code);font-size:14px;font-weight:700;outline:none;color:var(--text-primary)}
.q-answer{font-family:var(--font-code);font-size:14px;font-weight:800;color:#10B981;display:none}
.grade-desc{font-size:10px;color:var(--text-caption);margin-left:auto;font-weight:400}

<div class="main">
  <div class="panel">
    <div class="section-title">📐 计算题生成器</div>
    <div class="config-row">
      <span class="config-label">年级</span>
      <div class="pill active" data-g="1">一年级</div>
      <div class="pill" data-g="2">二年级</div>
      <div class="pill" data-g="3">三年级</div>
      <div class="pill" data-g="4">四年级</div>
      <div class="pill" data-g="5">五年级</div>
      <div class="pill" data-g="6">六年级</div>
    </div>
    <div class="config-row" id="opRow">
      <span class="config-label">运算</span>
      <div class="pill active" data-op="+">➕ 加</div>
      <div class="pill active" data-op="-">➖ 减</div>
      <div class="pill" data-op="×">✖️ 乘</div>
      <div class="pill" data-op="÷">➗ 除</div>

<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';
let grade=1,ops=new Set(['+','-']),showAns=false;

const GRADE_DESC={1:'20以内加减',2:'100以内加减',3:'乘法表内',4:'万以内四则',5:'大数四则',6:'综合运算'};

// Grade pill
document.querySelectorAll('[data-g]').forEach(p=>p.addEventListener('click',()=>{
  document.querySelectorAll('[data-g]').forEach(x=>x.classList.remove('active'));
  p.classList.add('active');grade=parseInt(p.dataset.g);
}));
// Op pill (toggle, keep at least 1)
document.querySelectorAll('[data-op]').forEach(p=>p.addEventListener('click',()=>{
  const op=p.dataset.op;
  if(ops.has(op)){if(ops.size>1){ops.delete(op);p.classList.remove('active')}}
  else{ops.add(op);p.classList.add('active')}
}));

function rnd(min,max){return Math.floor(Math.random()*(max-min+1))+min}

/* Core: generate from answer backwards → guaranteed correct, no negatives, no decimals */
function makeQ(){
  const opArr=[...ops];const op=opArr[rnd(0,opArr.length-1)];
  let a,b,ans;
  if(op==='+'){
    if(grade<=1){ans=rnd(2,20);a=rnd(1,ans-1);b=ans-a}
    else if(grade<=2){ans=rnd(2,100);a=rnd(1,ans-1);b=ans-a}
    else if(grade<=4){ans=rnd(10,9999);a=rnd(1,ans-1);b=ans-a}
    else{ans=rnd(100,99999);a=rnd(1,ans-1);b=ans-a}
    return{expr:`${a} + ${b}`,ans};
  }
  if(op==='-'){
    if(grade<=1){a=rnd(2,20);b=rnd(1,a-1);ans=a-b}
    else if(grade<=2){a=rnd(2,100);b=rnd(1,a-1);ans=a-b}
    else if(grade<=4){a=rnd(10,9999);b=rnd(1,a-1);ans=a-b}
    else{a=rnd(100,99999);b=rnd(1,a-1);ans=a-b}
    return{expr:`${a} - ${b}`,ans};
  }
  if(op==='×'){
    if(grade<=3){a=rnd(1,9);b=rnd(1,9);ans=a*b}
    else if(grade<=4){a=rnd(2,99);b=rnd(2,9);ans=a*b}
    else{a=rnd(10,999);b=rnd(2,99);ans=a*b}
    return{expr:`${a} × ${b}`,ans};
  }
  // ÷ — build from multiplication: ans = a/b, so a = ans * b
  if(grade<=3){b=rnd(1,9);ans=rnd(1,9)}
  else if(grade<=4){b=rnd(2,9);ans=rnd(2,99)}
  else{b=rnd(2,99);ans=rnd(2,999)}
  a=ans*b;
  return{expr:`${a} ÷ ${b}`,ans};
}

function generate(){
  const count=Math.max(5,Math.min(100,parseInt(document.getElementById('countInput').value)||20));
  document.getElementById('gradeDesc').textContent=
    ['一','二','三','四','五','六'][grade-1]+'年级 · '+GRADE_DESC[grade];
  const grid=document.getElementById('qGrid');
  const items=[];
  for(let i=0;i<count;i++){
    const q=makeQ();
    items.push(`<div class="q-item"><span class="q-num">${i+1}.</span><span class="q-expr">${q.expr} =</span><input class="q-blank" type="text"><span class="q-answer">${q.ans}</span></div>`);
  }
  grid.innerHTML=items.join('');
  showAns=false;
  document.querySelectorAll('.q-answer').forEach(el=>el.style.display='none');
  document.querySelectorAll('.q-blank').forEach(el=>el.style.display='');
  document.getElementById('ansBtn').textContent='👁️ 显示答案';
}

document.getElementById('genBtn').addEventListener('click',generate);
document.getElementById('ansBtn').addEventListener('click',()=>{
  showAns=!showAns;
  document.querySelectorAll('.q-answer').forEach(el=>el.style.display=showAns?'inline':'none');
  document.querySelectorAll('.q-blank').forEach(el=>el.style.display=showAns?'none':'');
  document.getElementById('ansBtn').textContent=showAns?'✏️ 隐藏答案':'👁️ 显示答案';
});

generate();
</script>
