<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" integrity="sha384-+mbV2IY1Zk/X1p/nWllGySJSUN8uMs+gUAN10Or95UBH0fpj6GfKgPmgC5EXieXG" crossorigin="anonymous"></script>
<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

let img = null, cols = 3, rows = 3, pieces = [];

/* Upload */
const zone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');

zone.addEventListener('click', () => fileInput.click());
zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor = 'var(--brand-500)'; });
zone.addEventListener('dragleave', () => { zone.style.borderColor = ''; });
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.style.borderColor = '';
  if (e.dataTransfer.files[0]) { fileInput.files = e.dataTransfer.files; loadImage(e.dataTransfer.files[0]); }
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadImage(fileInput.files[0]); });

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const i = new Image();
    i.onload = () => {
      img = i;
      zone.innerHTML = `<img src="${ev.target.result}">`;
      zone.classList.add('has-image');
      document.getElementById('imageStats').style.display = 'flex';
      document.getElementById('statSize').textContent = `${i.width} × ${i.height}`;
      document.getElementById('statFile').textContent = (file.size / 1024).toFixed(0) + ' KB';
      document.getElementById('splitBtn').disabled = false;
      drawPreview();
    };
    i.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

/* Mode */
document.getElementById('modeGrid').addEventListener('click', e => {
  const pill = e.target.closest('.mode-pill');
  if (!pill) return;
  document.querySelectorAll('.mode-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  const c = parseInt(pill.dataset.c), r = parseInt(pill.dataset.r);
  if (c === 0) {
    document.getElementById('customRow').style.display = 'flex';
    cols = parseInt(document.getElementById('customCols').value) || 3;
    rows = parseInt(document.getElementById('customRows').value) || 3;
  } else {
    document.getElementById('customRow').style.display = 'none';
    cols = c; rows = r;
  }
  drawPreview();
});

document.getElementById('customCols').addEventListener('input', updateGrid);
document.getElementById('customRows').addEventListener('input', updateGrid);

function updateGrid() {
  cols = Math.max(1, Math.min(10, parseInt(document.getElementById('customCols').value) || 1));
  rows = Math.max(1, Math.min(10, parseInt(document.getElementById('customRows').value) || 1));
  drawPreview();
}

function drawPreview() {
  const canvas = document.getElementById('previewCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 400; canvas.height = 400;
  ctx.clearRect(0, 0, 400, 400);

  if (img) {
    const side = Math.min(img.width, img.height);
    const sx = (img.width - side) / 2, sy = (img.height - side) / 2;
    ctx.drawImage(img, sx, sy, side, side, 0, 0, 400, 400);
  } else {
    ctx.fillStyle = '#e5e7eb';
    ctx.fillRect(0, 0, 400, 400);
  }

  // Grid lines
  ctx.setLineDash([6, 4]);
  ctx.strokeStyle = 'rgba(99,102,241,0.6)'; ctx.lineWidth = 2;
  for (let i = 1; i < cols; i++) { const x = 400 / cols * i; ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 400); ctx.stroke(); }
  for (let i = 1; i < rows; i++) { const y = 400 / rows * i; ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(400, y); ctx.stroke(); }

  // Numbers
  const cw = 400 / cols, ch = 400 / rows;
  ctx.setLineDash([]);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const n = r * cols + c + 1;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.beginPath(); ctx.arc(c * cw + 16, r * ch + 16, 12, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 11px -apple-system,sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(String(n).padStart(2, '0'), c * cw + 16, r * ch + 16);
    }
  }
  document.getElementById('statusInfo').textContent = `${cols}×${rows} · ${cols * rows} 格`;
}

/* Split */
document.getElementById('splitBtn').addEventListener('click', () => {
  if (!img) return;
  pieces = [];
  const side = Math.min(img.width, img.height);
  const sx = (img.width - side) / 2, sy = (img.height - side) / 2;
  const cw = side / cols, ch = side / rows;
  const total = rows * cols;

  const grid = document.getElementById('resultGrid');
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.innerHTML = '';

  let done = 0;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const n = r * cols + c + 1;
      const cv = document.createElement('canvas');
      cv.width = cw; cv.height = ch;
      const ctx = cv.getContext('2d');
      ctx.drawImage(img, sx + c * cw, sy + r * ch, cw, ch, 0, 0, cw, ch);

      const url = cv.toDataURL('image/jpeg', 0.92);
      const cell = document.createElement('div'); cell.className = 'result-cell';
      cell.innerHTML = `<img src="${url}"><div class="result-num">${String(n).padStart(2, '0')}</div>`;
      grid.appendChild(cell);

      cv.toBlob(blob => {
        pieces[n - 1] = { name: `grid_${String(n).padStart(2, '0')}.jpg`, blob };
        done++;
        if (done === total) document.getElementById('downloadBtn').disabled = false;
        cv.width = 0;
      }, 'image/jpeg', 0.92);
    }
  }
  document.getElementById('resultSection').style.display = 'block';
});

/* Download ZIP */
document.getElementById('downloadBtn').addEventListener('click', async () => {
  if (!pieces.length) return;
  const zip = new JSZip();
  pieces.forEach(p => zip.file(p.name, p.blob));
  const blob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `grid_${cols}x${rows}.zip`; a.click();
  URL.revokeObjectURL(url); URL.revokeObjectURL(url); URL.revokeObjectURL(url);
});

drawPreview();
</script>
