.input-group input:focus{border-color:#8B5CF6}
.btn{padding:10px 24px;border-radius:20px;border:none;font-size:12px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,#8B5CF6,#A78BFA);color:#fff;transition:all 150ms;display:block;margin:0 auto}
.btn:hover{transform:translateY(-1px)}

.steps-box .step{padding:6px 0;border-bottom:1px solid var(--border-glass)}

.error-msg{color:#EF4444;text-align:center;font-weight:700;font-size:14px;padding:16px}

<div class="main">
  <div class="glass">
    <div class="section-title">◎ 排列组合计算</div>
    <div class="tab-row">
      <div class="tab active" onclick="setMode(0)">A(n,m) 排列</div>
      <div class="tab" onclick="setMode(1)">C(n,m) 组合</div>
    </div>
    <div class="input-grid">
      <div class="input-group"><label>n（总数）</label><input type="number" id="nInput" value="5" min="0" max="170"></div>
      <div class="input-group"><label>m（选取数）</label><input type="number" id="mInput" value="3" min="0" max="170"></div>
    </div>
    <button class="btn" onclick="calc()">计算</button>
  </div>

      </div>

      <div class="steps-box" id="stepsBox"></div>
    </div>
  </div>
  <div class="glass">
    <div class="section-title">▦ 阶乘速查表（0! ~ 20!）</div>
    <div class="fact-table" id="factTable"></div>
  </div>

<script src="../../shared/theme.js"></script>
<script>
let mode=0;
function setMode(m){mode=m;document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===m))}

function factBig(n){let r=1n;for(let i=2n;i<=BigInt(n);i++)r*=i;return r}

function calc(){
  const n=parseInt(document.getElementById('nInput').value);
  const m=parseInt(document.getElementById('mInput').value);
  if(isNaN(n)||isNaN(m)){alert('请输入有效数值');return}
  if(n<0||m<0){document.getElementById('resultSection').style.display='block';document.getElementById('resultExpr').textContent='';document.getElementById('resultVal').innerHTML='<span style="color:#EF4444">n 和 m 不能为负数</span>';document.getElementById('stepsBox').innerHTML='';return}
  if(m>n){document.getElementById('resultSection').style.display='block';document.getElementById('resultExpr').textContent='';document.getElementById('resultVal').innerHTML='<span style="color:#EF4444">m 不能大于 n</span>';document.getElementById('stepsBox').innerHTML='';return}

  document.getElementById('resultSection').style.display='block';
  let result,steps=[];

  if(mode===0){
    // Permutation A(n,m) = n!/(n-m)!
    result=factBig(n)/factBig(n-m);
    document.getElementById('resultExpr').textContent=`A(${n}, ${m}) = ${n}! / (${n}-${m})!`;
    steps.push(`A(${n}, ${m}) = n! / (n-m)!`);
    steps.push(`= ${n}! / ${n-m}!`);
    if(m<=10){
      let parts=[];for(let i=n;i>n-m;i--)parts.push(i);
      steps.push(`= ${parts.join(' × ')}`);
    }
    steps.push(`= ${result.toLocaleString?result.toString():result}`);
  } else {
    // Combination C(n,m) = n!/[m!(n-m)!]
    result=factBig(n)/(factBig(m)*factBig(n-m));
    document.getElementById('resultExpr').textContent=`C(${n}, ${m}) = ${n}! / (${m}! × (${n}-${m})!)`;
    steps.push(`C(${n}, ${m}) = n! / [m! × (n-m)!]`);
    steps.push(`= ${n}! / (${m}! × ${n-m}!)`);
    if(m<=10){
      let num=[],den=[];for(let i=n;i>n-m;i--)num.push(i);for(let i=m;i>=1;i--)den.push(i);
      steps.push(`= ${num.join('×')} / ${den.join('×')}`);
    }
    steps.push(`= ${result.toString()}`);
  }

  document.getElementById('resultVal').textContent=result.toString();
  document.getElementById('stepsBox').innerHTML=steps.map(s=>`<div class="step">${s}</div>`).join('');
}

// Factorial table
const ft=document.getElementById('factTable');
for(let i=0;i<=20;i++){
  const v=factBig(i).toString();
  ft.innerHTML+=`<div class="fact-item"><span class="fact-n">${i}!</span><span class="fact-v">${v}</span></div>`;
}
</script>
