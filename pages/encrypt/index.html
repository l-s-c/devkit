<script type="module">
import '../../shared/theme.js';

let algo = 'aes', hashAlgo = 'SHA-256';

/* ===== ROT13 ===== */
function rot13(str) {
  return str.replace(/[a-zA-Z]/g, c => {
    const base = c <= 'Z' ? 65 : 97;
    return String.fromCharCode((c.charCodeAt(0) - base + 13) % 26 + base);
  });
}

/* ===== Caesar ===== */
function caesar(str, shift, decrypt = false) {
  const s = decrypt ? (26 - shift) % 26 : shift;
  return str.replace(/[a-zA-Z]/g, c => {
    const base = c <= 'Z' ? 65 : 97;
    return String.fromCharCode((c.charCodeAt(0) - base + s) % 26 + base);
  });
}

/* ===== AES-256-GCM + PBKDF2 ===== */
/* 密文格式: base64(salt(16) + iv(12) + ciphertext) */
async function aesEncrypt(text, password) {
  const enc = new TextEncoder();
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 }, false, ['encrypt']
  );
  const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(text));
  const buf = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
  buf.set(salt, 0);
  buf.set(iv, 16);
  buf.set(new Uint8Array(encrypted), 28);
  return btoa(String.fromCharCode(...buf));
}

async function aesDecrypt(b64, password) {
  const dec = new TextDecoder();
  const enc = new TextEncoder();
  const buf = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const salt = buf.slice(0, 16);
  const iv = buf.slice(16, 28);
  const data = buf.slice(28);
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 }, false, ['decrypt']
  );
  const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
  return dec.decode(decrypted);
}

/* ===== Hash ===== */
async function hashText(text, algorithm) {
  const buf = await crypto.subtle.digest(algorithm, new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

/* ===== 状态 ===== */
function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.innerHTML = (type === 'success' ? '✅ ' : '❌ ') + msg;
}
function clearStatus() { document.getElementById('status').className = 'status'; }

/* ===== 加密 ===== */
async function doEncrypt() {
  const input = document.getElementById('inputText').value;
  if (!input) { showStatus('请输入文本', 'error'); return; }
  try {
    let result = '';
    if (algo === 'aes') {
      const pwd = document.getElementById('password').value;
      if (!pwd) { showStatus('请输入密码', 'error'); return; }
      result = await aesEncrypt(input, pwd);
      showStatus('AES-256-GCM 加密成功', 'success');
    } else if (algo === 'rot13') {
      result = rot13(input);
      showStatus('ROT13 转换完成', 'success');
    } else if (algo === 'caesar') {
      const shift = parseInt(document.getElementById('caesarShift').value);
      result = caesar(input, shift);
      showStatus(`Caesar 位移 ${shift} 加密完成`, 'success');
    } else if (algo === 'hash') {
      result = await hashText(input, hashAlgo);
      showStatus(`${hashAlgo} 哈希完成（不可逆）`, 'success');
    }
    document.getElementById('outputText').value = result;
    document.getElementById('statusInfo').textContent = `${algo.toUpperCase()} · 加密完成`;
  } catch (e) { showStatus('加密失败: ' + e.message, 'error'); }
}

/* ===== 解密 ===== */
async function doDecrypt() {
  const input = document.getElementById('outputText').value || document.getElementById('inputText').value;
  if (!input) { showStatus('请输入要解密的文本', 'error'); return; }
  try {
    let result = '';
    if (algo === 'aes') {
      const pwd = document.getElementById('password').value;
      if (!pwd) { showStatus('请输入密码', 'error'); return; }
      result = await aesDecrypt(input, pwd);
      showStatus('AES-256-GCM 解密成功', 'success');
    } else if (algo === 'rot13') {
      result = rot13(input);
      showStatus('ROT13 转换完成（自反）', 'success');
    } else if (algo === 'caesar') {
      const shift = parseInt(document.getElementById('caesarShift').value);
      result = caesar(input, shift, true);
      showStatus(`Caesar 位移 ${shift} 解密完成`, 'success');
    }
    document.getElementById('inputText').value = result;
    document.getElementById('statusInfo').textContent = `${algo.toUpperCase()} · 解密完成`;
  } catch (e) { showStatus('解密失败：密码错误或密文损坏', 'error'); }
}

/* ===== 自动处理（ROT13/Caesar/Hash 输入即转换）===== */
function autoProcess() {
  if (algo === 'rot13' || algo === 'caesar' || algo === 'hash') doEncrypt();
}

/* ===== 事件绑定 ===== */
document.getElementById('algoTabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  algo = tab.dataset.algo;
  document.querySelectorAll('#algoTabs .tab').forEach(t => t.classList.toggle('active', t.dataset.algo === algo));
  document.getElementById('aesPanel').style.display = algo === 'aes' ? 'block' : 'none';
  document.getElementById('caesarPanel').style.display = algo === 'caesar' ? 'block' : 'none';
  document.getElementById('hashPanel').style.display = algo === 'hash' ? 'block' : 'none';
  document.getElementById('decryptBtn').style.display = algo === 'hash' ? 'none' : '';
  clearStatus();
  autoProcess();
});

document.getElementById('hashTabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  hashAlgo = tab.dataset.hash;
  document.querySelectorAll('#hashTabs .tab').forEach(t => t.classList.toggle('active', t.dataset.hash === hashAlgo));
  autoProcess();
});

document.getElementById('caesarShift').addEventListener('input', function() {
  document.getElementById('caesarShiftVal').textContent = this.value;
  autoProcess();
});

document.getElementById('inputText').addEventListener('input', autoProcess);
document.getElementById('encryptBtn').addEventListener('click', doEncrypt);
document.getElementById('decryptBtn').addEventListener('click', doDecrypt);

document.getElementById('pwdToggle').addEventListener('click', () => {
  const el = document.getElementById('password');
  el.type = el.type === 'password' ? 'text' : 'password';
});

document.getElementById('copyInput').addEventListener('click', function() {
  navigator.clipboard.writeText(document.getElementById('inputText').value).then(() => {
    this.textContent = '已复制 ✓'; setTimeout(() => this.textContent = '复制', 1500);
  });
});
document.getElementById('copyOutput').addEventListener('click', function() {
  navigator.clipboard.writeText(document.getElementById('outputText').value).then(() => {
    this.textContent = '已复制 ✓'; setTimeout(() => this.textContent = '复制', 1500);
  });
});
</script>
