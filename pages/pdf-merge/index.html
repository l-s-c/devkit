<div class="main">
  <div class="panel">
    <div class="security-badge">⊕ 文件不上传服务器，全部本地处理</div>
    <div class="upload-zone" id="dropZone">
      <div style="font-size:32px;margin-bottom:8px">☰</div>
      <div style="font-size:14px;font-weight:700;margin-bottom:4px">拖拽 PDF 文件到此处</div>
      <div style="font-size:12px">或 <span style="color:var(--brand-500);font-weight:600;cursor:pointer">点击选择文件</span>（支持多选）</div>
      <div style="font-size:10px;color:var(--text-caption);margin-top:8px">单文件最大 50MB</div>
      <input type="file" id="fileInput" accept=".pdf" multiple>
    </div>
    <div class="file-list" id="fileList"></div>
    <div class="stats-row" id="statsRow" style="display:none">
      <span id="fileCount">0 个文件</span>
      <span id="totalSize">0 KB</span>
    </div>
    <button class="merge-btn" id="mergeBtn" disabled>⊞ 合并 PDF</button>
    <div class="progress-bar" id="progressBar" style="display:none"><div class="progress-fill" id="progressFill"></div></div>
  </div>

    <div class="result-card">
      <div class="icon">✓</div>
      <div style="font-size:16px;font-weight:800;margin-bottom:4px">合并完成！</div>
      <div style="font-size:12px;color:var(--text-secondary);margin-bottom:16px" id="resultInfo"></div>
      <button class="btn-download" id="downloadBtn">↓ 下载合并后的 PDF</button>
    </div>
  </div>

<div class="statusbar">
  <span id="statusInfo">PDF 合并</span>
  <div class="statusbar-spacer"></div>
  <span>pdf-lib · 纯本地</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js" integrity="sha384-weMABwrltA6jWR8DDe9Jp5blk+tZQh7ugpCsF3JwSA53WZM9/14PjS5LAJNHNjAI" crossorigin="anonymous"></script>
<script type="module">
import '../../shared/theme.js';
import '../../shared/sidebar.js';

let files = [];
let resultUrl = null;

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  addFiles(Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf'));
});
fileInput.addEventListener('change', () => { addFiles(Array.from(fileInput.files)); fileInput.value = ''; });

function addFiles(newFiles) {
  for (const f of newFiles) {
    if (f.size > 50 * 1024 * 1024) {
      document.getElementById('statusInfo').textContent = `⚠ ${f.name} 超过 50MB 限制`;
      continue;
    }
    files.push(f);
  }
  renderList();
}

function renderList() {
  const list = document.getElementById('fileList');
  if (!files.length) {
    list.innerHTML = '';
    document.getElementById('statsRow').style.display = 'none';
    document.getElementById('mergeBtn').disabled = true;
    return;
  }
  list.innerHTML = files.map((f, i) => `
    <div class="file-item" draggable="true" data-idx="${i}">
      <span class="drag-handle">⠿</span>
      <span class="name">☰ ${f.name}</span>
      <span class="meta">${(f.size / 1024).toFixed(1)} KB</span>
      <span class="remove" data-idx="${i}">✕</span>
    </div>`).join('');

  const totalSize = files.reduce((s, f) => s + f.size, 0);
  document.getElementById('fileCount').textContent = `${files.length} 个文件`;
  document.getElementById('totalSize').textContent = totalSize > 1024 * 1024 ? `${(totalSize / 1024 / 1024).toFixed(1)} MB` : `${(totalSize / 1024).toFixed(1)} KB`;
  document.getElementById('statsRow').style.display = 'flex';
  document.getElementById('mergeBtn').disabled = files.length < 2;

  // Drag sorting
  list.querySelectorAll('.file-item').forEach(item => {
    item.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', item.dataset.idx); item.style.opacity = '0.5'; });
    item.addEventListener('dragend', () => { item.style.opacity = '1'; });
    item.addEventListener('dragover', e => e.preventDefault());
    item.addEventListener('drop', e => {
      e.preventDefault();
      const from = parseInt(e.dataTransfer.getData('text/plain'));
      const to = parseInt(item.dataset.idx);
      if (from !== to) { const [moved] = files.splice(from, 1); files.splice(to, 0, moved); renderList(); }
    });
  });

  list.querySelectorAll('.remove').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); files.splice(parseInt(btn.dataset.idx), 1); renderList(); });
  });
}

document.getElementById('mergeBtn').addEventListener('click', async () => {
  if (files.length < 2) return;
  const btn = document.getElementById('mergeBtn');
  btn.disabled = true; btn.textContent = '⏳ 合并中...';
  document.getElementById('progressBar').style.display = 'block';
  document.getElementById('resultPanel').style.display = 'none';
  if (resultUrl) { URL.revokeObjectURL(resultUrl); resultUrl = null; }

  try {
    const { PDFDocument } = PDFLib;
    const merged = await PDFDocument.create();
    let totalPages = 0;

    for (let i = 0; i < files.length; i++) {
      const buf = await files[i].arrayBuffer();
      const doc = await PDFDocument.load(buf);
      const pages = await merged.copyPages(doc, doc.getPageIndices());
      pages.forEach(p => merged.addPage(p));
      totalPages += pages.length;
      document.getElementById('progressFill').style.width = `${((i + 1) / files.length * 100)}%`;
    }

    const pdfBytes = await merged.save();
    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
    resultUrl = URL.createObjectURL(blob);

    const sizeMB = (blob.size / 1024 / 1024).toFixed(2);
    document.getElementById('resultInfo').textContent = `${files.length} 个文件 · ${totalPages} 页 · ${sizeMB} MB`;
    document.getElementById('resultPanel').style.display = 'block';
    document.getElementById('statusInfo').textContent = `✓ 合并完成 ${totalPages} 页`;
  } catch (e) {
    document.getElementById('statusInfo').textContent = '✗ 合并失败：' + e.message;
  }

  btn.disabled = false; btn.textContent = '⊞ 合并 PDF';
  document.getElementById('progressBar').style.display = 'none';
  document.getElementById('progressFill').style.width = '0';
});

document.getElementById('downloadBtn').addEventListener('click', () => {
  if (!resultUrl) return;
  const a = document.createElement('a');
  a.href = resultUrl; a.download = 'merged.pdf'; a.click();
});
</script>
