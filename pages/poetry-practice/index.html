  {t:'静夜思',a:'李白',d:'唐',lines:['床前明月光','疑是地上霜','举头望明月','低头思故乡']},

  {t:'独坐敬亭山',a:'李白',d:'唐',lines:['众鸟高飞尽','孤云独去闲','相看两不厌','只有敬亭山']},
  {t:'夏日绝句',a:'李清照',d:'宋',lines:['生当作人杰','死亦为鬼雄','至今思项羽','不肯过江东']},
  {t:'四时田园杂兴',a:'范成大',d:'宋',lines:['昼出耘田夜绩麻','村庄儿女各当家','童孙未解供耕织','也傍桑阴学种瓜']},
  {t:'秋夕',a:'杜牧',d:'唐',lines:['银烛秋光冷画屏','轻罗小扇扑流萤','天阶夜色凉如水','卧看牵牛织女星']},
  {t:'暮江吟',a:'白居易',d:'唐',lines:['一道残阳铺水中','半江瑟瑟半江红','可怜九月初三夜','露似真珠月似弓']},
  {t:'大林寺桃花',a:'白居易',d:'唐',lines:['人间四月芳菲尽','山寺桃花始盛开','长恨春归无觅处','不知转入此中来']},
  {t:'马诗',a:'李贺',d:'唐',lines:['大漠沙如雪','燕山月似钩','何当金络脑','快走踏清秋']},
  {t:'七步诗',a:'曹植',d:'三国',lines:['煮豆持作羹','漉菽以为汁','萁在釜下燃','豆在釜中泣']},
  {t:'秋浦歌',a:'李白',d:'唐',lines:['白发三千丈','缘愁似个长','不知明镜里','何处得秋霜']},
  {t:'采薇（节选）',a:'《诗经》',d:'先秦',lines:['昔我往矣','杨柳依依','今我来思','雨雪霏霏']},
  {t:'寻隐者不遇',a:'贾岛',d:'唐',lines:['松下问童子','言师采药去','只在此山中','云深不知处']},
];
let idx=0,correct=0,wrong=0,showAns=false;
function pickBlanks(line){
  // pick 1-2 positions to blank out (2-char segments from content words)
  const chars=[...line];if(chars.length<3)return{html:line,answers:[]};
  const pos=Math.floor(Math.random()*(chars.length-1));
  const ans=chars[pos]+chars[pos+1];
  const before=chars.slice(0,pos).join('');
  const after=chars.slice(pos+2).join('');
  return{html:`${before}<input class="poem-blank" maxlength="2" data-ans="${ans}" placeholder="__">${after}`,answers:[ans]};
}
function render(){
  const p=POEMS[idx];
  document.getElementById('pTitle').textContent=p.t;
  document.getElementById('pAuthor').textContent=p.a;
  document.getElementById('pDynasty').textContent=p.d;
  // blank 1-2 lines
  const blankLine=Math.floor(Math.random()*p.lines.length);
  document.getElementById('pLines').innerHTML=p.lines.map((l,i)=>{
    if(i===blankLine){const b=pickBlanks(l);return b.html}
    return l;
  }).join('<br>');
  document.getElementById('sProgress').textContent=`${idx+1}/${POEMS.length}`;
  showAns=false;
  // attach check handlers
  document.querySelectorAll('.poem-blank').forEach(inp=>{
    inp.addEventListener('blur',function(){
      const v=this.value.trim();if(!v)return;
      this.classList.remove('correct','wrong');
      if(v===this.dataset.ans){this.classList.add('correct');correct++}
      else{this.classList.add('wrong');wrong++}
      document.getElementById('sCorrect').textContent=correct;
      document.getElementById('sWrong').textContent=wrong;
    });
  });
}
function next(){idx=(idx+1)%POEMS.length;render()}
function prev(){idx=(idx-1+POEMS.length)%POEMS.length;render()}
document.getElementById('nextBtn').addEventListener('click',next);
document.getElementById('nextBtn2').addEventListener('click',next);
document.getElementById('prevBtn').addEventListener('click',prev);
document.getElementById('readBtn').addEventListener('click',()=>{
  if(!('speechSynthesis' in window))return;speechSynthesis.cancel();
  const p=POEMS[idx];const text=p.t+'，'+p.a+'。'+p.lines.join('，');
  const u=new SpeechSynthesisUtterance(text);u.lang='zh-CN';u.rate=0.9;speechSynthesis.speak(u);
});
document.getElementById('ansBtn').addEventListener('click',()=>{
  showAns=!showAns;
  document.querySelectorAll('.poem-blank').forEach(inp=>{
    if(showAns){inp.value=inp.dataset.ans;inp.classList.add('correct')}
    else{inp.value='';inp.classList.remove('correct','wrong')}
  });
});
render();
</script>
