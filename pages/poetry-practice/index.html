      <button class="btn btn-primary" id="nextBtn">🎲 换一首</button>

        <div class="score-item"><div class="score-num" id="sCorrect" style="color:#10B981">0</div><div class="score-label">正确</div></div>
        <div class="score-item"><div class="score-num" id="sWrong" style="color:#EF4444">0</div><div class="score-label">错误</div></div>
        <div class="score-item"><div class="score-num" id="sProgress">1/30</div><div class="score-label">进度</div></div>
      </div>

<script type="module">
import '../../shared/theme.js';
const POEMS=[
  {t:'静夜思',a:'李白',d:'唐',lines:['床前明月光','疑是地上霜','举头望明月','低头思故乡']},
  {t:'春晓',a:'孟浩然',d:'唐',lines:['春眠不觉晓','处处闻啼鸟','夜来风雨声','花落知多少']},
  {t:'登鹳雀楼',a:'王之涣',d:'唐',lines:['白日依山尽','黄河入海流','欲穷千里目','更上一层楼']},
  {t:'咏鹅',a:'骆宾王',d:'唐',lines:['鹅鹅鹅','曲项向天歌','白毛浮绿水','红掌拨清波']},
  {t:'悯农（其二）',a:'李绅',d:'唐',lines:['锄禾日当午','汗滴禾下土','谁知盘中餐','粒粒皆辛苦']},
  {t:'望庐山瀑布',a:'李白',d:'唐',lines:['日照香炉生紫烟','遥看瀑布挂前川','飞流直下三千尺','疑是银河落九天']},
  {t:'绝句',a:'杜甫',d:'唐',lines:['两个黄鹂鸣翠柳','一行白鹭上青天','窗含西岭千秋雪','门泊东吴万里船']},
  {t:'江南春',a:'杜牧',d:'唐',lines:['千里莺啼绿映红','水村山郭酒旗风','南朝四百八十寺','多少楼台烟雨中']},
  {t:'出塞',a:'王昌龄',d:'唐',lines:['秦时明月汉时关','万里长征人未还','但使龙城飞将在','不教胡马度阴山']},
  {t:'回乡偶书',a:'贺知章',d:'唐',lines:['少小离家老大回','乡音无改鬓毛衰','儿童相见不相识','笑问客从何处来']},
  {t:'望天门山',a:'李白',d:'唐',lines:['天门中断楚江开','碧水东流至此回','两岸青山相对出','孤帆一片日边来']},
  {t:'赠汪伦',a:'李白',d:'唐',lines:['李白乘舟将欲行','忽闻岸上踏歌声','桃花潭水深千尺','不及汪伦送我情']},
  {t:'早发白帝城',a:'李白',d:'唐',lines:['朝辞白帝彩云间','千里江陵一日还','两岸猿声啼不住','轻舟已过万重山']},
  {t:'江雪',a:'柳宗元',d:'唐',lines:['千山鸟飞绝','万径人踪灭','孤舟蓑笠翁','独钓寒江雪']},
  {t:'游子吟',a:'孟郊',d:'唐',lines:['慈母手中线','游子身上衣','临行密密缝','意恐迟迟归']},
  {t:'元日',a:'王安石',d:'宋',lines:['爆竹声中一岁除','春风送暖入屠苏','千门万户曈曈日','总把新桃换旧符']},
  {t:'泊船瓜洲',a:'王安石',d:'宋',lines:['京口瓜洲一水间','钟山只隔数重山','春风又绿江南岸','明月何时照我还']},
  {t:'题西林壁',a:'苏轼',d:'宋',lines:['横看成岭侧成峰','远近高低各不同','不识庐山真面目','只缘身在此山中']},
  {t:'示儿',a:'陆游',d:'宋',lines:['死去元知万事空','但悲不见九州同','王师北定中原日','家祭无忘告乃翁']},
  {t:'小池',a:'杨万里',d:'宋',lines:['泉眼无声惜细流','树阴照水爱晴柔','小荷才露尖尖角','早有蜻蜓立上头']},
  {t:'晓出净慈寺送林子方',a:'杨万里',d:'宋',lines:['毕竟西湖六月中','风光不与四时同','接天莲叶无穷碧','映日荷花别样红']},
  {t:'春日',a:'朱熹',d:'宋',lines:['胜日寻芳泗水滨','无边光景一时新','等闲识得东风面','万紫千红总是春']},
  {t:'村居',a:'高鼎',d:'清',lines:['草长莺飞二月天','拂堤杨柳醉春烟','儿童散学归来早','忙趁东风放纸鸢']},
  {t:'所见',a:'袁枚',d:'清',lines:['牧童骑黄牛','歌声振林樾','意欲捕鸣蝉','忽然闭口立']},
  {t:'夜书所见',a:'叶绍翁',d:'宋',lines:['萧萧梧叶送寒声','江上秋风动客情','知有儿童挑促织','夜深篱落一灯明']},
  {t:'敕勒歌',a:'北朝民歌',d:'南北朝',lines:['敕勒川','阴山下','天似穹庐','笼盖四野']},
  {t:'鹿柴',a:'王维',d:'唐',lines:['空山不见人','但闻人语响','返景入深林','复照青苔上']},
  {t:'送元二使安西',a:'王维',d:'唐',lines:['渭城朝雨浥轻尘','客舍青青柳色新','劝君更尽一杯酒','西出阳关无故人']},
  {t:'九月九日忆山东兄弟',a:'王维',d:'唐',lines:['独在异乡为异客','每逢佳节倍思亲','遥知兄弟登高处','遍插茱萸少一人']},
  {t:'黄鹤楼送孟浩然之广陵',a:'李白',d:'唐',lines:['故人西辞黄鹤楼','烟花三月下扬州','孤帆远影碧空尽','唯见长江天际流']},
];
let idx=0,correct=0,wrong=0,showAns=false;
function pickBlanks(line){
  // pick 1-2 positions to blank out (2-char segments from content words)
  const chars=[...line];if(chars.length<3)return{html:line,answers:[]};
  const pos=Math.floor(Math.random()*(chars.length-1));
  const ans=chars[pos]+chars[pos+1];
  const before=chars.slice(0,pos).join('');
  const after=chars.slice(pos+2).join('');
  return{html:`${before}<input class="poem-blank" maxlength="2" data-ans="${ans}" placeholder="__">${after}`,answers:[ans]};
}
function render(){
  const p=POEMS[idx];
  document.getElementById('pTitle').textContent=p.t;
  document.getElementById('pAuthor').textContent=p.a;
  document.getElementById('pDynasty').textContent=p.d;
  // blank 1-2 lines
  const blankLine=Math.floor(Math.random()*p.lines.length);
  document.getElementById('pLines').innerHTML=p.lines.map((l,i)=>{
    if(i===blankLine){const b=pickBlanks(l);return b.html}
    return l;
  }).join('<br>');
  document.getElementById('sProgress').textContent=`${idx+1}/${POEMS.length}`;
  showAns=false;
  // attach check handlers
  document.querySelectorAll('.poem-blank').forEach(inp=>{
    inp.addEventListener('blur',function(){
      const v=this.value.trim();if(!v)return;
      this.classList.remove('correct','wrong');
      if(v===this.dataset.ans){this.classList.add('correct');correct++}
      else{this.classList.add('wrong');wrong++}
      document.getElementById('sCorrect').textContent=correct;
      document.getElementById('sWrong').textContent=wrong;
    });
  });
}
function next(){idx=(idx+1)%POEMS.length;render()}
function prev(){idx=(idx-1+POEMS.length)%POEMS.length;render()}
document.getElementById('nextBtn').addEventListener('click',next);
document.getElementById('nextBtn2').addEventListener('click',next);
document.getElementById('prevBtn').addEventListener('click',prev);
document.getElementById('readBtn').addEventListener('click',()=>{
  if(!('speechSynthesis' in window))return;speechSynthesis.cancel();
  const p=POEMS[idx];const text=p.t+'，'+p.a+'。'+p.lines.join('，');
  const u=new SpeechSynthesisUtterance(text);u.lang='zh-CN';u.rate=0.9;speechSynthesis.speak(u);
});
document.getElementById('ansBtn').addEventListener('click',()=>{
  showAns=!showAns;
  document.querySelectorAll('.poem-blank').forEach(inp=>{
    if(showAns){inp.value=inp.dataset.ans;inp.classList.add('correct')}
    else{inp.value='';inp.classList.remove('correct','wrong')}
  });
});
render();
</script>
