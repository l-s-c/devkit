<style>
body{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;min-height:0;position:relative;z-index:1}
.input-area{display:grid;grid-template-columns:1fr 1fr;flex:0 0 40%;border-bottom:0.5px solid var(--border-glass-outer)}
.input-pane{display:flex;flex-direction:column;min-height:0}
.input-pane:first-child{border-right:0.5px solid var(--border-glass-outer)}
.input-head{height:28px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:var(--bg-glass);border-bottom:0.5px solid var(--border-glass-outer);flex-shrink:0;font-size:11px;font-weight:600;color:var(--text-tertiary)}
.input-pane textarea{flex:1;width:100%;padding:12px 16px;font-family:var(--font-code);font-size:13px;line-height:1.7;background:transparent;border:none;outline:none;color:var(--text-primary);resize:none}
.diff-result{flex:1;overflow-y:auto;font-family:var(--font-code);font-size:12px;line-height:1.8}
.diff-line{display:flex;padding:0 16px;min-height:22px}
.diff-ln{min-width:40px;text-align:right;padding-right:8px;color:var(--text-caption);user-select:none}
.diff-content{flex:1;white-space:pre-wrap;word-break:break-all}
.diff-add{background:rgba(34,197,94,0.12)}
.diff-del{background:rgba(239,68,68,0.12)}
.diff-add .diff-content{color:#16A34A}
.diff-del .diff-content{color:#DC2626}
[data-theme="dark"] .diff-add{background:rgba(34,197,94,0.08)}
[data-theme="dark"] .diff-del{background:rgba(239,68,68,0.08)}
[data-theme="dark"] .diff-add .diff-content{color:#4ADE80}
[data-theme="dark"] .diff-del .diff-content{color:#FCA5A5}
.diff-header{padding:8px 16px;font-size:11px;font-weight:600;color:var(--text-caption);background:var(--bg-glass);border-bottom:0.5px solid var(--border-glass-outer)}
</style>

<body>
<h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">文本对比 — DevKit 在线开发者工具箱</h1>

<div class="mesh-bg"><div class="mesh-blob"></div><div class="mesh-blob"></div><div class="mesh-blob"></div></div>

<div class="topbar">
  <a class="topbar-logo" href="/"><svg class="topbar-logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="6" fill="url(#bg)"/><path d="M8 7L4 12L8 17M16 7L20 12L16 17" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="bg" x1="0" y1="0" x2="24" y2="24"><stop stop-color="#6366F1"/><stop offset="1" stop-color="#818CF8"/></linearGradient></defs></svg><span class="topbar-logo-text">DevKit</span></a>
  <span class="topbar-tool-name">文本对比</span>
  <div class="topbar-spacer"></div>
  <button class="theme-btn" onclick="toggleTheme()">🌙</button>
</div>

<div class="tool-toolbar">
  <button class="btn-tool" id="btnDiff" style="background:var(--brand-500);color:white;border:none">🔍 对比</button>
  <button class="btn-tool" id="btnSample">示例</button>
  <label class="checkbox-label"><input type="checkbox" id="ignoreWs"> 忽略空白</label>
  <label class="checkbox-label"><input type="checkbox" id="ignoreCase"> 忽略大小写</label>
  <div class="toolbar-spacer"></div>
  <button class="btn-tool" id="btnSwap">🔄 交换</button>
  <button class="btn-tool" id="btnClear">✕ 清空</button>
</div>

<div class="main">
  <div class="input-area">
    <div class="input-pane"><div class="input-head"><span>原始文本</span><span id="leftMeta"></span></div><textarea id="leftText" placeholder="输入原始文本..."></textarea></div>
    <div class="input-pane"><div class="input-head"><span>修改文本</span><span id="rightMeta"></span></div><textarea id="rightText" placeholder="输入修改后的文本..."></textarea></div>
  </div>
  <div class="diff-header" id="diffHeader" style="display:none"></div>
  <div class="diff-result" id="diffResult"><div style="text-align:center;color:var(--text-caption);padding:40px">输入两段文本即可实时对比</div></div>
</div>

<div class="statusbar">
  <span id="statLabel">—</span>
  <div class="statusbar-spacer"></div>
</div>

  <noscript><p>文本对比 — DevKit 在线开发者工具箱。请启用 JavaScript 以使用本工具。</p></noscript>
