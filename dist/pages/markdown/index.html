body{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0;position:relative;z-index:1}
.edit-pane{display:flex;flex-direction:column;border-right:0.5px solid var(--border-glass-outer);min-height:0}
.preview-pane{display:flex;flex-direction:column;min-height:0}
.pane-head{height:32px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:var(--bg-glass);border-bottom:0.5px solid var(--border-glass-outer);flex-shrink:0;font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase}
.edit-area{flex:1;min-height:0}
.edit-area textarea{width:100%;height:100%;padding:16px 18px;font-family:var(--font-code);font-size:13px;line-height:1.7;background:transparent;border:none;outline:none;color:var(--text-primary);resize:none;tab-size:2}
.edit-area textarea::placeholder{color:var(--text-caption)}
.preview-area{flex:1;overflow-y:auto;padding:20px 24px;font-size:14px;line-height:1.8;color:var(--text-primary)}
.preview-area h1{font-size:28px;font-weight:700;margin:20px 0 12px;padding-bottom:8px;border-bottom:0.5px solid var(--border-glass-outer)}
.preview-area h2{font-size:22px;font-weight:600;margin:18px 0 10px;padding-bottom:6px;border-bottom:0.5px solid var(--border-glass-outer)}
.preview-area h3{font-size:17px;font-weight:600;margin:16px 0 8px}
.preview-area p{margin:8px 0}
.preview-area code{font-family:var(--font-code);font-size:12px;background:var(--bg-glass-input);padding:2px 6px;border-radius:4px}
.preview-area pre{background:var(--bg-glass-input);border:0.5px solid var(--border-input);border-radius:10px;padding:14px 16px;overflow-x:auto;margin:12px 0}
.preview-area pre code{background:none;padding:0;font-size:13px;line-height:1.6}
.preview-area blockquote{border-left:3px solid var(--brand-500);padding:4px 16px;margin:12px 0;color:var(--text-secondary);background:var(--bg-glass-input);border-radius:0 8px 8px 0}
.preview-area ul,.preview-area ol{padding-left:24px;margin:8px 0}
.preview-area li{margin:4px 0}
.preview-area a{color:var(--brand-500);text-decoration:none}
.preview-area a:hover{text-decoration:underline}
.preview-area table{border-collapse:collapse;width:100%;margin:12px 0}
.preview-area th,.preview-area td{border:0.5px solid var(--border-input);padding:8px 12px;text-align:left;font-size:13px}
.preview-area th{background:var(--bg-glass);font-weight:600}
.preview-area img{max-width:100%;border-radius:8px}
.preview-area li.task{list-style:none;margin-left:-20px}
.preview-area li.task input{margin-right:6px;accent-color:var(--brand-500)}
.preview-area hr{border:none;border-top:0.5px solid var(--border-glass-outer);margin:20px 0}
</style>
