body{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;display:grid;grid-template-columns:360px 1fr;min-height:0;position:relative;z-index:1;overflow:hidden}

/* Left panel */
.left-panel{display:flex;flex-direction:column;gap:0;border-right:0.5px solid var(--border-glass-outer);overflow-y:auto;padding:16px}
.color-swatch{width:100%;height:180px;border-radius:16px;border:0.5px solid var(--border-glass-outer);position:relative;overflow:hidden;cursor:pointer;flex-shrink:0}
.color-swatch input[type="color"]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}

.hue-bar{width:100%;height:16px;border-radius:8px;margin-top:12px;background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00);cursor:crosshair;position:relative;flex-shrink:0}
.hue-thumb{width:12px;height:20px;border-radius:4px;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.3);position:absolute;top:-2px;transform:translateX(-50%);pointer-events:none}

.format-group{margin-top:16px;display:flex;flex-direction:column;gap:8px}
.format-row{display:flex;align-items:center;gap:8px}
.format-label{font-size:10px;font-weight:700;color:var(--text-tertiary);min-width:36px;font-family:var(--font-code)}
.format-input{flex:1;height:32px;padding:0 10px;font-family:var(--font-code);font-size:12px;background:var(--bg-glass-input);border:0.5px solid var(--border-input);border-radius:8px;color:var(--text-primary);outline:none}
.format-input:focus{border-color:var(--brand-500)}
.fmt-copy{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--text-tertiary);cursor:pointer;border-radius:6px;font-size:12px}
.fmt-copy:hover{background:var(--bg-glass-hover)}

.recent-colors{display:flex;gap:6px;flex-wrap:wrap;margin-top:16px}
.recent-dot{width:32px;height:32px;border-radius:8px;border:0.5px solid var(--border-glass-outer);cursor:pointer;transition:transform 200ms}
.recent-dot:hover{transform:scale(1.12)}

/* Right panel */
.right-panel{overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
.panel-card{padding:16px;background:var(--bg-glass-card);backdrop-filter:blur(12px);border:0.5px solid var(--border-glass);border-radius:14px}
.panel-title{font-size:12px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}
.palette-grid{display:flex;gap:8px;flex-wrap:wrap}
.palette-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.palette-swatch{width:56px;height:56px;border-radius:10px;border:0.5px solid var(--border-glass-outer);transition:transform 200ms}
.palette-swatch:hover{transform:scale(1.08)}
.palette-label{font-size:10px;color:var(--text-caption)}
.palette-hex{font-size:10px;font-family:var(--font-code);color:var(--text-tertiary)}

.gradient-preview{height:80px;border-radius:12px;border:0.5px solid var(--border-glass-outer);margin-bottom:12px}
.gradient-code{font-family:var(--font-code);font-size:12px;color:var(--text-primary);background:var(--bg-glass-input);padding:8px 12px;border-radius:8px;word-break:break-all;cursor:pointer}
.gradient-controls{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.gradient-stop{width:32px;height:32px;border-radius:8px;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.2);cursor:pointer;position:relative}
.gradient-stop input[type="color"]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}
.gradient-angle{width:60px}

.contrast-section{display:flex;gap:12px;align-items:center}
.contrast-preview{width:120px;height:60px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;border:0.5px solid var(--border-glass-outer)}
.contrast-details{flex:1}
.contrast-ratio-big{font-size:28px;font-weight:700;font-family:var(--font-code)}
.contrast-badges{display:flex;gap:6px;margin-top:4px}
.cbadge{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700}
.cbadge-pass{background:#D1FAE5;color:#059669}
.cbadge-fail{background:#FEE2E2;color:#DC2626}
[data-theme="dark"] .cbadge-pass{background:rgba(5,150,105,0.2);color:#34D399}
[data-theme="dark"] .cbadge-fail{background:rgba(220,38,38,0.2);color:#FCA5A5}
.contrast-bg-input{display:flex;gap:8px;align-items:center;margin-top:8px}
</style>
