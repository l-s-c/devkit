body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
.main { flex: 1; overflow-y: auto; position: relative; z-index: 1; display: flex; flex-direction: column; }
.jwt-input-area { padding: 16px; flex-shrink: 0; background: var(--bg-glass); backdrop-filter: saturate(var(--glass-saturate)) blur(20px); border-bottom: 0.5px solid var(--border-glass-outer); }
.jwt-input-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.jwt-input-label { font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; }
.jwt-textarea { width: 100%; height: 56px; padding: 10px 14px; font-family: var(--font-code); font-size: 12px; line-height: 1.5; background: var(--bg-glass-input); border: 0.5px solid var(--border-input); border-radius: 12px; color: var(--text-primary); outline: none; resize: none; }
.jwt-textarea:focus { border-color: var(--brand-500); }
.jwt-textarea::placeholder { color: var(--text-caption); }
.jwt-result { flex: 1; display: grid; grid-template-columns: 1fr 1fr; min-height: 0; }
.jwt-segment { display: flex; flex-direction: column; min-height: 0; border-right: 0.5px solid var(--border-glass-outer); }
.jwt-segment:last-child { border-right: none; }
.jwt-segment-header { height: 36px; padding: 0 16px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; border-bottom: 0.5px solid var(--border-glass-outer); background: var(--bg-glass); }
.jwt-segment-tag { padding: 2px 8px; font-size: 10px; font-weight: 700; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.tag-header { background: #DBEAFE; color: #1D4ED8; }
.tag-payload { background: #EDE9FE; color: #6D28D9; }
[data-theme="dark"] .tag-header { background: rgba(29,78,216,0.2); color: #60A5FA; }
[data-theme="dark"] .tag-payload { background: rgba(109,40,217,0.2); color: #A78BFA; }
.jwt-segment-meta { font-size: 11px; color: var(--text-caption); }
.jwt-segment-body { flex: 1; padding: 16px; overflow: auto; font-family: var(--font-code); font-size: 13px; line-height: 1.8; color: var(--text-primary); min-height: 0; white-space: pre-wrap; }
.expire-bar { height: 32px; padding: 0 16px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; background: var(--bg-glass); border-top: 0.5px solid var(--border-glass-outer); font-size: 12px; color: var(--text-secondary); }
.expire-dot { width: 8px; height: 8px; border-radius: 50%; }
.expire-dot.ok { background: var(--success); box-shadow: 0 0 6px rgba(48,209,88,0.4); }
.expire-dot.expired { background: var(--error); box-shadow: 0 0 6px rgba(255,69,58,0.4); }
</style>
